services:
  cloudsim:
    build:
      context: ./cloudsim-backbone
    ports:
      - "9010:9010"
    environment:
      CLOUDLEARN_CLOUDSIM_HOST: 0.0.0.0
      CLOUDLEARN_CLOUDSIM_PORT: 9010
      CLOUDLEARN_CLOUDSIM_STATE_FILE: /data/cloudsim_state.json
    volumes:
      - cloudsim-data:/data
    restart: unless-stopped

  cloudlearn-sql-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudlearn
    ports:
      - "5432:5432"
    volumes:
      - vyomi-sql-pg:/var/lib/postgresql/data
    restart: unless-stopped

  vyomi-sql-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudlearn
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - vyomi-sql-mysql:/var/lib/mysql
    restart: unless-stopped

  vyomi-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/data"]
    ports:
      - "4443:4443"
    volumes:
      - vyomi-gcs:/data
    restart: unless-stopped

  # P1: official Google emulators — let real gRPC client libraries (Pub/Sub,
  # Firestore) work by pointing PUBSUB_EMULATOR_HOST / FIRESTORE_EMULATOR_HOST
  # at these; the simulator delegates its console/REST handlers to them too.
  #
  # v2.0.3+: both emulators now persist to named volumes so topics /
  # subscriptions / messages / collections / documents survive a
  # `docker compose up --force-recreate` (which is what `vyomi upgrade`
  # does to swap in a new image). See packaging/firestore/firestore-start.sh
  # for the Firestore import-on-restart wrapper (Firestore's --import-data
  # needs a real metadata file; the wrapper handles first-boot gracefully).
  # Pub/Sub: gcloud emulator's --data-dir flag was found to write only
  # env.yaml (not actual topic WAL). v2.0.3 ships the volume mount +
  # scaffolding so when v2.1.0 adds STATE-write to the simulator's GCP
  # Pub/Sub proxy endpoints, the rehydrate_pubsub_topics() hook in
  # core/backend_rehydrate.py will recover everything. Today: topics +
  # subscriptions created via direct emulator hits do NOT survive
  # `vyomi upgrade`. Topics created via the simulator's catalog
  # endpoints will survive once v2.1.0 lands.
  cloudlearn-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","pubsub","start","--host-port=0.0.0.0:8085","--project=cloudlearn","--data-dir=/data"]
    ports:
      - "8085:8085"
    volumes:
      - cloudlearn-pubsub:/data
    restart: unless-stopped

  # Firestore: persistence via REST-export-on-SIGTERM + import-on-boot.
  # See packaging/firestore/firestore-start.sh — the gcloud --export-on-
  # exit flag was found to be a no-op when SIGTERM isn't forwarded
  # cleanly to the JVM, so we POST /emulator/v1/projects/<id>:export
  # ourselves before letting the container die. stop_grace_period
  # gives the REST call up to 30s + a bit of slack for big collections.
  cloudlearn-firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    entrypoint: ["/bin/bash", "/etc/vyomi/firestore-start.sh"]
    ports:
      - "8080:8080"
    volumes:
      - cloudlearn-firestore:/data
      - ./packaging/firestore/firestore-start.sh:/etc/vyomi/firestore-start.sh:ro
    stop_grace_period: 45s
    restart: unless-stopped

  # MVP P0 backends — fidelity-first: real engines back the simulator's surfaces.
  # Vault     → AWS KMS + Secrets Manager + GCP Cloud KMS + Secret Manager + Azure Key Vault
  # NATS      → AWS EventBridge + GCP Eventarc + Azure Event Grid (single broker, 3 surfaces)
  # MinIO     → AWS S3 (real bytes, SigV4)
  # DynamoDB  → AWS DynamoDB (official Amazon emulator; real PartiQL)
  # ElasticMQ → AWS SQS (real FIFO + visibility timeout)

  # v2.0.3+: Vault now runs in PROD mode with a file backend so KMS keys
  # (transit/) and secrets (cloudlearn-kv/) survive container recreate.
  # vault-init.sh runs `vault operator init` on first boot and stores the
  # single unseal key + root token in /vault/data/init.json. Subsequent
  # boots unseal automatically from that file. The root token is then
  # written to /vault/shared/root_token where the simulator container
  # reads it on startup (see core/vault_client.py).
  #
  # Upgrade-from-v2.0.2 note: dev-mode Vault was in-memory; users who
  # upgrade will need to recreate any KMS keys / secrets they had in
  # v2.0.2. The simulator detects this and surfaces a one-time banner.
  cloudlearn-vault:
    image: hashicorp/vault:1.15
    entrypoint: ["/bin/sh", "/etc/vyomi/vault-init.sh"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - cloudlearn-vault-data:/vault/data
      - cloudlearn-vault-shared:/vault/shared
      - ./packaging/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - ./packaging/vault/vault-init.sh:/etc/vyomi/vault-init.sh:ro
    restart: unless-stopped

  vyomi-nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - vyomi-nats:/data
    restart: unless-stopped

  vyomi-minio:
    image: minio/minio:latest
    command: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cloudlearn
      MINIO_ROOT_PASSWORD: cloudlearn-dev-secret-key
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - vyomi-minio:/data
    restart: unless-stopped

  vyomi-dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    working_dir: /home/dynamodblocal
    user: root
    ports:
      - "8000:8000"
    volumes:
      - vyomi-dynamodb:/data
    restart: unless-stopped

  # v2.0.3+: ElasticMQ now reads a HOCON config from a mounted file +
  # has a /data volume mount. Queue DEFINITIONS survive container recreate
  # because the simulator re-declares them from cloudlearn_state.sqlite3
  # on startup (core/backend_rehydrate.py). In-flight messages don't
  # survive (ElasticMQ OSS is in-memory only) — matches real SQS's
  # best-effort message durability semantics.
  cloudlearn-elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - cloudlearn-elasticmq:/data
      - ./packaging/elasticmq/elasticmq.conf:/opt/elasticmq.conf:ro
    restart: unless-stopped

  simulator:
    # v2.0.8 progressive startup — Wave 1 (instant): simulator + caddy are the
    # only services a plain `docker compose up -d` brings up. Pull the prebuilt
    # published image by default (the launcher runs `compose pull` first) for a
    # fast install; `build: .` stays as a local-dev fallback when the image
    # isn't available.
    image: ${VYOMI_SIMULATOR_IMAGE:-${CLOUDLEARN_SIMULATOR_IMAGE:-vyomi/appliance:latest}}
    build: .
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No depends_on the backend containers: the simulator serves the console +
    # license + read-only browsing with just its SQLite state, connecting to
    # backends lazily. The heavy backends live under the `backends` profile and
    # stream in as Wave 2 (background) — see core/appliance_readiness + launcher.
    environment:
      CLOUDLEARN_STATE_FILE: /data/cloudlearn_state.sqlite3
      CLOUDLEARN_LICENSE_SECRET: cloudlearn-dev-secret
      CLOUDLEARN_CLOUDSIM_URL: http://cloudsim:9010
      # Distribution mode — customer-safe default. Override to `developer`
      # via a host `.env` file alongside this compose file when running the
      # internal UI-conformance harness in tests/conformance/ui/ (which
      # needs /api/license/signup to be unlocked for tier promotion).
      CLOUDLEARN_DISTRIBUTION_MODE: ${CLOUDLEARN_DISTRIBUTION_MODE:-appliance}
      CLOUDLEARN_DEV_MODE: ${CLOUDLEARN_DEV_MODE:-0}
      # Pre-issued install id from the package-manager phone-home. When
      # the `vyomi` CLI launcher detects $HOME/.vyomi/install_id on the
      # host (written by brew/.deb/.rpm/scoop postinst), it forwards
      # that value here so the simulator adopts it via
      # get_or_create_install_id(). Empty → simulator falls back to its
      # own hardware-derived id (docker-compose-direct users).
      VYOMI_INSTALL_ID: ${VYOMI_INSTALL_ID:-}
      # Disk-health gate. Default ON (enabled) — refuses VM creates the
      # host can't safely back. Set CLOUDLEARN_DISK_GATE=disabled in a
      # host-side `.env` for tight-disk dogfood runs only. Customer
      # installs MUST NOT set this.
      CLOUDLEARN_DISK_GATE: ${CLOUDLEARN_DISK_GATE:-enabled}
      CLOUDLEARN_DEPLOY_DIR: /var/lib/cloudlearn/deployments
      CLOUDLEARN_HOST_SIZING_FILE: /config/cloudlearn-host-sizing.json
      CLOUDLEARN_RUNTIME_BRIDGE_URL: http://host.docker.internal:9171
      # Real Cloud SQL data plane (P1a): provision DBs on these engines.
      CLOUDLEARN_SQL_PG_HOST: cloudlearn-sql-postgres
      CLOUDLEARN_SQL_PG_PORT: "5432"
      CLOUDLEARN_SQL_PG_ADMIN_USER: postgres
      CLOUDLEARN_SQL_PG_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_SQL_MYSQL_HOST: vyomi-sql-mysql
      CLOUDLEARN_SQL_MYSQL_PORT: "3306"
      CLOUDLEARN_SQL_MYSQL_ADMIN_USER: root
      CLOUDLEARN_SQL_MYSQL_ADMIN_PASSWORD: cloudlearn
      # Real Cloud Storage data plane (P1b): object bytes live in fake-gcs-server.
      CLOUDLEARN_GCS_URL: http://vyomi-gcs:4443
      # P1: official Pub/Sub + Firestore emulators back the gRPC data planes.
      PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
      CLOUDLEARN_PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      CLOUDLEARN_FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
      # MVP P0 backends — see compose service block above.
      # v2.0.3+: Vault now runs in prod mode. The root token is generated on
      # first boot by vault-init.sh and written to the shared volume mounted
      # at /run/vault/root_token. core/vault_client.py reads that file (with
      # a short retry loop in case vault-init is still bringing the server
      # up). The env-var fallback below is kept for tests / one-off runs.
      CLOUDLEARN_VAULT_URL: http://cloudlearn-vault:8200
      CLOUDLEARN_VAULT_TOKEN_FILE: /run/vault/root_token
      CLOUDLEARN_VAULT_TOKEN: ""
      CLOUDLEARN_NATS_URL: nats://vyomi-nats:4222
      CLOUDLEARN_MINIO_URL: http://vyomi-minio:9000
      CLOUDLEARN_MINIO_ACCESS_KEY: cloudlearn
      CLOUDLEARN_MINIO_SECRET_KEY: cloudlearn-dev-secret-key
      CLOUDLEARN_DYNAMODB_URL: http://vyomi-dynamodb:8000
      CLOUDLEARN_ELASTICMQ_URL: http://cloudlearn-elasticmq:9324
    volumes:
      - vyomi-data:/data
      - /var/lib/cloudlearn/deployments:/var/lib/cloudlearn/deployments
      - /var/lib/cloudlearn/host-sizing-report.json:/config/cloudlearn-host-sizing.json:ro
      # Host SSH pubkey for the Connect feature. Populated during
      # `cloud-learn appliance up` by vyomi_mount_host_pubkey_into_appliance.
      # vm_connect.py reads it and pushes it into every new LXD container
      # as ~ubuntu/.ssh/authorized_keys, so users never download a key.
      - /etc/vyomi/host-ssh-pubkey.pub:/config/host-ssh-pubkey.pub:ro
      # v2.0.3+: shared volume with cloudlearn-vault so the simulator can
      # read the prod-mode root token written by vault-init.sh. Mounted
      # read-only — only the vault container writes here.
      - cloudlearn-vault-shared:/run/vault:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:9000/healthz').read().decode())"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Caddy TLS terminator (Phase 12 — vyomi rebrand) ────────────────────
  # Serves https://vyomi.local:9443 with the mkcert-signed cert pushed
  # into the appliance VM by the launcher (multipass transfer of cert.pem
  # + key.pem from ~/.vyomi/tls/ on the host → /etc/vyomi/tls/ in the VM).
  caddy:
    image: caddy:2-alpine
    ports:
      - "9443:9443"
    depends_on:
      - simulator
    volumes:
      - /etc/vyomi/tls:/etc/caddy/tls:ro
      - /etc/vyomi/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--no-check-certificate", "-O-", "https://127.0.0.1:9443/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  vyomi-data:
  cloudsim-data:
  vyomi-sql-pg:
  vyomi-sql-mysql:
  vyomi-gcs:
  vyomi-nats:
  vyomi-minio:
  vyomi-dynamodb:
  # v2.0.3+ — close the 4 state-persistence gaps (Pub/Sub topics,
  # Firestore collections, Vault KMS keys + secrets, ElasticMQ queue
  # defs) so `docker compose up --force-recreate` (what `vyomi upgrade`
  # does) doesn't silently wipe user resources.
  cloudlearn-pubsub:
  cloudlearn-firestore:
  cloudlearn-vault-data:
  cloudlearn-vault-shared:
  cloudlearn-elasticmq:
  caddy-data:
  caddy-config:
