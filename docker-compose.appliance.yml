services:
  cloudsim:
    build:
      context: ./cloudsim-backbone
    ports:
      - "9010:9010"
    environment:
      CLOUDLEARN_CLOUDSIM_HOST: 0.0.0.0
      CLOUDLEARN_CLOUDSIM_PORT: 9010
      CLOUDLEARN_CLOUDSIM_STATE_FILE: /data/cloudsim_state.json
    volumes:
      - cloudsim-data:/data
    restart: unless-stopped

  cloudlearn-sql-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudlearn
    ports:
      - "5432:5432"
    volumes:
      - vyomi-sql-pg:/var/lib/postgresql/data
    restart: unless-stopped

  vyomi-sql-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudlearn
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - vyomi-sql-mysql:/var/lib/mysql
    restart: unless-stopped

  vyomi-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/data"]
    ports:
      - "4443:4443"
    volumes:
      - vyomi-gcs:/data
    restart: unless-stopped

  # P1: official Google emulators — let real gRPC client libraries (Pub/Sub,
  # Firestore) work by pointing PUBSUB_EMULATOR_HOST / FIRESTORE_EMULATOR_HOST
  # at these; the simulator delegates its console/REST handlers to them too.
  cloudlearn-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","pubsub","start","--host-port=0.0.0.0:8085","--project=cloudlearn"]
    ports:
      - "8085:8085"
    restart: unless-stopped

  cloudlearn-firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","firestore","start","--host-port=0.0.0.0:8080","--project=cloudlearn"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  # MVP P0 backends — fidelity-first: real engines back the simulator's surfaces.
  # Vault     → AWS KMS + Secrets Manager + GCP Cloud KMS + Secret Manager + Azure Key Vault
  # NATS      → AWS EventBridge + GCP Eventarc + Azure Event Grid (single broker, 3 surfaces)
  # MinIO     → AWS S3 (real bytes, SigV4)
  # DynamoDB  → AWS DynamoDB (official Amazon emulator; real PartiQL)
  # ElasticMQ → AWS SQS (real FIFO + visibility timeout)

  cloudlearn-vault:
    image: hashicorp/vault:1.15
    command: ["server", "-dev", "-dev-root-token-id=cloudlearn-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: cloudlearn-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    restart: unless-stopped

  vyomi-nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - vyomi-nats:/data
    restart: unless-stopped

  vyomi-minio:
    image: minio/minio:latest
    command: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cloudlearn
      MINIO_ROOT_PASSWORD: cloudlearn-dev-secret-key
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - vyomi-minio:/data
    restart: unless-stopped

  vyomi-dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    working_dir: /home/dynamodblocal
    user: root
    ports:
      - "8000:8000"
    volumes:
      - vyomi-dynamodb:/data
    restart: unless-stopped

  cloudlearn-elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    restart: unless-stopped

  simulator:
    build: .
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloudlearn-sql-postgres
      - vyomi-sql-mysql
      - vyomi-gcs
      - cloudlearn-pubsub
      - cloudlearn-firestore
      - cloudlearn-vault
      - vyomi-nats
      - vyomi-minio
      - vyomi-dynamodb
      - cloudlearn-elasticmq
    environment:
      CLOUDLEARN_STATE_FILE: /data/cloudlearn_state.sqlite3
      CLOUDLEARN_LICENSE_SECRET: cloudlearn-dev-secret
      CLOUDLEARN_CLOUDSIM_URL: http://cloudsim:9010
      CLOUDLEARN_DISTRIBUTION_MODE: appliance
      CLOUDLEARN_DEPLOY_DIR: /var/lib/cloudlearn/deployments
      CLOUDLEARN_HOST_SIZING_FILE: /config/cloudlearn-host-sizing.json
      CLOUDLEARN_RUNTIME_BRIDGE_URL: http://host.docker.internal:9171
      # Real Cloud SQL data plane (P1a): provision DBs on these engines.
      CLOUDLEARN_SQL_PG_HOST: cloudlearn-sql-postgres
      CLOUDLEARN_SQL_PG_PORT: "5432"
      CLOUDLEARN_SQL_PG_ADMIN_USER: postgres
      CLOUDLEARN_SQL_PG_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_SQL_MYSQL_HOST: vyomi-sql-mysql
      CLOUDLEARN_SQL_MYSQL_PORT: "3306"
      CLOUDLEARN_SQL_MYSQL_ADMIN_USER: root
      CLOUDLEARN_SQL_MYSQL_ADMIN_PASSWORD: cloudlearn
      # Real Cloud Storage data plane (P1b): object bytes live in fake-gcs-server.
      CLOUDLEARN_GCS_URL: http://vyomi-gcs:4443
      # P1: official Pub/Sub + Firestore emulators back the gRPC data planes.
      PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
      CLOUDLEARN_PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      CLOUDLEARN_FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
      # MVP P0 backends — see compose service block above.
      CLOUDLEARN_VAULT_URL: http://cloudlearn-vault:8200
      CLOUDLEARN_VAULT_TOKEN: cloudlearn-dev-token
      CLOUDLEARN_NATS_URL: nats://vyomi-nats:4222
      CLOUDLEARN_MINIO_URL: http://vyomi-minio:9000
      CLOUDLEARN_MINIO_ACCESS_KEY: cloudlearn
      CLOUDLEARN_MINIO_SECRET_KEY: cloudlearn-dev-secret-key
      CLOUDLEARN_DYNAMODB_URL: http://vyomi-dynamodb:8000
      CLOUDLEARN_ELASTICMQ_URL: http://cloudlearn-elasticmq:9324
    volumes:
      - vyomi-data:/data
      - /var/lib/cloudlearn/deployments:/var/lib/cloudlearn/deployments
      - /var/lib/cloudlearn/host-sizing-report.json:/config/cloudlearn-host-sizing.json:ro
      # Host SSH pubkey for the Connect feature. Populated during
      # `cloud-learn appliance up` by vyomi_mount_host_pubkey_into_appliance.
      # vm_connect.py reads it and pushes it into every new LXD container
      # as ~ubuntu/.ssh/authorized_keys, so users never download a key.
      - /etc/vyomi/host-ssh-pubkey.pub:/config/host-ssh-pubkey.pub:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:9000/healthz').read().decode())"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  vyomi-data:
  cloudsim-data:
  vyomi-sql-pg:
  vyomi-sql-mysql:
  vyomi-gcs:
  vyomi-nats:
  vyomi-minio:
  vyomi-dynamodb:
