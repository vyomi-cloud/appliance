// ElasticMQ config for the Vyomi appliance.
//
// ElasticMQ (open-source) is an in-memory SQS-compatible broker — it does
// NOT have on-disk message persistence in the OSS build. The state-survival
// contract for SQS is therefore:
//
//   * Queue DEFINITIONS survive an appliance restart: the simulator's
//     SimulationKernel state DB (vyomi-data volume / cloudlearn_state.sqlite3)
//     authoritatively owns the queue list. On simulator startup, every queue
//     in `service_states.sqs` is re-declared against ElasticMQ before the
//     SPA serves traffic. The user sees their queues come back.
//
//   * In-flight MESSAGES do NOT survive a restart. Messages sit in the
//     ElasticMQ JVM heap; a container restart drops them. This mirrors real
//     SQS behaviour on a region-wide outage — message durability is best-
//     effort, queue durability is contractual.
//
// If we ever need on-disk message persistence we'd swap to localstack-sqs
// or a Postgres-backed implementation; for v2.0.3 the trade-off is honest
// and explicit.

include classpath("application.conf")

node-address {
    protocol = http
    host = "*"
    port = 9324
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    // strict = behave like real SQS (reject oversized payloads etc.)
    sqs-limits = strict
}

rest-stats {
    enabled = true
    bind-port = 9325
    bind-hostname = "0.0.0.0"
}

// AWS account ID stamped on returned ARNs. Matches the value the simulator
// uses for the canonical AWS account.
aws {
    region = us-east-1
    accountId = "123456789012"
}

// Default queue settings the simulator overrides on a per-queue basis when
// re-declaring from sqlite state on startup.
queues {
    // Queues are declared programmatically by the simulator — leave empty.
}
