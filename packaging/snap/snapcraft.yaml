name: cloud-learn
base: core24
adopt-info: cloud-learn  # part-name whose override-pull calls craftctl set version=...
summary: Local multi-cloud simulator with AWS/GCP/Azure parity
description: |
  CloudLearn runs AWS, GCP, and Azure simulation locally with cloud-faithful
  APIs that work with standard provider SDKs (boto3, aws-sdk-java, google-cloud-*,
  azure-sdk-for-*) and CLIs (aws, gcloud, gsutil, bq, az, terraform) — no shim
  required, just override the endpoint URL.

  This snap packages the launcher in appliance mode. The full simulator stack
  runs inside a Multipass VM boundary that the launcher provisions.

  Includes 9 AWS services, 9 GCP services, 11 Azure services backed by real
  sidecar integrations (Vault, NATS, MinIO, Postgres, MySQL, DynamoDB Local,
  ElasticMQ, Cedar, fake-gcs-server). 4-tier licensing (Free/Student/Developer/
  Enterprise), multi-tenant + cross-tenant RBAC, SSO, Terraform export.

license: MIT
grade: stable
confinement: classic   # needs to control Multipass + docker on the host
contact: support@cloudlearn.io
issues: https://github.com/sudhirkumarganti/cloud-learn/issues
source-code: https://github.com/sudhirkumarganti/cloud-learn
website: https://github.com/sudhirkumarganti/cloud-learn
title: CloudLearn

# snapcraft 8+ with base: core24 uses 'platforms', not 'architectures'.
# Each platform maps a build host arch → target arch. GitHub Actions
# ubuntu-latest runners are amd64; arm64 builds require either an
# arm64 runner or QEMU emulation. Starting amd64-only — adding arm64
# is an extra `runs-on: ubuntu-24.04-arm` matrix job (next iteration).
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  cloud-learn:
    command: bin/cloud-learn
    environment:
      CLOUDLEARN_DISTRIBUTION_MODE: appliance
      CLOUD_LEARN_HOME: $SNAP/cloudlearn
    # Classic confinement = full host access. plugs/slots are NOT allowed
    # alongside classic confinement and the Snap Store review rejects the
    # upload if they're present. (The plugs were redundant anyway — a
    # classic snap can already touch the network, home dir, etc.)
    #
    # Classic confinement requires manual approval from the Snapcraft team:
    #   https://forum.snapcraft.io/c/store-requests/classic-confinement/26
    # Justification: the launcher must invoke `multipass launch`,
    # `multipass exec`, and other host binaries to manage the appliance VM.
    # Strict-confined snaps run in a sandbox and can't see /usr/bin/multipass.

parts:
  cloud-learn:
    # Pull the curated tarball produced by release.yml — same artefact
    # the GitHub Release ships. Smaller than `source: ../..` (which
    # copied .git/, target/, tests/, etc — that was hanging the build
    # for 40+ min on file-system thrash).
    #
    # The VERSION env var here is the snap version (set via adopt-info);
    # we fetch the tarball using the same string.
    plugin: nil
    build-environment:
      - CL_VERSION: "0.1.0"
    override-pull: |
      VER="${CL_VERSION}"
      echo "Fetching cloud-learn ${VER} source tarball..."
      curl -fsSL "https://github.com/sudhirkumarganti/cloud-learn/releases/download/v${VER}/cloud-learn-${VER}.tar.gz" \
        | tar xz --strip-components=1
      craftctl set version="${VER}"
    override-build: |
      mkdir -p "$CRAFT_PART_INSTALL/bin"
      mkdir -p "$CRAFT_PART_INSTALL/cloudlearn"
      # Only ship the runtime tree the launcher needs.
      cp -r core providers packs static scripts \
            server.py requirements.txt VERSION Dockerfile \
            docker-compose.yml docker-compose.appliance.yml \
            "$CRAFT_PART_INSTALL/cloudlearn/" 2>/dev/null || true
      cat > "$CRAFT_PART_INSTALL/bin/cloud-learn" <<'EOF'
      #!/bin/sh
      export CLOUD_LEARN_HOME="$SNAP/cloudlearn"
      export CLOUDLEARN_DISTRIBUTION_MODE=appliance
      exec bash "$SNAP/cloudlearn/scripts/cloud-learn" "$@"
      EOF
      chmod 0755 "$CRAFT_PART_INSTALL/bin/cloud-learn"
    stage-packages:
      - bash
      - curl
