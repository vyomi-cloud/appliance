# NOTE: Reference scaffold. The FIRST winget-pkgs submission of Vyomi.Vyomi is
# manual (winget-releaser only UPDATES existing packages); subsequent releases
# are auto-bumped by the `winget-submit` job, which recomputes InstallerSha256 +
# ProductCode from the release MSI. InstallerSha256 below is filled from the real
# v2.1.0.2 release MSI when the PR to microsoft/winget-pkgs is opened.
PackageIdentifier: Vyomi.Vyomi
PackageVersion: 2.1.0.2
InstallerType: msi
Scope: machine
InstallModes:
  - interactive
  - silent
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/vyomi-cloud/appliance/releases/download/v2.1.0.2/cloud-learn-2.1.0.2-x64.msi
    InstallerSha256: FILLED_FROM_v2.1.0.2_RELEASE_MSI
ManifestType: installer
ManifestVersion: 1.6.0
