name: Docker Publish

# Builds + pushes multi-arch (amd64 + arm64) vyomi/appliance images.
# Appliance publishes to BOTH Docker Hub + GHCR (unlike portal which is
# Docker Hub only) so users can pull from either registry.
#
# Triggers (release-driven — main pushes do NOT build):
#   stable tag    v1.2.0       → :1.2.0 + :latest  (both registries)
#   prerelease    v1.2.0-rc1   → :1.2.0-rc1 only   (never :latest — SemVer rule)
#   manual run    tag=foo      → :foo only
#   manual run    no tag input → :edge + :sha-<short>
#
# Why no auto-build on main pushes:
#   • Daily commits to main are dev iteration, not releases — we don't
#     want every commit to ship an image. That would churn Hub tag lists,
#     consume CI minutes, and tempt users to pin :edge in production.
#   • Build only when you explicitly cut a version (`git tag v0.x.y`).
#   • Manual sanity build from current main is still available via the
#     "Run workflow" button on the Actions tab.
#
# Required secrets (configure once at github.com/<org>/<repo>/settings/secrets):
#   DOCKERHUB_USERNAME — Docker Hub account that owns the cloudlearn org
#   DOCKERHUB_TOKEN    — Docker Hub access token (Account Settings → Security)
#
# GHCR auth uses the workflow-issued GITHUB_TOKEN — no secret needed.
# If DOCKERHUB_TOKEN is missing, the Docker Hub login + tag steps are
# skipped (HAS_DOCKERHUB guard), and the build still pushes to GHCR.

on:
  push:
    tags: ['v*.*.*']      # release tags ONLY — branch pushes are ignored
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (leave blank for :edge + :sha-<short>)"
        required: false

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tags
        id: meta
        run: |
          # Stable tag      (v1.2.0)         → :1.2.0 + :latest  (both registries)
          # Pre-release tag (v1.2.0-rc1,     → :1.2.0-rc1 ONLY (no :latest)
          #                  v2.0.0-beta.3)   SemVer rule: anything after the
          #                                   first '-' is a pre-release; never
          #                                   promote it to :latest, otherwise
          #                                   users pinned to :latest would
          #                                   silently land on an RC.
          # Manual dispatch with tag input    → :<input>    (no :latest)
          # Manual dispatch, no input         → :edge + :sha-<7chars>
          DH="vyomi/appliance"
          GH="ghcr.io/vyomi-cloud/appliance"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
            if [[ "${VER}" == *-* ]]; then
              TAGS="${DH}:${VER},${GH}:${VER}"
              PRERELEASE="yes"
            else
              TAGS="${DH}:${VER},${DH}:latest,${GH}:${VER},${GH}:latest"
              PRERELEASE="no"
            fi
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            VER="${{ github.event.inputs.tag }}"
            TAGS="${DH}:${VER},${GH}:${VER}"
            PRERELEASE="n/a"
          else
            VER="edge"
            SHORT="${GITHUB_SHA::7}"
            TAGS="${DH}:edge,${DH}:sha-${SHORT},${GH}:edge,${GH}:sha-${SHORT}"
            PRERELEASE="n/a"
          fi
          echo "version=${VER}"         >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}"           >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          {
            echo "## Will publish"
            echo
            echo "- **version**: \`${VER}\`"
            echo "- **prerelease**: \`${PRERELEASE}\`"
            echo "- **tags**:"
            for t in ${TAGS//,/ }; do echo "  - \`$t\`"; done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Embed git SHA + build date in image labels for traceability.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description (stable tag only)
        # Pre-release tags don't update the Hub README — the README should
        # always reflect the latest stable user-facing docs.
        if: |
          startsWith(github.ref, 'refs/tags/v') &&
          steps.meta.outputs.prerelease == 'no' &&
          env.HAS_DOCKERHUB == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vyomi/appliance
          short-description: "Local multi-cloud simulator — AWS/GCP/Azure with real backends"
          readme-filepath: ./docs/DOCKERHUB.md
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}
