name: Release

# On every v*.*.* tag (or manual dispatch):
#   1. Build the source tarball + .deb + .rpm
#   2. Publish a GitHub Release with all artifacts attached
#   3. Fan out to downstream package managers (Brew tap, Snap Store,
#      winget, Chocolatey) — each one is OPT-IN via its secret being set
#
# Required secrets — none for a default release (just builds the tarball
# + .deb + .rpm + GitHub Release). Each downstream PM is gated on its
# own secret being present. Adding a secret turns that PM's job on:
#
#   HOMEBREW_TAP_TOKEN        — PAT (contents:write) on the homebrew-tap repo
#   SNAPCRAFT_STORE_CREDENTIALS — output of `snapcraft export-login`
#   WINGET_TOKEN              — PAT (public_repo) for opening PRs to microsoft/winget-pkgs
#   CHOCOLATEY_API_KEY        — push key from chocolatey.org
#
# The Docker Hub publish lives in a separate workflow (docker-publish.yml).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write     # github-release needs to write the Release page
  packages: write     # if any job ever needs to push to GHCR

env:
  GH_OWNER: sudhirkumarganti
  GH_REPO:  cloud-learn

jobs:
  # ── Preflight: which downstream PMs have credentials? ───────────────────
  # Secrets CANNOT be referenced from job-level `if:` expressions in GitHub
  # Actions. The clean workaround is to evaluate them inside a step and
  # surface the result via job outputs that downstream `if:` can consume.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_brew:   ${{ steps.check.outputs.has_brew }}
      has_snap:   ${{ steps.check.outputs.has_snap }}
      has_winget: ${{ steps.check.outputs.has_winget }}
      has_choco:  ${{ steps.check.outputs.has_choco }}
    steps:
      - id: check
        env:
          BREW:   ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SNAP:   ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET: ${{ secrets.WINGET_TOKEN }}
          CHOCO:  ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          mask() { [ -n "$1" ] && echo true || echo false; }
          {
            echo "has_brew=$(mask "$BREW")"
            echo "has_snap=$(mask "$SNAP")"
            echo "has_winget=$(mask "$WINGET")"
            echo "has_choco=$(mask "$CHOCO")"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Downstream targets"
            echo "- Homebrew tap : $(mask "$BREW")"
            echo "- Snap Store   : $(mask "$SNAP")"
            echo "- Winget       : $(mask "$WINGET")"
            echo "- Chocolatey   : $(mask "$CHOCO")"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── source tarball + deb + rpm ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tarball_sha256: ${{ steps.shas.outputs.tarball_sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.14"}
      - uses: ruby/setup-ruby@v1
        with: {ruby-version: '3.3'}

      - name: Install fpm (for .deb + .rpm)
        run: gem install --no-document fpm

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF#refs/tags/v}"
          fi
          echo "$VER" > VERSION
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        run: |
          mkdir -p dist
          tar czf "dist/cloud-learn-${{ steps.ver.outputs.version }}.tar.gz" \
            --exclude='.git' --exclude='__pycache__' --exclude='node_modules' \
            --exclude='dist' --exclude='**/target' --exclude='**/playwright-report' \
            --transform "s,^,cloud-learn-${{ steps.ver.outputs.version }}/," \
            core providers packs server.py static requirements.txt VERSION \
            Dockerfile docker-compose.yml docker-compose.appliance.yml \
            .env.example packaging scripts docs install.sh \
            README.md CHANGELOG.md LICENSE

      - name: Build .deb
        run: bash packaging/debian/build-deb.sh "${{ steps.ver.outputs.version }}"

      - name: Build .rpm via fpm
        run: |
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/usr/lib/cloud-learn" "$STAGE/usr/bin" "$STAGE/usr/share/doc/cloud-learn"
          cp -r core providers packs static scripts \
                server.py requirements.txt VERSION Dockerfile \
                docker-compose.yml docker-compose.appliance.yml .env.example install.sh \
                "$STAGE/usr/lib/cloud-learn/"
          cat > "$STAGE/usr/bin/cloud-learn" <<'EOF'
          #!/usr/bin/env bash
          export CLOUD_LEARN_HOME="${CLOUD_LEARN_HOME:-/usr/lib/cloud-learn}"
          export CLOUDLEARN_DISTRIBUTION_MODE="${CLOUDLEARN_DISTRIBUTION_MODE:-appliance}"
          exec bash "$CLOUD_LEARN_HOME/scripts/cloud-learn" "$@"
          EOF
          chmod 0755 "$STAGE/usr/bin/cloud-learn"
          cp README.md LICENSE CHANGELOG.md "$STAGE/usr/share/doc/cloud-learn/"
          fpm -s dir -t rpm \
            -n cloud-learn -v "${{ steps.ver.outputs.version }}" \
            --license MIT --architecture noarch \
            --maintainer "CloudLearn <support@cloudlearn.io>" \
            --url "https://github.com/${{ env.GH_OWNER }}/${{ env.GH_REPO }}" \
            --description "Local multi-cloud simulator (AWS/GCP/Azure) with real backends" \
            --depends bash --depends curl \
            --chdir "$STAGE" \
            --package "dist/cloud-learn-${{ steps.ver.outputs.version }}-1.noarch.rpm" \
            .

      - name: Compute SHA256 of tarball (Homebrew formula bump needs it)
        id: shas
        run: |
          TARBALL_SHA="$(sha256sum dist/cloud-learn-${{ steps.ver.outputs.version }}.tar.gz | awk '{print $1}')"
          echo "tarball_sha256=$TARBALL_SHA" >> "$GITHUB_OUTPUT"
          {
            for f in dist/*; do sha256sum "$f"; done
          } > dist/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 30

  # ── GitHub Release page ─────────────────────────────────────────────────
  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {name: release-artifacts, path: dist}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VER="${{ needs.build.outputs.version }}"
          # Extract section between ## [<version>] and the next ## header
          awk -v v="$VER" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" v "\\]") { in_section=1; next }
            }
            in_section { print }
          ' CHANGELOG.md > /tmp/changelog-section.md || true
          [ -s /tmp/changelog-section.md ] || echo "See CHANGELOG.md" > /tmp/changelog-section.md
          {
            echo 'body<<EOF'
            cat /tmp/changelog-section.md
            echo
            echo "---"
            echo "## Artifacts"
            echo
            ls dist | sed 's/^/- /'
            echo
            echo "**Docker image:** \`docker pull gansudkum/cloud-learn:${VER}\`"
            echo "**Install:** \`curl -fsSL https://raw.githubusercontent.com/${{ env.GH_OWNER }}/${{ env.GH_REPO }}/main/install.sh | bash\`"
            echo "**SHA256 checksums:** see \`SHA256SUMS\` in attached artifacts."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: CloudLearn v${{ needs.build.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*

  # ── Brew tap auto-bump ──────────────────────────────────────────────────
  # Bumps cloud-learn.rb in the sudhirkumarganti/homebrew-tap repo with the
  # new url + sha256. Requires HOMEBREW_TAP_TOKEN secret (PAT with `contents:write`
  # on sudhirkumarganti/homebrew-tap). Falls back to a no-op if missing.
  brew-bump:
    needs: [preflight, build]
    if: needs.preflight.outputs.has_brew == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GH_OWNER }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump formula
        run: |
          VER="${{ needs.build.outputs.version }}"
          SHA="${{ needs.build.outputs.tarball_sha256 }}"
          F=tap/Formula/cloud-learn.rb
          # Point at the workflow-built RELEASE-ASSET tarball — that's the
          # file whose SHA we compute in the build job (the GitHub
          # auto-tarball at /archive/refs/tags/* has different bytes and
          # a different SHA).
          sed -i.bak \
            -e "s|url \".*\"|url \"https://github.com/${{ env.GH_OWNER }}/${{ env.GH_REPO }}/releases/download/v${VER}/cloud-learn-${VER}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            -e "s|version \".*\"|version \"${VER}\"|" \
            "$F"
          rm -f "$F.bak"
          cd tap
          git config user.email "bot@cloudlearn.io"
          git config user.name  "CloudLearn Release Bot"
          git add Formula/cloud-learn.rb
          git commit -m "cloud-learn ${VER}"
          git push

  # ── Snap Store publish ──────────────────────────────────────────────────
  snap-publish:
    needs: [preflight, build]
    if: needs.preflight.outputs.has_snap == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snapcore/action-build@v1
        id: build-snap
        with: {path: packaging/snap}
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build-snap.outputs.snap }}
          release: stable

  # ── Winget PR submission ────────────────────────────────────────────────
  # NOTE: winget consumes .msi installers — we don't build one yet.
  # This job stays gated behind WINGET_TOKEN AND the existence of an .msi
  # in dist/ (the winget-releaser action looks for it). For MVP it stays
  # skipped; revisit once we ship a real MSI installer.
  winget-submit:
    needs: [preflight, build]
    if: needs.preflight.outputs.has_winget == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: CloudLearn.CloudLearn
          version: ${{ needs.build.outputs.version }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}

  # ── Chocolatey publish ──────────────────────────────────────────────────
  choco-publish:
    needs: [preflight, build]
    if: needs.preflight.outputs.has_choco == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update nuspec version
        shell: pwsh
        run: |
          $ver = "${{ needs.build.outputs.version }}"
          (Get-Content packaging/chocolatey/cloud-learn.nuspec) `
            -replace '<version>.*</version>', "<version>$ver</version>" `
            | Set-Content packaging/chocolatey/cloud-learn.nuspec
      - name: Pack
        run: choco pack packaging/chocolatey/cloud-learn.nuspec --outputdirectory dist
      - name: Push
        run: choco push dist/cloud-learn.${{ needs.build.outputs.version }}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
