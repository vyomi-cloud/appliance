title: "[Show & Tell] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Built something with Vyomi?
        We love seeing what people make. Drop a screenshot, a repo link, a blog post,
        a video — anything. Bonus points if you can share the use case + tier so others
        in the same boat can find your story.

  - type: textarea
    id: what
    attributes:
      label: What did you build?
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links (repo, demo, blog post, video, screenshot)
    validations:
      required: false

  - type: textarea
    id: feedback
    attributes:
      label: What worked? What didn't? What would you change?
    validations:
      required: false
