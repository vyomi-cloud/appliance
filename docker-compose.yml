services:
  cloudsim:
    # Pull the published image (docker-compose-only / pull-only installs); falls
    # back to building from ./cloudsim-backbone when the source tree is present
    # (dev clone) or the image isn't available. Mirrors the simulator service.
    image: ${VYOMI_CLOUDSIM_IMAGE:-${CLOUDLEARN_CLOUDSIM_IMAGE:-vyomi/cloudsim:latest}}
    build:
      context: ./cloudsim-backbone
    ports:
      - "9010:9010"
    environment:
      CLOUDLEARN_CLOUDSIM_HOST: 0.0.0.0
      CLOUDLEARN_CLOUDSIM_PORT: 9010
      CLOUDLEARN_CLOUDSIM_STATE_FILE: /data/cloudsim_state.json
    volumes:
      - cloudsim-data:/data
    restart: unless-stopped

  vyomi-sql-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudlearn
    ports:
      - "5432:5432"
    volumes:
      - vyomi-sql-pg:/var/lib/postgresql/data
    restart: unless-stopped

  vyomi-sql-mysql:
    # Heavy (~200 MB) — opt-in via the lazy provisioner on first MySQL call,
    # or eagerly via `docker compose --profile full up`.
    profiles: ["full"]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudlearn
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - vyomi-sql-mysql:/var/lib/mysql
    restart: unless-stopped

  vyomi-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/data"]
    ports:
      - "4443:4443"
    volumes:
      - vyomi-gcs:/data
    restart: unless-stopped

  # ── MVP backends — all lazy-provisioned by default ────────────────────
  # These services are NOT started by `docker compose up -d`. The simulator
  # pulls + runs them on demand via core/backend_provisioner.py the first
  # time a user clicks the matching feature (S3 → minio, Vault → vault, etc.).
  # They're declared here too so power users can opt for eager start via:
  #   docker compose --profile full up -d

  vyomi-vault:
    profiles: ["full"]
    image: hashicorp/vault:1.15
    command: ["server", "-dev", "-dev-root-token-id=vyomi-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: vyomi-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    restart: unless-stopped

  vyomi-nats:
    profiles: ["full"]
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - vyomi-nats:/data
    restart: unless-stopped

  vyomi-minio:
    profiles: ["full"]
    image: minio/minio:latest
    command: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cloudlearn
      MINIO_ROOT_PASSWORD: cloudlearn-dev-secret-key
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - vyomi-minio:/data
    restart: unless-stopped

  vyomi-dynamodb:
    profiles: ["full"]
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    working_dir: /home/dynamodblocal
    user: root
    ports:
      - "8000:8000"
    volumes:
      - vyomi-dynamodb:/data
    restart: unless-stopped

  vyomi-elasticmq:
    profiles: ["full"]
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    restart: unless-stopped

  # ── v2.0.9 new-service backends (Azure Storage + GCP emulators) ──────────
  # Added so the dev stack can exercise the v2.0.9 messaging/secrets/KMS work:
  # Azurite serves Azure Blob (:10000) AND Queue (:10001 — the AMQP→HTTP
  # substitution for Service Bus); the Google emulators back native Pub/Sub +
  # Firestore gRPC. Profile-gated "full" like the other backends.
  vyomi-azurite:
    profiles: ["full"]
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: ["azurite", "--blobHost", "0.0.0.0", "--blobPort", "10000",
              "--queueHost", "0.0.0.0", "--queuePort", "10001",
              "--location", "/data", "--loose", "--skipApiVersionCheck"]
    ports:
      - "10000:10000"
      - "10001:10001"
    volumes:
      - vyomi-azurite:/data
    restart: unless-stopped

  vyomi-pubsub:
    profiles: ["full"]
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","pubsub","start","--host-port=0.0.0.0:8085","--project=cloudlearn"]
    ports:
      - "8085:8085"
    restart: unless-stopped

  vyomi-firestore:
    profiles: ["full"]
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","firestore","start","--host-port=0.0.0.0:8080"]
    # Host port 18080 (the probe's Spring Boot app uses 8080). The simulator
    # still reaches it internally at vyomi-firestore:8080.
    ports:
      - "18080:8080"
    restart: unless-stopped

  simulator:
    # Default: use the published image from Docker Hub. To build from source
    # instead (e.g. for local development), set CLOUDLEARN_SIMULATOR_IMAGE
    # to an empty string OR run `docker compose build simulator`.
    # Default to :latest — the publish workflow's pre-release guard keeps
    # :latest pinned to the most recent STABLE tag (not RCs). Pin explicitly
    # in your .env for production:
    #   CLOUDLEARN_SIMULATOR_IMAGE=vyomi/appliance:0.1.0
    image: ${VYOMI_SIMULATOR_IMAGE:-${CLOUDLEARN_SIMULATOR_IMAGE:-vyomi/appliance:latest}}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${VYOMI_SIMULATOR_PORT:-${CLOUDLEARN_SIMULATOR_PORT:-9000}}:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      # Default install only requires the 2 small backends. The rest
      # (vault, nats, minio, dynamodb, elasticmq, mysql) are lazy-provisioned
      # via /api/runtime/backends/{name}/provision when first used.
      - vyomi-sql-postgres
      - vyomi-gcs
    environment:
      CLOUDLEARN_STATE_FILE: /data/cloudlearn_state.sqlite3
      # PRODUCTION: override CLOUDLEARN_LICENSE_SECRET via env or .env file
      CLOUDLEARN_LICENSE_SECRET: ${VYOMI_LICENSE_SECRET:-${CLOUDLEARN_LICENSE_SECRET:-cloudlearn-dev-secret}}
      # Identity-first license backend (CloudLearn Portal). Reachable from
      # inside the container. Override per environment:
      #   - Production:    https://portal.cloudlearn.io
      #   - Local Mac:     http://host.docker.internal:8001
      #   - Compose net:   http://vyomi-portal:8000  (if portal in same compose)
      CLOUDLEARN_LICENSE_BACKEND_URL: ${VYOMI_LICENSE_BACKEND_URL:-${CLOUDLEARN_LICENSE_BACKEND_URL:-https://vyomi.cloud}}
      # Refresh interval (seconds) — appliance validates with portal to pick
      # up subscription changes. Default 24h — matches JWT TTL and the
      # user-facing "validate once per day" promise. The JWT's
      # sub_expires_at claim is the real hard enforcement signal; shorter
      # intervals just add network chatter without improving security.
      CLOUDLEARN_LICENSE_REFRESH_INTERVAL_SECONDS: ${VYOMI_LICENSE_REFRESH_INTERVAL_SECONDS:-${CLOUDLEARN_LICENSE_REFRESH_INTERVAL_SECONDS:-86400}}
      CLOUDLEARN_CLOUDSIM_URL: http://cloudsim:9010
      CLOUDLEARN_DEPLOY_DIR: /var/lib/cloudlearn/deployments
      CLOUDLEARN_HOST_CONFIG_FILE: /config/cloudlearn-host.json
      CLOUDLEARN_HOST_SIZING_FILE: /config/cloudlearn-host-sizing.json
      CLOUDLEARN_PARENT_OS: ${VYOMI_PARENT_OS:-${CLOUDLEARN_PARENT_OS:-linux}}
      CLOUDLEARN_DISTRIBUTION_MODE: ${VYOMI_DISTRIBUTION_MODE:-${CLOUDLEARN_DISTRIBUTION_MODE:-developer}}
      CLOUDLEARN_RUNTIME_BRIDGE_URL: ${VYOMI_RUNTIME_BRIDGE_URL:-${CLOUDLEARN_RUNTIME_BRIDGE_URL:-http://host.docker.internal:9171}}
      CLOUDLEARN_SQL_PG_HOST: vyomi-sql-postgres
      CLOUDLEARN_SQL_PG_PORT: "5432"
      CLOUDLEARN_SQL_PG_ADMIN_USER: postgres
      CLOUDLEARN_SQL_PG_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_SQL_MYSQL_HOST: vyomi-sql-mysql
      CLOUDLEARN_SQL_MYSQL_PORT: "3306"
      CLOUDLEARN_SQL_MYSQL_ADMIN_USER: root
      CLOUDLEARN_SQL_MYSQL_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_GCS_URL: http://vyomi-gcs:4443
      # MVP P0 backends.
      CLOUDLEARN_VAULT_URL: http://vyomi-vault:8200
      CLOUDLEARN_VAULT_TOKEN: vyomi-dev-token
      CLOUDLEARN_NATS_URL: nats://vyomi-nats:4222
      CLOUDLEARN_MINIO_URL: http://vyomi-minio:9000
      CLOUDLEARN_MINIO_ACCESS_KEY: cloudlearn
      CLOUDLEARN_MINIO_SECRET_KEY: cloudlearn-dev-secret-key
      CLOUDLEARN_DYNAMODB_URL: http://vyomi-dynamodb:8000
      CLOUDLEARN_ELASTICMQ_URL: http://vyomi-elasticmq:9324
      # v2.0.9 new-service backends — Azure Storage (blob + queue) + GCP emulators.
      CLOUDLEARN_AZURITE_URL: http://vyomi-azurite:10000
      CLOUDLEARN_AZURITE_QUEUE_URL: http://vyomi-azurite:10001
      PUBSUB_EMULATOR_HOST: vyomi-pubsub:8085
      CLOUDLEARN_PUBSUB_EMULATOR_HOST: vyomi-pubsub:8085
      FIRESTORE_EMULATOR_HOST: vyomi-firestore:8080
      CLOUDLEARN_FIRESTORE_EMULATOR_HOST: vyomi-firestore:8080
    volumes:
      - vyomi-data:/data
      - /var/lib/cloudlearn/deployments:/var/lib/cloudlearn/deployments
      - ./.cloudlearn-host.json:/config/cloudlearn-host.json:ro
      - ./.cloudlearn-appliance/host-sizing-report.json:/config/cloudlearn-host-sizing.json:ro
      # Host SSH pubkey for the Connect feature — installed during
      # `cloud-learn appliance up` by vyomi_mount_host_pubkey_into_appliance.
      # If absent (dev), vm_connect.py falls back to per-instance keygen.
      - /etc/vyomi/host-ssh-pubkey.pub:/config/host-ssh-pubkey.pub:ro
      # Lazy backend provisioner (core/backend_provisioner.py) needs to
      # pull + run sibling containers (MinIO, Vault, NATS, etc.) on demand
      # via the host Docker daemon. The socket is mounted RO at the kernel
      # level — the SDK still writes to it via /var/run/docker.sock.
      - /var/run/docker.sock:/var/run/docker.sock
    # read_only: dropped — the docker SDK + lazy provisioner write small
    # state files (~/.docker, tempdirs). If you re-enable read_only, also
    # add a tmpfs for ~/.docker.
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:9000/healthz').read().decode())"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── CloudLearn Portal (license + auth + checkout) ────────────────────────
  # Lives in its OWN repo at ../cloud-learn-portal — fully decoupled from
  # the appliance. Bundled here under `--profile portal` for local dev
  # convenience only. PRODUCTION: deploy that repo on its own host
  # (Render/Fly/Railway) and point CLOUDLEARN_LICENSE_BACKEND_URL at it.
  #   cd ../cloud-learn-portal && docker compose up   ← prod-style standalone
  #   docker compose --profile portal up -d           ← bundled dev
  vyomi-portal:
    profiles: ["portal"]
    image: python:3.12-slim
    working_dir: /app
    command: ["sh", "-c", "pip install -q -r requirements.txt && python -m app.keygen && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8001:8000"
    volumes:
      - ../cloud-learn-portal/app:/app/app:ro
      - ../cloud-learn-portal/scripts:/app/scripts:ro
      - ../cloud-learn-portal/requirements.txt:/app/requirements.txt:ro
      - vyomi-portal-keys:/app/keys
      - vyomi-portal-data:/app/data
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token-CHANGE}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-CHANGE}
      LICENSE_ISSUER: ${LICENSE_ISSUER:-http://vyomi-portal:8000}
      # `demo` → safe out-of-box checkout flow; switch to razorpay|stripe in prod
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-demo}
    restart: unless-stopped

  # ── Caddy TLS terminator (Phase 12 — vyomi rebrand) ────────────────────
  # Serves https://vyomi.local:9443 with a mkcert-signed cert provisioned
  # by the launcher. See packaging/caddy/Caddyfile.
  #
  # The simulator stays HTTP on :9000 — Caddy fully terminates TLS and
  # reverse-proxies. Cert files mount from ${VYOMI_TLS_DIR:-~/.vyomi/tls}.
  #
  # If the cert files aren't present (user skipped mkcert, e.g. on a
  # restricted machine), Caddy's healthcheck fails but the simulator
  # remains reachable on :9000 HTTP. Graceful degradation.
  caddy:
    image: caddy:2-alpine
    ports:
      - "${VYOMI_HTTPS_PORT:-${CLOUDLEARN_HTTPS_PORT:-9443}}:9443"
    depends_on:
      - simulator
    volumes:
      - ${VYOMI_TLS_DIR:-~/.vyomi/tls}:/etc/caddy/tls:ro
      - ${VYOMI_CADDYFILE:-./packaging/caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    profiles: ["tls", "full"]

volumes:
  vyomi-data:
  cloudsim-data:
  vyomi-sql-pg:
  vyomi-sql-mysql:
  vyomi-gcs:
  vyomi-nats:
  vyomi-minio:
  vyomi-dynamodb:
  vyomi-azurite:
  vyomi-portal-keys:
  vyomi-portal-data:
  caddy-data:
  caddy-config:
