services:
  cloudsim:
    build:
      context: ./cloudsim-backbone
    ports:
      - "9010:9010"
    environment:
      CLOUDLEARN_CLOUDSIM_HOST: 0.0.0.0
      CLOUDLEARN_CLOUDSIM_PORT: 9010
      CLOUDLEARN_CLOUDSIM_STATE_FILE: /data/cloudsim_state.json
    volumes:
      - cloudsim-data:/data
    restart: unless-stopped

  cloudlearn-sql-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudlearn
    ports:
      - "5432:5432"
    volumes:
      - cloudlearn-sql-pg:/var/lib/postgresql/data
    restart: unless-stopped

  cloudlearn-sql-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudlearn
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - cloudlearn-sql-mysql:/var/lib/mysql
    restart: unless-stopped

  cloudlearn-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/data"]
    ports:
      - "4443:4443"
    volumes:
      - cloudlearn-gcs:/data
    restart: unless-stopped

  # MVP P0 backends — see docker-compose.appliance.yml for full notes.
  cloudlearn-vault:
    image: hashicorp/vault:1.15
    command: ["server", "-dev", "-dev-root-token-id=cloudlearn-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: cloudlearn-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    restart: unless-stopped

  cloudlearn-nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - cloudlearn-nats:/data
    restart: unless-stopped

  cloudlearn-minio:
    image: minio/minio:latest
    command: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cloudlearn
      MINIO_ROOT_PASSWORD: cloudlearn-dev-secret-key
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - cloudlearn-minio:/data
    restart: unless-stopped

  cloudlearn-dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    working_dir: /home/dynamodblocal
    user: root
    ports:
      - "8000:8000"
    volumes:
      - cloudlearn-dynamodb:/data
    restart: unless-stopped

  cloudlearn-elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    restart: unless-stopped

  simulator:
    # Default: use the published image from Docker Hub. To build from source
    # instead (e.g. for local development), set CLOUDLEARN_SIMULATOR_IMAGE
    # to an empty string OR run `docker compose build simulator`.
    image: ${CLOUDLEARN_SIMULATOR_IMAGE:-cloudlearn/simulator:1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CLOUDLEARN_SIMULATOR_PORT:-9000}:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloudlearn-sql-postgres
      - cloudlearn-sql-mysql
      - cloudlearn-gcs
      - cloudlearn-vault
      - cloudlearn-nats
      - cloudlearn-minio
      - cloudlearn-dynamodb
      - cloudlearn-elasticmq
    environment:
      CLOUDLEARN_STATE_FILE: /data/cloudlearn_state.sqlite3
      CLOUDLEARN_LICENSE_SECRET: cloudlearn-dev-secret
      CLOUDLEARN_CLOUDSIM_URL: http://cloudsim:9010
      CLOUDLEARN_DEPLOY_DIR: /var/lib/cloudlearn/deployments
      CLOUDLEARN_HOST_CONFIG_FILE: /config/cloudlearn-host.json
      CLOUDLEARN_HOST_SIZING_FILE: /config/cloudlearn-host-sizing.json
      CLOUDLEARN_PARENT_OS: ${CLOUDLEARN_PARENT_OS:-linux}
      CLOUDLEARN_DISTRIBUTION_MODE: ${CLOUDLEARN_DISTRIBUTION_MODE:-developer}
      CLOUDLEARN_RUNTIME_BRIDGE_URL: ${CLOUDLEARN_RUNTIME_BRIDGE_URL:-http://host.docker.internal:9171}
      CLOUDLEARN_SQL_PG_HOST: cloudlearn-sql-postgres
      CLOUDLEARN_SQL_PG_PORT: "5432"
      CLOUDLEARN_SQL_PG_ADMIN_USER: postgres
      CLOUDLEARN_SQL_PG_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_SQL_MYSQL_HOST: cloudlearn-sql-mysql
      CLOUDLEARN_SQL_MYSQL_PORT: "3306"
      CLOUDLEARN_SQL_MYSQL_ADMIN_USER: root
      CLOUDLEARN_SQL_MYSQL_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_GCS_URL: http://cloudlearn-gcs:4443
      # MVP P0 backends.
      CLOUDLEARN_VAULT_URL: http://cloudlearn-vault:8200
      CLOUDLEARN_VAULT_TOKEN: cloudlearn-dev-token
      CLOUDLEARN_NATS_URL: nats://cloudlearn-nats:4222
      CLOUDLEARN_MINIO_URL: http://cloudlearn-minio:9000
      CLOUDLEARN_MINIO_ACCESS_KEY: cloudlearn
      CLOUDLEARN_MINIO_SECRET_KEY: cloudlearn-dev-secret-key
      CLOUDLEARN_DYNAMODB_URL: http://cloudlearn-dynamodb:8000
      CLOUDLEARN_ELASTICMQ_URL: http://cloudlearn-elasticmq:9324
    volumes:
      - cloudlearn-data:/data
      - /var/lib/cloudlearn/deployments:/var/lib/cloudlearn/deployments
      - ./.cloudlearn-host.json:/config/cloudlearn-host.json:ro
      - ./.cloudlearn-appliance/host-sizing-report.json:/config/cloudlearn-host-sizing.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:9000/healthz').read().decode())"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  cloudlearn-data:
  cloudsim-data:
  cloudlearn-sql-pg:
  cloudlearn-sql-mysql:
  cloudlearn-gcs:
  cloudlearn-nats:
  cloudlearn-minio:
  cloudlearn-dynamodb:
