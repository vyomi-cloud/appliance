      formHost.append(sec);
      formHost.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:async()=>{
          if (!repoInp.value.trim()) { toast("Repo required","err"); return; }
          const cfg = {githubActionConfiguration: {repoUrl:"https://github.com/"+repoInp.value, branch:branchInp.value, isGitHubAction:true}};
          const r = await arm("PATCH","/"+full.id.replace(/^\//,""),
            {properties:{sourceControl: cfg, scmType:"GitHubAction"}}, svc.apiVersion);
          if (r.ok) { toast("GitHub deployment configured"); recordNotif("ok","Source control set","GitHub: "+repoInp.value); }
          else toast("Configure failed","err");
        }}, icon("save"), "Save")));
    } else if (sourceState.choice === "localgit") {
      formHost.append(el("div",{class:"wiz-help-banner"},
        "After save, push to: https://"+full.name+".scm.azurewebsites.net/"+full.name+".git"));
      formHost.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:async()=>{
          const r = await arm("PATCH","/"+full.id.replace(/^\//,""),
            {properties:{scmType:"LocalGit"}}, svc.apiVersion);
          if (r.ok) toast("Local Git enabled"); else toast("Enable failed","err");
        }}, icon("save"), "Enable Local Git")));
    } else if (sourceState.choice === "container") {
      const sec = el("div",{class:"essentials"});
      sec.append(el("div",{class:"h"}, "Container"));
      const g = el("div",{class:"essentials-grid"});
      const imageInp = el("input",{class:"sub-select",style:"min-width:380px",placeholder:"registry.io/org/image:tag"});
      g.append(el("div",{class:"k"},"Image"), el("div",{class:"v"}, imageInp));
      sec.append(g);
      formHost.append(sec);
      formHost.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:async()=>{
          if (!imageInp.value.trim()) { toast("Image required","err"); return; }
          const r = await arm("PATCH","/"+full.id.replace(/^\//,""),
            {properties:{siteConfig:{linuxFxVersion:"DOCKER|"+imageInp.value}}}, svc.apiVersion);
          if (r.ok) toast("Container image set"); else toast("Set failed","err");
        }}, icon("save"), "Save")));
    }
  }

  // History — always shown below source picker.
  const historyHost = el("div",{style:"margin-top:20px"}); host.append(historyHost);
  function renderHistory(){
    historyHost.innerHTML = "";
    historyHost.append(el("h3",{class:"sub-h"}, "Deployment history"));
    const deploys = getPath(full,"properties.deployments") || [];
    if (!deploys.length) { historyHost.append(emptyState("No deployments yet.")); return; }
    const t = el("table",{class:"sub-table"});
    t.append(el("tr",{},el("th",{},"Deployment ID"),el("th",{},"Source"),
      el("th",{},"Artifact"),el("th",{},"Status"),el("th",{},"When")));
    deploys.forEach(d => t.append(el("tr",{},
      el("td",{class:"mono small"}, d.id),
      el("td",{}, d.source),
      el("td",{class:"small"}, d.artifact + (d.bytes ? ` (${(d.bytes/1024).toFixed(1)} KB)`:"")),
      el("td",{}, el("span",{class:"status-dot "+(d.status==="success"?"ok":"err")}),
                  document.createTextNode(" "+d.status)),
      el("td",{class:"small"}, new Date(d.deployedAt).toLocaleString()))));
    historyHost.append(t);
  }

  renderForm(); renderHistory();
};

// --- PE3: Cosmos containers + partition keys (drill-down) ----------------
SUB_RENDERERS.cosmosexplorer = function(svc, full, host){
  const state = {view:"databases", database:null, container:null};
  function render(){
    host.innerHTML = "";
    const crumbs = [{label:"Databases", onClick:state.view!=="databases" ? back : null}];
    if (state.database) crumbs.push({label: state.database, onClick: state.view!=="database" ? gotoDb : null});
    if (state.container) crumbs.push({label: state.container});
    if (crumbs.length > 1) crumbs[crumbs.length-1].onClick = null;  // last = current
    drillCrumbs(host, crumbs);

    if (state.view === "databases") return renderDatabases();
    if (state.view === "database")  return renderContainers();
    if (state.view === "container") return renderContainerDetail();
  }
  function back(){ state.view="databases"; state.database=null; state.container=null; render(); }
  function gotoDb(){ state.view="database"; state.container=null; render(); }

  function renderDatabases(){
    host.append(el("div",{class:"sub-info"},
      "SQL API databases under this Cosmos account. Click a database to manage containers."));
    fetch(ORIGIN + full.id + "/sqlDatabases?api-version=" + svc.apiVersion)
      .then(r=>r.json()).then(j => {
        const dbs = j.value || [];
        const t = el("table",{class:"sub-table"});
        t.append(el("tr",{},el("th",{},"Database"),el("th",{},"Resource ID"),el("th",{},"")));
        if (!dbs.length) host.append(emptyState("No databases yet. Click + Add database below."));
        else {
          dbs.forEach(db => t.append(el("tr",{class:"row",onclick:()=>{state.view="database"; state.database=db.name; render();}},
            el("td",{}, el("a",{class:"reslink"}, db.name)),
            el("td",{class:"mono small"}, getPath(db,"properties.resource.id") || db.name),
            el("td",{onclick:e=>e.stopPropagation()},
              el("button",{class:"vm-action danger",onclick:async()=>{
                if (!confirm("Delete database "+db.name+"?")) return;
                const r = await arm("DELETE", "/"+db.id.replace(/^\//,""), undefined, svc.apiVersion);
                if (r.ok || r.status===204) { toast("Database deleted"); render(); }
              }}, icon("delete"))))));
          host.append(t);
        }
        host.append(el("div",{class:"blade-actions"},
          el("button",{class:"btn",onclick:addDatabase}, icon("add"), "Add database")));
      });
  }
  function addDatabase(){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Add database"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"db-1"});
    const ruInp   = el("input",{type:"number",class:"sub-select",style:"min-width:120px",value:400,min:400,step:100});
    g.append(el("div",{class:"k"},"Database id"),    el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Throughput (RU/s)"), el("div",{class:"v"}, ruInp));
    form.append(g);
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); if (!nm) return;
        const r = await arm("PUT", full.id + "/sqlDatabases/" + encodeURIComponent(nm),
          {properties:{resource:{id:nm}, options:{throughput: Number(ruInp.value)||400}}}, svc.apiVersion);
        if (r.ok) { toast("Database created"); recordNotif("ok","Cosmos database created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Add"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }

  function renderContainers(){
    const dbPath = full.id + "/sqlDatabases/" + encodeURIComponent(state.database);
    host.append(el("div",{class:"sub-info"},
      "Containers in "+state.database+". Each container needs a partition key."));
    fetch(ORIGIN + dbPath + "/containers?api-version=" + svc.apiVersion)
      .then(r=>r.json()).then(j => {
        const cs = j.value || [];
        const t = el("table",{class:"sub-table"});
        t.append(el("tr",{},el("th",{},"Container"),el("th",{},"Partition key"),
          el("th",{},"Throughput"),el("th",{},"Indexing"),el("th",{},"")));
        if (!cs.length) host.append(emptyState("No containers in this database yet."));
        else {
          cs.forEach(c => {
            const pk = ((getPath(c,"properties.resource.partitionKey.paths") || []).join(", ")) || "—";
            const ru = getPath(c,"properties.options.throughput") || "—";
            const idx = getPath(c,"properties.resource.indexingPolicy.indexingMode") || "consistent";
            t.append(el("tr",{class:"row",onclick:()=>{state.view="container"; state.container=c.name; render();}},
              el("td",{}, el("a",{class:"reslink"}, c.name)),
              el("td",{class:"mono small"}, pk),
              el("td",{}, String(ru)+(ru!=="—"?" RU/s":"")),
              el("td",{}, idx),
              el("td",{onclick:e=>e.stopPropagation()},
                el("button",{class:"vm-action danger",onclick:async()=>{
                  if (!confirm("Delete container "+c.name+"?")) return;
                  const r = await arm("DELETE","/"+c.id.replace(/^\//,""), undefined, svc.apiVersion);
                  if (r.ok || r.status===204) { toast("Container deleted"); render(); }
                }}, icon("delete")))));
          });
          host.append(t);
        }
        host.append(el("div",{class:"blade-actions"},
          el("button",{class:"btn",onclick:()=>addContainer(dbPath)}, icon("add"), "Add container")));
      });
  }
  function addContainer(dbPath){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Add container"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"container-1"});
    const pkInp   = el("input",{class:"sub-select",style:"min-width:240px",value:"/partitionKey",
      placeholder:"e.g. /userId, /tenantId"});
    const ruInp   = el("input",{type:"number",class:"sub-select",style:"min-width:120px",value:400,min:400,step:100});
    const idxSel  = el("select",{class:"sub-select"});
    ["consistent","lazy","none"].forEach(m => idxSel.append(el("option",{value:m},m)));
    g.append(el("div",{class:"k"},"Container id"), el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Partition key path"), el("div",{class:"v"}, pkInp));
    g.append(el("div",{class:"k"},"Throughput (RU/s)"), el("div",{class:"v"}, ruInp));
    g.append(el("div",{class:"k"},"Indexing mode"), el("div",{class:"v"}, idxSel));
    form.append(g);
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); const pk = pkInp.value.trim();
        if (!nm || !pk) { toast("Name and partition key required","err"); return; }
        const body = {properties:{
          resource:{id:nm, partitionKey:{paths:[pk], kind:"Hash"},
            indexingPolicy:{indexingMode: idxSel.value, automatic: idxSel.value !== "none"}},
          options:{throughput: Number(ruInp.value)||400}}};
        const r = await arm("PUT", dbPath + "/containers/" + encodeURIComponent(nm),
          body, svc.apiVersion);
        if (r.ok) { toast("Container created"); recordNotif("ok","Cosmos container created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Add"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }

  function renderContainerDetail(){
    const cPath = full.id + "/sqlDatabases/" + encodeURIComponent(state.database)
                + "/containers/" + encodeURIComponent(state.container);
    fetch(ORIGIN + cPath + "?api-version=" + svc.apiVersion).then(r=>r.json()).then(d => {
      const sec = el("div",{class:"essentials"});
      sec.append(el("div",{class:"h"}, state.container + " — properties"));
      const g = el("div",{class:"essentials-grid"});
      const pk = (getPath(d,"properties.resource.partitionKey.paths") || []).join(", ") || "—";
      g.append(el("div",{class:"k"},"Database"),       el("div",{class:"v"}, state.database));
      g.append(el("div",{class:"k"},"Partition key"),  el("div",{class:"v"}, pk));
      g.append(el("div",{class:"k"},"Throughput"),     el("div",{class:"v"}, String(getPath(d,"properties.options.throughput")||"—")+" RU/s"));
      g.append(el("div",{class:"k"},"Indexing mode"),  el("div",{class:"v"}, getPath(d,"properties.resource.indexingPolicy.indexingMode")||"consistent"));
      g.append(el("div",{class:"k"},"Default TTL"),    el("div",{class:"v"}, String(getPath(d,"properties.resource.defaultTtl")||"None")));
      sec.append(g);
      host.append(sec);
    });
  }
  render();
};

// --- PE4: Service Bus topics + subscriptions + filters (drill-down) ------
SUB_RENDERERS.topicsdrilldown = function(svc, full, host){
  const state = {view:"topics", topic:null, subscription:null};
  function render(){
    host.innerHTML = "";
    const crumbs = [{label:"Topics"}];
    if (state.topic) { crumbs[0].onClick = back; crumbs.push({label: state.topic}); }
    if (state.subscription) { crumbs[1].onClick = () => {state.view="topic"; state.subscription=null; render();};
      crumbs.push({label: state.subscription}); }
    if (crumbs.length) crumbs[crumbs.length-1].onClick = null;
    drillCrumbs(host, crumbs);
    if (state.view === "topics")        return renderTopics();
    if (state.view === "topic")         return renderSubs();
    if (state.view === "subscription")  return renderRules();
  }
  function back(){ state.view="topics"; state.topic=null; state.subscription=null; render(); }

  function renderTopics(){
    host.append(el("div",{class:"sub-info"}, "Topics in this Service Bus namespace. Click a topic to manage its subscriptions."));
    fetch(ORIGIN + full.id + "/topics?api-version=" + svc.apiVersion).then(r=>r.json()).then(j => {
      const topics = j.value || [];
      if (!topics.length) host.append(emptyState("No topics yet."));
      else {
        const t = el("table",{class:"sub-table"});
        t.append(el("tr",{},el("th",{},"Name"),el("th",{},"Status"),el("th",{},"Subscriptions"),el("th",{},"")));
        topics.forEach(tp => t.append(el("tr",{class:"row",onclick:()=>{state.view="topic"; state.topic=tp.name; render();}},
          el("td",{}, el("a",{class:"reslink"}, tp.name)),
          el("td",{}, getPath(tp,"properties.status")||"Active"),
          el("td",{}, String(getPath(tp,"properties.subscriptionCount")||0)),
          el("td",{onclick:e=>e.stopPropagation()},
            el("button",{class:"vm-action danger",onclick:async()=>{
              if (!confirm("Delete topic "+tp.name+"?")) return;
              const r = await arm("DELETE","/"+tp.id.replace(/^\//,""), undefined, svc.apiVersion);
              if (r.ok || r.status===204) { toast("Topic deleted"); render(); }
            }}, icon("delete"))))));
        host.append(t);
      }
      host.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:addTopic}, icon("add"), "Add topic")));
    });
  }
  function addTopic(){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Add topic"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"topic-1"});
    const sizeInp = el("input",{type:"number",class:"sub-select",style:"min-width:140px",value:1024});
    g.append(el("div",{class:"k"},"Topic name"), el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Max size (MB)"), el("div",{class:"v"}, sizeInp));
    form.append(g);
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); if (!nm) return;
        const r = await arm("PUT", full.id + "/topics/" + encodeURIComponent(nm),
          {properties:{maxSizeInMegabytes:Number(sizeInp.value)||1024, status:"Active",
                       defaultMessageTimeToLive:"P14D"}}, svc.apiVersion);
        if (r.ok) { toast("Topic created"); recordNotif("ok","SB topic created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Add"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }

  function renderSubs(){
    host.append(el("div",{class:"sub-info"},
      "Subscriptions on topic '"+state.topic+"'. Each subscription is a virtual queue with optional filters."));
    const tPath = full.id + "/topics/" + encodeURIComponent(state.topic);
    fetch(ORIGIN + tPath + "/subscriptions?api-version=" + svc.apiVersion).then(r=>r.json()).then(j => {
      const subs = j.value || [];
      if (!subs.length) host.append(emptyState("No subscriptions yet."));
      else {
        const t = el("table",{class:"sub-table"});
        t.append(el("tr",{},el("th",{},"Name"),el("th",{},"Status"),el("th",{},"DLQ on expire"),
          el("th",{},"Max delivery"),el("th",{},"Lock duration"),el("th",{},"")));
        subs.forEach(s => t.append(el("tr",{class:"row",onclick:()=>{state.view="subscription"; state.subscription=s.name; render();}},
          el("td",{}, el("a",{class:"reslink"}, s.name)),
          el("td",{}, getPath(s,"properties.status")||"Active"),
          el("td",{}, String(getPath(s,"properties.deadLetteringOnMessageExpiration")||false)),
          el("td",{}, String(getPath(s,"properties.maxDeliveryCount")||10)),
          el("td",{}, getPath(s,"properties.lockDuration")||"PT30S"),
          el("td",{onclick:e=>e.stopPropagation()},
            el("button",{class:"vm-action danger",onclick:async()=>{
              if (!confirm("Delete subscription "+s.name+"?")) return;
              const r = await arm("DELETE","/"+s.id.replace(/^\//,""), undefined, svc.apiVersion);
              if (r.ok || r.status===204) { toast("Subscription deleted"); render(); }
            }}, icon("delete"))))));
        host.append(t);
      }
      host.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:()=>addSub(tPath)}, icon("add"), "Add subscription")));
    });
  }
  function addSub(tPath){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Add subscription"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"subscription-1"});
    const dlqExp = el("input",{type:"checkbox"}); dlqExp.checked = true;
    const dlqFail = el("input",{type:"checkbox"}); dlqFail.checked = true;
    const maxDel = el("input",{type:"number",class:"sub-select",style:"min-width:100px",value:10,min:1,max:2000});
    const lockSec = el("input",{type:"number",class:"sub-select",style:"min-width:100px",value:30,min:5,max:300});
    g.append(el("div",{class:"k"},"Subscription name"), el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Dead-letter on expiration"), el("div",{class:"v"}, el("label",{class:"wiz-check"}, dlqExp, el("span",{class:"lbl"},"enabled"))));
    g.append(el("div",{class:"k"},"Dead-letter on filter failure"), el("div",{class:"v"}, el("label",{class:"wiz-check"}, dlqFail, el("span",{class:"lbl"},"enabled"))));
    g.append(el("div",{class:"k"},"Max delivery count"), el("div",{class:"v"}, maxDel));
    g.append(el("div",{class:"k"},"Lock duration (s)"), el("div",{class:"v"}, lockSec));
    form.append(g);
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); if (!nm) return;
        const body = {properties:{
          deadLetteringOnMessageExpiration: dlqExp.checked,
          deadLetteringOnFilterEvaluationExceptions: dlqFail.checked,
          maxDeliveryCount: Number(maxDel.value)||10,
          lockDuration: "PT"+(Number(lockSec.value)||30)+"S",
          status: "Active"}};
        const r = await arm("PUT", tPath + "/subscriptions/" + encodeURIComponent(nm), body, svc.apiVersion);
        if (r.ok) { toast("Subscription created"); recordNotif("ok","SB subscription created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Add"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }

  function renderRules(){
    host.append(el("div",{class:"sub-info"},
      "Filter rules for subscription '"+state.subscription+"'. SQL filters use SQL92-like syntax; correlation filters match message properties."));
    const sPath = full.id + "/topics/" + encodeURIComponent(state.topic)
                + "/subscriptions/" + encodeURIComponent(state.subscription);
    fetch(ORIGIN + sPath + "/rules?api-version=" + svc.apiVersion).then(r=>r.json()).then(j => {
      const rules = j.value || [];
      if (!rules.length) host.append(emptyState("No filter rules. Default $Default rule matches all messages."));
      else {
        const t = el("table",{class:"sub-table"});
        t.append(el("tr",{},el("th",{},"Name"),el("th",{},"Filter type"),el("th",{},"Filter"),el("th",{},"Action"),el("th",{},"")));
        rules.forEach(r => {
          const ft = getPath(r,"properties.filterType") || "SqlFilter";
          const f = ft === "SqlFilter"
            ? (getPath(r,"properties.sqlFilter.sqlExpression") || "")
            : JSON.stringify(getPath(r,"properties.correlationFilter") || {});
          const a = getPath(r,"properties.action.sqlExpression") || "";
          t.append(el("tr",{},
            el("td",{}, r.name),
            el("td",{}, ft),
            el("td",{class:"mono small"}, f),
            el("td",{class:"mono small"}, a||"—"),
            el("td",{},
              el("button",{class:"vm-action danger",onclick:async()=>{
                if (!confirm("Delete rule "+r.name+"?")) return;
                const res = await arm("DELETE","/"+r.id.replace(/^\//,""), undefined, svc.apiVersion);
                if (res.ok || res.status===204) { toast("Rule deleted"); render(); }
              }}, icon("delete")))));
        });
        host.append(t);
      }
      host.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:()=>addRule(sPath)}, icon("add"), "Add rule")));
    });
  }
  function addRule(sPath){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Add filter rule"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"rule-1"});
    const typeSel = el("select",{class:"sub-select",onchange:swap});
    ["SqlFilter","CorrelationFilter","TrueFilter","FalseFilter"].forEach(t => typeSel.append(el("option",{value:t},t)));
    const sqlInp = el("input",{class:"sub-select",style:"min-width:380px",value:"user/properties/label = 'priority'"});
    const corrInp = el("textarea",{class:"xml-editor",style:"min-height:120px"});
    corrInp.value = JSON.stringify({label:"priority", contentType:"application/json", properties:{tenant:"acme"}}, null, 2);
    const sqlActionInp = el("input",{class:"sub-select",style:"min-width:380px",placeholder:"optional: SET sys.label = 'tagged'"});
    g.append(el("div",{class:"k"},"Rule name"), el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Filter type"), el("div",{class:"v"}, typeSel));
    const fHost = el("div",{class:"v"}); g.append(el("div",{class:"k"},"Filter"), fHost);
    g.append(el("div",{class:"k"},"Action (optional)"), el("div",{class:"v"}, sqlActionInp));
    form.append(g);
    function swap(){
      fHost.innerHTML = "";
      const t = typeSel.value;
      if (t === "SqlFilter") fHost.append(sqlInp);
      else if (t === "CorrelationFilter") fHost.append(corrInp);
      else fHost.append(el("div",{class:"sub-info"}, t === "TrueFilter" ? "Matches every message." : "Matches no messages."));
    }
    swap();
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); if (!nm) return;
        const t = typeSel.value;
        const body = {properties:{filterType: t,
          ...(t==="SqlFilter" ? {sqlFilter:{sqlExpression: sqlInp.value, requiresPreprocessing:true}} : {}),
          ...(t==="CorrelationFilter" ? (() => {
            try { return {correlationFilter: JSON.parse(corrInp.value)}; }
            catch(e) { return {correlationFilter: {label: corrInp.value}}; }
          })() : {}),
          ...(sqlActionInp.value.trim() ? {action: {sqlExpression: sqlActionInp.value, requiresPreprocessing:true}} : {})}};
        const r = await arm("PUT", sPath + "/rules/" + encodeURIComponent(nm), body, svc.apiVersion);
        if (r.ok) { toast("Rule created"); recordNotif("ok","SB filter rule created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Add"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }
  render();
};

// --- PE5: APIM policy XML editor -----------------------------------------
SUB_RENDERERS.apimpolicies = function(svc, full, host){
  host.append(el("div",{class:"sub-info"},
    "Policies are XML statements executed sequentially on the request/response pipeline. The global policy applies to every API; you can scope to product, API, or operation level too."));
  // Templates — load on click into the editor.
  const TEMPLATES = {
    "empty": `<policies>
  <inbound>
    <base />
  </inbound>
  <backend>
    <base />
  </backend>
  <outbound>
    <base />
  </outbound>
  <on-error>
    <base />
  </on-error>
</policies>`,
    "rate-limit": `<policies>
  <inbound>
    <base />

// --- PE6: Key Vault secret versioning + rotation (drill-down) ------------
SUB_RENDERERS.secretsdrilldown = function(svc, full, host){
  const state = {view:"list", secret:null};
  function render(){
    host.innerHTML = "";
    const crumbs = [{label:"Secrets"}];
    if (state.secret) { crumbs[0].onClick = back; crumbs.push({label: state.secret}); }
    if (crumbs.length) crumbs[crumbs.length-1].onClick = null;
    drillCrumbs(host, crumbs);
    if (state.view === "list")    return renderList();
    if (state.view === "secret")  return renderSecret();
  }
  function back(){ state.view="list"; state.secret=null; render(); }

  function renderList(){
    host.append(el("div",{class:"sub-info"},
      "Secrets stored in this vault. Click a secret to manage its versions, expiration, and rotation policy."));
    fetch(ORIGIN + full.id + "/secrets?api-version=" + svc.apiVersion).then(r=>r.json()).then(j => {
      const secrets = j.value || [];
      const t = el("table",{class:"sub-table"});
      t.append(el("tr",{},el("th",{},"Name"),el("th",{},"Content type"),
        el("th",{},"Enabled"),el("th",{},"Last updated"),el("th",{},"")));
      if (!secrets.length) host.append(emptyState("No secrets yet."));
      else {
        secrets.forEach(s => t.append(el("tr",{class:"row",onclick:()=>{state.view="secret"; state.secret=s.name; render();}},
          el("td",{}, el("a",{class:"reslink"}, s.name)),
          el("td",{class:"small"}, getPath(s,"properties.contentType")||"—"),
          el("td",{}, String(getPath(s,"properties.attributes.enabled")!==false)),
          el("td",{class:"small"}, getPath(s,"properties.attributes.updated")||"—"),
          el("td",{onclick:e=>e.stopPropagation()},
            el("button",{class:"vm-action danger",onclick:async()=>{
              if (!confirm("Delete secret "+s.name+"?")) return;
              const r = await arm("DELETE","/"+s.id.replace(/^\//,""), undefined, svc.apiVersion);
              if (r.ok || r.status===204) { toast("Secret deleted"); render(); }
            }}, icon("delete"))))));
        host.append(t);
      }
      host.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:addSecret}, icon("add"), "Generate/Import")));
    });
  }
  function addSecret(){
    const form = el("div",{class:"essentials",style:"margin-top:14px"});
    form.append(el("div",{class:"h"}, "Create a secret"));
    const g = el("div",{class:"essentials-grid"});
    const nameInp = el("input",{class:"sub-select",style:"min-width:240px",value:"my-secret"});
    const valueInp = el("input",{type:"password",class:"sub-select",style:"min-width:380px",placeholder:"secret value"});
    const ctInp = el("input",{class:"sub-select",style:"min-width:200px",placeholder:"e.g. password, connection-string"});
    const expIn = el("input",{type:"number",class:"sub-select",style:"min-width:140px",value:365});
    g.append(el("div",{class:"k"},"Name"),         el("div",{class:"v"}, nameInp));
    g.append(el("div",{class:"k"},"Secret value"), el("div",{class:"v"}, valueInp));
    g.append(el("div",{class:"k"},"Content type"), el("div",{class:"v"}, ctInp));
    g.append(el("div",{class:"k"},"Expires in (days)"), el("div",{class:"v"}, expIn));
    form.append(g);
    form.append(el("div",{class:"blade-actions"},
      el("button",{class:"btn",onclick:async()=>{
        const nm = nameInp.value.trim(); if (!nm) return;
        const ver = "v" + Date.now().toString(36);
        const now = Math.floor(Date.now()/1000);
        const body = {properties:{
          value: valueInp.value, contentType: ctInp.value || undefined,
          attributes:{enabled:true, created: now, updated: now,
            exp: now + (Number(expIn.value)||365) * 86400},
          versions: [{id: ver, created: now, enabled: true}]}};
        const r = await arm("PUT", full.id + "/secrets/" + encodeURIComponent(nm), body, svc.apiVersion);
        if (r.ok) { toast("Secret created"); recordNotif("ok","Key Vault secret created",nm); form.remove(); render(); }
        else toast("Create failed","err");
      }}, "Create"),
      el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
    host.append(form);
  }

  function renderSecret(){
    const sPath = full.id + "/secrets/" + encodeURIComponent(state.secret);
    fetch(ORIGIN + sPath + "?api-version=" + svc.apiVersion).then(r=>r.json()).then(s => {
      // Top — secret detail card.
      const sec = el("div",{class:"essentials"});
      sec.append(el("div",{class:"h"}, "Secret properties"));
      const g = el("div",{class:"essentials-grid"});
      const enabled = getPath(s,"properties.attributes.enabled") !== false;
      const exp = getPath(s,"properties.attributes.exp");
      g.append(el("div",{class:"k"},"Name"),         el("div",{class:"v"}, state.secret));
      g.append(el("div",{class:"k"},"Content type"), el("div",{class:"v"}, getPath(s,"properties.contentType")||"—"));
      g.append(el("div",{class:"k"},"Enabled"),      el("div",{class:"v"}, String(enabled)));
      g.append(el("div",{class:"k"},"Expires"),      el("div",{class:"v"},
        exp ? new Date(exp*1000).toLocaleString() : "never"));
      sec.append(g);
      host.append(sec);

      // Versions list.
      const verSec = el("div",{class:"essentials",style:"margin-top:14px"});
      verSec.append(el("div",{class:"h"}, "Versions"));
      const versions = getPath(s,"properties.versions") || [];
      if (!versions.length) verSec.append(emptyState("No versions tracked."));
      else versions.forEach(v => {
        const row = el("div",{class:"version-row"});
        const isCurrent = v.id === (versions[0] && versions[0].id);
        const stateChip = v.enabled === false
          ? el("span",{class:"exp"},"disabled")
          : el("span",{class:"actv"}, isCurrent ? "current" : "active");
        row.append(el("div",{class:"id"}, v.id),
          el("div",{class:"v"}, v.created ? new Date(v.created*1000).toLocaleString() : "—"),
          stateChip,
          el("button",{class:"vm-action danger",onclick:async()=>{
            const next = versions.filter(x => x.id !== v.id);
            const r = await arm("PATCH","/"+s.id.replace(/^\//,""),
              {properties:{versions: next}}, svc.apiVersion);
            if (r.ok) { toast("Version removed"); render(); } else toast("Remove failed","err");
          }}, icon("delete")));
        verSec.append(row);
      });
      verSec.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:newVersion}, icon("add"), "New version")));
      host.append(verSec);

      // Rotation policy.
      const rotSec = el("div",{class:"essentials",style:"margin-top:14px"});
      rotSec.append(el("div",{class:"h"}, "Rotation policy"));
      const rg = el("div",{class:"essentials-grid"});
      const policy = getPath(s,"properties.rotationPolicy") || {};
      const enabledBox = el("input",{type:"checkbox"});
      if (policy.enabled) enabledBox.checked = true;
      const periodInp = el("input",{type:"number",class:"sub-select",style:"min-width:120px",value:policy.rotateAfterDays||90});
      const notifyInp = el("input",{type:"number",class:"sub-select",style:"min-width:120px",value:policy.notifyBeforeExpiryDays||30});
      rg.append(el("div",{class:"k"},"Auto-rotate"),         el("div",{class:"v"}, el("label",{class:"wiz-check"}, enabledBox, el("span",{class:"lbl"},"enabled"))));
      rg.append(el("div",{class:"k"},"Rotate after (days)"), el("div",{class:"v"}, periodInp));
      rg.append(el("div",{class:"k"},"Notify before expiry (days)"), el("div",{class:"v"}, notifyInp));
      rotSec.append(rg);
      rotSec.append(el("div",{class:"blade-actions"},
        el("button",{class:"btn",onclick:async()=>{
          const r = await arm("PATCH","/"+s.id.replace(/^\//,""),
            {properties:{rotationPolicy:{enabled: enabledBox.checked,
              rotateAfterDays: Number(periodInp.value)||90,
              notifyBeforeExpiryDays: Number(notifyInp.value)||30}}}, svc.apiVersion);
          if (r.ok) { toast("Rotation policy saved"); recordNotif("ok","Rotation policy saved",state.secret); }
          else toast("Save failed","err");
        }}, "Save rotation")));
      host.append(rotSec);

      function newVersion(){
        const form = el("div",{class:"essentials",style:"margin-top:14px"});
        form.append(el("div",{class:"h"}, "New secret version"));
        const g = el("div",{class:"essentials-grid"});
        const valueInp = el("input",{type:"password",class:"sub-select",style:"min-width:380px",placeholder:"new value"});
        g.append(el("div",{class:"k"},"Value"), el("div",{class:"v"}, valueInp));
        form.append(g);
        form.append(el("div",{class:"blade-actions"},
          el("button",{class:"btn",onclick:async()=>{
            const ver = "v" + Date.now().toString(36);
            const now = Math.floor(Date.now()/1000);
            const nextVersions = [{id:ver, created: now, enabled:true}, ...versions];
            const r = await arm("PATCH","/"+s.id.replace(/^\//,""),
              {properties:{value: valueInp.value,
                attributes:{enabled:true, updated: now, created: now},
                versions: nextVersions}}, svc.apiVersion);
            if (r.ok) { toast("New version: "+ver); recordNotif("ok","Secret version added",ver); form.remove(); render(); }
            else toast("Create failed","err");
          }}, "Create"),
          el("button",{class:"btn sec",onclick:()=>form.remove()}, "Cancel")));
        host.append(form);
      }
    });
  }
  render();
};

// ---------- Phase B: multi-step Create wizard ----------
function openWizard(svc, body){
  const wiz = svc.wizard;
  const tabs = wiz.tabs;
  const synth = wiz.synthetic_map || {};
  // Per-wizard state — values keyed by field "name" (which may be a dotted
  // ARM body path OR a synthetic "__foo__" name handled separately).
  const state = {values:{}, errors:{}, tab:0, tabErrors:new Set()};

  // Seed defaults from every field.
  tabs.forEach(t => (t.sections||[]).forEach(sec => (sec.fields||[]).forEach(f=>{
    if (f.type === "help" || f.type === "info") return;
    let dv = f.default;
    if (dv === "__UUID__") dv = uuid();
    if (dv !== undefined) state.values[f.name] = dv;
  })));

  body.append(el("div",{class:"wiz-banner"},
    "Creates "+svc.namespace+"/"+svc.type+" in resource group "+RG+" via ARM PUT. "+
    "All fields write to a single REST body submitted from the final tab."));

  // Stepper + content + actions are siblings — actions stay glued to the
  // bottom of the blade body.
  const stepper = el("div",{class:"wiz-stepper"});
  const content = el("div",{class:"wiz-content"});
  const actions = el("div",{class:"wiz-actions"});
  body.append(stepper, content, actions);

  function isFieldVisible(f){
    if (!f.ifEquals) return true;
    return Object.entries(f.ifEquals).every(([k,v]) => state.values[k] === v);
  }
  function fieldsOfTab(tabIdx){
    const t = tabs[tabIdx];
    const out = [];
    (t.sections||[]).forEach(sec => (sec.fields||[]).forEach(f => out.push(f)));
    return out;
  }
  function validateField(f){
    if (f.type === "help" || f.type === "info") return null;
    if (!isFieldVisible(f)) return null;
    const v = state.values[f.name];
    const isEmpty = v === undefined || v === null || v === "" || (Array.isArray(v) && !v.length);
    if (f.required && isEmpty) return "This field is required.";
    if (isEmpty) return null;
    const val = f.validate || {};
    if (val.regex && typeof v === "string" && !new RegExp(val.regex).test(v))
      return val.message || "Invalid format.";
    if (f.type === "number") {
      const n = Number(v);
      if (Number.isNaN(n)) return "Must be a number.";
      if (val.min !== undefined && n < val.min) return "Minimum "+val.min+".";
      if (val.max !== undefined && n > val.max) return "Maximum "+val.max+".";
    }
    return null;
  }
  function validateTab(tabIdx){
    if (tabs[tabIdx].auto) return [];   // Review tab — synthesized
    const errs = {};
    fieldsOfTab(tabIdx).forEach(f => {
      const m = validateField(f);
      if (m) errs[f.name] = m;
    });
    Object.assign(state.errors, errs);
    if (Object.keys(errs).length) state.tabErrors.add(tabIdx);
    else state.tabErrors.delete(tabIdx);
    return Object.keys(errs);
  }

  function renderStepper(){
    stepper.innerHTML = "";
    tabs.forEach((t, i) => {
      const klass = ["wiz-step"];
      if (i === state.tab) klass.push("active");
      else if (i < state.tab) klass.push("done");
      if (state.tabErrors.has(i)) klass.push("error");
      const btn = el("button",{class:klass.join(" "),onclick:()=>gotoTab(i)},
        el("span",{class:"num"}, String(i+1)),
        document.createTextNode(t.label));
      stepper.append(btn);
    });
  }

  function renderField(f){
    if (f.type === "help") {
      return el("div",{class:"wiz-help-banner"}, f.value || "");
    }
    if (f.type === "info") {
      const display = f.name === "__sub__" ? (SUB||"(none)") :
                      f.name === "__rg__"  ? (RG||"(none)")  : (state.values[f.name]||"");
      return el("div",{class:"wiz-field"},
        el("label",{}, f.label),
        el("div",{class:"wiz-info"}, display),
        f.help ? el("div",{class:"help"}, f.help) : null);
    }
    const wrap = el("div",{class:"wiz-field"});
    const labelKids = [document.createTextNode(f.label||f.name)];
    if (f.required) labelKids.push(el("span",{class:"req"},"*"));
    wrap.append(el("label",{}, ...labelKids));
    const err = state.errors[f.name];
    let inp;

    if (f.type === "vmSize" && INSTANCE_CATALOG.length) {
      inp = el("select",{onchange:e=>{state.values[f.name]=e.target.value; rerender();}});
      const byFamily = {};
      INSTANCE_CATALOG.forEach(it => { (byFamily[it.family] = byFamily[it.family] || []).push(it); });
      Object.keys(byFamily).forEach(fam => {
        const og = el("optgroup",{label:String(fam).toUpperCase()});
        byFamily[fam].forEach(it => {
          const ramG = (it.ram_mb/1024).toFixed(it.ram_mb < 1024 ? 1 : 0);
          og.append(el("option",{value:it.name}, `${it.name} — ${it.vcpu} vCPU · ${ramG} GB`));
        });
        inp.append(og);
      });
      inp.value = state.values[f.name] || (f.default||"");
      wrap.append(inp);
    } else if (f.type === "select") {
      inp = el("select",{onchange:e=>{state.values[f.name]=e.target.value; rerender();}});
      (f.options||[]).forEach(o => inp.append(el("option",{value:o.value}, o.label||o.value)));
      inp.value = state.values[f.name] ?? (f.default||"");
      wrap.append(inp);
    } else if (f.type === "radio") {
      (f.options||[]).forEach(o => {
        const r = el("input",{type:"radio",name:f.name,value:o.value,
                              onchange:e=>{state.values[f.name]=e.target.value; rerender();}});
        if ((state.values[f.name] ?? f.default) === o.value) r.checked = true;
        wrap.append(el("label",{class:"wiz-radio"}, r,
          el("span",{class:"lbl"}, o.label||o.value)));
      });
    } else if (f.type === "boolean") {
      const cb = el("input",{type:"checkbox",
        onchange:e=>{state.values[f.name]=e.target.checked; rerender();}});
      if (state.values[f.name]) cb.checked = true;
      // Replace the heading label with checkbox-style label (Azure portal style).
      wrap.innerHTML = "";
      wrap.append(el("label",{class:"wiz-check"}, cb,
        el("span",{class:"lbl"}, f.label||f.name)));
    } else if (f.type === "number") {
      inp = el("input",{type:"number",value: state.values[f.name] ?? f.default ?? "",
        oninput:e=>{state.values[f.name]= e.target.value === "" ? "" : Number(e.target.value); rerender(true);}});
      if ((f.validate||{}).min !== undefined) inp.setAttribute("min", f.validate.min);
      if ((f.validate||{}).max !== undefined) inp.setAttribute("max", f.validate.max);
      wrap.append(inp);
    } else if (f.type === "password") {
      inp = el("input",{type:"password",value: state.values[f.name] || "",
        oninput:e=>{state.values[f.name]=e.target.value; rerender(true);}});
      wrap.append(inp);
    } else if (f.type === "tagsEditor") {
      const tagsState = state.values[f.name] || {};
      state.values[f.name] = tagsState;
      const grid = el("div",{class:"tags-grid"});
      const rows = Object.entries(tagsState);
      if (!rows.length) rows.push(["",""]);
      rows.forEach(([k,v], idx) => {
        const kInp = el("input",{placeholder:"Name",value:k,
          oninput:e=>{ const nv={...tagsState}; delete nv[k]; if(e.target.value) nv[e.target.value]=v; state.values[f.name]=nv; }});
        const vInp = el("input",{placeholder:"Value",value:v,
          oninput:e=>{ tagsState[k]=e.target.value; }});
        const x = el("button",{class:"x material-symbols-outlined",
          onclick:()=>{ const nv={...tagsState}; delete nv[k]; state.values[f.name]=nv; rerender(); }}, "close");
        grid.append(kInp, vInp, x);
      });
      wrap.append(grid);
      wrap.append(el("button",{class:"wiz-add-row",onclick:()=>{
        const nv = {...tagsState}; nv["new-tag-"+(Object.keys(nv).length+1)] = ""; state.values[f.name] = nv; rerender();
      }}, "+ Add tag"));
    } else if (f.type === "subnetEditor") {
      const subs = Array.isArray(state.values[f.name]) ? state.values[f.name] : [];
      state.values[f.name] = subs;
      const hdr = el("div",{class:"wiz-subnet-grid",style:"font-size:11.5px;color:var(--sub);font-weight:600"},
        el("div",{},"Subnet name"), el("div",{},"Subnet address range (CIDR)"), el("div",{},""));
      wrap.append(hdr);
      subs.forEach((s, idx) => {
        const nInp = el("input",{value:s.name||"",oninput:e=>{subs[idx].name=e.target.value;}});
        const cInp = el("input",{value:(s.properties||{}).addressPrefix||"",
          oninput:e=>{ subs[idx].properties = subs[idx].properties || {}; subs[idx].properties.addressPrefix = e.target.value; }});
        const x = el("button",{class:"x material-symbols-outlined",
          onclick:()=>{ subs.splice(idx,1); rerender(); }}, "close");
        wrap.append(el("div",{class:"wiz-subnet-grid"}, nInp, cInp, x));
      });
      wrap.append(el("button",{class:"wiz-add-row",onclick:()=>{
        subs.push({name:"subnet-"+(subs.length+1), properties:{addressPrefix:"10.0."+subs.length+".0/24"}});
        rerender();
      }}, "+ Add subnet"));
    } else {  // text + cidr default to plain text input
      inp = el("input",{type:"text",value: state.values[f.name] ?? f.default ?? "",
        oninput:e=>{state.values[f.name]=e.target.value; rerender(true);}});
      wrap.append(inp);
    }

    if (inp && err) inp.classList.add("err");
    if (f.help) wrap.append(el("div",{class:"help"}, f.help));
    if (err) wrap.append(el("div",{class:"err-msg"}, icon("error"), document.createTextNode(err)));
    return wrap;
  }

  function renderTab(){
    content.innerHTML = "";
    const t = tabs[state.tab];
    if (t.auto) return renderReview();
    (t.sections||[]).forEach(sec => {
      const secDiv = el("div",{class:"wiz-section"});
      if (sec.label) secDiv.append(el("div",{class:"h"}, sec.label));
      (sec.fields||[]).forEach(f => {
        if (!isFieldVisible(f)) return;
        secDiv.append(renderField(f));
      });
      content.append(secDiv);
    });
  }

  function renderReview(){
    // Validate every previous tab and surface an aggregate banner.
    let allOk = true, badTabs = [];
    tabs.forEach((t,i) => {
      if (t.auto) return;
      const errs = validateTab(i);
      if (errs.length) { allOk = false; badTabs.push(t.label); }
    });
    content.append(el("div",{class:"wiz-review-validation"+(allOk?"":" err")},
      icon(allOk ? "check_circle" : "error"),
      document.createTextNode(allOk ? "Validation passed" : "Fix errors in: "+badTabs.join(", "))));

    tabs.forEach((t,i) => {
      if (t.auto) return;
      const card = el("div",{class:"wiz-review-tab"});
      card.append(el("div",{class:"hdr"},
        document.createTextNode(t.label),
        el("button",{class:"edit",onclick:()=>gotoTab(i)}, "Edit")));
      const grid = el("div",{class:"wiz-review-grid"});
      let any = false;
      (t.sections||[]).forEach(sec => (sec.fields||[]).forEach(f => {
        if (f.type === "help") return;
        if (!isFieldVisible(f)) return;
        if (f.type === "info") {
          const dv = f.name==="__sub__" ? SUB : f.name==="__rg__" ? RG : "";
          grid.append(el("div",{class:"k"}, f.label), el("div",{class:"v"}, dv||"(none)"));
          any = true; return;
        }
        let v = state.values[f.name];
        if (f.type === "password" && v) v = "•".repeat(Math.min(8, String(v).length));
        if (f.type === "tagsEditor") v = Object.entries(v||{}).filter(([k,_])=>k).map(([k,vv])=>`${k}=${vv}`).join(", ") || "(none)";
        if (f.type === "subnetEditor") v = (v||[]).map(s=>`${s.name||"?"} ${(s.properties||{}).addressPrefix||"?"}`).join(", ") || "(none)";
        if (Array.isArray(v)) v = JSON.stringify(v);
        if (typeof v === "boolean") v = v ? "Yes" : "No";
        grid.append(el("div",{class:"k"}, f.label||f.name),
                    el("div",{class:"v"}, v===undefined||v===""?"(empty)":String(v)));
        any = true;
      }));
      if (any) card.append(grid);
      content.append(card);
    });
  }

  function renderActions(){
    actions.innerHTML = "";
    actions.append(el("button",{class:"btn-sec",onclick:closeBlade},"Cancel"));
    actions.append(el("div",{class:"spacer"}));
    if (state.tab > 0) actions.append(el("button",{class:"btn-sec",onclick:prev},"Previous"));
    const last = state.tab === tabs.length-1;
    if (last) {
      // Disable Create if validation banner is in error state.
      const anyErrs = Array.from(state.tabErrors).length > 0;
      const btn = el("button",{class:"btn-primary",onclick:()=>submitWizard(svc, state, synth)}, "Create");
      if (anyErrs) btn.setAttribute("disabled","");
      actions.append(btn);
    } else if (state.tab === tabs.length-2 || tabs[state.tab+1].auto) {
      actions.append(el("button",{class:"btn-primary",onclick:()=>{validateTab(state.tab); gotoTab(state.tab+1);}}, "Review + create"));
    } else {
      actions.append(el("button",{class:"btn-primary",onclick:()=>{validateTab(state.tab); gotoTab(state.tab+1);}}, "Next"));
    }
  }

  function rerender(softFieldOnly){
    // softFieldOnly=true means: an oninput fired; redrawing every field would
    // steal focus from the active input. Only refresh stepper+actions.
    if (softFieldOnly) { renderStepper(); renderActions(); return; }
    renderStepper(); renderTab(); renderActions();
  }
  function gotoTab(i){
    if (i < 0 || i >= tabs.length) return;
    state.tab = i;
    state.errors = {};   // clear any per-field errors not re-validated yet
    tabs.forEach((_,idx) => validateTab(idx));
    rerender();
  }
  function prev(){ gotoTab(state.tab-1); }

  rerender();
  openBlade();
}

function openFlatCreate(svc, body){
  // Backward-compat path for services without a wizard schema. Keeps the SDK
  // examples working unchanged.
  const form=el("div",{});
  const inputs={};
  svc.createFields.forEach(f=>{
    let dv=f.default||""; if(dv==="__UUID__") dv=uuid();
    let inp;
    if (f.name && f.name.endsWith(".vmSize") && INSTANCE_CATALOG.length) {
      inp = el("select",{});
      const byFamily = {};
      INSTANCE_CATALOG.forEach(it => { (byFamily[it.family] = byFamily[it.family] || []).push(it); });
      Object.keys(byFamily).forEach(fam => {
        const og = el("optgroup", {label: String(fam).toUpperCase()});
        byFamily[fam].forEach(it => {
          const ramG = (it.ram_mb/1024).toFixed(it.ram_mb < 1024 ? 1 : 0);
          og.append(el("option", {value: it.name},
            `${it.name} — ${it.vcpu} vCPU · ${ramG} GB`));
        });
        inp.append(og);
      });
      inp.value = dv;
    } else {
      inp = el("input",{value:dv});
    }
    inputs[f.name]=inp;
    form.append(el("div",{class:"field"}, el("label",{},f.label), inp));
  });
  form.append(el("div",{class:"field"}, el("label",{},"Location"), (inputs.__loc__=el("input",{value:LOCATION}))));
  form.append(el("div",{class:"blade-actions"},
    el("button",{class:"btn",onclick:()=>submitCreate(svc,inputs)},"Create"),
    el("button",{class:"btn sec",onclick:closeBlade},"Cancel")));
  body.append(el("div",{style:"font-size:13px;color:var(--sub);margin-bottom:14px"},
    "Creates "+svc.namespace+"/"+svc.type+" in resource group "+RG+" via ARM PUT."));
  body.append(form);
  openBlade();
}

async function submitCreate(svc, inputs){
  const name=(inputs["name"]?.value||"").trim();
  if(!name){ toast("Name is required","err"); return; }
  const bodyObj={location:(inputs.__loc__.value||LOCATION).trim(), properties:{}};
  svc.createFields.forEach(f=>{
    if(f.name==="name") return;
    const v=inputs[f.name].value;
    if(v!=="") setPath(bodyObj, f.name, v);
  });
  const res=await arm("PUT", resPath(svc,name), bodyObj, svc.apiVersion);
  if(res.ok){ toast(name+" created"); recordNotif("ok","Created "+name); closeBlade(); selectService(svc.key); refreshBudgetChip(); }
  else {
    const msg = (res.json && (res.json.detail || (res.json.error && res.json.error.message))) || "";
    toast("Create failed ("+res.status+"): "+msg, "err");
    recordNotif("err","Create failed ("+res.status+")", msg);
  }
}

// Build the ARM body from wizard state and PUT it. Synthetic "__foo__" fields
// either drive synthetic_map expansion or are dropped (they're UI-only).
async function submitWizard(svc, state, synth){
  const name = String(state.values["name"]||"").trim();
  if (!name) { toast("Name is required","err"); return; }
  const loc = String(state.values["__loc__"]||LOCATION||"eastus").trim();
  const bodyObj = {location: loc, properties: {}, tags: state.values["tags"]||{}};

  Object.entries(state.values).forEach(([k,v])=>{
    if (k === "name" || k === "__loc__" || k === "tags") return;
    if (v === undefined || v === null || v === "") return;
    // Synthetic field — translate via synthetic_map if present.
    if (k.startsWith("__")) {
      const m = synth[k];
      if (!m) return;
      const expansion = m[v] || m["*"];
      if (!expansion) return;
      Object.entries(expansion).forEach(([path,val])=>{
        const final = val === "$value" ? v : val;
        setPath(bodyObj, path, final);
      });
      return;
    }
    setPath(bodyObj, k, v);
  });

  const res = await arm("PUT", resPath(svc,name), bodyObj, svc.apiVersion);
  if (res.ok) {
    toast(name+" created"); recordNotif("ok","Created "+name+" ("+svc.label+")");
    closeBlade(); selectService(svc.key); refreshBudgetChip();
  } else {
    const msg = (res.json && (res.json.detail || (res.json.error && res.json.error.message))) || "";
    toast("Create failed ("+res.status+"): "+msg, "err");
    recordNotif("err","Create failed ("+res.status+")", msg);
  }
}

// ---------- delete ----------
async function confirmDelete(svc, item, fromBlade){
  if(!confirm("Delete "+item.name+"?\n"+item.id)) return;
  const res=await arm("DELETE", resPath(svc,item.name), undefined, svc.apiVersion);
  if([200,202,204].includes(res.status)){ toast(item.name+" deleted"); if(fromBlade) closeBlade(); selectService(svc.key); refreshBudgetChip(); }
  else toast("Delete failed ("+res.status+")","err");
}

document.getElementById("menuBtn").addEventListener("click",()=>document.getElementById("rail").classList.toggle("collapsed"));
