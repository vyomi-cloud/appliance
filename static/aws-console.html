// =====================================================================
// DETAIL page (full-page; top tabs replace list)
// =====================================================================
async function renderDetail(main){
  // Self-clear so any caller (router OR top-tab click) is safe.
  main.innerHTML = "";
  const svc = svcByKey(STATE.service);
  const itemStub = STATE.item || {};
  const name = String(getPath(itemStub, svc.name_field) || itemStub.name || "");
  // Auto-refresh: poll the detail view every 5s on mutable-state services
  // so state transitions (pending→running, creating→available) show up
  // without a hard reload. Cleared on navigation away.
  clearAutoRefresh();
  if (_AUTO_REFRESH_SERVICES.has(svc.key)) {
    _AUTO_REFRESH_TIMER = setInterval(() => {
      if (STATE.view === "detail" && STATE.service === svc.key) {
        if (_shouldSkipAutoRefresh()) return;
        renderDetail(main).catch(()=>{});
      } else {
        clearAutoRefresh();
      }
    }, _AUTO_REFRESH_MS);
  }
  // Refetch
  const path = fillPath(svc.resource_path, {name});
  const r = await api("GET", path);
  const full = (r.ok && r.json) ? r.json : itemStub;

  // Top: ID line + actions
  const top = el("div",{class:"detail-top"});
  const idCol = el("div",{class:"id"});
  idCol.append(el("h1",{class:"page-h"}, name));
  idCol.append(el("div",{class:"meta"}, svc.namespace + "  ·  " + REGION + "  ·  " + ACCOUNT));
  const actCol = el("div",{style:"display:flex;gap:8px;flex-shrink:0"});
  actCol.append(...detailActions(svc, full));
  top.append(idCol, actCol);
  main.append(top);

  // Summary panel — high-level facts
  const summary = el("div",{class:"panel"});
  summary.append(el("div",{class:"panel-h"}, icon("info"), svc.label.replace(/s$/,"") + " summary"));
  summary.append(buildSummaryGrid(svc, full));
  main.append(summary);

  // Top tabs (flatten subBlades to a single linear tab strip — AWS pattern)
  const tabs = flattenTabs(svc.subBlades);
  if (!tabs.length) {
    main.append(el("pre",{class:"json"}, JSON.stringify(full, null, 2)));
    return;
  }
  const tabsEl = el("div",{class:"top-tabs"});
  tabs.forEach((t, i) => tabsEl.append(el("button",{class: i === STATE.detailTab ? "active" : "",
    onclick:()=>{ STATE.detailTab = i; renderDetail(main); }}, t.label)));
  main.append(tabsEl);

  // Tab content
  const content = el("div",{}); main.append(content);
  const activeTab = tabs[STATE.detailTab] || tabs[0];
  const renderer = SUB_RENDERERS[(activeTab.type || "").toLowerCase()];
  if (renderer) {
    try { renderer(svc, full, content, activeTab); }
    catch (e) { content.append(el("div",{class:"alert err"}, "Renderer error: " + e.message)); }
  } else {
    content.append(el("div",{class:"empty"},
      el("span",{class:"ic material-symbols-outlined"}, "construction"),
      el("div",{}, "This pane mirrors the AWS console's "+activeTab.label+" experience."),
      el("div",{class:"small",style:"font-size:11.5px;color:#a19f9d"}, "Not yet wired — placeholder for portal parity.")));
  }
}
function flattenTabs(subBlades){
  const out = [];
  (subBlades || []).forEach(node => {
    if (node.group) (node.items || []).forEach(it => out.push(it));
    else out.push(node);
  });
  // AWS shows ~8 tabs max; if longer, the rest become an "Overflow" — for now, keep first 10.
  return out.slice(0, 10);
}
function buildSummaryGrid(svc, full){
  const grid = el("div",{class:"summary-grid"});
  // Pick a few key facts from columns + obvious fields
  const fields = [];
  svc.columns.slice(0, 5).forEach(c => fields.push([c[1], getPath(full, c[0])]));
  // Common extras
  if (full.arn) fields.push(["ARN", full.arn]);
  if (full.endpoint) fields.push(["Endpoint", full.endpoint]);
  if (full.public_ip) fields.push(["Public IPv4 address", full.public_ip]);
  if (full.private_ip) fields.push(["Private IPv4 addresses", full.private_ip]);
  if (full.vpc_id) fields.push(["VPC ID", full.vpc_id]);
  if (full.subnet_id) fields.push(["Subnet ID", full.subnet_id]);
  const seen = new Set();
  fields.forEach(([k,v]) => {
    if (v == null || v === "") return;
    if (seen.has(k)) return; seen.add(k);
    const dv = el("div",{class: "v"+(/id|arn|endpoint/i.test(k) ? " mono" : "")}, String(v));
    grid.append(el("div",{}, el("div",{class:"k"}, k), dv));
  });
  return grid;
}
function detailActions(svc, full){
  const acts = [];
  if (svc.key === "ec2") {
    const st = String(full.state || "").toLowerCase();
    const running = st === "running";
    const stopped = ["stopped","stopping",""].includes(st);
    const term = st === "terminated";
    acts.push(makeDropdown("Instance state", "tune", [
      {label:"Start instance",   fn:()=>singleAction(svc, full, "start"), disabled: !stopped || term},
      {label:"Stop instance",    fn:()=>singleAction(svc, full, "stop"),  disabled: !running},
      {label:"Reboot instance",  fn:()=>singleAction(svc, full, "reboot"),disabled: !running},
      {sep:true},
      {label:"Terminate instance", danger:true, fn:()=>singleAction(svc, full, "terminate")},
    ]));
    if (running) acts.push(el("button",{class:"btn primary",onclick:()=>{
      STATE.detailTab = tabIndexByType(svc, "connect"); render();
    }}, icon("terminal"), "Connect"));
  }
  if (svc.key === "rds") {
    const st = String(full.status || "").toLowerCase();
    const avail = st === "available";
    acts.push(makeDropdown("Actions", "tune", [
      {label:"Start DB",   fn:()=>singleAction(svc, full, "start"), disabled: avail},
      {label:"Stop DB",    fn:()=>singleAction(svc, full, "stop"),  disabled: !avail},
      {label:"Reboot DB",  fn:()=>singleAction(svc, full, "reboot"),disabled: !avail},
      {sep:true},
      {label:"Delete DB",  danger:true, fn:()=>singleAction(svc, full, "delete")},
    ]));
  }
  if (svc.key === "lambda") {
    acts.push(el("button",{class:"btn primary",onclick:()=>{
      STATE.detailTab = tabIndexByType(svc, "lambdainvoke"); render();
    }}, icon("play_arrow"), "Test"));
  }
  // Generic delete fallback
  acts.push(el("button",{class:"btn danger",onclick:async()=>{
    const name = itemKey(svc, full);
    if (!confirm("Delete "+name+"?")) return;
    const r = await api("DELETE", fillPath(svc.resource_path, {name}));
    if (r.ok || [200,202,204].includes(r.status)) { toast(name+" deleted"); recordNotif("ok","Deleted "+name); navigate({view:"list", item:null}); }
    else toast("Delete failed ("+r.status+")", "err");
  }}, icon("delete"), "Delete"));
  return acts;
}
function tabIndexByType(svc, type){
  const tabs = flattenTabs(svc.subBlades);
  const i = tabs.findIndex(t => (t.type||"").toLowerCase() === type);
  return i >= 0 ? i : 0;
}
async function singleAction(svc, full, action){
  const name = itemKey(svc, full);
  if (action === "delete" || action === "terminate") {
    if (!confirm(action+" "+name+"?")) return;
  }
  const ap = (svc.api_paths || {})[action];
  if (!ap) {
    if (action === "delete" || action === "terminate") {
      const r = await api("DELETE", fillPath(svc.resource_path, {name}));
      if (r.ok || [200,202,204].includes(r.status)) { toast(name+" "+action+"d"); recordNotif("ok", action+" "+name); navigate({view:"list", item:null}); }
      else toast(action+" failed ("+r.status+")", "err");
      return;
    }
    toast("No action mapping for "+action, "err"); return;
  }
  const path = fillPath(ap.path, {name});
  const r = await api(ap.method, path);
  if (r.ok || [200,201,202,204].includes(r.status)) {
    toast(name+" "+action);
    recordNotif("ok", action+" "+name);
    // For destructive actions (terminate/delete), the resource is gone
    // from the backend — but `render()` would re-render the current
    // detail view from cache, so the user stays on a stale page showing
    // 'stopped' instead of seeing the instance disappear. Navigate back
    // to the list view, which refetches collection_path. For lifecycle
    // actions (start/stop/reboot), the instance still exists; re-render
    // the current view (which on list view re-fetches; on detail view
    // shows stale data until the user refreshes — acceptable since the
    // state transition is asynchronous anyway).
    if (action === "delete" || action === "terminate") {
      navigate({view:"list", item:null});
    } else {
      render();
    }
  }
  else toast(action+" failed ("+r.status+")", "err");
}

  // Seed defaults from every field

    if (f.type === "help" || f.type === "info") return;
    let dv = f.default; if (dv === "__UUID__") dv = uuid();

    let inp;

      const byFamily = {};

      Object.keys(byFamily).forEach(fam => {
        const og = el("optgroup",{label:String(fam).toUpperCase()});
        byFamily[fam].forEach(it => {
          const ramG = (it.ram_mb/1024).toFixed(it.ram_mb < 1024 ? 1 : 0);
          og.append(el("option",{value:it.name}, `${it.name} — ${it.vcpu} vCPU · ${ramG} GB`));
        });

    } else if (f.type === "select") {

      el("div",{style:"display:flex;align-items:center;gap:6px;font-weight:700;color:#0c5689"},
        el("span",{class:"material-symbols-outlined",style:"font-size:14px"}, "info"), "Free tier"),

    const createTemplate = svc.create_path || svc.collection_path;
    const createUrl = fillPath(createTemplate, {name: name});
    const r = await api(svc.create_method, createUrl, bodyObj);
    if (r.ok) { toast(name + " created", "ok"); recordNotif("ok", "Launched " + name);
      navigate({view:"list", item:null}); }
    else {
      const m = (r.json && (r.json.detail || (r.json.error && r.json.error.message))) || "";
      toast("Launch failed (" + r.status + "): " + m, "err");
      recordNotif("err", "Launch failed (" + r.status + ")");
    }
  }

  rerender();
}

function renderSteppedWizard(svc, main){
  const wiz = svc.wizard;
  const tabs = wiz.tabs;
  const synth = wiz.synthetic_map || {};
  const wState = {values:{}, errors:{}, tab:0, tabErrors:new Set()};
  // Seed defaults
  tabs.forEach(t => (t.sections||[]).forEach(sec => (sec.fields||[]).forEach(f => {
    if (f.type === "help" || f.type === "info") return;
    let dv = f.default;
    if (dv === "__UUID__") dv = uuid();
    if (dv !== undefined) wState.values[f.name] = dv;
  })));

  const grid = el("div",{class:"wizard-grid"});
  const mainCol = el("div",{class:"wizard-main"});
  const aside = el("aside",{class:"wizard-summary"});
  grid.append(mainCol, aside);
  main.append(grid);

  // Step strip
  const strip = el("div",{class:"step-strip"});
  mainCol.append(strip);

  // Step content
  const content = el("div",{}); mainCol.append(content);

  // Footer
  const footer = el("div",{class:"wizard-footer"});
  mainCol.append(footer);

  function isFieldVisible(f){
    if (!f.ifEquals) return true;
    return Object.entries(f.ifEquals).every(([k,v]) => wState.values[k] === v);
  }
  function fieldsOfTab(i){
    const out = []; (tabs[i].sections||[]).forEach(sec => (sec.fields||[]).forEach(f => out.push(f)));
    return out;
  }
  function validateField(f){
    if (f.type === "help" || f.type === "info") return null;
    if (!isFieldVisible(f)) return null;
    const v = wState.values[f.name];
    const isEmpty = v === undefined || v === null || v === "" || (Array.isArray(v) && !v.length);
    if (f.required && isEmpty) return "This field is required.";
    if (isEmpty) return null;
    const val = f.validate || {};
    if (val.regex && typeof v === "string" && !new RegExp(val.regex).test(v))
      return val.message || "Invalid format.";
    if (f.type === "number") {
      const n = Number(v);
      if (Number.isNaN(n)) return "Must be a number.";
      if (val.min !== undefined && n < val.min) return "Minimum "+val.min+".";
      if (val.max !== undefined && n > val.max) return "Maximum "+val.max+".";
    }
    return null;
  }
  function validateTab(i){
    if (tabs[i].auto) return [];
    const errs = {};
    fieldsOfTab(i).forEach(f => { const m = validateField(f); if (m) errs[f.name] = m; });
    Object.assign(wState.errors, errs);
    if (Object.keys(errs).length) wState.tabErrors.add(i); else wState.tabErrors.delete(i);
    return Object.keys(errs);
  }
  function renderStrip(){
    strip.innerHTML = "";
    tabs.forEach((t, i) => {
      const klass = [];
      if (i === wState.tab) klass.push("active");
      else if (i < wState.tab) klass.push("done");
      if (wState.tabErrors.has(i)) klass.push("error");
      strip.append(el("button",{class:klass.join(" "),onclick:()=>gotoTab(i)},
        el("span",{class:"num"}, String(i+1)), document.createTextNode(t.label)));
    });
  }

  function renderField(f){
    if (f.type === "help") return el("div",{class:"help-banner"}, f.value || "");
    if (f.type === "info") {
      const dv = f.name === "__account__" ? ACCOUNT
              : f.name === "__region__"  ? REGION : (wState.values[f.name] || "");
      return el("div",{class:"field"},
        el("label",{}, f.label),
        el("div",{class:"info-pill"}, dv),
        f.help ? el("div",{class:"help"}, f.help) : null);
    }
    const wrap = el("div",{class:"field"});
    const labelKids = [document.createTextNode(f.label || f.name)];
    if (f.required) labelKids.push(el("span",{class:"req"}, "*"));
    wrap.append(el("label",{}, ...labelKids));
    const err = wState.errors[f.name];
    let inp;
    if (f.type === "vmSize" && INSTANCE_CATALOG.length) {
      inp = el("select",{onchange:e=>{wState.values[f.name]=e.target.value; rerender();}});
      const byFamily = {};
      INSTANCE_CATALOG.forEach(it => { (byFamily[it.family] = byFamily[it.family] || []).push(it); });
      Object.keys(byFamily).forEach(fam => {
        const og = el("optgroup",{label:String(fam).toUpperCase()});
        byFamily[fam].forEach(it => {
          const ramG = (it.ram_mb/1024).toFixed(it.ram_mb < 1024 ? 1 : 0);
          og.append(el("option",{value:it.name}, `${it.name} — ${it.vcpu} vCPU · ${ramG} GB`));
        });
        inp.append(og);
      });
      inp.value = wState.values[f.name] || (f.default||"");
      wrap.append(inp);
    } else if (f.type === "select") {
      inp = el("select",{onchange:e=>{wState.values[f.name]=e.target.value; rerender();}});
      (f.options||[]).forEach(o => inp.append(el("option",{value:o.value}, o.label||o.value)));
      inp.value = wState.values[f.name] ?? (f.default||"");
      wrap.append(inp);
    } else if (f.type === "radio") {
      (f.options||[]).forEach(o => {
        const r = el("input",{type:"radio",name:f.name,value:String(o.value),
          onchange:e=>{wState.values[f.name]= (typeof o.value === "boolean") ? (e.target.value==="true") : e.target.value; rerender();}});
        if (String(wState.values[f.name] ?? f.default) === String(o.value)) r.checked = true;
        wrap.append(el("label",{class:"radio"}, r, el("span",{class:"lbl"}, o.label||String(o.value))));
      });
    } else if (f.type === "boolean") {
      const cb = el("input",{type:"checkbox",onchange:e=>{wState.values[f.name]=e.target.checked; rerender();}});
      if (wState.values[f.name]) cb.checked = true;
      wrap.innerHTML = "";
      wrap.append(el("label",{class:"check"}, cb, el("span",{class:"lbl"}, f.label||f.name)));
    } else if (f.type === "number") {
      inp = el("input",{type:"number",value: wState.values[f.name] ?? f.default ?? "",
        oninput:e=>{wState.values[f.name]= e.target.value === "" ? "" : Number(e.target.value); rerender(true);}});
      if ((f.validate||{}).min !== undefined) inp.setAttribute("min", f.validate.min);
      if ((f.validate||{}).max !== undefined) inp.setAttribute("max", f.validate.max);
      wrap.append(inp);
    } else if (f.type === "password") {
      inp = el("input",{type:"password",value: wState.values[f.name] || "",
        oninput:e=>{wState.values[f.name]=e.target.value; rerender(true);}});
      wrap.append(inp);
    } else if (f.type === "tagsEditor") {
      const t = wState.values[f.name] || {}; wState.values[f.name] = t;
      const rows = el("div",{});
      function paint(){
        rows.innerHTML = "";
        const entries = Object.entries(t);
        if (!entries.length) entries.push(["",""]);
        entries.forEach(([k,v]) => {
          const grid = el("div",{class:"tags-rows"});
          const kInp = el("input",{placeholder:"Key",value:k,
            oninput:e=>{ delete t[k]; if (e.target.value) t[e.target.value] = v; }});
          const vInp = el("input",{placeholder:"Value",value:v,oninput:e=>{ t[k] = e.target.value; }});
          const x = el("button",{class:"x material-symbols-outlined",
            onclick:()=>{ delete t[k]; paint(); rerender(true); }}, "close");
          grid.append(kInp, vInp, x);
          rows.append(grid);
        });
      }
      paint();
      wrap.append(rows);
      wrap.append(el("button",{class:"add-row",onclick:()=>{
        t["new-tag-"+(Object.keys(t).length+1)] = ""; paint(); rerender(true);
      }}, "+ Add tag"));
    } else if (f.type === "cidr") {
      inp = el("input",{type:"text",value: wState.values[f.name] ?? f.default ?? "10.0.0.0/16",
        oninput:e=>{wState.values[f.name]=e.target.value; rerender(true);}});
      wrap.append(inp);
    } else {
      inp = el("input",{type:"text",value: wState.values[f.name] ?? f.default ?? "",
        oninput:e=>{wState.values[f.name]=e.target.value; rerender(true);}});
      wrap.append(inp);
    }
    if (inp && err) inp.classList.add("err");
    if (f.help) wrap.append(el("div",{class:"help"}, f.help));
    if (err) wrap.append(el("div",{class:"err-msg"}, icon("error"), document.createTextNode(err)));
    return wrap;
  }
  function renderTab(){
    content.innerHTML = "";
    const t = tabs[wState.tab];
    if (t.auto) return renderReview();
    (t.sections||[]).forEach(sec => {
      const sd = el("div",{class:"form-section"});
      if (sec.label) sd.append(el("div",{class:"h"}, sec.label));
      (sec.fields||[]).forEach(f => { if (!isFieldVisible(f)) return; sd.append(renderField(f)); });
      content.append(sd);
    });
  }
  function renderReview(){
    let allOk = true, badTabs = [];
    tabs.forEach((t,i) => { if (t.auto) return; if (validateTab(i).length) { allOk = false; badTabs.push(t.label); } });
    content.append(el("div",{class:"rev-banner "+(allOk?"ok":"err")},
      icon(allOk ? "check_circle" : "error"),
      document.createTextNode(allOk ? "All sections pass validation. Click Launch to create the resource."
                                    : "Errors in: "+badTabs.join(", "))));
    tabs.forEach((t,i) => {
      if (t.auto) return;
      const card = el("div",{class:"rev-card"});
      card.append(el("div",{class:"hdr"}, document.createTextNode(t.label),
        el("button",{class:"edit",onclick:()=>gotoTab(i)}, "Edit")));
      const g = el("div",{class:"grid"});
      (t.sections||[]).forEach(sec => (sec.fields||[]).forEach(f => {
        if (f.type === "help") return;
        if (!isFieldVisible(f)) return;
        if (f.type === "info") {
          const dv = f.name==="__account__" ? ACCOUNT : f.name==="__region__" ? REGION : "";
          g.append(el("div",{class:"k"}, f.label), el("div",{class:"v"}, dv||"(none)"));
          return;
        }
        let v = wState.values[f.name];
        if (f.type === "password" && v) v = "•".repeat(Math.min(8, String(v).length));
        if (f.type === "tagsEditor") v = Object.entries(v||{}).filter(([k,_])=>k).map(([k,vv])=>`${k}=${vv}`).join(", ") || "(none)";
        if (Array.isArray(v)) v = JSON.stringify(v);
        if (typeof v === "boolean") v = v ? "Yes" : "No";
        g.append(el("div",{class:"k"}, f.label||f.name),
                 el("div",{class:"v"}, v===undefined||v==="" ? "(empty)" : String(v)));
      }));
      card.append(g);
      content.append(card);
    });
  }
  function renderFooter(){
    footer.innerHTML = "";
    footer.append(el("button",{class:"btn",onclick:()=>navigate({view:"list", item:null})}, "Cancel"));
    footer.append(el("div",{class:"spacer"}));
    if (wState.tab > 0) footer.append(el("button",{class:"btn",onclick:()=>gotoTab(wState.tab-1)}, "Previous"));
    const last = wState.tab === tabs.length - 1;
    if (last) {
      const anyErrs = wState.tabErrors.size > 0;
      const btn = el("button",{class:"btn primary",onclick:submit}, icon("rocket_launch"),
        (svc.key === "ec2" ? "Launch instance" : (svc.key === "s3" ? "Create bucket" : "Create")));
      if (anyErrs) btn.setAttribute("disabled","");
      footer.append(btn);
    } else if (wState.tab === tabs.length-2 || (tabs[wState.tab+1] || {}).auto) {
      footer.append(el("button",{class:"btn primary",onclick:()=>{validateTab(wState.tab); gotoTab(wState.tab+1);}}, "Review and create"));
    } else {
      const nextLabel = "Next: " + (tabs[wState.tab+1] || {}).label;
      footer.append(el("button",{class:"btn primary",onclick:()=>{validateTab(wState.tab); gotoTab(wState.tab+1);}}, nextLabel));
    }
  }
  function renderAside(){
    aside.innerHTML = "";
    aside.append(el("h3",{}, "Summary"));
    const keep = (k,v)=>{ if (v == null || v === "" || k.startsWith("__")) return false; return true; };
    const fmt = (v) => {
      if (typeof v === "boolean") return v ? "Yes" : "No";
      if (Array.isArray(v)) return v.length ? v.join(", ") : "(empty)";
      if (typeof v === "object" && v) {
        const e = Object.entries(v).filter(([k,_])=>k); return e.length ? e.map(([k,vv])=>`${k}=${vv}`).join(", ") : "(empty)";
      }
      return String(v).slice(0,60);
    };
    // Pull most informative fields from current state for the summary card
    const pretty = (k) => {
      // Map field name → label by searching wizard schema
      for (const t of tabs) for (const sec of (t.sections||[])) for (const f of (sec.fields||[])) {
        if (f.name === k) return f.label || k;
      }
      return k;
    };
    let n = 0;
    Object.entries(wState.values).forEach(([k,v]) => {
      if (!keep(k,v) || n > 10) return;
      aside.append(el("div",{class:"row"}, el("span",{class:"k"}, pretty(k)), el("span",{class:"v"}, fmt(v))));
      n++;
    });
    if (n === 0) aside.append(el("div",{style:"font-size:12.5px;color:var(--sub)"}, "Fill in fields on the left — your choices will show here."));
    aside.append(el("div",{class:"cta"},
      el("button",{class:"btn primary",onclick:submit},
        icon("rocket_launch"),
        (svc.key === "ec2" ? "Launch instance" : "Create resource")),
      el("button",{class:"btn",onclick:()=>navigate({view:"list", item:null})}, "Cancel")));
  }

  function gotoTab(i){
    if (i < 0 || i >= tabs.length) return;
    wState.tab = i; wState.errors = {};
    tabs.forEach((_,idx) => validateTab(idx));
    rerender();
  }
  function rerender(softFieldOnly){
    if (softFieldOnly) { renderStrip(); renderAside(); renderFooter(); return; }
    renderStrip(); renderTab(); renderAside(); renderFooter();
  }
  async function submit(){
    const name = String(wState.values["name"] || "").trim();
    if (!name) { toast("Name is required", "err"); return; }
    const bodyObj = {tags: wState.values["tags"] || {}};
    Object.entries(wState.values).forEach(([k,v]) => {
      if (k === "tags") return;
      if (v === undefined || v === null || v === "") return;
      if (k.startsWith("__")) {
        const m = synth[k];
        if (!m) return;
        const expansion = m[v] || m["*"];
        if (!expansion) return;
        Object.entries(expansion).forEach(([path, val]) => {
          const final = val === "$value" ? v : val;
          setPath(bodyObj, path, final);
        });
        return;
      }
      setPath(bodyObj, k, v);
    });
    // Same create_path override pattern — applies to wizard path too.
    const createTemplate = svc.create_path || svc.collection_path;
    const createUrl = fillPath(createTemplate, {name: name});
    const r = await api(svc.create_method, createUrl, bodyObj);
    if (r.ok) {
      toast(name + " created", "ok"); recordNotif("ok", "Created " + name);
      navigate({view:"list", item:null});
    } else {
      const m = (r.json && (r.json.detail || (r.json.error && r.json.error.message))) || "";
      toast("Create failed (" + r.status + "): " + m, "err");
    }
  }

  rerender();
}

function renderFlatCreate(svc, main){
  // Fallback for any catalog entry lacking a wizard schema.
  const grid = el("div",{class:"wizard-grid"});
  const mainCol = el("div",{class:"wizard-main"});
  const aside = el("aside",{class:"wizard-summary"});
  grid.append(mainCol, aside);
  main.append(grid);
  const inputs = {};
  svc.createFields.forEach(f => {
    let dv = f.default || "";
    if (dv === "__UUID__") dv = uuid();
    const inp = el("input",{value:dv});
    inputs[f.name] = inp;
    mainCol.append(el("div",{class:"field"}, el("label",{}, f.label), inp));
  });
  mainCol.append(el("div",{class:"wizard-footer"},
    el("button",{class:"btn",onclick:()=>navigate({view:"list", item:null})}, "Cancel"),
    el("div",{class:"spacer"}),
    el("button",{class:"btn primary",onclick:async()=>{
      const body = {};
      svc.createFields.forEach(f => { const v = inputs[f.name].value; if (v !== "") body[f.name] = v; });
      const name = String(body.name || "").trim();
      if (!name) { toast("Name is required","err"); return; }
      const r = await api(svc.create_method, svc.collection_path, body);
      if (r.ok) { toast(name+" created"); navigate({view:"list", item:null}); }
      else toast("Create failed", "err");
    }}, "Create")));
  aside.append(el("h3",{}, "Summary"), el("div",{style:"font-size:12.5px;color:var(--sub)"},
    "Fill in fields on the left, then click Create."));
}

const SUB_RENDERERS = {};

SUB_RENDERERS.overview = function(svc, full, host){
  const card = el("div",{class:"kv-card"});
  card.append(el("div",{class:"h"}, "Resource details"));
  const grid = el("div",{class:"kv-grid"});
  const rows = [["Region", REGION], ["Account", ACCOUNT]];
  svc.columns.forEach(c => { const v = getPath(full, c[0]); if (v != null) rows.push([c[1], String(v)]); });
  if (full.arn) rows.push(["ARN", full.arn]);
  rows.forEach(([k,v])=>{ grid.append(el("div",{}, el("div",{class:"k"}, k),
    el("div",{class:"v"+(/id|arn/i.test(k)?" mono":"")}, v))); });
  card.append(grid); host.append(card);
};
SUB_RENDERERS.activitylog = async function(svc, full, host){
  host.append(el("div",{class:"alert info"}, icon("info"),
    el("div",{}, "Operations recorded against this resource in the current simulator session.")));
  const name = itemKey(svc, full);
  try {
    const r = await fetch(ORIGIN + "/api/cloudsim/events");
    const j = await r.json();
    const all = Array.isArray(j) ? j : (j.events || []);
    const t = name.toLowerCase();
    const filtered = all.filter(ev => {
      const d = ev.detail || {};
      if (d.resource_id && String(d.resource_id).toLowerCase().includes(t)) return true;
      if (d.name && String(d.name).toLowerCase() === t) return true;
      if (d.instance_id && String(d.instance_id).toLowerCase() === t) return true;
      return false;
    });
    if (!filtered.length) { host.append(el("div",{class:"empty"}, "No activity yet for this resource.")); return; }
    const tbl = el("table",{class:"aws"});
    tbl.append(el("tr",{}, el("th",{}, "Event time"), el("th",{}, "Operation"),
      el("th",{}, "Status"), el("th",{}, "Detail")));
    filtered.slice(0, 50).forEach(ev => {
      tbl.append(el("tr",{},
        el("td",{class:"mono small"}, ev.at || ev.ts || "—"),
        el("td",{}, String(ev.event||"")),
        el("td",{}, stateBadge("Succeeded")),
        el("td",{class:"small mono"}, Object.entries(ev.detail||{}).filter(([k,_])=>k!=="resource_id").map(([k,v])=>`${k}=${typeof v==="object"?JSON.stringify(v):v}`).join(", "))));
    });
    host.append(tbl);
  } catch(e) { host.append(el("div",{class:"empty"}, "Unable to load events.")); }
};
SUB_RENDERERS.iam = function(svc, full, host){
  host.append(el("div",{class:"alert info"}, icon("admin_panel_settings"),
    el("div",{}, "IAM permissions and resource-based policies attached to this resource.")));
  host.append(el("div",{class:"empty"}, "No policies attached."));
};
SUB_RENDERERS.tags = function(svc, full, host){
  const tags = (full.tags && typeof full.tags === "object") ? full.tags : {};
  const state = {tags: {...tags}};
  const card = el("div",{class:"kv-card"});
  card.append(el("div",{class:"h"}, "Tags ("+Object.keys(state.tags).length+")"));
  const rows = el("div",{}); card.append(rows);
  function paint(){
    rows.innerHTML = "";
    const entries = Object.entries(state.tags);
    if (!entries.length) entries.push(["",""]);
    entries.forEach(([k,v]) => {
      const grid = el("div",{class:"tags-rows"});
      const kInp = el("input",{placeholder:"Key",value:k,
        oninput:e=>{ delete state.tags[k]; if (e.target.value) state.tags[e.target.value] = v; }});
      const vInp = el("input",{placeholder:"Value",value:v,
        oninput:e=>{ state.tags[k] = e.target.value; }});
      const x = el("button",{class:"x material-symbols-outlined",
        onclick:()=>{ delete state.tags[k]; paint(); }}, "close");
      grid.append(kInp, vInp, x);
      rows.append(grid);
    });
  }
  paint();
  card.append(el("div",{style:"margin-top:10px"},
    el("button",{class:"add-row",onclick:()=>{state.tags["new-tag"]=""; paint();}}, "+ Add tag")));
  card.append(el("div",{style:"margin-top:16px;display:flex;gap:8px"},
    el("button",{class:"btn primary",onclick:async()=>{
      const r = await api("PATCH", fillPath(svc.resource_path, {name:itemKey(svc,full)}), {tags: state.tags});
      if (r.ok) { toast("Tags saved"); recordNotif("ok","Tags updated"); }
      else toast("Save failed ("+r.status+")", "err");
    }}, "Save changes"),
    el("button",{class:"btn",onclick:()=>{state.tags={...tags}; paint();}}, "Cancel")));
  host.append(card);
};
SUB_RENDERERS.json = function(svc, full, host){ host.append(el("pre",{class:"json"}, JSON.stringify(full, null, 2))); };
SUB_RENDERERS.properties = function(svc, full, host){
  const card = el("div",{class:"kv-card"});
  card.append(el("div",{class:"h"}, "All properties"));
  const grid = el("div",{style:"display:grid;grid-template-columns:280px 1fr;gap:4px 12px;font-size:12.5px"});
  function walk(o, prefix){
    if (o == null) return;
    if (typeof o !== "object" || Array.isArray(o)) {
      grid.append(el("div",{style:"color:var(--sub);font-family:Consolas,Menlo,monospace"}, prefix||"(root)"),
                  el("div",{}, Array.isArray(o) ? JSON.stringify(o) : String(o)));
      return;
    }
    Object.entries(o).forEach(([k,v]) => {
      const p = prefix ? prefix+"."+k : k;
      if (v && typeof v === "object" && !Array.isArray(v)) walk(v, p);
      else grid.append(el("div",{style:"color:var(--sub);font-family:Consolas,Menlo,monospace"}, p),
                       el("div",{}, Array.isArray(v) ? JSON.stringify(v) : String(v)));
    });
  }
  walk(full, ""); card.append(grid); host.append(card);
};
SUB_RENDERERS.metrics = function(svc, full, host){
  host.append(el("div",{class:"alert info"}, icon("show_chart"),
    el("div",{}, "Synthesized CloudWatch metrics. Real telemetry ingestion is future work.")));
  const series = svc.key === "ec2"
    ? [["CPU utilization (%)",10,80,"%"],["Network in (KB/s)",50,500,""],["Network out (KB/s)",30,400,""],["Status check failures",0,1,""]]
    : svc.key === "rds"
    ? [["CPU (%)",20,80,"%"],["DB connections",2,30,""],["Free storage (GiB)",10,80,""],["Read IOPS",10,200,""]]
    : svc.key === "lambda"
    ? [["Invocations",10,500,""],["Duration (ms)",50,300,""],["Errors",0,10,""],["Throttles",0,5,""]]
    : [["Requests",100,1000,""],["Latency (ms)",10,200,""],["Errors",0,10,""]];
  const grid = el("div",{class:"metrics-grid"});
  series.forEach(([l,lo,hi,suf]) => grid.append(buildSparkline(l, lo, hi, suf)));
  host.append(grid);
};
function buildSparkline(label, lo, hi, suffix){
  const card = el("div",{class:"metric-card"});
  card.append(el("div",{class:"label"}, label));
  let seed = 0; for (const c of label) seed = (seed*31 + c.charCodeAt(0)) & 0xffff;
  const pts = []; for (let i=0;i<24;i++) { seed = (seed * 1103515245 + 12345) & 0x7fffffff; pts.push(lo + (hi-lo) * ((seed % 1000)/1000)); }
  const w=240, h=60, max=Math.max(...pts), min=Math.min(...pts);
  const path = pts.map((p,i)=>`${i===0?"M":"L"}${(i*(w-4)/(pts.length-1)+2).toFixed(1)},${(h-2-((p-min)/(max-min||1))*(h-6)).toFixed(1)}`).join(" ");
  card.append(el("div",{class:"chart",html:`<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="#ff9900" stroke-width="1.6"/></svg>`}));
  card.append(el("div",{class:"value"}, pts[pts.length-1].toFixed(suffix==="%"?0:0) + (suffix||" units")));
  return card;
}

SUB_RENDERERS.connect = function(svc, full, host){
  host.append(el("div",{class:"alert info"}, icon("terminal"),
    el("div",{}, "Connect to your instance via SSH (real key + port forward) or via the LXD shell fallback.")));

  // Container for the live values — populated by an async fetch to the
  // /connect-info endpoint, which lazy-provisions the SSH key + lxc proxy
  // device on first hit and returns cached info thereafter.
  const wrap = el("div",{class:"vm-connect-pane"});
  host.append(wrap);
  wrap.append(el("div",{class:"alert"}, icon("clock"),
    el("div",{}, "Provisioning SSH access on the running container…")));

  const instanceId = full.instance_id || full.InstanceId || full.id || "";
  if (!instanceId) {
    wrap.innerHTML = "";
    wrap.append(el("div",{class:"alert warn"}, el("div",{}, "Missing instance_id — cannot generate connect command.")));
    return;
  }

  fetch(`/api/aws/ec2/instances/${encodeURIComponent(instanceId)}/connect-info`)
    .then(r => r.json().then(d => ({ok: r.ok, status: r.status, body: d})))
    .then(({ok, status, body}) => {
      wrap.innerHTML = "";
      if (!ok) {
        const reason = (body.detail && (body.detail.error || body.detail.reason)) || body.detail || "unknown";
        const hint = (body.detail && body.detail.hint) || "";
        wrap.append(el("div",{class:"alert warn"},
          el("div",{}, `Connect provisioning failed (HTTP ${status}): ${reason}${hint ? " · " + hint : ""}`)));
        return;
      }
      const ssh = body.ssh || {};
      const lxcCmd = (body.lxc || {}).command || "";
      const keyUrl = ssh.key_download_url || "";
      const sharedKey = body.auth_mode === "shared_host_key";

      // Shared host-key path (the headline path for installed appliances):
      // no download, no chmod — the user's ~/.ssh/vyomi_ed25519 already
      // matches the authorized_keys on every container. Just paste & go.
      if (sharedKey) {
        wrap.append(el("div",{class:"alert success",
                              style:"background:#ecfdf5;border-color:#a7f3d0;color:#047857"},
          el("div",{}, `✓ Shared SSH identity installed at `,
            el("code",{}, ssh.host_identity_path || "~/.ssh/vyomi_ed25519"),
            ` — no key download needed.`)));
      } else {
        // Dev fallback — per-instance keypair, download required.
        wrap.append(el("div",{class:"keyblock"},
          el("div",{class:"k"}, "Step 1 — Download SSH private key (one-time)"),
          el("div",{class:"row"},
            el("a",{class:"btn", href:keyUrl, download:`vyomi-${instanceId}.pem`},
              icon("download"), `Download ${ssh.key_local_filename || "vyomi-" + instanceId + ".pem"}`),
            el("span",{class:"muted", style:"font-size:12px;margin-left:8px"},
              "Save to ~/Downloads. Run `chmod 600` on it before connecting."))));
      }

      // The SSH command itself — same UI for both modes
      const sshCmd = ssh.command || "";
      const stepLabel = sharedKey ? "Paste this into your terminal" : "Step 2 — SSH command";
      wrap.append(el("div",{class:"keyblock"},
        el("div",{class:"k"}, stepLabel),
        el("pre",{class:"keyval"}, sshCmd),
        el("div",{class:"row"},
          el("button",{class:"btn",onclick:()=>{navigator.clipboard.writeText(sshCmd); toast("Copied");}},
            icon("copy"), "Copy"),
          el("span",{class:"muted", style:"font-size:12px;margin-left:8px"},
            `Logs you in as ${ssh.user || "ubuntu"}@${ssh.host || ""} on port ${ssh.port || ""}.`))));

      // 3. lxc shell fallback (no key needed, but only works on the
      //    same machine running the appliance VM)
      if (lxcCmd) {
        wrap.append(el("div",{class:"keyblock"},
          el("div",{class:"k"}, "Alternative — LXD shell (no key required)"),
          el("pre",{class:"keyval"}, lxcCmd),
          el("div",{class:"row"},
            el("button",{class:"btn",onclick:()=>{navigator.clipboard.writeText(lxcCmd); toast("Copied");}},
              icon("copy"), "Copy"),
            el("span",{class:"muted", style:"font-size:12px;margin-left:8px"},
              "Drops you straight into a root shell — works without SSH keys but only from the host running this appliance."))));
      }
    })
    .catch(e => {
      wrap.innerHTML = "";
      wrap.append(el("div",{class:"alert warn"}, el("div",{}, `Connect endpoint error: ${e.message}`)));
    });
};

// S3 specific
SUB_RENDERERS.bucketobjects = function(svc, full, host){
  // v2.0.6 — add the Upload button that was missing from the Objects
  // tab. POSTs multipart/form-data to /api/s3/buckets/{name}/objects
  // (api_paths.uploadObject), reuses the same endpoint that boto3 +
  // aws-cli `s3 cp` hit. Files larger than ~50 MB go via a background
  // FormData upload so the UI stays responsive.
  const action = el("div",{style:"display:flex;gap:8px;margin-bottom:14px;align-items:center"});
  const fileIn = el("input",{type:"file",style:"display:none",multiple:true,
    onchange: e => uploadFiles(e.target.files)});
  const uploadBtn = el("button",{class:"btn primary",onclick:()=>fileIn.click()},
    icon("file_upload"), "Upload");
  const refreshBtn = el("button",{class:"btn",onclick:()=>{ host.innerHTML=""; SUB_RENDERERS.bucketobjects(svc, full, host); }},
    icon("refresh"), "Refresh");
  const status = el("span",{style:"font-size:12.5px;color:var(--sub);margin-left:auto"}, "");
  action.append(uploadBtn, refreshBtn, fileIn, status);
  host.append(action);

  async function uploadFiles(fileList){
    if (!fileList || !fileList.length) return;
    const files = Array.from(fileList);
    let done = 0;
    for (const f of files){
      status.textContent = `Uploading ${f.name} (${done+1}/${files.length})…`;
      const fd = new FormData();
      fd.append("file", f, f.name);
      try {
        const r = await fetch(ORIGIN+fillPath(svc.api_paths.uploadObject.path, {name: full.name}),
          {method: "POST", body: fd});
        if (!r.ok) { toast(`Upload failed: ${f.name}`, "err"); }
        else { done++; }
      } catch (e) { toast(`Upload failed: ${f.name} — ${e.message}`, "err"); }
    }
    status.textContent = `Uploaded ${done} of ${files.length}`;
    if (done > 0) toast(`Uploaded ${done} object${done===1?"":"s"}`, "ok");
    // Re-render the list so the new objects show up immediately.
    host.innerHTML = "";
    SUB_RENDERERS.bucketobjects(svc, full, host);
  }

  // Delete one object. Build the URL with per-segment encoding (not fillPath,
  // which would %2F-escape the slashes the {key:path} route needs).
  async function deleteObject(key){
    if (!key || !confirm(`Delete object "${key}"? This can't be undone.`)) return;
    const url = ORIGIN + "/api/s3/buckets/" + encodeURIComponent(full.name)
              + "/objects/" + key.split("/").map(encodeURIComponent).join("/");
    try {
      const r = await fetch(url, {method: (svc.api_paths.deleteObject||{}).method || "DELETE"});
      if (r.ok || [200,202,204].includes(r.status)) {
        toast(`Deleted ${key}`, "ok");
        host.innerHTML = "";
        SUB_RENDERERS.bucketobjects(svc, full, host);
      } else { toast(`Delete failed: ${key}`, "err"); }
    } catch (e) { toast(`Delete failed: ${key} — ${e.message}`, "err"); }
  }

  fetch(ORIGIN+fillPath(svc.api_paths.objects.path, {name: full.name})).then(r=>r.json()).then(j=>{
    const objs = j.objects || j.value || [];
    if (!objs.length) {
      const empty = el("div",{class:"empty",style:"padding:32px;text-align:center"},
        icon("inbox"),
        el("div",{}, "This bucket is empty."),
        el("div",{style:"font-size:12px;color:var(--sub);margin-top:6px"},
          "Click ", el("strong",{}, "Upload"), " above to add your first object."));
      host.append(empty);
      return;
    }
    const tbl = el("table",{class:"aws"});
    tbl.append(el("tr",{}, el("th",{}, "Name"), el("th",{}, "Type"),
      el("th",{}, "Last modified"), el("th",{}, "Size"), el("th",{}, "Storage class"), el("th",{}, "")));
    objs.forEach(o => { const key = o.key||o.name||""; tbl.append(el("tr",{},
      el("td",{}, el("a",{class:"id"}, key||"—")),
      el("td",{}, /\.(png|jpg|jpeg)$/i.test(key) ? "Image" : "Object"),
      el("td",{class:"small"}, o.last_modified||"—"),
      el("td",{}, String(o.size||o.content_length||0)+" B"),
      el("td",{}, o.storage_class||"Standard"),
      el("td",{style:"text-align:right"},
        el("button",{class:"btn danger",title:"Delete object",onclick:()=>deleteObject(key)},
          icon("delete"), "Delete")))); });
    host.append(tbl);
  });
};

// ── Disk-health widget (vanilla JS — same data the SPA React widget uses) ──
// Renders into #disk-widget-slot above the breadcrumb. Auto-refreshes
// every 30s. Color matches the tier-aware status:
//   green  = healthy
//   warn   = ≤7 days OR ≥warn_pct used OR refresh stale >48h
//   freeze = ≥freeze_pct OR sub expired — new launches will be refused
let _diskWidgetState = null;

function _diskStatusToClass(s) {
  if (s === "warn") return "warn";
  if (s === "freeze" || s === "danger") return "danger";
  return "";
}
function _toggleDiskPopover() {
  const el = document.getElementById("disk-widget-slot");
  if (!el) return;
  el.classList.toggle("open");
}
function _closeDiskPopover(ev) {
  if (ev) { ev.stopPropagation(); }
  const el = document.getElementById("disk-widget-slot");
  if (el) el.classList.remove("open");
}
function _wrapWithChip(cardHtml, d) {
  const disk = d.disk || {};
  const pct = Math.round(disk.pct_used || 0);
  const klass = _diskStatusToClass(d.status);
  return (
    '<button class="disk-chip ' + klass + '" type="button" onclick="_toggleDiskPopover()" title="Click to expand disk health">'+
      '<span class="disk-chip-dot"></span>'+
      '<span>Disk</span>'+
      '<span class="disk-chip-pct">' + pct + '%</span>'+
      '<span class="disk-chip-caret">▾</span>'+
    '</button>'+
    '<div class="disk-popover" onclick="event.stopPropagation()">'+
      '<button class="dp-close" type="button" onclick="_closeDiskPopover(event)" title="Minimize">×</button>'+
      cardHtml +
    '</div>'
  );
}
// Close popover when clicking outside the chip
document.addEventListener("click", function(ev) {
  const el = document.getElementById("disk-widget-slot");
  if (!el || !el.classList.contains("open")) return;
  if (!el.contains(ev.target)) el.classList.remove("open");
});

function renderDiskWidget(d) {
  const slot = document.getElementById("disk-widget-slot");
  if (!slot) return;
  if (!d || !d.available) {
    slot.innerHTML = "";
    return;
  }
  _diskWidgetState = d;
  const disk = d.disk || {};
  const pct = Math.round(disk.pct_used || 0);
  const tier = String(d.tier || "free").toUpperCase();
  const status = d.status;  // green | warn | freeze
  const accent = status === "green" ? "#10b981"
               : status === "warn"  ? "#f59e0b"
               :                      "#ef4444";
  const bg = status === "green" ? "#fff"
           : status === "warn"  ? "#fffbeb"
           :                      "#fef2f2";
  const statusLabel = status === "green" ? "Healthy"
                    : status === "warn"  ? "Warning · " + pct + "% used"
                    :                      "Critical · " + pct + "% used — new launches will be refused";
  // Accept both new (pro/max) and legacy (student/developer) tier names.
  const canGrow = ["pro", "max", "enterprise", "student", "developer"].includes(String(d.tier || "").toLowerCase());
  slot.innerHTML = _wrapWithChip('<div style="background:' + bg + ';border:1.5px solid ' + accent + ';border-radius:10px;padding:12px 16px;margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
        '<div style="font-size:13.5px;font-weight:600;color:#1f2937">' +
          'Appliance disk' +
          '<span style="display:inline-block;margin-left:8px;padding:2px 8px;background:#ede9fe;color:#6d28d9;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.05em">' + tier + '</span>' +
        '</div>' +
        '<div style="font-size:12px;font-weight:600;color:' + accent + '">' + statusLabel + '</div>' +
      '</div>' +
      '<div style="margin-bottom:10px">' +
        '<div style="height:8px;background:#f3f4f6;border-radius:999px;overflow:hidden">' +
          '<div style="height:100%;width:' + pct + '%;background:' + accent + ';transition:width 0.3s"></div>' +
        '</div>' +
        '<div style="font-size:11px;color:#6b7280;margin-top:6px">' +
          disk.used_gb + " / " + disk.total_gb + " GB · " + disk.avail_gb + " GB free" +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn" onclick="openDiskCleanup()" style="font-size:12px;padding:6px 12px">Free up space →</button>' +
        (canGrow
          ? '<button class="btn" onclick="openDiskGrow()" style="font-size:12px;padding:6px 12px;background:#fff;color:#1a2330;border:1px solid #d8e0ea">Grow disk</button>'
          : '') +
      '</div>' +
    '</div>', d);
}
async function fetchDiskHealth() {
  try {
    const r = await fetch("/api/runtime/disk-health");
    const d = await r.json();
    renderDiskWidget(d);
  } catch (e) { /* keep last render */ }
}
async function openDiskCleanup() {
  let html = '<div class="empty">Scanning disk…</div>';
  const modal = document.createElement("div");
  modal.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,0.5);display:flex;align-items:center;justify-content:center;z-index:9999";
  modal.innerHTML = '<div style="background:#fff;border-radius:10px;max-width:640px;width:90%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden">' +
    '<div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">' +
      '<h3 style="margin:0;font-size:16px">Free up appliance disk</h3>' +
      '<button onclick="this.closest(\'.modal-disk\').remove()" style="background:none;border:0;font-size:24px;cursor:pointer">×</button>' +
    '</div>' +
    '<div id="cleanup-body" style="padding:20px;overflow-y:auto;flex:1">' + html + '</div>' +
    '<div id="cleanup-foot" style="padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end"></div>' +
    '</div>';
  modal.className = "modal-disk";
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
  try {
    const r = await fetch("/api/runtime/disk-cleanup/suggestions");
    const d = await r.json();
    const body = modal.querySelector("#cleanup-body");
    const foot = modal.querySelector("#cleanup-foot");
    body.innerHTML = '<div style="margin-bottom:12px;font-size:13px;color:#475569">Select what to clean. All options below are safe — they never affect running workloads.</div>' +
      (d.suggestions || []).map((s, i) =>
        '<label style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;cursor:pointer">' +
          '<input type="checkbox" data-key="' + s.key + '"' + (s.safe ? ' checked' : '') + ' style="margin-top:3px">' +
          '<div style="flex:1">' +
            '<div style="font-size:13.5px;font-weight:500">' + s.label +
              (s.est_reclaim_gb ? ' <span style="color:#059669;font-weight:600;margin-left:6px">≈ ' + s.est_reclaim_gb + ' GB</span>' : '') +
            '</div>' +
            '<div style="font-size:12px;color:#6b7280;margin-top:2px">' + s.detail + '</div>' +
          '</div>' +
        '</label>'
      ).join("");
    foot.innerHTML =
      '<button class="btn" onclick="this.closest(\'.modal-disk\').remove()" style="padding:8px 14px;background:#fff;border:1px solid #d8e0ea;color:#1a2330">Cancel</button>' +
      '<button class="btn" id="cleanup-run" style="padding:8px 14px;background:#0f1b2d;color:#fff">Run cleanup</button>';
    foot.querySelector("#cleanup-run").onclick = async () => {
      const cats = [...body.querySelectorAll("input[type=checkbox]:checked")].map(i => i.dataset.key);
      foot.querySelector("#cleanup-run").textContent = "Running…";
      foot.querySelector("#cleanup-run").disabled = true;
      try {
        const r = await fetch("/api/runtime/disk-cleanup/run", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({categories: cats}),
        });
        const out = await r.json();
        body.innerHTML = '<div style="background:#ecfdf5;color:#047857;padding:10px 14px;border-radius:6px;margin-bottom:12px">✓ Cleanup complete.</div>' +
          '<pre style="background:#0f172a;color:#e2e8f0;padding:10px;border-radius:6px;font-size:11px;overflow:auto;max-height:300px">' +
            JSON.stringify(out, null, 2) + '</pre>';
        foot.innerHTML = '<button class="btn" onclick="this.closest(\'.modal-disk\').remove(); fetchDiskHealth()" style="padding:8px 14px;background:#0f1b2d;color:#fff">Done</button>';
      } catch (e) {
        body.innerHTML += '<div style="color:#b91c1c">Error: ' + e.message + '</div>';
      }
    };
  } catch (e) {
    modal.querySelector("#cleanup-body").innerHTML = '<div style="color:#b91c1c">Failed to load suggestions: ' + e.message + '</div>';
  }
}
function openDiskGrow() {
  const current = (_diskWidgetState && _diskWidgetState.disk && _diskWidgetState.disk.total_gb) || 30;
  const modal = document.createElement("div");
  modal.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,0.5);display:flex;align-items:center;justify-content:center;z-index:9999";
  modal.className = "modal-disk";
  modal.innerHTML = '<div style="background:#fff;border-radius:10px;max-width:480px;width:90%">' +
    '<div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">' +
      '<h3 style="margin:0;font-size:16px">Grow appliance disk</h3>' +
      '<button onclick="this.closest(\'.modal-disk\').remove()" style="background:none;border:0;font-size:24px;cursor:pointer">×</button>' +
    '</div>' +
    '<div id="grow-body" style="padding:20px">' +
      '<div style="margin-bottom:14px;font-size:13px;color:#475569">Current size: ' + current + ' GB. Pick a new size:</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:14px">' +
        [60, 120, 240].map(g =>
          '<button class="grow-btn btn" data-gb="' + g + '" style="padding:6px 14px;background:#fff;color:#1a2330;border:1px solid #d8e0ea">' + g + ' GB</button>'
        ).join("") +
      '</div>' +
      '<div style="font-size:12px;color:#6b7280;line-height:1.5">Resize requires a brief restart of the appliance VM (≈30 s + 2 min boot). Running workloads will pause then resume.</div>' +
    '</div>' +
    '<div style="padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end">' +
      '<button class="btn" onclick="this.closest(\'.modal-disk\').remove()" style="padding:8px 14px;background:#fff;border:1px solid #d8e0ea;color:#1a2330">Close</button>' +
    '</div>' +
    '</div>';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
  modal.querySelectorAll(".grow-btn").forEach(b => {
    b.onclick = async () => {
      const target = parseInt(b.dataset.gb, 10);
      try {
        const r = await fetch("/api/runtime/disk-grow", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({target_gb: target}),
        });
        const d = await r.json();
        const body = modal.querySelector("#grow-body");
        if (r.ok && d.deferred) {
          body.innerHTML = '<div style="background:#e0f2fe;color:#075985;padding:10px;border-radius:6px;margin-bottom:10px">Run this command on the machine running your multipass:</div>' +
            '<pre style="background:#0f172a;color:#e2e8f0;padding:10px;border-radius:6px;font-size:12px">' + d.command + '</pre>' +
            '<div style="font-size:12px;color:#6b7280;margin-top:8px">' + d.instructions + '</div>';
        } else {
          body.innerHTML = '<div style="background:#fee2e2;color:#b91c1c;padding:10px;border-radius:6px">Failed: ' + ((d.detail && d.detail.reason) || d.reason || "unknown") + '</div>';
        }
      } catch (e) {
        modal.querySelector("#grow-body").innerHTML = '<div style="color:#b91c1c">Error: ' + e.message + '</div>';
      }
    };
  });
}
// Initial fetch + 30s auto-refresh
fetchDiskHealth();
setInterval(fetchDiskHealth, 30000);

// Boot
boot();
