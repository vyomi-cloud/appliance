<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AWS Management Console — Vyomi</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amazon+Ember:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<style>
  :root{
    /* Updated to 2024+ AWS skin: darker navy header, AWS-blue row-selection tint. */
    --navy:#0f1b2d; --navy-d:#000a16; --navy-l:#1a2737;
    --orange:#ff9900; --orange-d:#ec7211; --orange-l:#fff4e5;
    --bg:#fafafa; --panel:#fff; --line:#eaeded; --line-d:#d5d9d9;
    --ink:#16191f; --sub:#545b64; --hint:#687078;
    --link:#0073bb; --link-d:#005fa8; --link-l:#e9f3fb;
    --ok:#1d8102; --warn:#9e6e07; --err:#d13212;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Amazon Ember',Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45}
  a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit}

  /* ---- Top bar ---- */
  header.aws-top{display:flex;align-items:center;gap:14px;height:40px;background:var(--navy);color:#fff;padding:0 14px;position:sticky;top:0;z-index:50}
  header .logo{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;text-decoration:none}
  header .logo svg{width:30px;height:18px}
  header .nav-link{font-size:13px;color:#fff;padding:0 10px;cursor:pointer}
  header .nav-link:hover{color:var(--orange)}
  /* "Go back to spaces" — escape hatch from the AWS console back to the cross-cloud Spaces SPA */
  header .back-spaces{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 10px;font-size:12.5px;font-weight:600;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:6px;cursor:pointer;text-decoration:none;margin-left:6px}
  header .back-spaces:hover{background:rgba(255,255,255,.14);border-color:var(--orange);color:var(--orange);text-decoration:none}
  header .back-spaces .material-symbols-outlined{font-size:16px}
  header .search{flex:1;max-width:560px;background:#fff;border-radius:3px;display:flex;align-items:center;padding:0 8px;height:28px;color:#000}
  header .search input{flex:1;border:none;outline:none;font-size:12.5px;height:24px;background:transparent}
  header .right{display:flex;align-items:center;gap:14px;color:#fff;font-size:12.5px}
  header .right button,header .right a{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;font-size:12.5px}
  header .right .chip{padding:3px 9px;background:rgba(255,255,255,.08);border-radius:11px;font-size:11.5px}
  header .right .bell{position:relative}
  header .right .bell .dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--err);display:none}
  header .right .bell .dot.show{display:block}
  /* AWS-style header dropdowns (region + account): button shape, not pill chip */
  header .right .hdr-menu{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 11px;background:transparent;color:#fff;font-size:12.5px;border:1px solid rgba(255,255,255,.18);border-radius:6px;cursor:pointer}
  header .right .hdr-menu:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.32)}
  header .right .hdr-menu .caret{font-size:9px;opacity:.8;margin-left:2px}
  /* Notifications popover (opens from bell click) */
  .notif-pop{position:fixed;top:46px;right:14px;width:380px;max-height:520px;background:#fff;border:1px solid var(--line-d);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:55;display:none;overflow:hidden}
  .notif-pop.open{display:flex;flex-direction:column}
  .notif-pop .h{padding:12px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;align-items:center;gap:8px}
  .notif-pop .h .close{margin-left:auto;background:none;border:none;color:var(--sub);cursor:pointer;font-size:18px}
  .notif-pop .body{flex:1;overflow-y:auto}
  .notif-pop .item{padding:11px 16px;border-bottom:1px solid var(--line);font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .notif-pop .item .ic{width:20px;flex-shrink:0;color:var(--link)}
  .notif-pop .item.err .ic{color:var(--err)}
  .notif-pop .item.ok  .ic{color:var(--ok)}
  .notif-pop .item .msg{flex:1;color:var(--ink)}
  .notif-pop .item .ts{font-size:11px;color:var(--sub);margin-top:3px}
  .notif-pop .empty{padding:36px 18px;text-align:center;color:var(--sub);font-size:13px}

  /* ---- Breadcrumb bar ---- */
  .crumbs-bar{background:#fff;border-bottom:1px solid var(--line);padding:8px 22px;font-size:12.5px;color:var(--sub);display:flex;align-items:center;gap:4px}
  .crumbs-bar a{color:var(--link);cursor:pointer}
  .crumbs-bar .sep{color:#aab7b8;margin:0 2px}
  .crumbs-bar .current{color:var(--ink);font-weight:600}

  /* ---- Page layout (rail + main) ---- */
  .page{display:flex;min-height:calc(100vh - 40px - 36px)}
  aside.service-rail{width:232px;background:#fff;border-right:1px solid var(--line);padding:14px 0;overflow-y:auto}
  aside.service-rail h3{font-size:15px;font-weight:700;color:var(--ink);margin:0 14px 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  aside.service-rail .group{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--sub);padding:14px 14px 4px;font-weight:600}
  aside.service-rail a.item{display:flex;align-items:center;gap:9px;padding:6px 14px;color:var(--ink);font-size:13px;line-height:1.3;cursor:pointer;text-decoration:none;border-left:3px solid transparent}
  aside.service-rail a.item:hover{background:#f1f3f4}
  aside.service-rail a.item.active{background:var(--orange-l);color:var(--orange-d);border-left-color:var(--orange);font-weight:600}
  aside.service-rail a.item .ic{font-size:17px;color:var(--sub);width:18px}
  aside.service-rail a.item.active .ic{color:var(--orange-d)}
  aside.service-rail a.item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* Stub items are now real schema-driven pages — no special dim/tag needed */

  main.aws-main{flex:1;overflow-y:auto;padding:20px 26px;max-width:1500px}

  /* ---- Page headers ---- */
  h1.page-h{font-size:24px;font-weight:700;color:var(--ink);margin:0 0 4px;display:flex;align-items:center;gap:10px}
  h1.page-h .count{color:var(--sub);font-weight:500;font-size:18px}
  .page-sub{font-size:13px;color:var(--sub);margin-bottom:16px}

  /* ---- Action bar (above tables) ---- */
  .actions-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .actions-bar .spacer{flex:1}

  /* ---- Buttons ---- */
  /* AWS uses sharp rounded rectangles, NOT pills. Border-radius 6px matches Cloudscape. */
  .btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 14px;font-size:13px;font-weight:600;border:1px solid #687078;background:#fff;color:var(--ink);border-radius:6px;cursor:pointer}
  .btn:hover{background:#fafafa}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.primary{background:var(--orange);color:#000;border-color:var(--orange-d)}
  .btn.primary:hover{background:var(--orange-d);color:#fff}
  .btn.danger{color:var(--err);border-color:#d59494}
  .btn.danger:hover{background:#fdf3f4}
  .btn.dropdown::after{content:" ▼";font-size:9px;margin-left:4px;color:var(--sub)}
  .btn.icon-only{padding:0 8px}
  .btn .material-symbols-outlined{font-size:17px}

  /* Dropdown menus */
  .dd{position:relative;display:inline-block}
  .dd-menu{position:absolute;top:34px;left:0;background:#fff;border:1px solid var(--line-d);border-radius:4px;box-shadow:0 6px 16px rgba(0,0,0,.12);min-width:200px;z-index:30;padding:4px 0;display:none}
  .dd-menu.open{display:block}
  .dd-menu a{display:block;padding:7px 14px;font-size:13px;color:var(--ink);cursor:pointer;text-decoration:none}
  .dd-menu a:hover{background:var(--orange-l);color:var(--orange-d)}
  .dd-menu .sep{height:1px;background:var(--line);margin:4px 0}
  .dd-menu a.danger{color:var(--err)}
  .dd-menu a.disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

  /* ---- Panels ---- */
  .panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:16px;overflow:hidden}
  .panel-h{padding:12px 18px;font-weight:700;font-size:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:#fafafa}
  .panel-h .right{margin-left:auto;display:flex;gap:6px}
  .panel-b{padding:14px 18px}

  /* ---- Tables (AWS style: dense, checkbox column, sticky header) ---- */
  .table-wrap{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .table-toolbar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);background:#fff}
  .table-toolbar input.search{flex:1;max-width:380px;height:28px;border:1px solid #aab7b8;border-radius:3px;padding:0 9px;font-size:13px;outline:none}
  .table-toolbar input.search:focus{border-color:var(--link)}
  .table-toolbar .stats{font-size:12px;color:var(--sub)}
  .table-toolbar .iconbtn{background:none;border:1px solid var(--line-d);height:28px;width:28px;border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--sub)}
  .table-toolbar .iconbtn:hover{background:#f1f3f4;color:var(--ink)}
  table.aws{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
  table.aws th,table.aws td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.aws th{font-weight:700;color:var(--ink);background:#fafafa;font-size:12.5px}
  table.aws th.sortable{cursor:pointer;user-select:none}
  table.aws th.sortable:hover{background:#f1f3f4}
  table.aws td{color:var(--ink)}
  table.aws tr:hover td{background:#fafafa}
  table.aws tr.selected td{background:var(--link-l)}  /* AWS selected row = pale blue, not orange */
  table.aws td.chk,table.aws th.chk{width:38px;padding-right:0}
  table.aws td a.id{color:var(--link);font-weight:500}
  table.aws td a.id:hover{color:var(--link-d);text-decoration:underline}
  table.aws td .mono{font-family:Consolas,Menlo,monospace;font-size:12.5px}
  table.aws td .small{font-size:11.5px;color:var(--sub)}
  .empty{padding:50px 14px;text-align:center;color:var(--sub);font-size:13px}
  .empty .ic{font-size:48px;color:#aab7b8;margin-bottom:8px;display:block}
  .pager{display:flex;align-items:center;gap:6px;padding:9px 14px;border-top:1px solid var(--line);color:var(--sub);font-size:12.5px}
  .pager .iconbtn{height:24px;width:24px;background:none;border:1px solid var(--line-d);border-radius:3px;cursor:pointer;color:var(--sub)}

  /* State badges */
  .state{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:11px;font-size:11.5px;font-weight:600}
  .state .pip{width:7px;height:7px;border-radius:50%}
  .state.run{background:#dff6dd;color:var(--ok)} .state.run .pip{background:var(--ok)}
  .state.stop{background:#f1f3f4;color:var(--sub)} .state.stop .pip{background:var(--sub)}
  .state.err{background:#fde7e9;color:var(--err)} .state.err .pip{background:var(--err)}
  .state.warn{background:#fff4e5;color:var(--warn)} .state.warn .pip{background:var(--warn)}

  /* ---- Detail page (replaces list, full-page) ---- */
  .detail-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .detail-top .id{flex:1}
  .detail-top h1{margin:0;font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px}
  .detail-top .meta{font-size:12.5px;color:var(--sub);margin-top:4px}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px 22px;padding:14px 18px}
  .summary-grid .k{font-size:11.5px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
  .summary-grid .v{font-size:13.5px;color:var(--ink);word-break:break-all}
  .summary-grid .v.mono{font-family:Consolas,Menlo,monospace;font-size:12.5px}

  /* Top tabs (AWS detail page pattern) */
  .top-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin:18px 0 14px;overflow-x:auto}
  .top-tabs button{flex-shrink:0;background:none;border:none;font-size:13.5px;color:var(--sub);cursor:pointer;padding:11px 16px;border-bottom:2px solid transparent;font-weight:500;font-family:inherit}
  .top-tabs button:hover{color:var(--ink)}
  .top-tabs button.active{color:var(--link);border-bottom-color:var(--link);font-weight:700}

  /* ---- Wizard (full-page) ---- */
  .wizard-page{padding:0}
  .wizard-banner{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:16px;color:var(--sub);font-size:13px}
  .wizard-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
  .wizard-main{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px 22px}
  .wizard-summary{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px 18px;position:sticky;top:88px;max-height:calc(100vh - 110px);overflow-y:auto}
  .wizard-summary h3{font-size:14px;font-weight:700;margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .wizard-summary .row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px}
  .wizard-summary .row .k{color:var(--sub)}
  .wizard-summary .row .v{color:var(--ink);font-weight:600;text-align:right;max-width:180px;word-break:break-all}
  .wizard-summary .cta{margin-top:14px;display:flex;flex-direction:column;gap:6px}
  .wizard-summary .cta button{height:34px}

  .step-strip{display:flex;flex-wrap:wrap;gap:0;border-bottom:1px solid var(--line);margin-bottom:18px}
  .step-strip button{flex:0 0 auto;background:none;border:none;font-size:13px;color:var(--sub);padding:9px 14px 11px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;display:flex;align-items:center;gap:7px}
  .step-strip button:hover{color:var(--ink)}
  .step-strip button.active{color:var(--link);border-bottom-color:var(--link);font-weight:700}
  .step-strip button .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#eaeded;color:var(--sub);font-size:11px;font-weight:700}
  .step-strip button.active .num{background:var(--link);color:#fff}
  .step-strip button.done .num{background:var(--ok);color:#fff}
  .step-strip button.error{color:var(--err)}
  .step-strip button.error .num{background:var(--err);color:#fff}

  .form-section{margin-bottom:22px}
  .form-section .h{font-size:15px;font-weight:700;color:var(--ink);padding-bottom:7px;border-bottom:1px solid #eaeded;margin-bottom:14px}
  /* EC2-style collapsible section cards (real AWS Launch Instance pattern) */
  .col-card{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
  .col-card .col-h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;border-bottom:1px solid transparent;font-weight:700;font-size:15px;color:var(--ink);background:#fff}
  .col-card.open .col-h{border-bottom-color:var(--line)}
  .col-card .col-h .caret{margin-left:auto;color:var(--sub);transition:transform .15s}
  .col-card.open .col-h .caret{transform:rotate(90deg)}
  .col-card .col-h .info{font-size:11.5px;color:var(--link);font-weight:500;cursor:pointer}
  .col-card .col-h .info:hover{text-decoration:underline}
  .col-card .col-b{padding:16px 18px;display:none}
  .col-card.open .col-b{display:block}
  .col-card .free-tier{display:inline-block;padding:2px 8px;background:#dff6dd;color:var(--ok);font-size:11px;font-weight:600;border-radius:11px;margin-left:6px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--ink);margin-bottom:4px;font-weight:700}
  .field label .req{color:var(--err);margin-left:3px}
  .field input[type=text],.field input[type=password],.field input[type=number],.field select,.field textarea{
    width:100%;max-width:520px;height:32px;border:1px solid #aab7b8;border-radius:6px;padding:0 11px;font-size:13.5px;outline:none;background:#fff}
  .field textarea{height:120px;padding:9px 11px;font-family:Consolas,Menlo,monospace;font-size:12.5px;line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--link);box-shadow:0 0 0 1px var(--link)}
  .field input.err,.field select.err{border-color:var(--err);box-shadow:0 0 0 1px var(--err)}
  .field .help{font-size:11.5px;color:var(--sub);margin-top:4px;max-width:520px}
  .field .err-msg{font-size:11.5px;color:var(--err);margin-top:4px;display:flex;align-items:center;gap:4px}
  .radio,.check{display:flex;align-items:flex-start;gap:8px;margin:5px 0;font-size:13px;color:var(--ink);cursor:pointer}
  .radio input,.check input{margin-top:3px}
  .info-pill{font-size:13px;color:var(--ink);padding:7px 11px;background:#f1f3f4;border-radius:6px;max-width:520px}
  .help-banner{font-size:12.5px;color:var(--sub);background:#fff4e5;border-left:4px solid var(--orange);padding:10px 14px;border-radius:0 6px 6px 0;max-width:680px;margin-bottom:14px}

  .tags-rows{display:grid;grid-template-columns:1fr 1fr 32px;gap:6px;margin-bottom:6px;align-items:center}
  .tags-rows input{height:30px;border:1px solid #aab7b8;border-radius:6px;padding:0 9px;font-size:13px}
  .tags-rows .x{background:none;border:none;color:var(--err);cursor:pointer;font-size:18px}
  .add-row{font-size:12.5px;color:var(--link);background:none;border:none;cursor:pointer;padding:4px 0}
  .add-row:hover{text-decoration:underline}

  .wizard-footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 0 0;margin-top:18px;display:flex;align-items:center;gap:10px}
  .wizard-footer .spacer{flex:1}

  /* Review summary blocks in last step */
  .rev-card{border:1px solid var(--line);border-radius:6px;margin-bottom:14px}
  .rev-card .hdr{display:flex;align-items:center;padding:10px 14px;background:#fafafa;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px}
  .rev-card .hdr .edit{margin-left:auto;background:none;border:none;color:var(--link);font-size:12.5px;cursor:pointer;font-family:inherit}
  .rev-card .grid{display:grid;grid-template-columns:200px 1fr;font-size:12.5px;gap:6px 14px;padding:10px 14px}
  .rev-card .grid .k{color:var(--sub)}
  .rev-card .grid .v{color:var(--ink);word-break:break-all}
  .rev-banner{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .rev-banner.ok{background:#dff6dd;color:var(--ok)}
  .rev-banner.err{background:#fde7e9;color:var(--err)}

  /* ---- Tab content blocks ---- */
  .kv-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:14px}
  .kv-card .h{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px 22px}
  .kv-grid .k{font-size:11.5px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
  .kv-grid .v{font-size:13.5px;color:var(--ink);word-break:break-all}
  .kv-grid .v.mono{font-family:Consolas,Menlo,monospace;font-size:12.5px}

  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .metric-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px 16px}
  .metric-card .label{font-size:11.5px;color:var(--sub);font-weight:600;text-transform:uppercase;margin-bottom:6px}
  .metric-card .chart{height:60px}
  .metric-card .value{font-size:18px;color:var(--ink);font-weight:700;margin-top:6px}

  pre.json{background:#16191f;color:#d8e1eb;padding:14px;border-radius:6px;font-size:12.5px;font-family:Consolas,Menlo,monospace;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin:0}
  .keyblock{margin-bottom:16px;padding:14px 16px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .keyblock .k{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .keyblock .keyval{background:#16191f;color:#d8e1eb;padding:9px 11px;border-radius:4px;font-size:12px;font-family:Consolas,Menlo,monospace;margin:4px 0;white-space:pre-wrap;word-break:break-all}
  .keyblock .row{display:flex;gap:6px;margin-top:6px}

  .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
  .alert.info{background:#e9f3fb;color:#0c5689;border:1px solid #b3d8f0}

  .alert.err{background:#fde7e9;color:var(--err);border:1px solid #f5b8be}

  /* AWS-style Console Home widgets */
  .widget-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px;margin-top:14px}
  .widget{grid-column:span 6;background:#fff;border:1px solid var(--line);border-radius:8px;padding:0;overflow:hidden;display:flex;flex-direction:column}
  .widget.col-4{grid-column:span 4}.widget.col-12{grid-column:span 12}
  @media (max-width:1100px){.widget{grid-column:span 12}.widget.col-4{grid-column:span 12}}
  .widget .wh{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}

  .widget .wb .desc{font-size:13px;color:var(--sub);line-height:1.5}
  .widget .wb .stats{display:flex;gap:24px;margin-top:12px}
  .widget .wb .stats .stat{font-size:11.5px;color:var(--sub)}
  .widget .wb .stats .stat strong{display:block;font-size:24px;color:var(--ink);font-weight:700;line-height:1}
  .recent-list{display:flex;flex-direction:column;gap:0}
  .recent-list a{display:flex;align-items:center;gap:10px;padding:9px 18px;color:var(--ink);border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;text-decoration:none}
  .recent-list a:hover{background:#fafafa}
  .recent-list a:last-child{border-bottom:none}
  .recent-list .ic{font-size:18px;color:var(--link)}
  .recent-list .when{margin-left:auto;font-size:11.5px;color:var(--sub)}
  .cost-bar{height:120px;display:flex;align-items:flex-end;gap:4px;margin-top:6px}
  .cost-bar div{flex:1;background:var(--orange);border-radius:2px 2px 0 0;opacity:.85}
  .widget-add{margin-top:14px;display:flex;justify-content:center}
  /* Toast */
  #toast{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:6px;z-index:60}
  .toast{background:#16191f;color:#fff;font-size:13px;padding:10px 14px;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:380px}
  .toast.err{background:var(--err)}
  .toast.ok{background:var(--ok)}

<script>
const ORIGIN = window.location.origin;
let CATALOG = null, ACCOUNT = "", REGION = "us-east-1";
let INSTANCE_CATALOG = [];
let STATE = {view: "home", service: null, item: null, detailTab: 0};
// In-memory notifications log (50 max)
const NOTIFS = [];

// =====================================================================
// DOM helpers
// =====================================================================
function el(tag, attrs={}, ...kids){
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const kid of kids) { if (kid == null) continue; e.append(kid.nodeType ? kid : document.createTextNode(kid)); }
  return e;
}
function icon(name){ return el("span",{class:"material-symbols-outlined"}, name); }
function uuid(){ return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)); }
function toast(msg, kind="ok"){
  const t = el("div",{class:"toast "+kind}, msg);
  document.getElementById("toast").append(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(), 400); }, 3200);
}
function getPath(obj, dotted){
  let cur = obj;
  for (const p of String(dotted).split(".")) {
    if (cur == null) return undefined;
    if (Array.isArray(cur) && /^\d+$/.test(p)) cur = cur[+p];
    else cur = cur[p];
  }
  return cur;
}
function setPath(obj, dotted, value){
  const parts = String(dotted).split("."); let cur = obj;
  parts.forEach((p, i) => {
    const last = i === parts.length-1, nxt = parts[i+1];
    if (last) { if (Array.isArray(cur) && /^\d+$/.test(p)) cur[+p] = value; else cur[p] = value; return; }
    if (/^\d+$/.test(p)) { if (cur[+p] == null) cur[+p] = /^\d+$/.test(nxt) ? [] : {}; cur = cur[+p]; }
    else { if (cur[p] == null || typeof cur[p] !== "object") cur[p] = /^\d+$/.test(nxt) ? [] : {}; cur = cur[p]; }
  });
}
async function api(method, path, body){
  const opt = {method, headers:{}};
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(ORIGIN+path, opt);
  let json = null; try { json = await r.json(); } catch(e){}
  return {status:r.status, ok:r.ok, json};
}
function fillPath(template, params){
  return template.replace(/\{(\w+)\}/g, (_, k) => encodeURIComponent(params[k] || ""));
}
function svcByKey(k){ return (CATALOG.services||[]).find(s => s.key === k); }
function recordNotif(kind, msg){
  NOTIFS.unshift({kind, msg, ts: new Date().toLocaleTimeString()});
  if (NOTIFS.length > 50) NOTIFS.pop();
  document.getElementById("notifDot").classList.add("show");
  // Re-render popover if it's open so the new entry shows up immediately.
  if (document.getElementById("notifPop").classList.contains("open")) renderNotifPop();
}

// AWS-style friendly region names (matches the real console region dropdown).
const REGION_NAMES = {
  "us-east-1":      "N. Virginia",
  "us-east-2":      "Ohio",
  "us-west-1":      "N. California",
  "us-west-2":      "Oregon",
  "eu-west-1":      "Ireland",
  "eu-central-1":   "Frankfurt",
  "eu-north-1":     "Stockholm",
  "ap-northeast-1": "Tokyo",
  "ap-southeast-1": "Singapore",
  "ap-southeast-2": "Sydney",
  "ap-south-1":     "Mumbai",
  "sa-east-1":      "São Paulo",
  "ca-central-1":   "Central Canada",
};
function friendlyRegion(code){ return REGION_NAMES[code] || code; }

// Pull the username from the platform's active tenant/space context. Falls
// back to a deterministic default if not derivable.
async function deriveUsername(){
  try {
    const r = await fetch(ORIGIN + "/api/tenants");
    if (r.ok) {
      const d = await r.json();
      const active = (d.tenants||[]).find(t => t.tenant_id === d.active_tenant_id);
      if (active && active.name) return String(active.name).split(" ")[0].toLowerCase() || "user";
    }
  } catch(_) {}
  return "user";
}

function renderNotifPop(){
  const body = document.getElementById("notifBody");
  body.innerHTML = "";
  if (!NOTIFS.length) { body.append(el("div",{class:"empty"},
    icon("notifications_off"), el("div",{style:"margin-top:6px"}, "No notifications"),
    el("div",{style:"font-size:11.5px;margin-top:4px"}, "Activity from your console actions will appear here."))); return; }
  NOTIFS.forEach(n => {
    body.append(el("div",{class:"item "+(n.kind||"info")},
      el("span",{class:"ic material-symbols-outlined",style:"font-size:18px"},
        n.kind === "err" ? "error" : n.kind === "ok" ? "check_circle" : "info"),
      el("div",{},
        el("div",{class:"msg"}, n.msg),
        el("div",{class:"ts"}, n.ts))));
  });
}
function openNotifPop(){
  renderNotifPop();
  document.getElementById("notifPop").classList.add("open");
  document.getElementById("notifDot").classList.remove("show");
}
function closeNotifPop(){ document.getElementById("notifPop").classList.remove("open"); }

// =====================================================================
// Space-context gate (mirrors Azure's requireAzureSpace)
// =====================================================================
async function requireAwsSpace(){
  let active = null;
  try { const r = await fetch(ORIGIN + "/api/spaces/active"); if (r.ok) active = await r.json(); } catch(_){}
  const space = active && active.space ? active.space : null;
  const provider = space ? String(space.provider || "").toLowerCase() : "";
  if (!space || provider !== "aws") {
    document.body.innerHTML =
      '<div style="font-family:Amazon Ember,Arial,sans-serif;padding:60px 24px;max-width:560px;margin:60px auto;text-align:center;color:#16191f;background:#fff;border:1px solid #eaeded;border-radius:8px">' +
      '  <div style="font-size:48px;line-height:1">☁️</div>' +
      '  <h1 style="font-size:22px;font-weight:700;margin:16px 0 8px">Select an AWS space first</h1>' +
      '  <p style="font-size:14px;color:#545b64;line-height:1.6">The AWS console only opens inside a selected simulation space. Redirecting to the Spaces view…</p>' +
      '  <a href="/ui" style="display:inline-block;margin-top:20px;background:#ff9900;color:#000;padding:9px 20px;border-radius:6px;font-size:13px;text-decoration:none;font-weight:700">Go to Spaces</a>' +
      '</div>';
    setTimeout(()=>{ window.location.href = "/ui"; }, 1800);
    return false;
  }
  return true;
}

// =====================================================================
// Boot
// =====================================================================
async function boot(){
  if (!(await requireAwsSpace())) return;
  try {
    const r = await fetch(ORIGIN + "/api/aws/catalog"); CATALOG = await r.json();
    REGION = CATALOG.region; ACCOUNT = CATALOG.account;
    const username = await deriveUsername();
    document.getElementById("acctText").textContent = `${username} @ ${ACCOUNT}`;
    document.getElementById("regionText").textContent = friendlyRegion(REGION);
    // Wire notifications popover (bell click) and account/region menus (stub
    // dropdowns toasting the AWS reality for now).
    document.getElementById("notifBtn").addEventListener("click", e => {
      e.stopPropagation();
      const p = document.getElementById("notifPop");
      if (p.classList.contains("open")) closeNotifPop(); else openNotifPop();
    });
    document.getElementById("notifClose").addEventListener("click", closeNotifPop);
    document.addEventListener("click", e => {
      const p = document.getElementById("notifPop");
      if (!p.contains(e.target) && e.target.id !== "notifBtn") closeNotifPop();
    });
    document.getElementById("regionBtn").addEventListener("click", () =>
      toast("Region switching is set by the active simulator space — change there.", "ok"));
    document.getElementById("acctBtn").addEventListener("click", () =>
      toast("Account is set by the active simulator space.", "ok"));
    try {
      const ir = await fetch(ORIGIN + "/api/instances/catalog?provider=aws");
      const id = await ir.json();
      INSTANCE_CATALOG = Array.isArray(id.instances) ? id.instances : [];
    } catch(_) { INSTANCE_CATALOG = []; }
    // Initial route — Home page (no service)
    render();
  } catch (e) {
    document.getElementById("main").innerHTML = '<div class="empty">Failed to load AWS catalog: '+e+'</div>';
  }
}

// =====================================================================
// Router (state-based, no URL hash for now)
// =====================================================================
// Auto-refresh timer for grid/detail views. Cleared on every navigation
// so we never run two intervals at once or against a stale view.
let _AUTO_REFRESH_TIMER = null;
function clearAutoRefresh(){
  if (_AUTO_REFRESH_TIMER) { clearInterval(_AUTO_REFRESH_TIMER); _AUTO_REFRESH_TIMER = null; }
}
// Services with mutable state (instances transition pending→running→stopped,
// DBs transition creating→available, lambdas have execution status, etc.).
// We poll the list/detail view while the user is looking at these.
// Static services (VPC, IAM users, S3 buckets) don't get polling — no
// transitions to surface.
//
// Interval was 5s but that was too aggressive: it re-rendered the table
// every 5s, wiping the user's row selections so any subsequent
// multi-select action (Stop, Terminate, etc.) failed silently with
// "Select at least one item". The AWS console itself polls every 30s
// on its EC2 list — we match that. Also added _shouldSkipAutoRefresh()
// which pauses the timer when the user has live selections OR is
// hovering an action menu, so the click→act flow is never disrupted.
const _AUTO_REFRESH_SERVICES = new Set(["ec2","rds","lambda"]);
const _AUTO_REFRESH_MS = 30000;
function _shouldSkipAutoRefresh(){
  // Don't re-render if the user has anything selected (would wipe checkboxes).
  // Also skip if a dropdown / modal is open (would close it under their cursor).
  const selectedCount = document.querySelectorAll('input[type="checkbox"]:checked').length;
  const hasOpenDropdown = !!document.querySelector('.dropdown.open, .modal.open');
  return selectedCount > 0 || hasOpenDropdown;
}

function navigate(next){
  // Track recently visited services (fed into Console Home widget)
  if (next && next.service && next.service !== STATE.service) recordRecentVisit(next.service);
  // Cancel any running poll — we'll start a new one for the new view
  // in renderList/renderDetail if appropriate.
  clearAutoRefresh();
  STATE = {...STATE, ...next};
  render();
}
function render(){
  renderCrumbs();
  renderRail();
  const main = document.getElementById("main"); main.innerHTML = "";
  if (STATE.view === "home")      return renderHome(main);
  if (STATE.view === "list")      return renderList(main);
  if (STATE.view === "childList") return renderChildList(main);
  if (STATE.view === "stub")      return renderStub(main);
  if (STATE.view === "detail")    return renderDetail(main);
  if (STATE.view === "create")    return renderCreate(main);
  main.append(el("div",{class:"empty"}, "Unknown view: "+STATE.view));
}

// =====================================================================
// Breadcrumb
// =====================================================================
function renderCrumbs(){
  const c = document.getElementById("crumbs"); c.innerHTML = "";
  const link = (label, fn) => el("a",{onclick:fn}, label);
  const sep = () => el("span",{class:"sep"}, "›");
  c.append(link("Services", () => navigate({view:"home", service:null, item:null})));
  if (!STATE.service) return;
  const svc = svcByKey(STATE.service);
  if (!svc) return;
  c.append(sep(), link(svc.label, () => navigate({view:"list", service:STATE.service, item:null})));
  if (STATE.view === "detail" && STATE.item) {
    const name = String(getPath(STATE.item, svc.name_field) || STATE.item.name || "");
    c.append(sep(), el("span",{class:"current"}, name));
  } else if (STATE.view === "create") {
    c.append(sep(), el("span",{class:"current"}, "Create "+svc.label.replace(/s$/,"")));
  } else if (STATE.view === "childList") {
    const spec = childSpec(svc, STATE.child);
    c.append(sep(), el("span",{class:"current"}, spec ? spec.label : STATE.child));
  } else if (STATE.view === "stub") {
    c.append(sep(), el("span",{class:"current"}, STATE.stubLabel || STATE.stub));
  } else {
    c.append(sep(), el("span",{class:"current"}, svc.label));
  }
}

// =====================================================================
// Left rail — Home or service-specific
// =====================================================================
function renderRail(){
  const rail = document.getElementById("rail"); rail.innerHTML = "";
  if (!STATE.service) {
    // Home rail: services grouped by category
    rail.append(el("h3",{}, "Console Home"));
    const groups = [
      ["Compute", ["ec2", "lambda"]],
      ["Storage", ["s3"]],
      ["Databases", ["rds", "dynamodb"]],
      ["Application Integration", ["sqs", "apigateway", "eventbridge"]],
      ["Networking & Content Delivery", ["vpc"]],
      ["Security, Identity & Compliance", ["iam", "secretsmanager", "kms"]],
    ];
    groups.forEach(([label, keys]) => {
      rail.append(el("div",{class:"group"}, label));
      keys.forEach(k => {
        const s = svcByKey(k); if (!s) return;
        rail.append(el("a",{class:"item",onclick:()=>navigate({view:"list", service:s.key, item:null})},
          el("span",{class:"material-symbols-outlined ic"}, s.icon),
          el("span",{class:"lbl"}, s.label)));
      });
    });
    return;
  }
  // Service-specific rail
  const svc = svcByKey(STATE.service);
  if (!svc) return;
  rail.append(el("h3",{}, svc.label + " Dashboard"));

  // Prefer the catalog's rail_items (schema-driven, AWS-faithful) when present;
  // fall back to the legacy children list. Each rail item is one of:
  //   {group}                                         → section header
  //   {key,label,icon,type:"primary"}                 → svc's main list
  //   {key,label,icon,type:"child",child_key}         → childList view (wired)
  //   {key,label,icon,type:"link",link_service,link_child} → jumps to another svc's child
  //   {key,label,icon,type:"stub"}                    → "Coming soon" placeholder
  const railItems = (svc.rail_items && svc.rail_items.length) ? svc.rail_items
    : (svc.children || []).map(c => ({key:c.type, label:c.label, icon:c.icon, type:"child", child_key:c.type}));

  railItems.forEach(it => {
    if (it.group) {
      rail.append(el("div",{class:"group"}, it.group));
      return;
    }
    let isActive = false, onClick = null, extraClass = "";
    if (it.type === "primary") {
      isActive = (STATE.view === "list" || STATE.view === "detail" || STATE.view === "create");
      onClick = () => navigate({view:"list", child:null, item:null});
    } else if (it.type === "child") {
      isActive = (STATE.view === "childList" && STATE.child === it.child_key);
      const spec = childSpec(svc, it.child_key);
      onClick = () => {
        if (!spec) { toast("This child collection isn't wired yet.","err"); return; }
        if (spec.parent) {
          toast(spec.msg, "ok");
          if (STATE.view !== "list") navigate({view:"list", item:null});
          return;
        }
        navigate({view:"childList", child:it.child_key, item:null});
      };
    } else if (it.type === "link") {
      onClick = () => {
        const target = svcByKey(it.link_service);
        if (!target) { toast("Linked service "+it.link_service+" not in catalog","err"); return; }
        navigate({view:"childList", service:it.link_service, child:it.link_child, item:null});
      };
    } else {  // stub
      extraClass = " stub";
      // Allow the catalog to override the rail-key → extras-key mapping via
      // `stub_key` (e.g. EventBridge rail item "buses" → extras key
      // "eventbridge/event-buses"). Falls back to the rail key.
      const stubKey = it.stub_key
        ? it.stub_key.replace(svc.key + "/", "")  // strip svc/ prefix if present
        : it.key;
      onClick = () => navigate({view:"stub", stub:stubKey, stubLabel:it.label});
    }
    rail.append(el("a",{class:"item"+(isActive?" active":"")+extraClass,onclick:onClick},
      el("span",{class:"material-symbols-outlined ic"}, it.icon||"chevron_right"),
      el("span",{class:"lbl"}, it.label),
      // Stub items now open real (schema-driven) pages — no "soon" tag needed
      null,
      it.type === "link" ? el("span",{class:"material-symbols-outlined",style:"font-size:13px;color:var(--sub);margin-left:auto"}, "open_in_new") : null));
  });
  // Back to all services
  rail.append(el("div",{class:"group"}, "Navigate"));
  rail.append(el("a",{class:"item",onclick:()=>navigate({view:"home", service:null})},
    el("span",{class:"material-symbols-outlined ic"}, "home"),
    el("span",{class:"lbl"}, "Console Home")));
}

// HOME page
// =====================================================================
function recentVisitsKey(){ return "cloudlearn.aws.recent.visits"; }
function getRecentVisits(){
  try { return JSON.parse(localStorage.getItem(recentVisitsKey())||"[]"); } catch(_) { return []; }
}
function recordRecentVisit(svcKey){
  if (!svcKey) return;
  const recent = getRecentVisits().filter(v => v.key !== svcKey);
  recent.unshift({key:svcKey, at: new Date().toISOString()});
  localStorage.setItem(recentVisitsKey(), JSON.stringify(recent.slice(0, 8)));
}

function renderHome(main){
  // Self-clear so any caller is safe (matches list/detail/create pattern).
  main.innerHTML = "";
  // Page header — real AWS uses "Console Home" + "Info" link + an "Actions" menu.
  const h = el("div",{class:"detail-top"});
  const idCol = el("div",{class:"id"});
  idCol.append(el("h1",{class:"page-h"}, "Console Home",
    el("a",{class:"info",style:"font-size:12px;font-weight:500;color:var(--link);cursor:pointer;margin-left:8px",
      onclick:()=>toast("Console Home shows widgets you can customize.","ok")}, "Info")));
  idCol.append(el("div",{class:"meta"}, `Account: ${ACCOUNT}  ·  Region: ${REGION} (${friendlyRegion(REGION)})`));
  const actCol = el("div",{style:"display:flex;gap:8px;flex-shrink:0"});
  actCol.append(el("button",{class:"btn",onclick:()=>toast("Widget customization coming soon","ok")},
    icon("add"), "Add widgets"));
  actCol.append(el("button",{class:"btn",onclick:()=>toast("Reset to defaults","ok")}, icon("refresh"), "Reset to default layout"));
  h.append(idCol, actCol);
  main.append(h);

  // Widget grid — 12-col responsive layout (real AWS pattern)
  const grid = el("div",{class:"widget-grid"});

  // 1) Welcome to AWS (col-6)
  const welcome = el("div",{class:"widget"});
  welcome.append(el("div",{class:"wh"}, icon("waving_hand"), "Welcome to AWS",
    el("a",{class:"info",onclick:()=>toast("Welcome guide","ok")}, "Info")));
  welcome.append(el("div",{class:"wb"},
    el("div",{class:"desc"},
      "AWS Management Console (simulated). Get started by selecting a service from the left rail or the Recently visited widget. ",
      el("a",{onclick:()=>toast("Documentation","ok"),style:"color:var(--link);cursor:pointer"},"Get started with AWS"), "."),
    el("div",{class:"stats"},
      el("div",{class:"stat"}, el("strong",{}, String(CATALOG.services.length)), "Services"),
      el("div",{class:"stat"}, el("strong",{}, REGION), "Region"),
      el("div",{class:"stat"}, el("strong",{}, ACCOUNT.length>=4?ACCOUNT.slice(-4):"…"), "Account suffix"))));
  grid.append(welcome);

  // 2) Recently visited (col-6) — fed from localStorage
  const recent = el("div",{class:"widget"});
  recent.append(el("div",{class:"wh"}, icon("history"), "Recently visited",
    el("a",{class:"info"}, "View all")));
  const visits = getRecentVisits();
  if (!visits.length) {
    // Negative left/right/bottom margins negate the .wb padding (14px 18px)
    // so list rows span edge-to-edge and dividers reach the card border.
    // Same pattern as the "Build a solution" widget below.
    recent.append(el("div",{class:"wb"},
      el("div",{class:"desc"}, "Services you visit will show here. Click any service in the left rail to navigate."),
      el("div",{class:"recent-list",style:"margin:14px -18px -14px"},
        ...CATALOG.services.slice(0,5).map(s => el("a",{onclick:()=>{recordRecentVisit(s.key); navigate({view:"list", service:s.key, item:null});}},
          el("span",{class:"material-symbols-outlined ic"}, s.icon),
          el("span",{}, s.label),
          el("span",{class:"when"}, "Suggested"))))));
  } else {
    // List appends directly to .widget (no padding), so NO negative margins
    // needed — rows already span the full card width via the .recent-list a
    // default styling.
    const list = el("div",{class:"recent-list"});
    visits.forEach(v => {
      const s = svcByKey(v.key); if (!s) return;
      const when = new Date(v.at);
      const ago = Math.max(1, Math.floor((Date.now() - when.getTime())/60000));
      list.append(el("a",{onclick:()=>{recordRecentVisit(s.key); navigate({view:"list", service:s.key, item:null});}},
        el("span",{class:"material-symbols-outlined ic"}, s.icon),
        el("span",{}, s.label),
        el("span",{class:"when"}, ago < 60 ? ago+"m ago" : Math.floor(ago/60)+"h ago")));
    });
    recent.append(list);
  }
  grid.append(recent);

  // 3) Cost and usage (col-6) — synthesized bar chart
  const cost = el("div",{class:"widget"});
  cost.append(el("div",{class:"wh"}, icon("attach_money"), "Cost and usage",
    el("a",{class:"info"}, "Info")));
  const costBody = el("div",{class:"wb"});
  costBody.append(el("div",{class:"desc"},
    "Estimated month-to-date spend in simulator (synthetic data — not real billing)."));
  const bar = el("div",{class:"cost-bar"});
  // Deterministic 12-month pseudo-data
  for (let i=0;i<12;i++){ const h = 30 + ((i*23 + 7) % 70); bar.append(el("div",{style:`height:${h}%`})); }
  costBody.append(bar);
  costBody.append(el("div",{style:"display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--sub)"},
    el("span",{}, "Jul"), el("span",{}, "Aug"), el("span",{}, "Sep"),
    el("span",{}, "Oct"), el("span",{}, "Nov"), el("span",{}, "Dec"),
    el("span",{}, "Jan"), el("span",{}, "Feb"), el("span",{}, "Mar"),
    el("span",{}, "Apr"), el("span",{}, "May"), el("span",{}, "Jun")));
  cost.append(costBody);
  grid.append(cost);

  // 4) Build a solution (col-6)
  const build = el("div",{class:"widget"});
  build.append(el("div",{class:"wh"}, icon("rocket_launch"), "Build a solution",
    el("a",{class:"info"}, "Info")));
  const bb = el("div",{class:"wb"});
  bb.append(el("div",{class:"desc"}, "Get started with quick-build templates."));
  const links = el("div",{class:"recent-list",style:"margin:14px -18px -14px"});
  [
    ["Launch a virtual machine with EC2",     "ec2",        "computer"],
    ["Create a web app with Elastic Beanstalk", "lambda",   "rocket_launch"],
    ["Build a website using S3",              "s3",         "storage"],
    ["Set up a managed database with RDS",    "rds",        "database"],
  ].forEach(([label, key, ic]) => {
    links.append(el("a",{onclick:()=>{recordRecentVisit(key); navigate({view:"list", service:key, item:null});}},
      el("span",{class:"material-symbols-outlined ic"}, ic), el("span",{}, label)));
  });
  bb.append(links);
  build.append(bb);
  grid.append(build);

  main.append(grid);
}

// =====================================================================
// LIST page (resource grid for a service)
// =====================================================================
async function renderList(main){
  // Self-clear so any caller (router OR Refresh action OR multiAction
  // post-redraw) is safe to invoke — without this each call APPENDS another
  // header+table on top of the existing one.
  main.innerHTML = "";
  const svc = svcByKey(STATE.service);
  if (!svc) { main.append(el("div",{class:"empty"}, "Service not found")); return; }
  // Page header
  const headerWrap = el("div",{class:"detail-top"});
  const h = el("h1",{class:"page-h"}, svc.label, el("span",{class:"count",id:"countChip"}, ""));
  headerWrap.append(el("div",{class:"id"}, h));
  main.append(headerWrap);

  // Action bar (AWS pattern: orange Create primary, secondaries, dropdowns)
  const ab = el("div",{class:"actions-bar"});
  // Per-service primary action label
  const primaryLabel = (svc.key === "ec2") ? "Launch instances"
                     : (svc.key === "s3") ? "Create bucket"
                     : (svc.key === "rds") ? "Create database"
                     : (svc.key === "lambda") ? "Create function"
                     : (svc.key === "apigateway") ? "Create API"
                     : (svc.key === "vpc") ? "Create VPC"
                     : "Create";
  ab.append(el("button",{class:"btn primary",onclick:()=>navigate({view:"create", item:null})},
    icon("add"), primaryLabel));
  // EC2-specific dropdowns
  if (svc.key === "ec2") {
    ab.append(makeDropdown("Instance state", "stop", [
      {label:"Start instance",  fn:()=>multiAction(svc, "start")},
      {label:"Stop instance",   fn:()=>multiAction(svc, "stop")},
      {label:"Reboot instance", fn:()=>multiAction(svc, "reboot")},
      {sep:true},
      {label:"Terminate instance", danger:true, fn:()=>multiAction(svc, "terminate")},
    ]));
    ab.append(el("button",{class:"btn",onclick:()=>{
      const sel = selectedItems();
      if (!sel.length) { toast("Select one instance first","err"); return; }
      navigate({view:"detail", item:sel[0], detailTab:0});  // Connect tab will be available
    }}, "Connect"));
  }
  if (svc.key === "rds") {
    ab.append(makeDropdown("Actions", "tune", [
      {label:"Start DB",   fn:()=>multiAction(svc, "start")},
      {label:"Stop DB",    fn:()=>multiAction(svc, "stop")},
      {label:"Reboot DB",  fn:()=>multiAction(svc, "reboot")},
      {sep:true},
      {label:"Delete DB",  danger:true, fn:()=>multiAction(svc, "delete")},
    ]));
  }
  // Generic Actions dropdown for any service
  ab.append(makeDropdown("Actions", "more_horiz", [
    {label:"Refresh", fn:()=>renderList(main)},
    {label:"Delete selected", danger:true, fn:()=>multiAction(svc, "delete")},
  ]));
  ab.append(el("div",{class:"spacer"}));
  main.append(ab);

  // Table panel
  const tableWrap = el("div",{class:"table-wrap"});
  const toolbar = el("div",{class:"table-toolbar"});
  const filterInp = el("input",{class:"search",placeholder:"Filter "+svc.label.toLowerCase()+" by attribute…"});
  const statsSpan = el("span",{class:"stats"});
  toolbar.append(filterInp, statsSpan, el("div",{style:"flex:1"}),
    el("button",{class:"iconbtn",title:"Settings",
      onclick:()=>toast("Column settings not yet wired","ok")}, icon("settings")));
  tableWrap.append(toolbar);
  const tableHolder = el("div",{}); tableWrap.append(tableHolder);
  const pager = el("div",{class:"pager"});
  tableWrap.append(pager);
  main.append(tableWrap);

  // Kick off auto-refresh for mutable-state services so pending→running
  // transitions show up without a hard reload. Cleared on navigation.
  // We re-render the entire view to keep the code path consistent with
  // the manual Refresh action — no risk of partial updates leaving the
  // table in a weird state.
  clearAutoRefresh();
  if (_AUTO_REFRESH_SERVICES.has(svc.key)) {
    _AUTO_REFRESH_TIMER = setInterval(() => {
      // Only refresh if STILL on this list view (no race with nav)
      // AND user isn't mid-action (selections / open dropdown).
      if (STATE.view === "list" && STATE.service === svc.key) {
        if (_shouldSkipAutoRefresh()) return;
        renderList(main).catch(()=>{});
      } else {
        clearAutoRefresh();
      }
    }, _AUTO_REFRESH_MS);
  }

  // Load
  tableHolder.innerHTML = '<div class="empty">Loading…</div>';
  const r = await api("GET", svc.collection_path);
  if (!r.ok) { tableHolder.innerHTML = ""; tableHolder.append(el("div",{class:"empty"}, "Failed to load: HTTP "+r.status)); return; }
  const data = r.json || {};
  // Envelope shapes across services: native AWS endpoints use their service
  // name as the key ({instances:[...], buckets:[...]}); the generic extras
  // backend (EventBridge / Secrets Manager / KMS) uses {items:[...]}.
  // Envelope shapes vary by service. Keep this list in sync with the
  // backend response shapes. The RDS list returns `db_instances` (snake
  // case — what the real AWS SDK normalises to) AND `DBInstances` (the
  // PascalCase form some clients prefer). v2.0.4 added them after a user
  // reported "create → list shows empty" — the data was there, the SPA
  // was just looking for `instances` first.
  const items = data.instances || data.buckets || data.users || data.databases
              || data.db_instances || data.DBInstances
              || data.tables || data.queues || data.functions || data.apis
              || data.vpcs || data.items || data.value
              || (Array.isArray(data)?data:[]);
  const state = {filter:"", sortBy:null, sortDir:1, selected:new Set(), page:1, pageSize:10};

  function renderTable(){
    const q = state.filter.trim().toLowerCase();
    let filtered = items.slice();
    if (q) filtered = filtered.filter(it => svc.columns.some(c => {
      const v = getPath(it, c[0]); return v != null && String(v).toLowerCase().includes(q);
    }));
    if (state.sortBy != null) {
      const path = svc.columns[state.sortBy][0];
      filtered.sort((a,b)=>{
        const av = String(getPath(a, path)||""); const bv = String(getPath(b, path)||"");
        return av.localeCompare(bv) * state.sortDir;
      });
    }
    document.getElementById("countChip").textContent = `(${filtered.length})`;
    statsSpan.textContent = filtered.length === items.length
      ? `${items.length} item${items.length===1?"":"s"}`
      : `${filtered.length} of ${items.length} match`;
    tableHolder.innerHTML = "";
    if (!items.length) {
      tableHolder.append(el("div",{class:"empty"},
        el("span",{class:"ic material-symbols-outlined"}, "inbox"),
        el("div",{}, "You have no "+svc.label.toLowerCase()+" in "+REGION+".")));
      return;
    }
    if (!filtered.length) { tableHolder.append(el("div",{class:"empty"}, "No matches.")); return; }
    // Pagination — slice filtered by current page / pageSize
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    if (state.page > totalPages) state.page = totalPages;
    const start = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(start, start + state.pageSize);
    const t = el("table",{class:"aws"});
    const hdr = el("tr",{});
    hdr.append(el("th",{class:"chk"},
      el("input",{type:"checkbox",onchange:e=>{
        if (e.target.checked) pageItems.forEach(it => state.selected.add(itemKey(svc, it)));
        else state.selected.clear();
        renderTable();
      }})));
    svc.columns.forEach((c, idx) => {
      const arr = state.sortBy === idx ? (state.sortDir === 1 ? " ▲" : " ▼") : "";
      hdr.append(el("th",{class:"sortable",onclick:()=>{
        if (state.sortBy === idx) state.sortDir = -state.sortDir;
        else { state.sortBy = idx; state.sortDir = 1; }
        renderTable();
      }}, c[1] + arr));
    });
    t.append(hdr);
    pageItems.forEach(it => {
      const k = itemKey(svc, it);
      const sel = state.selected.has(k);
      const tr = el("tr",{class: sel ? "selected" : ""});
      tr.append(el("td",{class:"chk"},
        (() => { const cb = el("input",{type:"checkbox",onclick:e=>e.stopPropagation(),
          onchange:e=>{ if (e.target.checked) state.selected.add(k); else state.selected.delete(k); renderTable(); }});
        if (sel) cb.checked = true; return cb; })()));
      svc.columns.forEach((c, i) => {
        const v = getPath(it, c[0]);
        const td = el("td",{});
        if (i === 0) td.append(el("a",{class:"id",onclick:()=>navigate({view:"detail", item:it, detailTab:0})}, String(v||"—")));
        else if (c[0].endsWith("state") || c[0].endsWith("status")) td.append(stateBadge(v));
        else td.append(document.createTextNode(String(v ?? "—")));
        tr.append(td);
      });
      t.append(tr);
    });
    tableHolder.append(t);
    renderPager(filtered.length, totalPages);
  }

  function renderPager(total, totalPages){
    pager.innerHTML = "";
    if (total <= state.pageSize) {
      pager.append(document.createTextNode(`Showing ${total} item${total===1?"":"s"}`));
      // Page-size selector still useful even with single page
      const sel = el("select",{style:"margin-left:auto;height:24px;border:1px solid #aab7b8;border-radius:4px;font-size:12px;padding:0 4px",
        onchange:e=>{state.pageSize=Number(e.target.value)||10; state.page=1; renderTable();}});
      [10,25,50,100].forEach(n => sel.append(el("option",{value:n,...(n===state.pageSize?{selected:""}:{})}, "Show: "+n)));
      pager.append(el("div",{style:"flex:1"}), sel);
      return;
    }
    pager.append(document.createTextNode(
      `Showing ${(state.page-1)*state.pageSize + 1}–${Math.min(state.page*state.pageSize, total)} of ${total}`));
    pager.append(el("div",{style:"flex:1"}));
    // ‹ prev arrow
    const prev = el("button",{class:"iconbtn",onclick:()=>{ if (state.page>1) { state.page--; renderTable(); } }}, "‹");
    if (state.page === 1) prev.setAttribute("disabled","");
    pager.append(prev);
    // numeric pages (cap at 5 visible)
    const start = Math.max(1, state.page - 2);
    const end = Math.min(totalPages, start + 4);
    for (let p = start; p <= end; p++) {
      const btn = el("button",{class:"iconbtn",style:p===state.page?"background:var(--link);color:#fff;border-color:var(--link)":"",
        onclick:()=>{ state.page=p; renderTable(); }}, String(p));
      pager.append(btn);
    }
    // › next arrow
    const next = el("button",{class:"iconbtn",onclick:()=>{ if (state.page<totalPages) { state.page++; renderTable(); } }}, "›");
    if (state.page === totalPages) next.setAttribute("disabled","");
    pager.append(next);
    // page-size dropdown
    const sel = el("select",{style:"margin-left:10px;height:24px;border:1px solid #aab7b8;border-radius:4px;font-size:12px;padding:0 4px",
      onchange:e=>{state.pageSize=Number(e.target.value)||10; state.page=1; renderTable();}});
    [10,25,50,100].forEach(n => sel.append(el("option",{value:n,...(n===state.pageSize?{selected:""}:{})}, "Show: "+n)));
    pager.append(sel);
  }

  filterInp.addEventListener("input", e => { state.filter = e.target.value; state.page = 1; renderTable(); });
  renderTable();

  // Helpers exposed via closure
  function selectedItems(){ return items.filter(it => state.selected.has(itemKey(svc, it))); }
  async function multiAction(svc, action){
    const sel = selectedItems();
    if (!sel.length) { toast("Select at least one item","err"); return; }
    if (action === "delete" || action === "terminate") {
      if (!confirm(`${action} ${sel.length} ${svc.label.toLowerCase()}?`)) return;
    }
    // Resolve the action to a concrete (method, path-template) once. Prefer
    // an explicit api_paths mapping — EC2's terminate is POST
    // /api/ec2/instances/{name}/terminate, not DELETE
    // /api/ec2/instances/{name} (which the S3 catch-all swallows). The
    // earlier code unconditionally fell into the DELETE branch for
    // terminate, so multi-select Terminate silently did nothing on EC2.
    const ap = (svc.api_paths || {})[action];
    const explicitDelete = !ap && (action === "delete" || action === "terminate");
    let okCount = 0, failCount = 0;
    for (const it of sel) {
      const name = itemKey(svc, it);
      let r;
      if (ap) {
        const path = fillPath(ap.path, {name});
        r = await api(ap.method, path);
      } else if (explicitDelete) {
        const path = fillPath(svc.resource_path, {name});
        r = await api("DELETE", path);
      } else {
        continue;
      }
      if (r && (r.ok || [200,201,202,204].includes(r.status))) {
        okCount += 1;
        recordNotif("ok", `${action} ${name}`);
      } else {
        failCount += 1;
        recordNotif("error", `${action} ${name} failed`);
      }
    }
    if (failCount === 0) toast(`${action} on ${sel.length} item(s) completed`);
    else toast(`${action}: ${okCount} ok, ${failCount} failed`, failCount ? "err" : null);
    state.selected.clear();
    renderList(main);
  }
  // make selectedItems available to action bar
  window.__selectedItems = selectedItems;
  window.__multiAction = multiAction;
}
function itemKey(svc, item){ return String(getPath(item, svc.name_field) || item.name || ""); }
function stateBadge(v){
  if (v == null || v === "") return document.createTextNode("—");
  const s = String(v).toLowerCase();
  const cls = (s.includes("run") || s === "available" || s === "active") ? "run"
            : (s.includes("stop") || s.includes("term") || s === "deleting") ? "stop"
            : (s === "failed" || s === "error") ? "err"
            : s === "creating" || s === "modifying" || s === "pending" ? "warn" : "stop";
  return el("span",{class:"state "+cls}, el("span",{class:"pip"}), document.createTextNode(String(v)));
}
function makeDropdown(label, ic, items){
  const wrap = el("span",{class:"dd"});
  const btn = el("button",{class:"btn dropdown",onclick:e=>{
    e.stopPropagation();
    document.querySelectorAll(".dd-menu.open").forEach(m=>m.classList.remove("open"));
    menu.classList.toggle("open");
  }}, icon(ic), label);
  const menu = el("div",{class:"dd-menu"});
  items.forEach(it => {
    if (it.sep) { menu.append(el("div",{class:"sep"})); return; }
    menu.append(el("a",{class: it.danger ? "danger" : "",
      onclick:()=>{ menu.classList.remove("open"); it.fn && it.fn(); }}, it.label));
  });
  wrap.append(btn, menu);
  return wrap;
}
document.addEventListener("click", ()=>document.querySelectorAll(".dd-menu.open").forEach(m=>m.classList.remove("open")));

// =====================================================================
// CHILD-LIST view (rail items under a service: VPC subnets, RDS snapshots, …)
// =====================================================================
// Per-service child-type → list spec. Two kinds:
//   • {key, columns}      → has its own account-level endpoint in svc.api_paths;
//                            click → flat list view via renderChildList()
//   • {parent: true, msg} → only meaningful in parent context (S3 objects, APIGW
//                            resources/stages); toast + send user to parent list
function childSpec(svc, childType){
  const map = {
    vpc: {
      "subnets":           {key:"subnets", label:"Subnets",
        columns: [["id","Subnet ID"],["name","Name"],["cidr_block","IPv4 CIDR"],
                  ["availability_zone","AZ"],["vpc_id","VPC"]]},
      "security-groups":   {key:"securityGroups", label:"Security groups",
        columns: [["id","Group ID"],["name","Name"],["description","Description"],["vpc_id","VPC"]]},
      "route-tables":      {key:"routeTables", label:"Route tables",
        columns: [["id","Route table ID"],["name","Name"],["vpc_id","VPC"]]},
      "internet-gateways": {key:"internetGateways", label:"Internet gateways",
        columns: [["id","IGW ID"],["name","Name"],["state","State"]]},
    },
    rds: {
      "snapshots": {key:"snapshots", label:"Snapshots",
        columns: [["snapshot_id","Snapshot ID"],["db_instance","DB instance"],
                  ["type","Type"],["status","Status"],["created","Created"]]},
    },
    apigateway: {
      "resources": {parent:true, msg:"Open an API from the list, then use the Resources tab to browse its tree."},
      "stages":    {parent:true, msg:"Open an API from the list, then use the Stages tab to view its deployments."},
    },
    s3: {
      "objects":   {parent:true, msg:"Open a bucket from the list to browse its objects."},
    },
    // EC2 AMIs and IAM Groups/Roles/Policies/Providers all have real backend
    // endpoints — surface them as proper child lists instead of generic stubs.
    ec2: {
      "amis": {key:"amis", label:"AMIs", absolutePath:"/api/ec2/amis", arrayKey:"amis",
        columns: [["image_id","AMI ID"],["name","Name"],["state","State"],
                  ["architecture","Architecture"],["platform","Platform"]]},
    },
    iam: {
      "iam-groups":    {label:"User groups",      absolutePath:"/api/iam/groups",    arrayKey:"groups",
        columns: [["group_name","Group name"],["arn","ARN"],["created","Created"]]},
      "iam-roles":     {label:"Roles",            absolutePath:"/api/iam/roles",     arrayKey:"roles",
        columns: [["role_name","Role name"],["arn","ARN"],["created","Created"]]},
      "iam-policies":  {label:"Policies",         absolutePath:"/api/iam/policies",  arrayKey:"policies",
        columns: [["policy_name","Policy name"],["arn","ARN"],["attachable","Attachable"]]},
      "iam-providers": {label:"Identity providers",absolutePath:"/api/iam/identity-providers", arrayKey:"identity_providers",
        columns: [["name","Provider name"],["type","Type"],["url","URL"],["created","Created"]]},
    },
  };
  return (map[svc.key] || {})[childType] || null;
}

async function renderChildList(main){
  main.innerHTML = "";   // self-clear (same pattern as renderList)
  const svc = svcByKey(STATE.service);
  if (!svc) { main.append(el("div",{class:"empty"}, "Service not found")); return; }
  const spec = childSpec(svc, STATE.child);
  if (!spec || spec.parent) {
    // Shouldn't happen — rail click guards against this — but be defensive.
    main.append(el("div",{class:"empty"}, "Unknown child collection: "+STATE.child));
    return;
  }
  // Two shapes for path resolution:
  //   • spec.absolutePath → use as-is (for promoted child lists that hit
  //     existing AWS endpoints like /api/ec2/amis, /api/iam/groups, etc.)
  //   • spec.key         → look up via svc.api_paths (legacy VPC/RDS children)
  const apiPath = spec.absolutePath
    ? {method: "GET", path: spec.absolutePath}
    : (svc.api_paths || {})[spec.key];
  if (!apiPath) {
    main.append(el("div",{class:"empty"}, "No API path registered for "+(spec.key||STATE.child)));
    return;
  }

  // Header
  const headerWrap = el("div",{class:"detail-top"});
  headerWrap.append(el("div",{class:"id"},
    el("h1",{class:"page-h"}, spec.label, el("span",{class:"count",id:"childCountChip"}, ""))));
  headerWrap.append(el("div",{style:"display:flex;gap:8px;flex-shrink:0"},
    el("button",{class:"btn",onclick:()=>renderChildList(main)}, icon("refresh"), "Refresh"),
    el("button",{class:"btn",onclick:()=>navigate({view:"list", child:null, item:null})},
      icon("arrow_back"), "Back to "+svc.label)));
  main.append(headerWrap);

  // Table
  const tableWrap = el("div",{class:"table-wrap"});
  const toolbar = el("div",{class:"table-toolbar"});
  const filterInp = el("input",{class:"search",placeholder:"Filter "+spec.label.toLowerCase()+"…"});
  const statsSpan = el("span",{class:"stats"});
  toolbar.append(filterInp, statsSpan);
  tableWrap.append(toolbar);
  const tableHolder = el("div",{}); tableWrap.append(tableHolder);
  main.append(tableWrap);

  // Load
  tableHolder.innerHTML = '<div class="empty">Loading…</div>';
  const r = await api(apiPath.method, apiPath.path);
  if (!r.ok) { tableHolder.innerHTML = ""; tableHolder.append(el("div",{class:"empty"}, "Failed to load: HTTP "+r.status)); return; }
  const data = r.json || {};
  // Lists across AWS use slightly different envelope keys — prefer the
  // explicit arrayKey from the spec, else try common shapes.
  const items = (spec.arrayKey && data[spec.arrayKey])
              || data[spec.key] || data.subnets || data.security_groups || data.route_tables
              || data.internet_gateways || data.snapshots || data.amis || data.users
              || data.groups || data.roles || data.policies || data.identity_providers
              || data.value || (Array.isArray(data) ? data : []);

  const state = {filter:""};
  function renderTable(){
    const q = state.filter.trim().toLowerCase();
    let filtered = items.slice();
    if (q) filtered = filtered.filter(it => spec.columns.some(c => {
      const v = getPath(it, c[0]); return v != null && String(v).toLowerCase().includes(q);
    }));
    document.getElementById("childCountChip").textContent = `(${filtered.length})`;
    statsSpan.textContent = filtered.length === items.length
      ? `${items.length} item${items.length===1?"":"s"}`
      : `${filtered.length} of ${items.length} match`;
    tableHolder.innerHTML = "";
    if (!items.length) {
      tableHolder.append(el("div",{class:"empty"},
        el("span",{class:"ic material-symbols-outlined"}, "inbox"),
        el("div",{}, "No "+spec.label.toLowerCase()+" in "+REGION+".")));
      return;
    }
    if (!filtered.length) { tableHolder.append(el("div",{class:"empty"}, "No matches.")); return; }
    const t = el("table",{class:"aws"});
    const hdr = el("tr",{});
    spec.columns.forEach(c => hdr.append(el("th",{}, c[1])));
    t.append(hdr);
    filtered.forEach(it => {
      const tr = el("tr",{});
      spec.columns.forEach((c,i) => {
        const v = getPath(it, c[0]);
        const td = el("td",{});
        if (i === 0) td.append(el("a",{class:"id"}, String(v||"—")));
        else if (c[0].endsWith("state") || c[0].endsWith("status")) td.append(stateBadge(v));
        else td.append(document.createTextNode(String(v ?? "—")));
        tr.append(td);
      });
      t.append(tr);
    });
    tableHolder.append(t);
  }
  filterInp.addEventListener("input", e => { state.filter = e.target.value; renderTable(); });
  renderTable();
}

// STUB view — schema-driven CRUD list / analytics / config dispatcher
// (Schema lives in CATALOG.extras, keyed by "<service>/<stub-key>")
// =====================================================================
async function renderStub(main){
  main.innerHTML = "";
  const svc = svcByKey(STATE.service);
  const fullKey = (STATE.service || "") + "/" + (STATE.stub || "");
  const schema = (CATALOG.extras || {})[fullKey];
  if (!schema) return renderStubPlaceholder(main, svc, STATE.stubLabel || STATE.stub);
  if (schema.category === "crud")      return renderCrudStub(main, svc, fullKey, schema);
  if (schema.category === "analytics") return renderAnalyticsStub(main, svc, fullKey, schema);
  if (schema.category === "config")    return renderConfigStub(main, svc, fullKey, schema);
  return renderStubPlaceholder(main, svc, schema.label);
}

function _stubHeader(main, svc, schema) {

  headerWrap.append(id);
  return headerWrap;

      return;

    const t = el("table",{class:"aws"});
    const hdr = el("tr",{});
    schema.columns.forEach(c => hdr.append(el("th",{}, c[1])));

    t.append(hdr);

      const tr = el("tr",{});

        tr.append(td);

function _singular(label){ return String(label).replace(/s$/,"").replace(/ies$/,"y"); }

function openStubCreate(svc, fullKey, schema){
  // Modal overlay with the schema's create_fields
  const overlay = el("div",{style:"position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:center;justify-content:center"});
  const modal = el("div",{style:"background:#fff;border-radius:8px;width:560px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)"});
  modal.append(el("div",{style:"padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px"},
    "Create "+_singular(schema.label)));
  const body = el("div",{style:"padding:18px"});
  const values = {};
  (schema.create_fields || []).forEach(f => {
    if (f.default !== undefined) values[f.name] = f.default;
    const w = el("div",{class:"field"});
    const labelKids = [document.createTextNode(f.label || f.name)];
    if (f.required) labelKids.push(el("span",{class:"req"}, "*"));
    w.append(el("label",{}, ...labelKids));
    let inp;
    if (f.type === "select") {
      inp = el("select",{onchange:e=>{values[f.name]=e.target.value;}});
      (f.options||[]).forEach(o => inp.append(el("option",{value:o.value}, o.label||o.value)));
      inp.value = values[f.name] ?? (f.default || "");
    } else if (f.type === "number") {
      inp = el("input",{type:"number",value: values[f.name] ?? f.default ?? "",
        oninput:e=>{values[f.name]= e.target.value === "" ? "" : Number(e.target.value);}});
    } else if (f.type === "boolean") {
      inp = el("input",{type:"checkbox",onchange:e=>{values[f.name]=e.target.checked;}});
      if (values[f.name]) inp.checked = true;
    } else {
      inp = el("input",{type:"text",value: values[f.name] ?? f.default ?? "",
        oninput:e=>{values[f.name]=e.target.value;}});
    }
    w.append(inp);
    if (f.help) w.append(el("div",{class:"help"}, f.help));
    body.append(w);
  });
  modal.append(body);
  modal.append(el("div",{style:"padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end"},
    el("button",{class:"btn",onclick:()=>overlay.remove()}, "Cancel"),
    el("button",{class:"btn primary",onclick:async()=>{
      // Required-field check
      for (const f of (schema.create_fields || [])) {
        if (f.required && (values[f.name] === undefined || values[f.name] === "")) {
          toast(f.label+" is required","err"); return;
        }
      }
      const r = await api("POST", "/api/aws/extras/"+fullKey, values);
      if (r.ok) { toast("Created"); overlay.remove(); renderStub(document.getElementById("main")); }
      else toast("Create failed: "+(r.json && r.json.detail || r.status), "err");
    }}, icon("add"), "Create")));
  overlay.append(modal);
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}
