              <button className="btn btn-s" type="button" onClick={load}>↻ Refresh</button>
            </div>
            {renderTable()}
            <div style={{marginTop:16}}>
              {renderCreatePanel()}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function LaunchInstanceModal({onClose, onDone, notify, defaults = {}, providerContext = ''}) {
  const [busy, setBusy] = useState(false);
  const [runtimeStatus, setRuntimeStatus] = useState(null);
  const [runtimeReady, setRuntimeReady] = useState(false);
  const [runtimeMessage, setRuntimeMessage] = useState('Checking Multipass and LXD runtime...');
  const [gcpLaunchSection, setGcpLaunchSection] = useState('machine');
  const [vpcs, setVpcs] = useState([]);
  const [subnets, setSubnets] = useState([]);
  const [sgs, setSgs] = useState([]);
  const [amis, setAmis] = useState([]);
  const [form, setForm] = useState({
    name: 'demo-instance',
    project: '',
    instance_type: 't3.micro',
    ami: '',
    key_pair: '',
    runtime: 'python',
    runtime_backend: '',
    vpc_id: '',
    subnet_id: '',
    security_group_ids: '',
    az: 'us-east-1a',
    storage_gb: 8,
    command: '',
    user_data: '',
    machine_family: 'General purpose',
    machine_series: 'E2',
    boot_disk_type: 'Balanced persistent disk',
    assign_external_ip: true,
    shielded_vm: true,
    vtpm: true,
    integrity_monitoring: true,
    service_account: 'default',
    ...defaults,
  });

  useEffect(() => {
    let alive = true;
    Promise.all([
      api('GET', '/api/vpc/vpcs').catch(() => ({vpcs: []})),
      api('GET', '/api/vpc/subnets').catch(() => ({subnets: []})),
      api('GET', '/api/vpc/security-groups').catch(() => ({security_groups: []})),
      api('GET', '/api/ec2/amis').catch(() => ({amis: []})),
    ]).then(([v, s, g, a]) => {
      setVpcs(v.vpcs || []);
      setSubnets(s.subnets || []);
      setSgs(g.security_groups || []);
      setAmis(a.amis || []);
      if (!form.vpc_id && (v.vpcs || []).length) setForm(f => ({...f, vpc_id: v.vpcs[0].vpc_id, subnet_id: '', security_group_ids: ''}));
    });
    EC2.runtime()
      .then(current => {
        if (!alive) return;
        const backends = current?.backends || {};
        const ready = Object.values(backends).some(b => b?.available && b?.status === 'ready');
        setRuntimeStatus(current || null);
        setRuntimeReady(ready);
        setRuntimeMessage(ready ? 'Multipass or LXD runtime is ready.' : (current?.backends?.multipass?.message || current?.backends?.lxd?.message || 'No Multipass or LXD runtime is ready yet.'));
      })
      .catch(e => {
        if (!alive) return;
        setRuntimeReady(false);
        setRuntimeMessage(e.message || 'No Multipass or LXD runtime is ready.');
      });
    return () => {
      alive = false;
    };
  }, []);

  const hostOs = String(runtimeStatus?.host_os || '').toLowerCase();
  const runtimeFamilyLabel = hostOs === 'darwin' || hostOs === 'windows' ? 'Multipass' : 'Multipass or LXD';
  const providerKey = normalizeProvider(providerContext || window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const modalTitle = isGcp ? 'Create Compute Engine instance' : 'Launch instance';
  const nameLabel = isGcp ? 'Instance name' : 'Name and tags';
  const imageLabel = isGcp ? 'Boot image' : 'AMI';
  const machineLabel = isGcp ? 'Machine type' : 'Instance type';
  const keyLabel = isGcp ? 'SSH key' : 'Key pair';
  const zoneLabel = isGcp ? 'Zone' : 'Availability zone';
  const networkLabel = isGcp ? 'VPC network' : 'VPC';
  const subnetLabel = isGcp ? 'Subnet' : 'Subnet';
  const sgLabel = isGcp ? 'Firewall rules' : 'Security groups';
  const storageLabel = isGcp ? 'Boot disk (GiB)' : 'Storage (GiB)';
  const advancedLabel = isGcp ? 'Startup script' : 'Advanced details / user data';
  const bootCommandLabel = isGcp ? 'Startup command' : 'Boot command';
  const runtimeReadyLabel = isGcp ? 'Compute Engine runtime' : runtimeFamilyLabel;
  const defaultProject = String(window.__cloudlearnActiveSpaceId || providerContext || 'cloudlearn').trim() || 'cloudlearn';
  const gcpMachineFamilies = ['General purpose', 'Compute optimized', 'Memory optimized', 'Storage optimized', 'GPUs'];
  const gcpMachineTypes = {
    'General purpose': ['e2-micro', 'e2-small', 'e2-medium', 'n2-standard-2'],
    'Compute optimized': ['c2-standard-4', 'c2-standard-8'],
    'Memory optimized': ['n2-highmem-2', 'n2-highmem-4'],
    'Storage optimized': ['n2-standard-2', 'n2-standard-4'],
    GPUs: ['a2-highgpu-1g'],
  };
  const gcpSeriesByFamily = {
    'General purpose': ['E2', 'N1', 'N2', 'N2D'],
    'Compute optimized': ['C2', 'C2D'],
    'Memory optimized': ['M3', 'M2', 'N2-HIGHMEM'],
    'Storage optimized': ['N2', 'N2D'],
    GPUs: ['A2', 'A3'],
  };
  const gcpZoneOptions = ['Any', 'us-central1-a', 'us-central1-b', 'us-central1-c', 'europe-west1-b', 'asia-south1-a'];
  const visibleAmis = useMemo(() => {
    return amis.filter(ami => {
      const supportedHosts = (ami.supported_host_os || []).map(v => String(v).toLowerCase());
      const supportedBackends = (ami.supported_backends || []).map(v => String(v).toLowerCase());
      if (supportedHosts.length && hostOs && !supportedHosts.includes(hostOs)) {
        return false;
      }
      return supportedBackends.length > 0;
    });
  }, [amis, hostOs]);

  const currentAmi = visibleAmis.find(a => a.ami === form.ami) || visibleAmis[0] || null;
  const runtimeBackend = useMemo(() => {
    if (!currentAmi) return '';
    const supportedBackends = (currentAmi.supported_backends || []).map(v => String(v).toLowerCase());
    const preferred = String(runtimeStatus?.preferred_backend || currentAmi.default_runtime_backend || '').toLowerCase();
    const runtimeBackends = runtimeStatus?.backends || {};
    const candidates = [preferred, ...supportedBackends];
    for (const candidate of candidates) {
      if (candidate && supportedBackends.includes(candidate) && runtimeBackends[candidate]?.available) return candidate;
    }
    return supportedBackends[0] || preferred || '';
  }, [currentAmi, runtimeStatus]);

  const amiGroups = useMemo(() => {
    const groups = visibleAmis.reduce((acc, ami) => {
      const group = ami.category || 'Other AMIs';
      if (!acc[group]) acc[group] = [];
      acc[group].push(ami);
      return acc;
    }, {});
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
  }, [visibleAmis]);

  useEffect(() => {
    if (!visibleAmis.length) return;
    if (!form.ami || !visibleAmis.some(a => a.ami === form.ami)) {
      const first = visibleAmis[0];
      setForm(f => ({...f, ami: first.ami, runtime: first.default_runtime || f.runtime, runtime_backend: runtimeBackend || first.default_runtime_backend || f.runtime_backend || ''}));
    }
  }, [visibleAmis, form.ami, runtimeBackend]);

  useEffect(() => {
    if (!isGcp) return;
    const family = form.machine_family || 'General purpose';
    const series = form.machine_series || gcpSeriesByFamily[family]?.[0] || 'E2';
    const machineType = form.instance_type || gcpMachineTypes[family]?.[0] || 'e2-micro';
    const next = {
      ...form,
      project: form.project || defaultProject,
      machine_family: family,
      machine_series: series,
      instance_type: machineType,
      az: form.az && !['us-east-1a', 'Any', ''].includes(form.az) ? form.az : 'us-central1-a',
      key_pair: form.key_pair || 'default',
    };
    if (next.instance_type !== form.instance_type || next.machine_series !== form.machine_series || next.az !== form.az) {
      setForm(next);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [isGcp, providerContext, defaultProject]);

  const checkRuntimeReady = async () => {
    try {
      const current = await EC2.runtime();
      return {
        ready: !!(current?.available || Object.values(current?.backends || {}).some(b => b?.available && b?.status === 'ready')),
        current,
      };
    } catch (e) {
      return { ready: false, current: { message: e.message || `No ${runtimeReadyLabel} is available.` } };
    }
  };

  const submit = async () => {
    setBusy(true);
    try {
      const runtime = await checkRuntimeReady();
      if (!runtime?.ready) {
        notify(runtime?.current?.message || `A ${runtimeReadyLabel} is required before launching ${isGcp ? 'Compute Engine' : 'EC2'} instances.`, 'error');
        return;
      }
      const selectedBackend = runtimeBackend || currentAmi?.default_runtime_backend || runtime?.current?.preferred_backend || '';
      const payload = {
        ...form,
        storage_gb: Number(form.storage_gb) || 8,
        security_group_ids: form.security_group_ids ? form.security_group_ids.split(',').map(s => s.trim()).filter(Boolean) : [],
        runtime_backend: selectedBackend,
      };
      const gcpZone = String(payload.az || 'us-central1-a');
      const gcpProject = String(payload.project || defaultProject);
      const gcpMachineType = `projects/${gcpProject}/zones/${gcpZone}/machineTypes/${String(payload.instance_type || 'e2-micro')}`;
      const gcpSourceImage = `projects/${gcpProject}/global/images/${String(payload.ami || currentAmi?.ami || 'sim-ubuntu-22.04')}`;
      const gcpRegion = gcpZone.includes('-') ? gcpZone.split('-').slice(0, -1).join('-') : 'us-central1';
      const gcpDiskType = (() => {
        const raw = String(payload.boot_disk_type || 'pd-balanced').toLowerCase();
        if (raw.includes('ssd')) return 'pd-ssd';
        if (raw.includes('standard')) return 'pd-standard';
        return 'pd-balanced';
      })();
      const requestPayload = isGcp ? {
        name: String(payload.name || 'gcp-instance'),
        machineType: gcpMachineType,
        sourceImage: gcpSourceImage,
        networkInterfaces: [{
          name: 'nic0',
          network: `projects/${gcpProject}/global/networks/${String(payload.vpc_id || 'default')}`,
          subnetwork: `projects/${gcpProject}/regions/${gcpRegion}/subnetworks/${String(payload.subnet_id || 'default')}`,
          accessConfigs: payload.assign_external_ip === false ? [] : [{name: 'External NAT', type: 'ONE_TO_ONE_NAT'}],

        disks: [{
          boot: true,
          autoDelete: true,
          type: 'PERSISTENT',
          mode: 'READ_WRITE',
          initializeParams: {
            sourceImage: gcpSourceImage,
            diskSizeGb: String(Number(payload.storage_gb) || 8),
            diskType: `projects/${gcpProject}/zones/${gcpZone}/diskTypes/${gcpDiskType}`,
          },
        }],
        labels: payload.labels || {},
        metadata: {
          items: payload.user_data ? [{key: 'startup-script', value: String(payload.user_data)}] : [],

        serviceAccounts: [{
          email: `${String(payload.service_account || 'default')}@${gcpProject}.iam.gserviceaccount.com`,
          scopes: ['https://www.googleapis.com/auth/cloud-platform'],

        scheduling: {
          automaticRestart: true,
          onHostMaintenance: 'MIGRATE',
          preemptible: false,
        },
        shieldedInstanceConfig: {
          enableSecureBoot: !!payload.shielded_vm,
          enableVtpm: !!payload.vtpm,
          enableIntegrityMonitoring: !!payload.integrity_monitoring,
        },
        startupCommand: String(payload.command || ''),
        startupScript: String(payload.user_data || ''),
        runtimeBackend: selectedBackend,
        runtime: String(payload.runtime || 'python'),
        keyPair: String(payload.key_pair || 'default'),
        serviceAccount: String(payload.service_account || 'default'),
        assignExternalIp: payload.assign_external_ip !== false,
      } : payload;
      const created = isGcp
        ? await ComputeEngine.create(gcpProject, gcpZone, requestPayload)
        : await EC2.create(payload);
      const instanceId = created?.targetId || created?.instance?.instance_id || created?.instance_id || created?.id || '';
      if (instanceId) {
        const startedAt = Date.now();
        while (Date.now() - startedAt < 20000) {
          const current = isGcp
            ? await ComputeEngine.list(String(payload.project || defaultProject), gcpZone)
            : await EC2.list();
          const latest = (current.items || current.instances || []).find(i => i.instance_id === instanceId);
          if (!latest) break;
          if (['running', 'stopped', 'terminated'].includes(String(latest.state || '').toLowerCase()) || String(latest.launch_status || '').toLowerCase() === 'error') {
            break;
          }
          await new Promise(resolve => setTimeout(resolve, 1000));
        }
      }
      notify(isGcp ? 'Compute Engine instance launched' : 'EC2 instance launched', 'success');
      onDone();

      notify(e.message, 'error');

      setBusy(false);

  const filteredSubnets = subnets.filter(s => !form.vpc_id || s.vpc_id === form.vpc_id);

                    {['python','java','dotnet','go','php'].map(v => <option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">Runtime backend</label>
                  <select className="fi" value={form.runtime_backend} onChange={e=>setForm(f=>({...f,runtime_backend:e.target.value}))}>
                    {['', 'lxd', 'multipass'].map(v => <option key={v || 'auto'} value={v}>{v ? v.toUpperCase() : 'Auto'}</option>)}
                  </select>
                </div>
              </div>
              <div className="gcp-launch-summary" style={{marginTop:12}}>
                <strong>Launch summary</strong> - The selected {runtimeReadyLabel} runtime will download the chosen OS image automatically on first launch and cache it locally for later launches.
                <div className="fh" style={{marginTop:6}}>
                  {currentAmi ? `Selected backend: ${(runtimeBackend || currentAmi.default_runtime_backend || 'auto').toUpperCase()}. ` : ''}
                  {runtimeMessage}
                </div>
              </div>
            </div>
          </div>
        );
    }
  };

      <div className="overlay" onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>

                <div className="fh" style={{marginTop:6}}>

            <button className="btn btn-p" onClick={submit} disabled={busy || !runtimeReady}>{busy ? '⏳ Launching…' : 'Create instance'}</button>
          </div>

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>

                setForm(f=>({

            <div className="ibox">

            </div>
          )}
          <div className={`ibox ${runtimeReady ? '' : 'warn'}`}>
            <strong>{runtimeReady ? `${runtimeReadyLabel} ready` : `${runtimeReadyLabel} required`}</strong> — {runtimeMessage}
            <div className="fh" style={{marginTop:6}}>
              {Object.entries(runtimeStatus?.backends || {}).map(([name, info]) => (
                <span key={name} style={{display:'inline-block',marginRight:10}}>
                  {name}: <strong>{info?.available && info?.status === 'ready' ? 'ready' : (info?.message || 'unavailable')}</strong>
                </span>
              ))}
            </div>
          </div>
          <div className="ibox"><strong>Launch summary</strong> — The selected {runtimeReadyLabel} runtime will download the chosen OS image automatically on first launch and cache it locally for later launches.</div>

    </div>
  );
}

function EC2ConsoleModal({instance, notify, onClose, providerContext = ''}) {
  const instanceId = instance?.name || instance?.instance_id || instance?.id || instance?.instanceId || instance?.instanceID || '';
  const [output, setOutput] = useState('');
  const [input, setInput] = useState('');
  const [status, setStatus] = useState('connecting');
  const [busy, setBusy] = useState(false);
  const [history, setHistory] = useState([]);
  const [historyIndex, setHistoryIndex] = useState(-1);
  const endRef = useRef(null);
  const inputRef = useRef(null);
  const wsRef = useRef(null);
  const wsErroredRef = useRef(false);
  const isWindows = String(instance?.os_family || '').toLowerCase() === 'windows';
  const backend = String(instance?.runtime_backend || '').toLowerCase();
  const sshCommand = String(instance?.ssh_command || '').trim();
  const providerKey = normalizeProvider(providerContext || instance?.provider || window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const resourceName = (value, fallback = '') => {
    const text = String(value || '').trim();
    if (!text) return fallback;
    const parts = text.split('/').filter(Boolean);
    return parts[parts.length - 1] || fallback;
  };
  const isSandboxBacked = isGcp || ['lxd', 'multipass'].includes(backend);
  const sessionLabel = isGcp ? 'ssh' : (backend === 'multipass' ? 'ssh' : 'console');
  const project = String(instance?.project || window.__cloudlearnActiveSpaceId || providerContext || 'cloudlearn').trim() || 'cloudlearn';
  const zone = String(instance?.zoneId || instance?.zone || instance?.az || 'us-central1-a').trim() || 'us-central1-a';
  const sessionTarget = isSandboxBacked ? (instance.container_name || instance.container_id || instanceId) : '';
  const gcpSshCommand = sshCommand || `gcloud compute ssh ${instance?.name || instanceId} --project=${project} --zone=${zone}`;
  const hostCommand = isGcp
    ? gcpSshCommand
    : backend === 'multipass'
    ? (sshCommand || `ssh ubuntu@${instance?.public_ip || instance?.private_ip || sessionTarget}`)
    : '';
  const prompt = instance?.console_prompt || (isGcp ? `${instanceId || 'compute-engine'}:~$` : (isSandboxBacked ? `ubuntu@${sessionTarget}:/workspace$` : ''));
  const emptyTerminal = isSandboxBacked
    ? <>{hostCommand || (isGcp ? 'Connected to Compute Engine instance' : 'Connected to instance')}<br/>{isGcp ? 'Connected to Compute Engine instance' : 'Connected to instance'} {sessionTarget || instanceId}</>
    : <>{isGcp ? 'A sandbox runtime is required for Compute Engine consoles.' : 'A sandbox runtime is required for EC2 consoles.'}</>;

  useEffect(() => {
    if (!instanceId) {
      setStatus('error');
      setOutput('Missing EC2 instance id.\n');
      return;
    }
    if (!isSandboxBacked) {
      setStatus('error');
      setOutput(isGcp ? 'A sandbox runtime is required for Compute Engine consoles.\n' : 'A sandbox runtime is required for EC2 consoles.\n');
      return;
    }
    const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const wsPath = isGcp
      ? `/ws/compute/v1/projects/${encodeURIComponent(project)}/zones/${encodeURIComponent(zone)}/instances/${encodeURIComponent(instanceId)}/console`
      : `/ws/ec2/instances/${encodeURIComponent(instanceId)}/console`;
    const ws = new WebSocket(`${scheme}://${window.location.host}${wsPath}`);
    wsRef.current = ws;
    wsErroredRef.current = false;
    setStatus('connecting');
    ws.onopen = () => setStatus('attached');
    ws.onmessage = (ev) => {
      const chunk = typeof ev.data === 'string' ? ev.data.replace(/\r\n/g, '\n').replace(/\r/g, '\n') : '';
      if (!chunk) return;
      setOutput(prev => (prev ? prev + chunk : chunk));
    };
    ws.onerror = () => {
      wsErroredRef.current = true;
      setStatus('error');
      setOutput(`Unable to open sandbox console for ${instanceId}.\n`);
    };
    ws.onclose = () => {
      if (!wsErroredRef.current) setStatus('closed');
    };
    return () => {
      try { ws.close(); } catch (_) {}
    };
  }, [instanceId, instance?.endpoint_url, instance?.runtime_image, isSandboxBacked, sessionTarget, project, zone, isGcp]);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({behavior:'smooth', block:'end'});
  }, [output]);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  const send = (data) => {
    const ws = wsRef.current;
    if (!instanceId) {
      notify('Missing EC2 instance id for console connection.', 'error');
      return;
    }
    if (!ws || ws.readyState !== 1) {
      notify('Console is not connected.', 'error');
      return;
    }
    setBusy(true);
    const command = data.replace(/\n$/, '');
    try {
      ws.send(command);
    } catch (e) {
      notify(e.message || 'Console session is not connected.', 'error');
    } finally {
      setBusy(false);
    }
  };

  const submit = () => {
    if (busy) return;
    const value = input.trimEnd();
    if (!value) return;
    if (!isSandboxBacked) {
      notify(isGcp ? 'A sandbox runtime is required for Compute Engine consoles.' : 'A sandbox runtime is required for EC2 consoles.', 'error');
      return;
    }
    setHistory(prev => {
      const next = [...prev, value];
      return next.slice(-100);
    });
    setHistoryIndex(-1);
    send(value + '\n');
    setInput('');
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className={`modal modal-lg ${isGcp ? 'gcp-console-modal' : ''}`.trim()}>
        <div className="mh">
          <span className="mt">{isGcp ? 'Compute Engine SSH Console' : 'SSH Console'}</span>
          <button className="mx" onClick={onClose}>×</button>
        </div>
        <div className="mb">
          <div className="ibox">
            <strong>{instance.name}</strong> — {instanceId || instance.instance_id}
            <div className="console-meta">
              <span>State: <strong>{isGcp ? String(instance.status || instance.state || '').toUpperCase() : instance.state}</strong></span>
              {isGcp ? (
                <>
                  <span>Machine type: <strong>{instance.machineType ? resourceName(instance.machineType, instance.machineType) : '—'}</strong></span>
                  <span>Image: <strong>{instance.disks?.[0]?.initializeParams?.sourceImage ? resourceName(instance.disks[0].initializeParams.sourceImage, instance.disks[0].initializeParams.sourceImage) : '—'}</strong></span>
                </>
              ) : (
                <>
                  <span>AMI: <strong>{instance.ami_name || instance.ami}</strong></span>
                  <span>Runtime image: <strong>{instance.runtime_image || 'python:3.12-slim'}</strong></span>
                  <span>Image download: <strong>{instance.container_download_state || 'pending'}</strong></span>
                  <span>Backend: <strong>{instance.runtime_backend || 'sandbox'}</strong></span>
                </>
              )}
              {hostCommand && <span>SSH command: <strong className="ec2-mono">{hostCommand}</strong></span>}
              {instance.endpoint_url && <span>Endpoint: <strong>{instance.endpoint_url}</strong></span>}
            </div>
          </div>
          <div className="terminal-wrap">
            <div className="terminal-top">
              <span className="terminal-title"><span className="terminal-dot" />{sessionLabel}</span>
              <span className="terminal-state">{status}</span>
            </div>
            <div className="terminal-output">
              {output || <span className="dim">{emptyTerminal}</span>}
              <span ref={endRef} />
            </div>
            <div className="terminal-input-row">
              <div className="terminal-input-wrap">
                <span className="shell-prompt">{prompt}</span>
                <input
                  ref={inputRef}
                  className="shell-input"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      submit();
                    } else if (e.key === 'ArrowUp') {
                      e.preventDefault();
                      const nextIndex = history.length ? (historyIndex < 0 ? history.length - 1 : Math.max(0, historyIndex - 1)) : -1;
                      if (nextIndex >= 0) {
                        setHistoryIndex(nextIndex);
                        setInput(history[nextIndex] || '');
                      }
                    } else if (e.key === 'ArrowDown') {
                      e.preventDefault();
                      if (!history.length) return;
                      const nextIndex = historyIndex < 0 ? -1 : historyIndex + 1;
                      if (nextIndex >= history.length) {
                        setHistoryIndex(-1);
                        setInput('');
                      } else {
                        setHistoryIndex(nextIndex);
                        setInput(history[nextIndex] || '');
                      }
                    } else if (e.key === 'Tab') {
                      e.preventDefault();
                      setInput(prev => prev + '  ');
                    }
                  }}
                  disabled={!isSandboxBacked}
                  placeholder={isSandboxBacked ? 'Type an SSH command and press Enter' : 'Multipass runtime required'}
                  spellCheck="false"
                  autoCapitalize="off"
                  autoComplete="off"
                  autoCorrect="off"
                />
              </div>
            </div>
          </div>
          <div className="terminal-actions">
            <div className="btn-grp">
              <button className="btn btn-s" onClick={() => setOutput('')} disabled={busy}>Cls</button>
              <button className="btn btn-s" onClick={() => send('\u0003')} disabled={busy}>Ctrl-C</button>
            </div>
            <div className="btn-grp">
              <button className="btn btn-s" onClick={() => notify(isGcp ? 'Console output is executed over SSH against the running Compute Engine instance.' : 'Console output is executed over SSH against the running EC2 instance.', 'info')} disabled={busy}>Info</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const renderXmlSnippet = (xml) => {
  const escapeAttr = (value) => String(value).replace(/"/g, '&quot;');
  const highlightTag = (tag) => {
    const match = tag.match(/^<(\/?)([A-Za-z0-9:_-]+)([\s\S]*?)(\/?)>$/);
    if (!match) return <span className="ec2-xml-tag">{tag}</span>;
    const [, closing, name, attrs, selfClosing] = match;
    const tokens = [];
    let lastIndex = 0;
    const attrRe = /([A-Za-z0-9:_-]+)=("([^"]*)"|'([^']*)')/g;
    let attrMatch;
    while ((attrMatch = attrRe.exec(attrs)) !== null) {
      if (attrMatch.index > lastIndex) {
        tokens.push(attrs.slice(lastIndex, attrMatch.index));
      }
      tokens.push(
        <React.Fragment key={`${name}-attr-${attrMatch.index}`}>
          {' '}
          <span className="ec2-xml-attr">{attrMatch[1]}</span>="<span className="ec2-xml-value">{escapeAttr(attrMatch[3] || attrMatch[4] || '')}</span>"
        </React.Fragment>
      );
      lastIndex = attrRe.lastIndex;
    }
    if (lastIndex < attrs.length) {
      tokens.push(attrs.slice(lastIndex));
    }
    return (
      <span className="ec2-xml-tag">
        &lt;{closing}{name}
        {tokens}
        {selfClosing ? '/' : ''}
        &gt;
      </span>
    );
  };

  return (
    <pre className="ec2-docs-code ec2-xml">
      {String(xml).split('\n').map((line, lineIndex) => {
        const parts = line.split(/(<[^>]+>)/g).filter(Boolean);
        return (
          <span key={lineIndex} className="ec2-xml-line">
            {parts.length ? parts.map((part, partIndex) => (
              part.startsWith('<')
                ? <React.Fragment key={partIndex}>{highlightTag(part)}</React.Fragment>
                : <React.Fragment key={partIndex}>{part}</React.Fragment>
            )) : '\u00a0'}
          </span>
        );
      })}
    </pre>
  );
};

function EC2View({notify, providerCatalog = DEFAULT_PROVIDER_CATALOG, providerContext = '', connectedSpace = null, onOpenSpaces, onOpenDashboard}) {

  const [lxdRuntime, setLxdRuntime] = useState(null);

  const gcpProject = String(window.__cloudlearnActiveSpaceId || providerContext || 'cloudlearn').trim() || 'cloudlearn';
  const gcpZone = '-';
  const gcpResourceName = (value, fallback = '') => {
    const text = String(value || '').trim();
    if (!text) return fallback;
    const parts = text.split('/').filter(Boolean);
    return parts[parts.length - 1] || fallback;
  };
  const gcpInstanceRef = (instance) => String(instance?.name || instance?.id || instance?.instance_id || '');
  const gcpZoneRef = (instance) => gcpResourceName(instance?.zone || instance?.zoneId || instance?.az || gcpZone, gcpZone);
  const gcpStatusToUiState = (status) => {
    const value = String(status || '').toUpperCase();
    return ({
      PROVISIONING: 'pending',
      STAGING: 'pending',
      PENDING: 'pending',
      RUNNING: 'running',
      STOPPING: 'stopped',
      TERMINATED: 'terminated',
      STOPPED: 'stopped',
    }[value] || 'stopped');
  };
  const gcpStatusLabel = (status) => String(status || '').toUpperCase() || 'UNKNOWN';
  const loadInstances = useCallback(async () => {
    const d = isGcp ? await ComputeEngine.list(gcpProject, gcpZone) : await EC2.list();
    setInstances(d.items || d.instances || []);
  }, [gcpProject, isGcp]);
  const computeStart = useCallback((instance) => isGcp ? ComputeEngine.start(instance.project || gcpProject, gcpZoneRef(instance), gcpInstanceRef(instance)) : EC2.start(instance.instance_id), [gcpProject, isGcp]);
  const computeStop = useCallback((instance) => isGcp ? ComputeEngine.stop(instance.project || gcpProject, gcpZoneRef(instance), gcpInstanceRef(instance)) : EC2.stop(instance.instance_id), [gcpProject, isGcp]);
  const computeReset = useCallback((instance) => isGcp ? ComputeEngine.reset(instance.project || gcpProject, gcpZoneRef(instance), gcpInstanceRef(instance)) : EC2.reboot(instance.instance_id), [gcpProject, isGcp]);
  const computeDelete = useCallback((instance) => isGcp ? ComputeEngine.delete(instance.project || gcpProject, gcpZoneRef(instance), gcpInstanceRef(instance)) : EC2.terminate(instance.instance_id), [gcpProject, isGcp]);

  const load = useCallback(async () => {
    try { await loadInstances(); }
    catch(e) { notify(e.message, 'error'); }

  const loadRuntime = useCallback(async () => {
    try {
      const d = await EC2.runtime();
      setLxdRuntime(d);
      return d;
    } catch (e) {
      setLxdRuntime({available:false, status:'error', message:e.message, instructions:{label:runtimeFamilyLabel}});
      return null;
    }
  }, [notify, runtimeFamilyLabel]);

  const runAction = async (action) => {
    try {
      await action();
      await load();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  useEffect(() => {
    load();
  }, [load, connectedSpace?.spaceId, providerContext]);
  useEffect(() => {
    loadRuntime();
    const timer = setInterval(loadRuntime, 5000);
    return () => clearInterval(timer);
  }, [loadRuntime]);
  useEffect(() => {
    const closeMenu = () => setOpenMenu(null);
    document.addEventListener('click', closeMenu);
    return () => document.removeEventListener('click', closeMenu);
  }, []);

  const filteredInstances = instances.filter(i => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    const fields = isGcp ? [
      i.name,
      i.id,
      i.status,
      i.machineType,
      i.zone,
      i.private_ip,
      i.public_ip,
      i.labels && Object.values(i.labels).join(' '),
      i.description,
    ] : [
      i.name,
      i.instance_id,
      i.instance_type,
      i.state,
      i.ami_name || i.ami,
      i.private_ip,
      i.public_ip,
      i.vpc_id,
      i.subnet_id,
      ...(i.security_group_ids || [])
    ];
    return fields.filter(Boolean).some(v => String(v).toLowerCase().includes(q));
  });

  const instanceKey = (instance) => isGcp ? gcpInstanceRef(instance) : instance.instance_id;
  const selectedInstances = instances.filter(i => selectedIds.includes(instanceKey(i)));
  const selectedSingle = selectedInstances.length === 1 ? selectedInstances[0] : null;
  const focusedInstance = instances.find(i => instanceKey(i) === focusedInstanceId) || null;
  const runningInstances = instances.filter(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'running');
  const consoleTarget = selectedSingle || focusedInstance || (runningInstances.length === 1 ? runningInstances[0] : null);
  const consoleTargetState = consoleTarget ? (isGcp ? gcpStatusToUiState(consoleTarget.status || consoleTarget.state) : consoleTarget.state) : '';
  const runningCount = instances.filter(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'running').length;
  const stoppedCount = instances.filter(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'stopped').length;
  const selectedCount = selectedInstances.length;
  const filteredIds = filteredInstances.map(i => instanceKey(i));
  const allFilteredSelected = filteredInstances.length > 0 && filteredInstances.every(i => selectedIds.includes(instanceKey(i)));
  const someFilteredSelected = filteredInstances.some(i => selectedIds.includes(instanceKey(i))) && !allFilteredSelected;
  const selectedRunning = selectedInstances.length > 0 && selectedInstances.every(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'running');
  const selectedStopped = selectedInstances.length > 0 && selectedInstances.every(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'stopped');
  const anySelectedRunning = selectedInstances.some(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'running');
  const anySelectedStopped = selectedInstances.some(i => (isGcp ? gcpStatusToUiState(i.status || i.state) : i.state) === 'stopped');
  const lxdReady = !!(lxdRuntime?.available || Object.values(lxdRuntime?.backends || {}).some(b => b?.available && b?.status === 'ready'));

      notify(isGcp ? 'Compute Engine consoles require a supported Multipass or LXD-backed instance.' : 'EC2 consoles require a supported Multipass or LXD-backed instance.', 'error');

    });

  ] : [];

  const bootstrapRuntime = async () => {
    setLxdBusy(true);
    try {
      const d = await EC2.bootstrapRuntime();
      setLxdRuntime(d);
      if (lxdQueueTimerRef.current) {
        clearTimeout(lxdQueueTimerRef.current);
        lxdQueueTimerRef.current = null;
      }
      if (d.status === 'ready') {
        setLxdInstalling(false);
        notify(`${runtimeFamilyLabel} runtime is ready.`, 'success');
        return;
      }
      setLxdInstalling(true);
      notify(d.message || 'Multipass and LXD runtime checks started in the background.', 'info');
      lxdQueueTimerRef.current = setTimeout(async () => {
        try {
          const current = await EC2.runtime();
          setLxdRuntime(current);
          if (current?.available && current?.status === 'ready') {
            setLxdInstalling(false);
            notify(`${runtimeFamilyLabel} runtime is ready.`, 'success');
            return;
          }
          setLxdRuntime(prev => prev ? ({
            ...prev,
            available: false,
            status: 'manual',
            message: current?.message || `${runtimeFamilyLabel} runtime status checks are queued in the background. EC2 will remain blocked until a runtime is ready.`,
            instructions: {
              label: 'Runtime status queued',
              message: `CloudLearn keeps running while ${runtimeFamilyLabel} is unavailable.`,
              helper: 'background'
            }
          }) : prev);
          setLxdInstalling(false);
          notify(`${runtimeFamilyLabel} runtime status checks are queued in the background. EC2 will remain blocked until a runtime is ready.`, 'info');
        } catch (e) {
          setLxdInstalling(false);
          notify(e.message || `${runtimeFamilyLabel} runtime status checks are queued in the background.`, 'info');
        }
      }, 2500);
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLxdBusy(false);
    }

                </div>

          </div>
          )}
        </div>
        {!showApiDocs && (
          <button className="ec2-doc-toggle" onClick={() => { setShowApiDocs(true); setDetailsTab('api'); setGcpDetailsCollapsed(false); }}>

                <div className="ec2-doc-drawer-title">Compute Engine API Reference</div>

                <h3>Contents</h3>
                <div className="ec2-docs-links">
                  {ec2QueryContents.map(item => (

                  ))}
                </div>
              </div>
              <div className="ec2-docs-section" id="ec2-docs-request-syntax" style={{borderTop:'none',paddingTop:0,marginTop:16}}>
                <h3>REST resource</h3>
                <div className="ec2-docs-note">
                  Use the Compute Engine REST resource path with project and zone parameters. Postman can send JSON bodies or path parameters directly.
                </div>
                <div className="ec2-docs-request">
                  <div className="ec2-docs-block">
                    <div className="ec2-docs-block-title">Endpoint</div>

                  </div>
                  <div className="ec2-docs-block">
                    <div className="ec2-docs-block-title">Sample request</div>

                      <th>Description</th>
                      <th>Type</th>
                    </tr>

                  </div>
                </div>
              </div>
            </div>
          </aside>

        {showLaunch && <LaunchInstanceModal notify={notify} providerContext={providerKey} onClose={()=>setShowLaunch(false)} onDone={()=>{setShowLaunch(false); load();}} />}

          <div className="ec2-subtitle">
            {isGcp
              ? 'Create, manage, and connect Compute Engine VM instances with Google Cloud style controls.'
              : 'Monitor and manage your instances.'}
          </div>
          <div className="ec2-subtitle" style={{marginTop:6}}>
            {connectedSpace?.spaceId
              ? <>Connected space: <strong>{connectedSpace.spaceName || connectedSpace.spaceId}</strong> <span className="small-col">({connectedSpace.provider || providerKey})</span></>
              : 'Select a space to load its instances and service state.'}
          </div>
        </div>
        <div className="btn-grp">
          <button className="btn btn-s" onClick={load}>↻ Refresh</button>
          <button className="btn btn-p" onClick={()=>setShowLaunch(true)} disabled={!lxdReady} title={!lxdReady ? `A ${runtimeFamilyLabel} runtime must be ready before launching ${isGcp ? 'Compute Engine' : 'EC2'} instances.` : ''}>{isGcp ? 'Create instance' : 'Launch instances'}</button>

            <button className="ec2-doc-drawer-close" onClick={() => setShowApiDocs(false)}>Close</button>
          </div>

            <div className="ec2-docs-contents" style={{marginTop:0}}>
              <h3>Contents</h3>
              <div className="ec2-docs-links">
                {ec2QueryContents.map(item => (
                  <a key={item.id} className="ec2-docs-link" href={`#${item.id}`}>{item.title}</a>
                ))}
              </div>
            </div>

            <div className="ec2-docs-section" id="ec2-docs-request-syntax" style={{borderTop:'none',paddingTop:0,marginTop:16}}>
              <h3>{isGcp ? 'REST resource' : 'Request syntax'}</h3>
              <div className="ec2-docs-note">
                {isGcp
                  ? 'Use the Compute Engine REST resource path with project and zone parameters. Postman can send JSON bodies or path parameters directly.'

              <div className="ec2-docs-request">
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">{isGcp ? 'Endpoint' : 'Endpoint'}</div>
                  <pre className="ec2-docs-code">{isGcp ? 'http://127.0.0.1:9000/compute/v1/projects/{project}/zones/{zone}/instances' : 'http://127.0.0.1:9000/api/ec2/aws'}</pre>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Sample request</div>
                  <pre className="ec2-docs-code">{isGcp ? '{\n  "name": "demo-instance",\n  "machineType": "projects/{project}/zones/{zone}/machineTypes/e2-micro",\n  "sourceImage": "projects/{project}/global/images/sim-ubuntu-22.04"\n}' : 'Action=DescribeInstances\nVersion=2016-11-15'}</pre>
                </div>
              </div>
            </div>

            <div className="ec2-docs-section" id="ec2-docs-query-parameters">
              <h3>{isGcp ? 'Request fields' : 'Query parameters'}</h3>
              <table className="ec2-docs-param-table">
                <thead>
                  <tr>
                    <th>{isGcp ? 'Field' : 'Parameter'}</th>
                    <th>Description</th>
                    <th>Type</th>
                  </tr>
                </thead>
                <tbody>
                  {isGcp ? (
                    <>
                      <tr><td><span className="ec2-mono">project</span></td><td>Google Cloud project that owns the VM instance.</td><td>String</td></tr>

                      <tr><td><span className="ec2-mono">machineType</span></td><td>Machine type resource path for the VM instance.</td><td>String</td></tr>
                      <tr><td><span className="ec2-mono">sourceImage</span></td><td>Boot image used to start the instance.</td><td>String</td></tr>
                      <tr><td><span className="ec2-mono">networkInterfaces</span></td><td>Network interface configuration for the instance.</td><td>Array</td></tr>

                  ) : (
                    <>
                      <tr><td><span className="ec2-mono">Action</span></td><td>The EC2 operation to execute.</td><td>String</td></tr>
                      <tr><td><span className="ec2-mono">Version</span></td><td>The EC2 API version. The simulator accepts <span className="ec2-mono">2016-11-15</span>.</td><td>String</td></tr>

                      <tr><td><span className="ec2-mono">Filter.N</span></td><td>Filter values using the AWS Query list notation.</td><td>Array</td></tr>
                      <tr><td><span className="ec2-mono">InstanceId.N</span></td><td>Targets one or more EC2 instances for lifecycle actions and describes.</td><td>Array</td></tr>
                      <tr><td><span className="ec2-mono">ImageId</span></td><td>Selects the AMI for <span className="ec2-mono">RunInstances</span>.</td><td>String</td></tr>

                : renderXmlSnippet('<DescribeInstancesResponse xmlns="http://ec2.amazonaws.com/doc/2016-11-15/">\n  <requestId>...</requestId>\n  <reservationSet>\n    <item>...</item>\n  </reservationSet>\n</DescribeInstancesResponse>')}

              <select className="ec2-doc-select" value={docAction} onChange={e => setDocAction(e.target.value)}>
                {ec2QueryActions.map(item => <option key={item.action} value={item.action}>{item.action}</option>)}
              </select>
              <div className="ec2-doc-pill-row">
                {ec2QueryActions.map(item => (
                  <button
                    key={item.action}
                    className={`ec2-doc-pill ${selectedDocAction.action === item.action ? 'active' : ''}`}

              <div className="ec2-doc-summary">{selectedDocAction.summary}</div>
              <div className="ec2-docs-request">

                  <pre className="ec2-docs-code">{selectedDocAction.request}</pre>
                  <div className="fh" style={{marginTop:8}}>{isGcp ? 'JSON body:' : 'POST body:'} <span className="ec2-mono">{selectedDocAction.syntax}</span></div>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Response</div>
                  {isGcp ? <pre className="ec2-docs-code ec2-json">{selectedDocAction.response}</pre> : renderXmlSnippet(selectedDocAction.response)}
                  <div className="fh" style={{marginTop:8}}>{isGcp ? 'Response root:' : 'Response root:'} <span className="ec2-mono">{selectedDocAction.responseRoot}</span></div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      )}
      <div className="ec2-toolbar">
        <button className="btn btn-s" onClick={openConsole} disabled={!consoleTarget || consoleTarget.state !== 'running'}>Connect</button>
        <div className="ec2-menu">
          <button className="btn btn-s" onClick={(e)=>{e.stopPropagation(); setOpenMenu(openMenu === 'state' ? null : 'state');}} disabled={!selectedInstances.length}>Instance state ▾</button>
          {openMenu === 'state' && (
            <div className="ec2-menu-panel" onClick={e=>e.stopPropagation()}>
              <button className="ec2-menu-item" disabled={!selectedInstances.length || !anySelectedStopped} onClick={()=>actOnSelected(computeStart, i => i.state === 'stopped', 'Select a stopped instance first.')}>
                <strong>Start instance</strong>
                <span>Transition selected stopped instances to running.</span>
              </button>
              <button className="ec2-menu-item" disabled={!selectedInstances.length || !anySelectedRunning} onClick={()=>actOnSelected(computeStop, i => i.state === 'running', 'Select a running instance first.')}>
                <strong>Stop instance</strong>
                <span>Safely stop selected running instances.</span>
              </button>
              <button className="ec2-menu-item" disabled={!selectedInstances.length || !anySelectedRunning} onClick={()=>actOnSelected(computeReset, i => i.state === 'running', 'Select a running instance first.')}>
                <strong>Reboot instance</strong>
                <span>Restart selected running instances.</span>
              </button>
              <button className="ec2-menu-item red" disabled={!selectedInstances.length} onClick={()=>actOnSelected(computeDelete)}>
                <strong>Terminate instance</strong>
                <span>Permanently delete selected instances.</span>
              </button>
            </div>
          )}
        </div>
        <div className="ec2-menu">
          <button className="btn btn-s" onClick={(e)=>{e.stopPropagation(); setOpenMenu(openMenu === 'actions' ? null : 'actions');}} disabled={!selectedInstances.length}>Actions ▾</button>
          {openMenu === 'actions' && (
            <div className="ec2-menu-panel" onClick={e=>e.stopPropagation()}>
              <button className="ec2-menu-item" disabled={!consoleTarget || consoleTarget.state !== 'running'} onClick={()=>{setOpenMenu(null); openConsole();}}>
                <strong>Open console</strong>
                <span>Open the sandbox console for the selected running instance.</span>
              </button>
              <button className="ec2-menu-item" onClick={()=>{setOpenMenu(null); load();}}>
                <strong>Refresh</strong>
                <span>Reload instance data from the simulator.</span>
              </button>
            </div>
          )}
        </div>
        <input
          className="ec2-search"
          placeholder="Filter instances"
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
        <div className="ec2-count">{selectedCount ? `${selectedCount} selected` : `${runningCount} running · ${stoppedCount} stopped`}</div>
      </div>
      <div className="ec2-table-wrap" style={{padding:'0 0 16px'}}>
        <table className="tbl">
          <thead>
            <tr>
              <th><input type="checkbox" checked={allFilteredSelected} ref={el => { if (el) el.indeterminate = someFilteredSelected; }} onChange={e=>selectAllFiltered(e.target.checked)} /></th>

              <th>Instance ID</th>
              <th>Instance state</th>
              <th>Instance type</th>
              <th>Status check</th>
              <th>Alarm status</th>
              <th>Availability Zone</th>
              <th>Public IPv4 address</th>
              <th>Private IPv4 address</th>
              <th>VPC ID</th>
              <th>Security groups</th>
              <th>Key pair name</th>
              <th>Launch time</th>
            </tr>

            {filteredInstances.map(i => {

              const checkboxId = `ec2-${i.instance_id}`;
              const state = i.state || 'stopped';
              return (
                <tr key={i.instance_id} className={selected ? 'ec2-row-selected' : ''}>
                  <td>
                    <input
                      id={checkboxId}
                      type="checkbox"
                      checked={selected}
                      onChange={() => toggleSelected(i.instance_id)}
                    />
                  </td>
                  <td>
                    <div className="ec2-copyable" title={i.name || ''}>
                      <button className="btn-lnk" onClick={()=>{setSelectedIds([i.instance_id]); setFocusedInstanceId(i.instance_id);}}>{i.name}</button>
                      <button className="ec2-copyable-btn" aria-label="Copy instance name" title="Copy instance name" onClick={(e)=>copyField(i.name, 'Instance name', e)}>

                            <rect x="5" y="3" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.2" />
                            <rect x="3" y="1" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.2" />

                            <rect x="5" y="3" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.2" />
                            <rect x="3" y="1" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.2" />
                          </svg>
                        </span>
                      </button>
                    </div>
                  </td>
                  <td><span className="arn">{i.instance_id}</span></td>
                  <td><span className={`ec2-chip ${stateChipClass(state)}`}>{state}</span></td>
                  <td>{i.instance_type}</td>
                  <td>{statusCheckLabel(i)}</td>
                  <td>{alarmStatusLabel(i)}</td>
                  <td>{i.az}</td>
                  <td>{i.public_ip || '—'}</td>
                  <td>{i.private_ip || '—'}</td>
                  <td>{i.vpc_id || '—'}</td>
                  <td>{(i.security_group_ids || []).join(', ') || '—'}</td>
                  <td>{i.key_pair || '—'}</td>
                  <td>{fmtDate(i.created)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filteredInstances.length === 0 && (
          <div className="ec2-empty-overlay" aria-live="polite">
            <div className="ec2-empty-card">
              <div className="ec2-empty-title">No instances yet</div>
              <div className="ec2-empty-sub">Launch an EC2 instance to populate this grid.</div>
            </div>
          </div>
        )}
      </div>
      {filteredInstances.length > 0 && (
      <div className="ec2-details">
        <div className="ec2-details-head">
          <div>
            <div className="ec2-details-title">
              {selectedSingle ? selectedSingle.name : 'Instance details'}
            </div>
            <div className="ec2-details-sub">
              {selectedSingle
                ? `${selectedSingle.instance_id} · ${selectedSingle.ami_name || selectedSingle.ami} · ${runtimeLabel(selectedSingle)}`
                : 'Select an instance to view details and actions.'}
            </div>
          </div>
          <div className="ec2-details-actions">
            <button className="btn btn-s" onClick={openConsole} disabled={!consoleTarget || consoleTarget.state !== 'running'}>Connect</button>
          </div>
        </div>
        {selectedSingle ? (
          <>
            <div className="tabs ec2-subtabs">
              {tabOrder.map(tab => (
                <div key={tab} className={`tab ${detailsTab===tab ? 'active' : ''}`} onClick={()=>setDetailsTab(tab)}>{tabLabel(tab)}</div>
              ))}
            </div>
            <div className="ec2-details-body">
              {detailsTab === 'details' && (
                <div className="ec2-kv-grid">
                  {[
                    ['Instance ID', selectedSingle.instance_id],
                    ['Instance state', selectedSingle.state],
                    ['Instance type', selectedSingle.instance_type],
                    ['AMI', selectedSingle.ami_name || selectedSingle.ami],
                    ['Availability Zone', selectedSingle.az],
                    ['Launch time', fmtDate(selectedSingle.created)],
                    ['Key pair name', selectedSingle.key_pair || '—'],
                    ['Runtime backend', runtimeLabel(selectedSingle)],
                    ['Image download', selectedSingle.container_download_state || 'pending'],
                  ].map(([k, v]) => (
                    <dl className="ec2-kv" key={k}><dt>{k}</dt><dd>{String(v)}</dd></dl>
                  ))}
                  <dl className="ec2-kv"><dt>Endpoint</dt><dd className="ec2-mono">{selectedSingle.endpoint_url || '—'}</dd></dl>
                </div>
              )}
              {detailsTab === 'status checks' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>System status check</dt><dd>{selectedSingle.state === 'running' ? '2/2 checks passed' : 'Not available'}</dd></dl>
                  <dl className="ec2-kv"><dt>Instance status check</dt><dd>{selectedSingle.state === 'running' ? '2/2 checks passed' : 'Not available'}</dd></dl>
                  <dl className="ec2-kv"><dt>Alarm status</dt><dd>{alarmStatusLabel(selectedSingle)}</dd></dl>
                  <dl className="ec2-kv"><dt>Instance state</dt><dd><span className={`ec2-chip ${stateChipClass(selectedSingle.state)}`}>{selectedSingle.state}</span></dd></dl>
                </div>
              )}
              {detailsTab === 'monitoring' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>Detailed monitoring</dt><dd>Disabled</dd></dl>
                  <dl className="ec2-kv"><dt>CloudWatch alarms</dt><dd>No alarms</dd></dl>
                  <dl className="ec2-kv"><dt>CPU utilisation</dt><dd>—</dd></dl>
                  <dl className="ec2-kv"><dt>Network packets</dt><dd>—</dd></dl>
                </div>
              )}
              {detailsTab === 'tags' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>Name</dt><dd>{selectedSingle.name}</dd></dl>
                  <dl className="ec2-kv"><dt>Runtime backend</dt><dd>{runtimeLabel(selectedSingle)}</dd></dl>
                  <dl className="ec2-kv"><dt>Image download</dt><dd>{selectedSingle.container_download_state || 'pending'}</dd></dl>
                  <dl className="ec2-kv"><dt>Pack</dt><dd>{selectedSingle.pack_id || 'cloudlearn.ec2.basic'}</dd></dl>
                </div>
              )}
              {detailsTab === 'networking' && (
                <div className="ec2-kv-grid">
                  {[
                    ['Public IPv4 address', selectedSingle.public_ip || '—'],
                    ['Private IPv4 address', selectedSingle.private_ip || '—'],
                    ['VPC ID', selectedSingle.vpc_id || '—'],
                    ['Subnet ID', selectedSingle.subnet_id || '—'],
                    ['Security groups', (selectedSingle.security_group_ids || []).join(', ') || '—'],
                    ['Endpoint', selectedSingle.endpoint_url || '—'],
                  ].map(([k, v]) => (
                    <dl className="ec2-kv" key={k}><dt>{k}</dt><dd>{String(v)}</dd></dl>
                  ))}
                </div>
              )}
              {detailsTab === 'security' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>Key pair name</dt><dd>{selectedSingle.key_pair || '—'}</dd></dl>
                  <dl className="ec2-kv"><dt>Security groups</dt><dd>{(selectedSingle.security_group_ids || []).join(', ') || '—'}</dd></dl>
                  <dl className="ec2-kv"><dt>IAM role</dt><dd>—</dd></dl>
                  <dl className="ec2-kv"><dt>Console access</dt><dd>{selectedSingle.state === 'running' ? 'Available' : 'Unavailable'}</dd></dl>
                </div>
              )}
              {detailsTab === 'storage' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>Storage</dt><dd>{selectedSingle.storage_gb || 8} GB</dd></dl>
                  <dl className="ec2-kv"><dt>Workspace</dt><dd className="ec2-mono">{selectedSingle.workspace || '—'}</dd></dl>
                  <dl className="ec2-kv"><dt>Deployment path</dt><dd className="ec2-mono">{selectedSingle.deployment_path || '—'}</dd></dl>
                </div>
              )}
              {detailsTab === 'console' && (
                <div className="ec2-kv-grid">
                  <dl className="ec2-kv"><dt>Console backend</dt><dd>{consoleLabel(selectedSingle)}</dd></dl>
                  <dl className="ec2-kv"><dt>Console state</dt><dd>{selectedSingle.console_state?.cwd ? 'connected workspace' : selectedSingle.state}</dd></dl>
                  <dl className="ec2-kv"><dt>Recent commands</dt><dd>{(selectedSingle.console_log || []).slice(-3).map(item => item.command).join(' | ') || 'No console history yet'}</dd></dl>
                </div>
              )}
            </div>
          </>
        ) : (
          <div className="ec2-details-body">
            <div className="empty" style={{padding:'40px 20px'}}>
              <div className="empty-t">Select an instance to view details</div>
              <div className="empty-d">The instance details panel appears here after you choose a row in the table.</div>
            </div>
          </div>
        )}
      </div>
      )}
      {showLaunch && <LaunchInstanceModal notify={notify} providerContext={providerKey} onClose={()=>setShowLaunch(false)} onDone={()=>{setShowLaunch(false); load();}} />}
      {consoleInstance && <EC2ConsoleModal instance={consoleInstance} notify={notify} providerContext={providerKey} onClose={()=>setConsoleInstance(null)} />}
    </div>
  );
}

function VPCView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'vpc', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'VPC networks' : 'Your VPCs';
  const pageSub = providerKey === 'gcp'
    ? 'View and manage your VPC networks, their subnets, route tables, security groups, and connected services.'
    : 'View and manage your virtual private clouds, their subnets, route tables, security groups, and connected services.';
  const [data, setData] = useState({vpcs:[], subnets:[], security_groups:[], route_tables:[], internet_gateways:[], instances:[]});
  const [loading, setLoading] = useState(true);
  const [selectedVpcId, setSelectedVpcId] = useState('');
  const [pageTab, setPageTab] = useState('vpcs');
  const [detailTab, setDetailTab] = useState('details');
  const [query, setQuery] = useState('');
  const [updatedAt, setUpdatedAt] = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteVpcTarget, setDeleteVpcTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [showVpcLaunch, setShowVpcLaunch] = useState(false);
  const [vpcResourceForm, setVpcResourceForm] = useState({
    subnet_name: 'public-subnet-a',
    subnet_cidr: '10.0.1.0/24',
    subnet_az: AZS[0],
    sg_name: 'sg-web',
    sg_desc: 'Web access group',
    rt_name: 'rt-public',
    igw_name: 'igw-main',
    assoc_rt_id: '',
    assoc_subnet_id: '',
  });

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [vpcs, subnets, securityGroups, routeTables, internetGateways, instances] = await Promise.all([
        VPC.listVpcs().catch(() => ({vpcs: []})),
        api('GET', '/api/vpc/subnets').catch(() => ({subnets: []})),
        api('GET', '/api/vpc/security-groups').catch(() => ({security_groups: []})),
        api('GET', '/api/vpc/route-tables').catch(() => ({route_tables: []})),
        VPC.listInternetGateways().catch(() => ({internet_gateways: []})),
        EC2.list().catch(() => ({instances: []})),
      ]);
      setData({
        vpcs: vpcs.vpcs || [],
        subnets: subnets.subnets || [],
        security_groups: securityGroups.security_groups || [],
        route_tables: routeTables.route_tables || [],
        internet_gateways: internetGateways.internet_gateways || [],
        instances: instances.instances || [],
      });
      setUpdatedAt(new Date().toISOString());
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (selectedVpcId && !data.vpcs.some(v => v.vpc_id === selectedVpcId)) {
      setSelectedVpcId('');
      setDetailTab('details');
    }
  }, [data.vpcs, selectedVpcId]);

  useEffect(() => {
    if (pageTab !== 'vpcs') setActionsOpen(false);
  }, [pageTab]);

  const filteredVpcs = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return data.vpcs;
    return data.vpcs.filter(vpc => {
      const hay = [
        vpc.name,
        vpc.vpc_id,
        vpc.cidr_block,
        vpc.state,
        (vpc.availability_zones || []).join(' '),
      ].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }, [data.vpcs, query]);

  const selectedVpc = data.vpcs.find(v => v.vpc_id === selectedVpcId) || null;
  const selectedSubnets = data.subnets.filter(s => s.vpc_id === selectedVpcId);
  const selectedRouteTables = data.route_tables.filter(r => r.vpc_id === selectedVpcId);
  const selectedSecurityGroups = data.security_groups.filter(sg => sg.vpc_id === selectedVpcId);
  const selectedIgws = data.internet_gateways.filter(igw => igw.attached_vpc_id === selectedVpcId);
  const selectedInstances = data.instances.filter(inst => inst.vpc_id === selectedVpcId);
  const mainRouteTable = selectedRouteTables.find(r => r.is_main) || selectedRouteTables[0] || null;
  const defaultSecurityGroup = selectedSecurityGroups.find(sg => sg.is_default) || selectedSecurityGroups[0] || null;
  const attachedIgw = selectedIgws[0] || null;
  const totalVpcs = data.vpcs.length;
  const visibleVpcs = filteredVpcs.length;
  const detailTabs = ['details', 'resource map', 'cidrs', 'flow logs', 'tags', 'integrations'];

  const openCreateVpc = () => {
    setActionsOpen(false);
    setShowCreate(true);
  };
  const openVpcLaunch = () => {
    setActionsOpen(false);
    setShowVpcLaunch(true);
  };
  const openDeleteVpc = () => {
    if (!selectedVpc) return;
    setActionsOpen(false);
    setDeleteVpcTarget(selectedVpc);
  };
  const handleCreateDone = (created) => {
    setShowCreate(false);
    notify(`VPC "${created?.name || 'vpc'}" created`, 'success');
    if (created?.vpc_id) {
      setSelectedVpcId(created.vpc_id);
      setDetailTab('details');
      setPageTab('vpcs');
    }
    load();
  };
  const handleSelectVpc = (vpcId) => {
    setActionsOpen(false);
    setSelectedVpcId(vpcId);
    setDetailTab('details');
    setPageTab('vpcs');
  };
  const closeActions = () => setActionsOpen(false);
  const doDeleteVpc = async () => {
    if (!deleteVpcTarget) return;
    setDeleteBusy(true);
    try {
      await VPC.deleteVpc(deleteVpcTarget.vpc_id, true);
      notify(`VPC "${deleteVpcTarget.name}" deleted`, 'success');
      setDeleteVpcTarget(null);
      setSelectedVpcId('');
      setDetailTab('details');
      load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };
  const createSubnet = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createSubnet({
      vpc_id: selectedVpc.vpc_id,
      name: vpcResourceForm.subnet_name,
      cidr_block: vpcResourceForm.subnet_cidr,
      availability_zone: vpcResourceForm.subnet_az,
    });
    notify('Subnet mapped to VPC', 'success');
    load();
  };
  const createSecurityGroup = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createSecurityGroup({
      vpc_id: selectedVpc.vpc_id,
      group_name: vpcResourceForm.sg_name,
      description: vpcResourceForm.sg_desc,
    });
    notify('Security group mapped to VPC', 'success');
    load();
  };
  const createRouteTable = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createRouteTable({
      vpc_id: selectedVpc.vpc_id,
      name: vpcResourceForm.rt_name,
    });
    notify('Route table mapped to VPC', 'success');
    load();
  };
  const createIgw = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    const igw = await VPC.createInternetGateway({
      name: vpcResourceForm.igw_name,
    });
    await VPC.attachInternetGateway(igw.internet_gateway_id, {vpc_id: selectedVpc.vpc_id});
    notify('Internet gateway attached to VPC', 'success');
    load();
  };
  const associateSubnet = async () => {
    if (!vpcResourceForm.assoc_rt_id || !vpcResourceForm.assoc_subnet_id) return notify('Select a route table and subnet', 'error');
    await VPC.associateSubnet(vpcResourceForm.assoc_rt_id, {subnet_id: vpcResourceForm.assoc_subnet_id});
    notify('Subnet associated to route table', 'success');
    load();
  };

  if (showCreate) {
    return (
      <>
        <VPCApiDocsPanel />
        <CreateVpcView
          onBack={() => setShowCreate(false)}
          onDone={handleCreateDone}
        />
      </>
    );
  }

  const renderDetails = () => {
    if (!selectedVpc) {
      return <div className="vpc-detail-empty">Select a VPC from the grid to view details.</div>;
    }

    if (detailTab === 'resource map') {
      return (
        <>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Resource map</div>
            <div className="vpc-map">
              <div className="vpc-map-card"><h4>VPC</h4><p>{selectedVpc.name} · {selectedVpc.cidr_block}</p></div>
              <div className="vpc-map-card"><h4>Subnets</h4><p>{selectedSubnets.length ? `${selectedSubnets.length} subnet${selectedSubnets.length === 1 ? '' : 's'} across ${selectedVpc.availability_zones?.length || 0} AZs` : 'No subnets yet.'}</p></div>
              <div className="vpc-map-card"><h4>Route tables</h4><p>{selectedRouteTables.length ? `${selectedRouteTables.length} route table${selectedRouteTables.length === 1 ? '' : 's'}` : 'No route tables yet.'}</p></div>
              <div className="vpc-map-card"><h4>Internet gateway</h4><p>{attachedIgw ? `${attachedIgw.name} attached` : 'Not attached yet'}</p></div>
              <div className="vpc-map-card"><h4>Security groups</h4><p>{selectedSecurityGroups.length ? `${selectedSecurityGroups.length} security group${selectedSecurityGroups.length === 1 ? '' : 's'}` : 'No security groups yet.'}</p></div>
              <div className="vpc-map-card"><h4>{providerKey === 'gcp' ? 'Compute Engine instances' : 'EC2 instances'}</h4><p>{selectedInstances.length ? `${selectedInstances.length} instance${selectedInstances.length === 1 ? '' : 's'} connected` : (providerKey === 'gcp' ? 'No Compute Engine instances connected yet.' : 'No EC2 instances connected yet.')}</p></div>
            </div>
          </div>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Connected services</div>
            {selectedInstances.length ? (
              <table className="vpc-simple-table">
                <thead><tr><th>Name</th><th>Instance ID</th><th>Subnet</th><th>State</th></tr></thead>
                <tbody>
                  {selectedInstances.map(inst => {
                    const subnet = data.subnets.find(sn => sn.subnet_id === inst.subnet_id);
                    return (
                      <tr key={inst.instance_id}>
                        <td title={inst.name}>{inst.name}</td>
                        <td><span className="ec2-mono">{inst.instance_id}</span></td>
                        <td title={subnet ? subnet.name : (inst.subnet_id || '—')}>{subnet ? subnet.name : (inst.subnet_id || '—')}</td>
                        <td><span className={`tag ${inst.state === 'running' ? 'tg' : inst.state === 'stopped' ? 'ty' : 'tgr'}`}>{inst.state}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            ) : <div className="vpc-empty-table">Launch an EC2 instance in a subnet to see it connected here.</div>}
          </div>
        </>
      );
    }

    if (detailTab === 'cidrs') {
      return (
        <>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">CIDR blocks</div>
            <table className="vpc-cidr-table">
              <thead><tr><th>Type</th><th>CIDR block</th><th>Scope</th><th>Route table</th></tr></thead>
              <tbody>
                <tr>
                  <td>VPC</td>
                  <td className="ec2-mono">{selectedVpc.cidr_block}</td>
                  <td>Primary network</td>
                  <td>{mainRouteTable ? mainRouteTable.name : '—'}</td>
                </tr>
                {selectedSubnets.length ? selectedSubnets.map(sn => {
                  const rt = data.route_tables.find(r => r.route_table_id === sn.route_table_id);
                  return (
                    <tr key={sn.subnet_id}>
                      <td>Subnet</td>
                      <td className="ec2-mono">{sn.cidr_block}</td>
                      <td>{sn.availability_zone}</td>
                      <td>{rt ? rt.name : '—'}</td>
                    </tr>
                  );
                }) : (
                  <tr><td colSpan="4" style={{color:'#687078'}}>No subnets have been created in this VPC yet.</td></tr>
                )}
              </tbody>
            </table>
          </div>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Route targets</div>
            {selectedRouteTables.length ? (
              <table className="vpc-simple-table">
                <thead><tr><th>Route table</th><th>Route</th><th>Target</th></tr></thead>
                <tbody>
                  {selectedRouteTables.map(rt => (rt.routes || []).map((route, idx) => (
                    <tr key={`${rt.route_table_id}-${idx}`}>
                      <td>{rt.name}{rt.is_main ? ' (main)' : ''}</td>
                      <td className="ec2-mono">{route.destination}</td>
                      <td>{route.target_type}{route.target_id ? `:${route.target_id}` : ''}</td>
                    </tr>
                  )))}
                </tbody>
              </table>
            ) : <div className="vpc-empty-table">No route tables available for this VPC.</div>}
          </div>
        </>
      );
    }

    if (detailTab === 'flow logs') {
      return <div className="vpc-flow-card">No flow logs are configured for this VPC. Flow logs will appear here once you add a log destination and enable capture.</div>;
    }

    if (detailTab === 'tags') {
      const tags = selectedVpc.tags || [];
      return tags.length ? (
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Tags</div>
          <table className="vpc-simple-table">
            <thead><tr><th>Key</th><th>Value</th></tr></thead>
            <tbody>
              {tags.map((tag, idx) => (
                <tr key={`${tag.key || idx}`}>
                  <td>{tag.key}</td>
                  <td>{tag.value}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : <div className="vpc-flow-card">No tags are set on this VPC.</div>;
    }

    if (detailTab === 'integrations') {
      return (
        <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">{providerKey === 'gcp' ? 'Map Google Cloud resources to this VPC network' : 'Map AWS resources to this VPC'}</div>
          <div className="vpc-detail-note">{providerKey === 'gcp' ? 'In Google Cloud, resources are mapped to a VPC network by launching or creating them inside the network, subnet, or firewall rule scope. The simulator follows that same pattern here.' : 'In AWS, resources are mapped to a VPC by launching or creating them inside the VPC, subnet, or security group scope. The simulator follows that same pattern here.'}</div>
          <div className="btn-grp" style={{marginTop:10}}>
              <button className="btn btn-p" onClick={openVpcLaunch}>{providerKey === 'gcp' ? 'Launch Compute Engine instance in this VPC network' : 'Launch EC2 instance in this VPC'}</button>
            </div>
          </div>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Create subnet</div>
            <div className="vpc-kv-grid">
              <div className="fg"><label className="fl">Subnet name</label><input className="fi" value={vpcResourceForm.subnet_name} onChange={e => setVpcResourceForm(f => ({...f, subnet_name: e.target.value}))} /></div>
              <div className="fg"><label className="fl">CIDR block</label><input className="fi" value={vpcResourceForm.subnet_cidr} onChange={e => setVpcResourceForm(f => ({...f, subnet_cidr: e.target.value}))} /></div>
              <div className="fg"><label className="fl">Availability Zone</label><select className="fi" value={vpcResourceForm.subnet_az} onChange={e => setVpcResourceForm(f => ({...f, subnet_az: e.target.value}))}>{AZS.map(az => <option key={az} value={az}>{az}</option>)}</select></div>
            </div>
            <div className="btn-grp" style={{marginTop:10}}>
              <button className="btn btn-s" onClick={createSubnet} disabled={!selectedVpc}>Create subnet</button>
            </div>
          </div>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Create security group</div>
            <div className="vpc-kv-grid">
              <div className="fg"><label className="fl">Name</label><input className="fi" value={vpcResourceForm.sg_name} onChange={e => setVpcResourceForm(f => ({...f, sg_name: e.target.value}))} /></div>
              <div className="fg"><label className="fl">Description</label><input className="fi" value={vpcResourceForm.sg_desc} onChange={e => setVpcResourceForm(f => ({...f, sg_desc: e.target.value}))} /></div>
            </div>
            <div className="btn-grp" style={{marginTop:10}}>
              <button className="btn btn-s" onClick={createSecurityGroup} disabled={!selectedVpc}>Create security group</button>
            </div>
          </div>
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Create route table</div>
            <div className="vpc-kv-grid">
              <div className="fg"><label className="fl">Route table name</label><input className="fi" value={vpcResourceForm.rt_name} onChange={e => setVpcResourceForm(f => ({...f, rt_name: e.target.value}))} /></div>
            </div>
            <div className="btn-grp" style={{marginTop:10}}>

      </div>

          busy={deleteBusy}
        />
      )}

    </>
  );

function RDSApiDocsPanel() {

            <div className="ec2-docs-contents" style={{marginTop:0}}>
              <h3>Contents</h3>
              <div className="ec2-docs-links">
                {[
                  {id:'rds-doc-request-syntax', title:'Request syntax'},
                  {id:'rds-doc-query-parameters', title:'Request parameters'},
                  {id:'rds-doc-response-structures', title:'Response structures'},
                  {id:'rds-doc-examples', title:'Examples'},
                ].map(item => <a key={item.id} className="ec2-docs-link" href={`#${item.id}`}>{item.title}</a>)}
