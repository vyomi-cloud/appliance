                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Response</div>
                  <pre className="ec2-docs-code">{selected.response}</pre>
                </div>
              </div>
            </div>
          </div>
        </aside>
      )}
    </>
  );
}

function CreateDynamoDBView({onBack, onDone, notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const [form, setForm] = useState({
    table_name: 'my-table',
    partition_key_name: 'id',
    partition_key_type: 'S',
    sort_key_name: '',
    sort_key_type: 'S',
    billing_mode: 'PAY_PER_REQUEST',
  });
  const [tagRows, setTagRows] = useState([{key: 'Name', value: 'my-table'}]);
  const [gcpForm, setGcpForm] = useState({
    collection_name: 'books',
    document_id: 'book1',
    fields_json: '{\n  "title": "CloudLearn",\n  "published": true\n}',
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    setBusy(true);
    setErr('');
    try {
      if (isGcp) {
        let fields = {};
        try {
          fields = JSON.parse(gcpForm.fields_json || '{}');
        } catch (e) {
          throw new Error('Fields must be valid JSON');
        }
        const created = await DynamoDB.create({
          table_name: (gcpForm.collection_name || '').trim(),
          documentId: (gcpForm.document_id || '').trim(),
          item: fields,
        });
        onDone(created);
        return;
      }
      const tags = tagRows.map(t => ({key: (t.key || '').trim(), value: (t.value || '').trim()})).filter(t => t.key || t.value);
      const created = await DynamoDB.create({
        ...form,
        table_name: (form.table_name || '').trim(),
        partition_key_name: (form.partition_key_name || '').trim(),
        sort_key_name: (form.sort_key_name || '').trim(),
        tags: tags.reduce((acc, row) => (row.key ? {...acc, [row.key]: row.value} : acc), {}),
      });
      onDone(created);
    } catch (e) {
      setErr(e.message);
      setBusy(false);
    }
  };

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>{providerBreadcrumbLabelForView(providerKey, 'dynamodb', DEFAULT_PROVIDER_CATALOG)}</span><span className="bc-sep">›</span><a onClick={onBack}>{isGcp ? 'Collections' : 'Tables'}</a><span className="bc-sep">›</span><span>{isGcp ? 'Create collection' : 'Create table'}</span>
        </div>
        <div className="vpc-page-title">{isGcp ? 'Create collection' : 'Create table'}</div>
        <div className="vpc-page-sub">{isGcp ? 'Create a Firestore collection and seed its first document with typed fields, matching the Firestore Studio flow.' : 'Create a table with a partition key and optional sort key, then use query and scan from the table details view.'}</div>
      </div>
      {isGcp ? (
        <div className="gcp-firestore-shell" style={{padding:'0', background:'transparent'}}>
          <div className="gcp-firestore-card">
            <div className="gcp-firestore-card-head">
              <div>
                <div className="gcp-firestore-card-title">Create collection</div>
                <div className="gcp-firestore-card-sub">Firestore Studio-style create flow with one seed document.</div>
              </div>
              <div className="gcp-firestore-chip">Firestore</div>
            </div>
            <div className="gcp-firestore-card-body">
              <div className="gcp-firestore-detail-grid" style={{marginBottom:12}}>
                <div className="fg">
                  <label className="fl">Collection ID</label>
                  <input className="fi" value={gcpForm.collection_name} onChange={e => setGcpForm(f => ({...f, collection_name: e.target.value}))} placeholder="books" />
                </div>
                <div className="fg">
                  <label className="fl">Document ID</label>
                  <input className="fi" value={gcpForm.document_id} onChange={e => setGcpForm(f => ({...f, document_id: e.target.value}))} placeholder="book1" />
                </div>
              </div>
              <div className="gcp-firestore-pathbar" style={{marginBottom:12}}>
                <span className="gcp-firestore-path-label">Path</span>
                <div className="ec2-mono" style={{color:'#174ea6'}}>
                  projects/{gcpProjectScope()}/databases/(default)/documents/{gcpForm.collection_name || 'collection'}
                </div>
              </div>
              <div className="vpc-detail-section-title" style={{marginBottom:8}}>Document fields</div>
              <div className="vpc-detail-note" style={{marginBottom:8}}>Use a JSON object here to seed the first Firestore document.</div>
              <textarea
                className="fi gcp-firestore-json ec2-mono"
                value={gcpForm.fields_json}
                onChange={e => setGcpForm(f => ({...f, fields_json: e.target.value}))}
              />
            </div>
            {err && <div className="ferr" style={{margin:'0 16px 12px'}}>{err}</div>}
            <div className="vpc-create-footer" style={{padding:'0 16px 16px'}}>
              <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
              <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create collection'}</button>
            </div>
          </div>
        </div>
      ) : (
        <div className="vpc-create-wrap">
          <div className="vpc-create-card">
            <div className="vpc-create-section">
              <div className="vpc-detail-section-title">Table settings</div>
              <div className="vpc-create-field">
                <label className="fl">Table name</label>
                <input className="fi" value={form.table_name} onChange={e => setForm(f => ({...f, table_name: e.target.value}))} placeholder="my-table" />
              </div>
              <div className="vpc-kv-grid" style={{marginTop:12}}>
                <div className="fg">
                  <label className="fl">Partition key name</label>
                  <input className="fi" value={form.partition_key_name} onChange={e => setForm(f => ({...f, partition_key_name: e.target.value}))} placeholder="id" />
                </div>
                <div className="fg">
                  <label className="fl">Partition key type</label>
                  <select className="fi" value={form.partition_key_type} onChange={e => setForm(f => ({...f, partition_key_type: e.target.value}))}>
                    <option value="S">String</option>
                    <option value="N">Number</option>
                    <option value="B">Binary</option>
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">Sort key name</label>
                  <input className="fi" value={form.sort_key_name} onChange={e => setForm(f => ({...f, sort_key_name: e.target.value}))} placeholder="created_at" />
                </div>
                <div className="fg">
                  <label className="fl">Sort key type</label>
                  <select className="fi" value={form.sort_key_type} onChange={e => setForm(f => ({...f, sort_key_type: e.target.value}))}>
                    <option value="S">String</option>
                    <option value="N">Number</option>
                    <option value="B">Binary</option>
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">Billing mode</label>
                  <select className="fi" value={form.billing_mode} onChange={e => setForm(f => ({...f, billing_mode: e.target.value}))}>
                    <option value="PAY_PER_REQUEST">On-demand</option>
                    <option value="PROVISIONED">Provisioned</option>
                  </select>
                </div>
              </div>
            </div>

            <div className="vpc-create-section">
              <div className="vpc-detail-section-title">Tags</div>
              {tagRows.map((row, idx) => (
                <div className="vpc-create-tag-row" key={idx}>
                  <input className="fi" placeholder="Key" value={row.key} onChange={e => setTagRows(rows => rows.map((r, i) => i === idx ? {...r, key: e.target.value} : r))} />
                  <input className="fi" placeholder="Value" value={row.value} onChange={e => setTagRows(rows => rows.map((r, i) => i === idx ? {...r, value: e.target.value} : r))} />
                  <button className="btn btn-s" type="button" onClick={() => setTagRows(rows => rows.filter((_, i) => i !== idx))}>Remove</button>
                </div>
              ))}
              <div className="btn-grp" style={{marginTop:12}}>
                <button className="btn btn-s" type="button" onClick={() => setTagRows(rows => [...rows, {key:'', value:''}])}>Add tag</button>
              </div>
            </div>

            {err && <div className="ferr" style={{marginTop:8}}>{err}</div>}

            <div className="vpc-create-footer">
              <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
              <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create table'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DynamoDBView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'dynamodb', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Collections' : 'Tables';
  const [tables, setTables] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('list');
  const [selectedTableName, setSelectedTableName] = useState('');
  const [selectedTable, setSelectedTable] = useState(null);
  const [detailTab, setDetailTab] = useState('items');
  const [search, setSearch] = useState('');
  const [actionsOpen, setActionsOpen] = useState(false);
  const [showApiDocs, setShowApiDocs] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [selectedItemKey, setSelectedItemKey] = useState('');
  const [queryResult, setQueryResult] = useState(null);
  const [gcpPathInput, setGcpPathInput] = useState('');
  const [gcpQueryForm, setGcpQueryForm] = useState({
    collection_id: '',
    field_name: '',
    field_value: '',
    limit: 20,
  });
  const [itemDraft, setItemDraft] = useState('{\n  "id": "item-1",\n  "name": "Example"\n}');
  const [queryForm, setQueryForm] = useState({
    partition_key_value: '',
    sort_key_equals: '',
    sort_key_begins_with: '',
    limit: 50,
    scan_limit: 50,
  });
  const [tagRows, setTagRows] = useState([{key: 'Name', value: 'my-table'}]);
  const actionsRef = useRef(null);

  const loadList = useCallback(async () => {
    setLoading(true);
    try {
      const d = await DynamoDB.list();
      const list = d.tables || [];
      setTables(list);
      setSelectedTableName(current => current && list.some(table => table.table_name === current) ? current : (list[0]?.table_name || ''));
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  const loadDetail = useCallback(async (tableName) => {
    if (!tableName) {
      setSelectedTable(null);
      return;
    }
    try {
      const d = await DynamoDB.get(tableName);
      setSelectedTable(d.table || null);
    } catch (e) {
      notify(e.message, 'error');
    }
  }, [notify]);

  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => {
    if (page === 'create') return;
    if (!selectedTableName) return;
    if (selectedTable && selectedTable.table_name === selectedTableName) return;
    loadDetail(selectedTableName);
  }, [selectedTableName, selectedTable, page, loadDetail]);
  useEffect(() => {
    if (!isGcp) return;
    setGcpPathInput(selectedTableName || '');
    setGcpQueryForm(f => ({...f, collection_id: selectedTableName || ''}));
  }, [isGcp, selectedTableName]);
  useEffect(() => {
    if (!selectedTable) return;
    const pk = selectedTable.partition_key_name || 'id';
    const sk = selectedTable.sort_key_name || '';
    setItemDraft(JSON.stringify(sk ? {[pk]: 'item-1', [sk]: '001', name: 'Example'} : {[pk]: 'item-1', name: 'Example'}, null, 2));
    setTagRows(Object.entries(selectedTable.tags || {}).map(([key, value]) => ({key, value})).length ? Object.entries(selectedTable.tags || {}).map(([key, value]) => ({key, value})) : [{key:'', value:''}]);
    setQueryForm(f => ({
      ...f,
      partition_key_value: '',
      sort_key_equals: '',
      sort_key_begins_with: '',
      limit: 50,
      scan_limit: 50,
    }));
    setSelectedItemKey('');
    setQueryResult(null);
  }, [selectedTable]);
  useEffect(() => {
    if (!actionsOpen) return;
    const onPointerDown = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', onPointerDown);
    return () => document.removeEventListener('pointerdown', onPointerDown);
  }, [actionsOpen]);

  const filteredTables = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return tables;
    return tables.filter(table => [table.table_name, table.table_status, table.partition_key_name, table.sort_key_name, table.billing_mode, table.table_arn].join(' ').toLowerCase().includes(q));
  }, [tables, search]);

  const selectedItems = queryResult ? (queryResult.items || []) : (selectedTable?.item_rows || []);
  const selectedSingle = isGcp
    ? (selectedItemKey === '__new__' ? null : (selectedItems.find(row => JSON.stringify(row.key || {}) === selectedItemKey) || selectedItems[0] || null))
    : (selectedItems.find(row => JSON.stringify(row.key || {}) === selectedItemKey) || selectedItems[0] || null);
  const totalTables = tables.length;
  const visibleTables = filteredTables.length;
  const selectedCount = selectedTable ? 1 : 0;

  const openCreate = () => {
    setShowApiDocs(false);
    setActionsOpen(false);
    setDeleteTarget(null);
    setSelectedTableName('');
    setSelectedTable(null);
    setDetailTab('items');
    setPage('create');
  };

  const handleCreateDone = async (created) => {
    setPage('list');
    notify(`Table "${created?.table_name || 'table'}" created`, 'success');
    if (created?.table?.table_name) {
      setSelectedTableName(created.table.table_name);
      setSelectedTable(created.table);
      setDetailTab('items');
    }
    await loadList();
  };

  const handleSelectTable = (tableName) => {
    setActionsOpen(false);
    setSelectedTableName(tableName);
    setDetailTab('items');
  };

  const doDelete = async () => {
    if (!deleteTarget) return;
    setDeleteBusy(true);
    try {
      await DynamoDB.remove(deleteTarget.table_name);
      notify(`Table "${deleteTarget.table_name}" deleted`, 'success');
      setDeleteTarget(null);
      setSelectedTableName('');
      setSelectedTable(null);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };

  const saveItem = async () => {
    if (!selectedTable) return notify('Select a table first', 'info');
    try {
      const parsed = JSON.parse(itemDraft || '{}');
      if (isGcp && selectedSingle?.key?.id) {
        await DynamoDB.updateItem(selectedTable.table_name, {documentId: selectedSingle.key.id, item: parsed});
      } else {
        await DynamoDB.putItem(selectedTable.table_name, {item: parsed});
      }
      notify('Item saved', 'success');
      await loadDetail(selectedTable.table_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const deleteItem = async (row) => {
    if (!selectedTable || !row) return;
    try {
      await DynamoDB.deleteItem(selectedTable.table_name, {key: row.key});
      notify('Item deleted', 'success');
      await loadDetail(selectedTable.table_name);
      await loadList();
      setSelectedItemKey('');
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const runQuery = async () => {
    if (!selectedTable) return notify('Select a table first', 'info');
    try {
      const d = await DynamoDB.query(selectedTable.table_name, {
        partition_key_value: queryForm.partition_key_value || '',
        sort_key_equals: queryForm.sort_key_equals || '',
        sort_key_begins_with: queryForm.sort_key_begins_with || '',
        limit: Number(queryForm.limit) || 50,
      });
      setQueryResult(d);
      notify(`Query returned ${d.count || 0} item(s)`, 'success');
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const runScan = async () => {
    if (!selectedTable) return notify('Select a table first', 'info');
    try {
      const d = await DynamoDB.scan(selectedTable.table_name, {limit: Number(queryForm.scan_limit) || 50});
      setQueryResult(d);
      notify(`Scan returned ${d.count || 0} item(s)`, 'success');
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const runGcpQuery = async () => {
    if (!selectedTable) return notify('Select a collection first', 'info');
    try {
      const d = await DynamoDB.query(gcpQueryForm.collection_id || selectedTable.table_name, {
        field_name: gcpQueryForm.field_name,
        field_value: gcpQueryForm.field_value,
        limit: Number(gcpQueryForm.limit) || 20,
      });
      setQueryResult(d);
      notify(`Query returned ${d.count || 0} document(s)`, 'success');
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const saveTags = async () => {
    if (!selectedTable) return;
    try {
      const tags = tagRows.reduce((acc, row) => {
        const key = (row.key || '').trim();
        const value = (row.value || '').trim();
        if (key) acc[key] = value;
        return acc;
      }, {});
      await DynamoDB.tag(selectedTable.table_name, {tags});
      notify('Tags updated', 'success');
      await loadDetail(selectedTable.table_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const renderOverview = () => {
    if (!selectedTable) {
      return <div className="vpc-detail-empty">Select a table from the grid to view details.</div>;
    }
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-kpi-grid">
            <div className="vpc-kpi"><strong>{selectedTable.item_count ?? 0}</strong><span>Items</span></div>
            <div className="vpc-kpi"><strong>{selectedTable.indexes?.length || 0}</strong><span>Indexes</span></div>
            <div className="vpc-kpi"><strong>{Object.keys(selectedTable.tags || {}).length}</strong><span>Tags</span></div>
            <div className="vpc-kpi"><strong>{selectedTable.billing_mode || 'PAY_PER_REQUEST'}</strong><span>Billing mode</span></div>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Table details</div>
          <div className="rds-detail-grid">
            <dl className="ec2-kv"><dt>Table name</dt><dd>{selectedTable.table_name}</dd></dl>
            <dl className="ec2-kv"><dt>Table ARN</dt><dd className="ec2-mono">{selectedTable.table_arn}</dd></dl>
            <dl className="ec2-kv"><dt>Table status</dt><dd>{selectedTable.table_status}</dd></dl>
            <dl className="ec2-kv"><dt>Partition key</dt><dd>{selectedTable.partition_key_name} ({selectedTable.partition_key_type})</dd></dl>
            <dl className="ec2-kv"><dt>Sort key</dt><dd>{selectedTable.sort_key_name ? `${selectedTable.sort_key_name} (${selectedTable.sort_key_type})` : '—'}</dd></dl>
            <dl className="ec2-kv"><dt>Created</dt><dd>{fmtDate(selectedTable.created)}</dd></dl>
          </div>
        </div>
      </>
    );
  };

  const renderItems = () => {
    if (!selectedTable) return <div className="vpc-detail-empty">Select a table from the grid to view items.</div>;
    const rows = queryResult?.items || selectedTable.item_rows || [];
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Query / Scan</div>
          <div className="vpc-kv-grid">
            <div className="fg">
              <label className="fl">Partition key value</label>
              <input className="fi" value={queryForm.partition_key_value} onChange={e => setQueryForm(f => ({...f, partition_key_value: e.target.value}))} placeholder="item-1" />
            </div>
            <div className="fg">
              <label className="fl">Sort key equals</label>
              <input className="fi" value={queryForm.sort_key_equals} onChange={e => setQueryForm(f => ({...f, sort_key_equals: e.target.value}))} placeholder="001" />
            </div>
            <div className="fg">
              <label className="fl">Sort key begins with</label>
              <input className="fi" value={queryForm.sort_key_begins_with} onChange={e => setQueryForm(f => ({...f, sort_key_begins_with: e.target.value}))} placeholder="00" />
            </div>
            <div className="fg">
              <label className="fl">Limit</label>
              <input className="fi" type="number" min="1" value={queryForm.limit} onChange={e => setQueryForm(f => ({...f, limit: e.target.value}))} />
            </div>
          </div>
          <div className="btn-grp" style={{marginTop:10}}>
            <button className="btn btn-s" onClick={runQuery}>Query</button>
            <button className="btn btn-s" onClick={runScan}>Scan</button>
            <button className="btn btn-s" onClick={() => setQueryResult(null)}>Clear results</button>
          </div>
        </div>
        {rows.length > 0 && (
          <div className="vpc-detail-section">
            <div className="vpc-detail-section-title">Items</div>
            <div className="vpc-grid-wrap apigw-list-scroll">
              <table className="tbl vpc-grid">
                <thead>
                  <tr>
                    <th><input type="checkbox" disabled aria-label="Select all items" /></th>
                    <th>Primary key</th>
                    <th>Sort key</th>
                    <th>Attributes</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(row => {
                    const keyLabel = Object.entries(row.key || {}).map(([k, v]) => `${k}=${String(v)}`).join(', ');
                    return (
                      <tr key={JSON.stringify(row.key || {})} className={selectedItemKey === JSON.stringify(row.key || {}) ? 'active' : ''} onClick={() => setSelectedItemKey(JSON.stringify(row.key || {}))}>
                        <td><input type="checkbox" checked={selectedItemKey === JSON.stringify(row.key || {})} onChange={() => setSelectedItemKey(JSON.stringify(row.key || {}))} /></td>
                        <td title={keyLabel}><span className="vpc-grid-name">{keyLabel || '—'}</span></td>
                        <td>{selectedTable.sort_key_name ? String(row.key?.[selectedTable.sort_key_name] ?? '—') : '—'}</td>
                        <td><span className="ec2-mono">{JSON.stringify(row.item || {}, null, 0)}</span></td>
                        <td>{fmtDate(row.created)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Put item</div>
          <div className="vpc-detail-note">Paste a simple JSON object with at least the partition key field.</div>
          <textarea className="fi" rows="8" value={itemDraft} onChange={e => setItemDraft(e.target.value)} style={{fontFamily:'Consolas, "Courier New", monospace', minHeight:160}} />
          <div className="btn-grp" style={{marginTop:10}}>
            <button className="btn btn-p" onClick={saveItem}>Save item</button>
            <button className="btn btn-s" onClick={() => selectedSingle && deleteItem(selectedSingle)} disabled={!selectedSingle}>Delete selected item</button>
          </div>
        </div>
      </>
    );
  };

  const renderIndexes = () => {
    if (!selectedTable) return <div className="vpc-detail-empty">Select a table to view indexes.</div>;
    return (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Secondary indexes</div>
        {selectedTable.indexes && selectedTable.indexes.length ? (
          <table className="vpc-simple-table">
            <thead><tr><th>Name</th><th>Status</th><th>Type</th></tr></thead>
            <tbody>
              {selectedTable.indexes.map(idx => (
                <tr key={idx.index_name || idx.name}>
                  <td>{idx.index_name || idx.name}</td>
                  <td>{idx.index_status || idx.status || 'ACTIVE'}</td>
                  <td>{idx.index_type || idx.type || 'GSI'}</td>
                </tr>
              ))}
            </tbody>
          </table>

  const renderBackups = () => {

              <button className={`btn btn-s ${detailTab === 'query' ? 'active' : ''}`} onClick={() => setDetailTab('query')}>Query</button>

          <section className="gcp-firestore-card">

            <div className="gcp-firestore-card-body">
              {detailTab === 'query' ? (

                      <label className="fl">Collection ID</label>
                      <input className="fi" value={gcpQueryForm.collection_id} onChange={e => setGcpQueryForm(f => ({...f, collection_id: e.target.value}))} placeholder="books" />

                      <input className="fi" value={gcpQueryForm.field_name} onChange={e => setGcpQueryForm(f => ({...f, field_name: e.target.value}))} placeholder="title" />

                      <label className="fl">Value</label>
                      <input className="fi" value={gcpQueryForm.field_value} onChange={e => setGcpQueryForm(f => ({...f, field_value: e.target.value}))} placeholder="CloudLearn" />

                  </div>

                    <div className="gcp-firestore-doc-grid">
                      <table>
                        <thead>
                          <tr>
                            <th>Document</th>
                            <th>Fields</th>
                            <th>Created</th>
                          </tr>
                        </thead>
                        <tbody>

                            <tr key={JSON.stringify(row.key || {})}>

          </section>

          <aside className="gcp-firestore-card gcp-firestore-side">
            <div className="gcp-firestore-card-head">
              <div>
                <div className="gcp-firestore-card-title">Document details</div>
                <div className="gcp-firestore-card-sub">{selectedDoc ? (selectedDoc.key?.id || 'Selected document') : 'No document selected'}</div>
              </div>
              <button className="btn btn-s" onClick={() => { if (selectedTable) { setItemDraft('{}'); setSelectedItemKey('__new__'); } }}>Add document</button>
            </div>
            <div className="gcp-firestore-card-body">
              {selectedDoc ? (
                <>
                  <div className="gcp-firestore-detail-grid" style={{marginBottom:12}}>
                    <div className="gcp-firestore-field"><label>Document ID</label><strong>{selectedDoc.key?.id || '—'}</strong></div>
                    <div className="gcp-firestore-field"><label>Collection</label><strong>{selectedTable?.table_name || '—'}</strong></div>
                    <div className="gcp-firestore-field"><label>Fields</label><strong>{selectedDocFields.length}</strong></div>
                    <div className="gcp-firestore-field"><label>Created</label><strong>{fmtDate(selectedDoc.created)}</strong></div>
                  </div>
                  <div className="vpc-detail-section-title" style={{marginBottom:8}}>Fields</div>
                  <div className="gcp-firestore-detail-grid">
                    {selectedDocFields.length ? selectedDocFields.map(([key, value]) => (
                      <div className="gcp-firestore-field" key={key}>
                        <label>{key}</label>
                        <strong>{typeof value === 'object' ? JSON.stringify(value) : String(value)}</strong>
                      </div>
                    )) : (
                      <div className="gcp-firestore-empty">
                        <strong>No fields yet</strong>
                        This document does not contain any typed fields.
                      </div>
                    )}
                  </div>
                  <div style={{marginTop:14}}>
                    <div className="vpc-detail-section-title" style={{marginBottom:8}}>Document JSON</div>
                    <textarea className="fi gcp-firestore-json ec2-mono" value={itemDraft} onChange={e => setItemDraft(e.target.value)} />
                    <div className="btn-grp" style={{marginTop:10}}>
                      <button className="btn btn-p" onClick={saveItem}>Save document</button>
                      <button className="btn btn-s" onClick={() => deleteItem(selectedDoc)} disabled={!selectedDoc}>Delete document</button>
                    </div>
                  </div>
                </>
              ) : (
                <>
                  <div className="gcp-firestore-empty">
                    <strong>No document selected</strong>
                    Select a document from the data grid, or use the draft below to add a new document.
                  </div>
                  <div style={{marginTop:14}}>
                    <div className="vpc-detail-section-title" style={{marginBottom:8}}>Document JSON</div>
                    <textarea className="fi gcp-firestore-json ec2-mono" value={itemDraft} onChange={e => setItemDraft(e.target.value)} />
                    <div className="btn-grp" style={{marginTop:10}}>
                      <button className="btn btn-p" onClick={saveItem}>Save document</button>
                    </div>
                  </div>
                </>
              )}
            </div>
          </aside>
        </div>
      </div>
    );
  };

  if (isGcp) {
    if (page === 'create') {
      return (
        <>
          <DynamoDBApiDocsPanel />
          <CreateDynamoDBView onBack={() => setPage('list')} onDone={handleCreateDone} notify={notify} />
        </>
      );
    }
    return (
      <>
        <DynamoDBApiDocsPanel />
        {renderFirestoreStudio()}
      </>
    );
  }

  if (page === 'create') {
    return (
      <>
        <DynamoDBApiDocsPanel />
        <CreateDynamoDBView onBack={() => setPage('list')} onDone={handleCreateDone} notify={notify} />
      </>
    );
  }

  return (
    <>
      <DynamoDBApiDocsPanel />
      <div className="panel">
        <div className="vpc-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>{serviceLabel}</span><span className="bc-sep">›</span><span>{pageTitle}</span>
          </div>
          <div className="vpc-page-title">{pageTitle}</div>
          <div className="vpc-page-sub">{providerKey === 'gcp' ? 'Create and manage Firestore collections and documents with a provider-native full-width grid and separate details view.' : 'Create and manage DynamoDB tables with a full-width grid and separate details view.'}</div>
        </div>
        <div className="vpc-vpcs-toolbar">
          <div className="vpc-vpcs-toolbar-left">
            <input className="fi vpc-search" value={search} onChange={e => setSearch(e.target.value)} placeholder="Find tables by name or key schema" />
            <div className="vpc-summary">
              <div className="vpc-summary-count">Your tables ({visibleTables}/{totalTables})</div>
              <a className="vpc-summary-info" href="#" onClick={e => e.preventDefault()}>Info</a>
              <div className="vpc-summary-updated">Last updated {relativeTime(selectedTable?.last_modified || tables[0]?.last_modified || '')}</div>
            </div>
          </div>
          <div className="vpc-vpcs-toolbar-right">
            <button type="button" className="btn btn-s" onClick={() => { setActionsOpen(false); loadList(); }}>↻</button>
            <div className="vpc-actions-wrap" ref={actionsRef}>
              <button type="button" className="btn btn-s" onClick={(e) => { e.stopPropagation(); setActionsOpen(v => !v); }}>Actions ▾</button>
              {actionsOpen && (
                <div className="vpc-actions-menu">
                  <button type="button" className="vpc-actions-item" onClick={() => { setActionsOpen(false); loadList(); }}>Refresh</button>
                  <button type="button" className="vpc-actions-item" onClick={openCreate}>Create table</button>
                  <button type="button" className="vpc-actions-item" onClick={() => { if (selectedTable) { setActionsOpen(false); setDeleteTarget(selectedTable); } }} disabled={!selectedTable}>Delete selected table</button>
                </div>
              )}
            </div>
            <button type="button" className="btn btn-p" onClick={openCreate}>Create table</button>
          </div>
        </div>

        <div className="vpc-grid-wrap apigw-list-scroll">
          {loading && !tables.length ? (
            <div className="ld">Loading tables…</div>
          ) : filteredTables.length ? (
            <table className="tbl vpc-grid">
              <thead>
                <tr>
                  <th><input type="checkbox" disabled aria-label="Select all tables" /></th>
                  <th>Table name</th>
                  <th>Status</th>
                  <th>Partition key</th>
                  <th>Sort key</th>
                  <th>Items</th>
                  <th>Billing mode</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>
                {filteredTables.map(table => (
                  <tr key={table.table_name} className={selectedTableName === table.table_name ? 'active' : ''} onClick={() => handleSelectTable(table.table_name)}>
                    <td><input type="checkbox" checked={selectedTableName === table.table_name} onChange={() => handleSelectTable(table.table_name)} /></td>
                    <td title={table.table_name}><span className="vpc-grid-name">{table.table_name}</span></td>
                    <td><span className={`tag ${table.table_status === 'ACTIVE' ? 'tg' : 'tgr'}`}>{table.table_status}</span></td>
                    <td>{table.partition_key_name}</td>
                    <td>{table.sort_key_name || '—'}</td>
                    <td>{table.item_count ?? 0}</td>
                    <td>{table.billing_mode || 'PAY_PER_REQUEST'}</td>
                    <td>{fmtDate(table.created)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            <div className="empty">
              <div className="empty-t">{search ? 'No matching tables' : 'No tables yet'}</div>
              <div className="empty-d">{search ? 'Try a different search term.' : 'Create a table to get started.'}</div>
            </div>
          )}
        </div>

        <div className="vpc-detail-wrap">
          <div className="vpc-detail-panel">
            {selectedTable ? (
              <>
                <div className="vpc-detail-banner">
                  <div className="vpc-detail-name">{selectedTable.table_name}</div>
                  <div className="vpc-detail-meta">{selectedTable.table_arn} · {selectedTable.partition_key_name} · {selectedTable.sort_key_name || 'No sort key'}</div>
                </div>
                <div className="tabs ec2-subtabs">
                  {[
                    ['items', 'Items'],
                    ['indexes', 'Indexes'],
                    ['backups', 'Backups'],
                    ['tags', 'Tags'],
                    ['settings', 'Settings'],
                  ].map(([k, label]) => (
                    <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                  ))}
                </div>
                <div className="vpc-detail-body">
                  {detailTab === 'items' ? renderItems()
                    : detailTab === 'indexes' ? renderIndexes()
                    : detailTab === 'backups' ? renderBackups()
                    : detailTab === 'tags' ? renderTags()
                    : renderSettings()}
                </div>
              </>
            ) : (
              <div className="vpc-detail-body">
                <div className="vpc-detail-empty">Select a table from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>

        {deleteTarget && (
          <ConfirmDelete
            title="Delete table"
            lines={[
              `You are about to delete table "${deleteTarget.table_name}".`,
              'The simulator will remove the table and all items in it.',
            ]}
            onConfirm={doDelete}
            onClose={() => setDeleteTarget(null)}
            busy={deleteBusy}
          />
        )}
      </div>
    </>
  );
}

function APIGatewayApiDocsPanel() {
  const [showApiDocs, setShowApiDocs] = useState(false);
  const [docAction, setDocAction] = useState('CreateRestApi');
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const apiPrefix = isGcp ? '/v1' : '/api/apigateway';
  const docs = useMemo(() => {
    if (isGcp) {
      return [
        {
          action: 'CreateApi',
          request: `POST http://127.0.0.1:9000/v1/projects/{project}/locations/{location}/apis\n{\n  "name": "orders-api",\n  "displayName": "Orders API",\n  "labels": {"env": "dev"}\n}`,
          response: `{
  "name": "projects/{project}/locations/{location}/apis/orders-api",

  "managedService": "orders-api.apigateway.local",
  "state": "ACTIVE"
}`,
          summary: 'Creates an API Gateway API resource in Google Cloud.',
          params: [
            ['project', 'Google Cloud project identifier.', 'String'],
            ['location', 'Gateway location or region.', 'String'],
            ['name', 'Unique API name within the project and location.', 'String'],
            ['displayName', 'Human-readable API name.', 'String'],
            ['labels', 'Optional labels for the API resource.', 'Object'],
          ],
        },
        {
          action: 'CreateApiConfig',

          response: `{
  "name": "projects/{project}/locations/{location}/apiConfigs/orders-api-config",
  "displayName": "orders-api-config",
  "state": "ACTIVE"
}`,
          summary: 'Creates an API configuration for the selected API.',
          params: [
            ['project', 'Google Cloud project identifier.', 'String'],
            ['location', 'Gateway location or region.', 'String'],
            ['name', 'Unique API config name.', 'String'],

        },
        {

          request: `POST http://127.0.0.1:9000/v1/projects/{project}/locations/{location}/gateways\n{\n  "name": "orders-gateway",\n  "apiConfig": "projects/{project}/locations/{location}/apiConfigs/orders-api-config"\n}`,
          response: `{
  "name": "projects/{project}/locations/{location}/gateways/orders-gateway",
  "displayName": "orders-gateway",
  "state": "ACTIVE",

}`,
          summary: 'Creates a gateway backed by the selected API config.',
          params: [
            ['project', 'Google Cloud project identifier.', 'String'],
            ['location', 'Gateway location or region.', 'String'],
            ['name', 'Gateway name.', 'String'],
            ['apiConfig', 'Selected API config resource name.', 'String'],
          ],
        },
        {
          action: 'ListApis',
          request: 'GET http://127.0.0.1:9000/v1/projects/{project}/locations/{location}/apis',
          response: `{
  "kind": "apigateway#listApisResponse",
  "apis": [
    {
      "name": "projects/{project}/locations/{location}/apis/orders-api",
      "displayName": "Orders API",
      "state": "ACTIVE"
    }
  ]
}`,
          summary: 'Lists API Gateway APIs in a location.',
          params: [
            ['project', 'Google Cloud project identifier.', 'String'],
            ['location', 'Gateway location or region.', 'String'],
          ],
        },
        {
          action: 'ListGateways',
          request: 'GET http://127.0.0.1:9000/v1/projects/{project}/locations/{location}/gateways',
          response: `{
  "kind": "apigateway#listGatewaysResponse",
  "gateways": [
    {
      "name": "projects/{project}/locations/{location}/gateways/orders-gateway",
      "displayName": "orders-gateway",
      "state": "ACTIVE"
    }
  ]
}`,
          summary: 'Lists gateways in a location.',
          params: [
            ['project', 'Google Cloud project identifier.', 'String'],
            ['location', 'Gateway location or region.', 'String'],
          ],
        },
      ];
    }
    return ([
    {
      action: 'CreateRestApi',
      request: `POST ${apiPrefix}/apis
{
  "name": "orders-api",
  "description": "Orders API",
  "endpoint_type": "REGIONAL"
}`,
      response: `{
  "rest_api_id": "api-abc123",
  "name": "orders-api",
  "endpoint_type": "REGIONAL",
  "invoke_url": "/api/apigateway/invoke/api-abc123"
}`,
      summary: 'Creates a managed API Gateway API inside the simulator control plane.',
    },
    {
      action: 'CreateResource',

function CreateAPIGatewayView({onBack, onDone, notify}) {
  const [name, setName] = useState('orders-api');
  const [description, setDescription] = useState('Orders API');
  const [endpointType, setEndpointType] = useState('REGIONAL');
  const [seedSample, setSeedSample] = useState(true);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    if (!name.trim()) {
      setErr('API name is required');
      return;
    }
    setBusy(true);
    setErr('');
    try {
      const created = await APIGateway.create({
        name: name.trim(),
        description: description.trim(),
        endpoint_type: endpointType,
      });
      let api = created;
      if (seedSample && created?.rest_api_id) {
        const rootId = created.root_resource_id;
        const resource = await APIGateway.createResource(created.rest_api_id, {parent_id: rootId, path_part: 'hello'});
        const resourceId = resource.resource.resource_id;
        await APIGateway.putMethod(created.rest_api_id, {
          resource_id: resourceId,
          http_method: 'GET',
          authorization_type: 'NONE',
          api_key_required: false,
        });
        await APIGateway.putIntegration(created.rest_api_id, {
          resource_id: resourceId,
          http_method: 'GET',
          type: 'MOCK',
          response_body: JSON.stringify({message: 'Hello from API Gateway'}, null, 2),
          status_code: 200,
          content_type: 'application/json',
        });
        await APIGateway.createDeployment(created.rest_api_id, {stage_name: 'prod', description: 'Initial deployment'});
        api = await APIGateway.get(created.rest_api_id);
      }
      onDone(api || created);
    } catch (e) {
      setErr(e.message);
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="panel">
        <div className="vpc-page-head">
          <div className="vpc-page-title">Create API</div>
          <div className="vpc-page-sub">Create a lightweight REST API, then add resources, methods, integrations, and stages from the separate details view.</div>
        </div>
      <div className="vpc-detail-body">
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">API settings</div>
          <div className="vpc-kv-grid">
            <div className="fg">
              <label className="fl">API name</label>
              <input className="fi" value={name} onChange={e => setName(e.target.value)} />
            </div>
            <div className="fg">
              <label className="fl">Endpoint type</label>
              <select className="fi" value={endpointType} onChange={e => setEndpointType(e.target.value)}>
                <option value="REGIONAL">Regional</option>
                <option value="EDGE" disabled>Edge-optimized</option>
                <option value="PRIVATE" disabled>Private</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:'1 / -1'}}>
              <label className="fl">Description</label>
              <input className="fi" value={description} onChange={e => setDescription(e.target.value)} />
            </div>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Getting started</div>
          <label className="s3-switch">
            <input type="checkbox" checked={seedSample} onChange={e => setSeedSample(e.target.checked)} />
            <span className="s3-switch-ui"></span>
            <span className="s3-switch-label">Seed a sample MOCK /hello route and deploy to prod</span>
          </label>
          <div className="vpc-detail-note" style={{marginTop:10}}>This makes the API immediately testable after creation.</div>
        </div>
        {err && <div className="ferr">{err}</div>}
        <div className="btn-grp">
          <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create API'}</button>
        </div>
      </div>
    </div>
  );
}

function APIGatewayView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const isGcp = providerKey === 'gcp';
  const [apis, setApis] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedApiId, setSelectedApiId] = useState('');
  const [selectedApi, setSelectedApi] = useState(null);
  const [query, setQuery] = useState('');
  const [detailTab, setDetailTab] = useState('overview');
  const [showCreate, setShowCreate] = useState(false);
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [selectedResourceId, setSelectedResourceId] = useState('');
  const [routeForm, setRouteForm] = useState({
    parent_id: '',
    path_part: 'hello',
    http_method: 'GET',
    authorization_type: 'NONE',
    integration_type: 'MOCK',
    uri: '',
    response_body: JSON.stringify({message: 'Hello from API Gateway'}, null, 2),
    status_code: 200,
    content_type: 'application/json',
  });
  const [stageForm, setStageForm] = useState({
    stage_name: 'prod',
    description: 'Production',
  });
  const actionsRef = useRef(null);

  const loadList = useCallback(async () => {
    setLoading(true);
    try {
      const d = await APIGateway.list();
      setApis(d.apis || []);
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  const loadDetail = useCallback(async (apiId) => {
    if (!apiId) {
      setSelectedApi(null);
      return;
    }
    try {
      const d = await APIGateway.get(apiId);
      setSelectedApi(d);
    } catch (e) {
      notify(e.message, 'error');
    }
  }, [notify]);

  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => { loadDetail(selectedApiId); }, [selectedApiId, loadDetail]);
  useEffect(() => {
    if (!selectedApi) return;
    if (!selectedResourceId) {
      setSelectedResourceId(selectedApi.root_resource_id || '');
    }
    if (!routeForm.parent_id) {
      setRouteForm(f => ({...f, parent_id: selectedApi.root_resource_id || ''}));
    }
    if (selectedApi && !selectedApi.resource_map?.some(r => r.resource_id === selectedResourceId)) {
      setSelectedResourceId(selectedApi.root_resource_id || '');
      setRouteForm(f => ({...f, parent_id: selectedApi.root_resource_id || ''}));
    }
  }, [selectedApi, selectedResourceId, routeForm.parent_id]);
  useEffect(() => {
    if (!actionsOpen) return;
    const onPointerDown = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', onPointerDown);
    return () => document.removeEventListener('pointerdown', onPointerDown);
  }, [actionsOpen]);

  const filteredApis = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return apis;
    return apis.filter(api => [api.name, api.rest_api_id, api.description, api.endpoint_type].join(' ').toLowerCase().includes(q));
  }, [apis, query]);

  const openCreate = () => {
    setShowCreate(true);
    setActionsOpen(false);
  };

  const handleCreateDone = (created) => {
    setShowCreate(false);
    notify(`API "${created?.name || 'api'}" created`, 'success');
    if (created?.rest_api_id) {
      setSelectedApiId(created.rest_api_id);
      setDetailTab('overview');
      loadList();
    }
  };

  const handleSelectApi = (apiId) => {
    setActionsOpen(false);
    setSelectedApiId(apiId);
    setSelectedResourceId('');
    setDetailTab('overview');
    setRouteForm(f => ({...f, parent_id: ''}));
  };

  const closeActions = () => setActionsOpen(false);

  const doDelete = async () => {
    if (!deleteTarget) return;
    setDeleteBusy(true);
    try {
      await APIGateway.remove(deleteTarget.rest_api_id);
      notify(`API "${deleteTarget.name}" deleted`, 'success');
      setDeleteTarget(null);
      setSelectedApiId('');
      setSelectedApi(null);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };

  const createRoute = async () => {
    try {
      if (!selectedApi) return notify('Select an API first', 'error');
      if (!routeForm.path_part.trim()) return notify('Path part is required', 'error');
      const parentId = routeForm.parent_id || selectedApi.root_resource_id;
      const resource = await APIGateway.createResource(selectedApi.rest_api_id, {parent_id: parentId, path_part: routeForm.path_part.trim()});
      const resourceId = resource.resource.resource_id;
      const httpMethod = routeForm.http_method.toUpperCase();
      await APIGateway.putMethod(selectedApi.rest_api_id, {
        resource_id: resourceId,
        http_method: httpMethod,
        authorization_type: routeForm.authorization_type,
        api_key_required: false,
      });
      await APIGateway.putIntegration(selectedApi.rest_api_id, {
        resource_id: resourceId,
        http_method: httpMethod,
        type: routeForm.integration_type,
        uri: routeForm.uri,
        integration_http_method: routeForm.integration_http_method || httpMethod,
        response_body: routeForm.response_body,
        status_code: Number(routeForm.status_code) || 200,
        content_type: routeForm.content_type || 'application/json',
      });
      notify('Route created', 'success');
      await loadDetail(selectedApi.rest_api_id);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const deployStage = async () => {
    try {
      if (!selectedApi) return notify('Select an API first', 'error');
      if (!stageForm.stage_name.trim()) return notify('Stage name is required', 'error');
      await APIGateway.createDeployment(selectedApi.rest_api_id, {
        stage_name: stageForm.stage_name.trim(),
        description: stageForm.description.trim(),
      });
      notify(`Stage "${stageForm.stage_name}" deployed`, 'success');
      await loadDetail(selectedApi.rest_api_id);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const routeRows = selectedApi?.routes || [];
  const resourceRows = selectedApi?.resource_map || [];
  const stageRows = selectedApi?.stages || [];
  const deploymentRows = selectedApi?.deployments || [];
  const logRows = selectedApi?.logs || [];
  const selectedResource = resourceRows.find(r => r.resource_id === selectedResourceId) || resourceRows[0] || null;
  const selectedResourceRoutes = routeRows.filter(r => r.resource_id === (selectedResource?.resource_id || selectedApi?.root_resource_id));
  const totalApis = apis.length;
  const visibleApis = filteredApis.length;

  const renderOverview = () => {
    if (!selectedApi) return <div className="vpc-detail-empty">Select an API from the grid to view details.</div>;
    const activeStage = stageRows[0] || null;
    const invokeUrl = activeStage ? APIGateway.invokeUrl(selectedApi.rest_api_id, activeStage.stage_name) : APIGateway.invokeUrl(selectedApi.rest_api_id);
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-kpi-grid">
            <div className="vpc-kpi"><strong>{resourceRows.length}</strong><span>Resources</span></div>
            <div className="vpc-kpi"><strong>{routeRows.length}</strong><span>Routes</span></div>
            <div className="vpc-kpi"><strong>{stageRows.length}</strong><span>Stages</span></div>
            <div className="vpc-kpi"><strong>{deploymentRows.length}</strong><span>Deployments</span></div>

        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Invoke URL</div>
          <dl className="ec2-kv"><dt>URL</dt><dd className="ec2-mono">{invokeUrl}</dd></dl>
          <div className="vpc-detail-note" style={{marginTop:8}}>Deploy a stage to make the route accessible. Use the invoke URL in Postman or curl.</div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Current status</div>
          <table className="vpc-simple-table">

                <td>{fmtDate(selectedApi.created)}</td>

            </tbody>

      </>

  const renderResources = () => {

        <div className="vpc-detail-section">

          <div className="vpc-kv-grid">

            <div className="fg" style={{gridColumn:'1 / -1'}}>

  const renderIntegrations = () => {

      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Integrations</div>
        <table className="vpc-simple-table">
          <thead><tr><th>Path</th><th>Method</th><th>Type</th><th>Target</th><th>Status</th></tr></thead>
          <tbody>
            {routeRows.map(route => (
              <tr key={`${route.resource_id}-${route.http_method}`}>
                <td className="ec2-mono">{route.path}</td>
                <td>{route.http_method}</td>
                <td>{route.integration_type}</td>
                <td className="ec2-mono">{route.integration_uri || '—'}</td>
                <td><span className={`tag ${route.status_code < 300 ? 'tg' : 'tgr'}`}>{route.status_code}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    ) : <div className="vpc-detail-empty">Create a route to see integrations here.</div>;
  };

  const renderLogs = () => {
    if (!selectedApi) return <div className="vpc-detail-empty">Select an API from the grid to view logs.</div>;
    return logRows.length ? (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Invoke logs</div>
        <table className="vpc-simple-table">
          <thead><tr><th>Time</th><th>Stage</th><th>Method</th><th>Path</th><th>Status</th><th>Integration</th></tr></thead>

  const renderSettings = () => {

    return (
      <>

  if (showCreate) {
    return (
      <>

      <div className="panel">

          <div className="vpc-page-title">{isGcp ? 'Gateways' : 'APIs'}</div>
          <div className="vpc-page-sub">
            {isGcp
              ? 'Create, manage, and deploy Google Cloud API Gateway resources with a Material-style control plane.'
              : 'Create, manage, and deploy API Gateway resources with a lightweight AWS-like control plane.'}

        </div>
        <div className="vpc-vpcs-toolbar">

            </div>

                  <button className="vpc-actions-item" onClick={() => { if (selectedApi) { closeActions(); setDeleteTarget(selectedApi); } }} disabled={!selectedApi}>{isGcp ? 'Delete selected gateway' : 'Delete selected API'}</button>
                </div>

            <button className="btn btn-p" onClick={openCreate}>{isGcp ? 'Create gateway' : 'Create API'}</button>
          </div>

        <div className="vpc-grid-wrap apigw-list-scroll">

                  <th>API ID</th>
                  <th>Endpoint</th>
                  <th>Resources</th>
                  <th>Stages</th>
                  <th>Invoke URL</th>
                </tr>
              </thead>
              <tbody>
                {filteredApis.map(api => (
                  <tr key={api.rest_api_id} className={selectedApiId === api.rest_api_id ? 'active' : ''} onClick={() => handleSelectApi(api.rest_api_id)}>
                    <td><input type="checkbox" checked={selectedApiId === api.rest_api_id} onChange={() => handleSelectApi(api.rest_api_id)} /></td>
                    <td title={api.name}><span className="vpc-grid-name">{api.name}</span></td>
                    <td><span className="ec2-mono">{api.rest_api_id}</span></td>
                    <td>{api.endpoint_type}</td>
                    <td>{api.resource_count}</td>
                    <td>{api.stage_count}</td>
                    <td><span className="ec2-mono" title={api.invoke_url}>{api.invoke_url}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            <div className="empty">
              <div className="empty-t">{query ? 'No matching APIs' : 'No APIs yet'}</div>
              <div className="empty-d">{query ? 'Try a different search term.' : 'Create an API to get started.'}</div>
            </div>
          )}
        </div>

        <div className="vpc-detail-wrap">
          <div className="vpc-detail-panel">
            {selectedApi ? (
              <>
                <div className="vpc-detail-banner">
                  <div className="vpc-detail-name">{selectedApi.name}</div>
                  <div className="vpc-detail-meta">{selectedApi.rest_api_id} · {selectedApi.endpoint_type} · {selectedApi.invoke_url}</div>
                </div>
                <div className="vpc-detail-tabs">
                  <div className="tabs ec2-subtabs">
                    {[
                      ['overview', 'Overview'],
                      ['resources', 'Resources'],
                      ['stages', 'Stages'],
                      ['integrations', 'Integrations'],
                      ['logs', 'Logs'],
                      ['settings', 'Settings'],
                    ].map(([k, label]) => (
                      <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                    ))}
                  </div>
                </div>
                <div className="vpc-detail-body">
                  {detailTab === 'overview' ? renderOverview()
                    : detailTab === 'resources' ? renderResources()
                    : detailTab === 'stages' ? renderStages()
                    : detailTab === 'integrations' ? renderIntegrations()
                    : detailTab === 'logs' ? renderLogs()
                    : renderSettings()}
                </div>
              </>
            ) : (
              <div className="vpc-detail-body">
                <div className="vpc-detail-empty">Select an API from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>

        {deleteTarget && (
          <ConfirmDelete
            title="Delete API"
            lines={[
              `You are about to delete API "${deleteTarget.name}".`,
              'The simulator will remove the API, routes, stages, and deployments.',
            ]}
            onConfirm={doDelete}
            onClose={() => setDeleteTarget(null)}
            busy={deleteBusy}
          />
        )}
      </div>
    </>
  );
}

function CreateLambdaView({onBack, onDone, notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'lambda', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Create Cloud Function' : 'Create function';
  const [functionName, setFunctionName] = useState('hello-lambda');
  const [runtime, setRuntime] = useState('python3.12');
  const [handler, setHandler] = useState('lambda_function.lambda_handler');
  const [description, setDescription] = useState('Hello world Lambda');
  const [role, setRole] = useState('arn:aws:iam::123456789012:role/service-role/cloudlearn-lambda-basic-execution');
  const [timeout, setTimeoutVal] = useState(3);
  const [memorySize, setMemorySize] = useState(128);
  const [code, setCode] = useState(lambdaDefaultCode('hello-lambda'));
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    if (!functionName.trim()) {
      setErr('Function name is required');
      return;
    }
    if (!code.trim()) {
      setErr('Inline code is required');
      return;
    }
    setBusy(true);
    setErr('');
    try {
      const created = await Lambda.create({
        function_name: functionName.trim(),
        runtime,
        handler,
        role,
        description,
        timeout: Number(timeout) || 3,
        memory_size: Number(memorySize) || 128,
        code,
        environment: {},
      });
      onDone(created);
    } catch (e) {
      setErr(e.message);
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>{serviceLabel}</span><span className="bc-sep">›</span><a onClick={onBack}>{providerKey === 'gcp' ? 'Cloud Functions' : 'Functions'}</a><span className="bc-sep">›</span><span>{pageTitle}</span>
        </div>
        <div className="vpc-page-title">{pageTitle}</div>
        <div className="vpc-page-sub">{providerKey === 'gcp' ? 'Create a lightweight Cloud Function with inline code, then invoke it or attach Cloud Storage notifications to it.' : 'Create a lightweight Lambda function with inline code, then invoke it or attach S3 notifications to it.'}</div>
      </div>
      <div className="vpc-create-wrap">
        <div className="vpc-create-card">
          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Function settings</div>
            <div className="vpc-kv-grid">
              <div className="fg">
                <label className="fl">Function name</label>
                <input className="fi" value={functionName} onChange={e => setFunctionName(e.target.value)} placeholder="hello-lambda" />
              </div>
              <div className="fg">
                <label className="fl">Runtime</label>
                <select className="fi" value={runtime} onChange={e => setRuntime(e.target.value)}>
                  <option value="python3.12">Python 3.12</option>
                  <option value="python3.11">Python 3.11</option>
                </select>
              </div>
              <div className="fg">
                <label className="fl">Handler</label>
                <input className="fi" value={handler} onChange={e => setHandler(e.target.value)} placeholder="lambda_function.lambda_handler" />
              </div>
              <div className="fg">
                <label className="fl">Execution role</label>
                <input className="fi" value={role} onChange={e => setRole(e.target.value)} />
              </div>
              <div className="fg">
                <label className="fl">Timeout (seconds)</label>
                <input className="fi" type="number" min="1" value={timeout} onChange={e => setTimeoutVal(e.target.value)} />
              </div>
              <div className="fg">
                <label className="fl">Memory size (MB)</label>
                <input className="fi" type="number" min="128" step="64" value={memorySize} onChange={e => setMemorySize(e.target.value)} />
              </div>
              <div className="fg" style={{gridColumn:'1 / -1'}}>
                <label className="fl">Description</label>
                <input className="fi" value={description} onChange={e => setDescription(e.target.value)} />
              </div>
            </div>
          </div>
          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Function code</div>
            <div className="vpc-detail-note">The simulator stores inline Python code and executes it in a separate subprocess.</div>
            <textarea
              className="fi ec2-mono"
              style={{minHeight:280,fontFamily:'Consolas, "Courier New", monospace'}}
              value={code}
              onChange={e => setCode(e.target.value)}
            />
          </div>
          {err && <div className="ferr" style={{marginTop:8}}>{err}</div>}
          <div className="vpc-create-footer">
            <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
            <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create function'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function LambdaView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'lambda', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Cloud Functions' : 'Functions';
  const [functions, setFunctions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedFunctionName, setSelectedFunctionName] = useState('');
  const [selectedFunction, setSelectedFunction] = useState(null);
  const [query, setQuery] = useState('');
  const [detailTab, setDetailTab] = useState('overview');
  const [showCreate, setShowCreate] = useState(false);
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [codeDraft, setCodeDraft] = useState('');
  const [configDraft, setConfigDraft] = useState({
    runtime: 'python3.12',
    handler: 'lambda_function.lambda_handler',
    role: 'arn:aws:iam::123456789012:role/service-role/cloudlearn-lambda-basic-execution',
    description: '',
    timeout: 3,
    memory_size: 128,
  });
  const [testPayload, setTestPayload] = useState(JSON.stringify({message: 'hello from Lambda'}, null, 2));
  const [invokeType, setInvokeType] = useState('RequestResponse');
  const [invokeBusy, setInvokeBusy] = useState(false);
  const [invokeResult, setInvokeResult] = useState(null);
  const [publishDescription, setPublishDescription] = useState('');
  const [permissionDraft, setPermissionDraft] = useState({
    statement_id: 'AllowS3Invoke',
    action: 'lambda:InvokeFunction',
    principal: 's3.amazonaws.com',
    source_arn: 'arn:aws:s3:::my-bucket',
    source_account: '123456789012',
  });
  const actionsRef = useRef(null);

  const loadList = useCallback(async () => {
    setLoading(true);
    try {
      const d = await Lambda.list();
      setFunctions(d.functions || []);
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  const loadDetail = useCallback(async (name) => {
    if (!name) {
      setSelectedFunction(null);
      return;
    }
    try {
      const d = await Lambda.get(name);
      setSelectedFunction(d);
    } catch (e) {
      notify(e.message, 'error');
    }
  }, [notify]);

  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => { loadDetail(selectedFunctionName); }, [selectedFunctionName, loadDetail]);
  useEffect(() => {
    if (!selectedFunction) return;
    setCodeDraft(selectedFunction.code || lambdaDefaultCode(selectedFunction.function_name));
    setConfigDraft({
      runtime: selectedFunction.runtime || 'python3.12',
      handler: selectedFunction.handler || 'lambda_function.lambda_handler',
      role: selectedFunction.role || 'arn:aws:iam::123456789012:role/service-role/cloudlearn-lambda-basic-execution',
      description: selectedFunction.description || '',
      timeout: selectedFunction.timeout || 3,
      memory_size: selectedFunction.memory_size || 128,
    });
    setPublishDescription('');
    setInvokeResult(null);
    setPermissionDraft(f => ({
      ...f,
      statement_id: 'AllowS3Invoke',
      action: 'lambda:InvokeFunction',
      principal: 's3.amazonaws.com',
      source_arn: 'arn:aws:s3:::my-bucket',
      source_account: '123456789012',
    }));
  }, [selectedFunction]);
  useEffect(() => {
    if (!actionsOpen) return;
    const onPointerDown = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', onPointerDown);
    return () => document.removeEventListener('pointerdown', onPointerDown);
  }, [actionsOpen]);

  const filteredFunctions = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return functions;
    return functions.filter(fn => [fn.function_name, fn.runtime, fn.handler, fn.description, fn.state].join(' ').toLowerCase().includes(q));
  }, [functions, query]);

  const handleSelect = (name) => {
    setActionsOpen(false);
    setSelectedFunctionName(name);
    setDetailTab('overview');
  };

  const openCreate = () => {
    setShowCreate(true);
    setActionsOpen(false);
  };

  const handleCreateDone = (created) => {
    setShowCreate(false);
    notify(`Function "${created?.function_name || 'function'}" created`, 'success');
    if (created?.function_name) {
      setSelectedFunctionName(created.function_name);
      loadList();
    }
  };

  const doDelete = async () => {
    if (!deleteTarget) return;
    setDeleteBusy(true);
    try {
      await Lambda.remove(deleteTarget.function_name);
      notify(`Function "${deleteTarget.function_name}" deleted`, 'success');
      setDeleteTarget(null);
      setSelectedFunctionName('');
      setSelectedFunction(null);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };

  const saveCode = async () => {
    if (!selectedFunction) return;
    try {
      await Lambda.updateCode(selectedFunction.function_name, {code: codeDraft});
      notify('Function code updated', 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const saveConfig = async () => {
    if (!selectedFunction) return;
    try {
      await Lambda.updateConfig(selectedFunction.function_name, {
        ...configDraft,
        timeout: Number(configDraft.timeout) || 3,
        memory_size: Number(configDraft.memory_size) || 128,
      });
      notify('Function configuration updated', 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const runInvoke = async () => {
    if (!selectedFunction) return;
    setInvokeBusy(true);
    try {
      let parsed;
      try {
        parsed = testPayload.trim() ? JSON.parse(testPayload) : {};
      } catch {
        throw new Error('Event payload must be valid JSON');
      }
      const res = await Lambda.invoke(selectedFunction.function_name, {
        invocation_type: invokeType,
        payload: parsed,
      });
      setInvokeResult(res);
      notify(invokeType === 'Event' ? 'Invocation queued' : 'Function invoked', 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setInvokeBusy(false);
    }
  };

  const publishVersion = async () => {
    if (!selectedFunction) return;
    try {
      const res = await Lambda.publishVersion(selectedFunction.function_name, {description: publishDescription});
      notify(`Version ${res?.version?.version || 'published'} created`, 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const addPermission = async () => {
    if (!selectedFunction) return;
    try {
      const payload = {
        statement_id: (permissionDraft.statement_id || '').trim(),
        action: (permissionDraft.action || 'lambda:InvokeFunction').trim() || 'lambda:InvokeFunction',
        principal: (permissionDraft.principal || '').trim(),
        source_arn: (permissionDraft.source_arn || '').trim(),
        source_account: (permissionDraft.source_account || '').trim(),
      };
      if (!payload.principal) {
        throw new Error('Principal is required');
      }
      await Lambda.addPermission(selectedFunction.function_name, payload);
      notify('Permission added', 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const removePermission = async (statementId) => {
    if (!selectedFunction || !statementId) return;
    try {
      await Lambda.removePermission(selectedFunction.function_name, statementId);
      notify('Permission removed', 'success');
      await loadDetail(selectedFunction.function_name);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const selectedTriggers = selectedFunction?.triggers || [];
  const selectedVersions = selectedFunction?.versions || [];
  const selectedInvocations = selectedFunction?.invocations || [];
  const selectedPermissions = selectedFunction?.permissions || [];
  const visibleCount = filteredFunctions.length;
  const totalCount = functions.length;

  const renderOverview = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to show the separate details view.</div>;
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Function summary</div>
          <div className="vpc-kpi-grid">
            <div className="vpc-kpi"><strong>{selectedFunction.state || 'Active'}</strong><span>Status</span></div>
            <div className="vpc-kpi"><strong>{selectedFunction.runtime || 'python3.12'}</strong><span>Runtime</span></div>
            <div className="vpc-kpi"><strong>{selectedFunction.timeout || 3}s</strong><span>Timeout</span></div>
            <div className="vpc-kpi"><strong>{selectedFunction.memory_size || 128} MB</strong><span>Memory</span></div>
            <div className="vpc-kpi"><strong>{selectedFunction.policy_statement_count || 0}</strong><span>Policy statements</span></div>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Configuration</div>
          <table className="vpc-simple-table">
            <thead><tr><th>Field</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Function ARN</td><td className="ec2-mono">{selectedFunction.function_arn}</td></tr>
              <tr><td>Handler</td><td className="ec2-mono">{selectedFunction.handler}</td></tr>
              <tr><td>Execution role</td><td className="ec2-mono">{selectedFunction.role || '—'}</td></tr>
              <tr><td>Description</td><td>{selectedFunction.description || '—'}</td></tr>
              <tr><td>Created</td><td>{fmtDate(selectedFunction.created)}</td></tr>
              <tr><td>Last modified</td><td>{fmtDate(selectedFunction.last_modified)}</td></tr>
            </tbody>
          </table>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Invocation history</div>
          {selectedInvocations.length ? (
            <table className="vpc-simple-table">
              <thead><tr><th>Time</th><th>Type</th><th>Status</th><th>Source</th><th>Result</th></tr></thead>
              <tbody>
                {selectedInvocations.slice(0, 10).map(item => (
                  <tr key={item.id}>
                    <td>{fmtDate(item.at)}</td>
                    <td>{item.invocation_type}</td>
                    <td><span className={`tag ${item.status === 'success' ? 'tg' : item.status === 'accepted' ? 'ty' : 'tgr'}`}>{item.status}</span></td>
                    <td>{item.source || '—'}</td>
                    <td className="ec2-mono">{item.response_payload ? JSON.stringify(item.response_payload) : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="vpc-empty-table">No invocations yet.</div>}
        </div>
      </>
    );
  };

  const renderCode = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to edit code.</div>;
    return (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Inline code</div>
        <div className="vpc-detail-note">The simulator keeps Python code inline and runs it in an isolated subprocess.</div>
        <textarea
          className="fi ec2-mono"
          style={{minHeight:360,fontFamily:'Consolas, "Courier New", monospace'}}
          value={codeDraft}
          onChange={e => setCodeDraft(e.target.value)}
        />
        <div className="btn-grp" style={{marginTop:10}}>
          <button className="btn btn-p" onClick={saveCode}>Save code</button>
        </div>
      </div>
    );
  };

  const renderConfiguration = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to edit configuration.</div>;
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Function configuration</div>
          <div className="vpc-kv-grid">
            <div className="fg">
              <label className="fl">Runtime</label>
              <select className="fi" value={configDraft.runtime} onChange={e => setConfigDraft(f => ({...f, runtime: e.target.value}))}>
                <option value="python3.12">Python 3.12</option>
                <option value="python3.11">Python 3.11</option>
              </select>
            </div>
            <div className="fg">
              <label className="fl">Handler</label>
              <input className="fi" value={configDraft.handler} onChange={e => setConfigDraft(f => ({...f, handler: e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">Execution role</label>
              <input className="fi" value={configDraft.role} onChange={e => setConfigDraft(f => ({...f, role: e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">Timeout (seconds)</label>
