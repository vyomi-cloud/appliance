<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudLearn Simulator</title>
  <script crossorigin src="/assets/react.development.js"></script>
  <script crossorigin src="/assets/react-dom.development.js"></script>
  <script src="/assets/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Amazon Ember",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;background:#f2f3f3;color:#16191f}

    /* ── Header ── */
    .hdr{background:#232f3e;color:#fff;display:flex;align-items:center;padding:0 20px;height:50px;position:fixed;top:0;width:100%;z-index:1000;gap:12px}
    .hdr-logo{font-size:20px;font-weight:900;color:#ff9900;letter-spacing:-1px}
    .hdr-logo span{color:#fff;font-weight:400}
    .hdr-svc{color:#fff;font-size:14px;border-left:1px solid #4a5568;padding-left:12px}
    .hdr-menu{background:#37475a;border:1px solid #4a5568;color:#fff;border-radius:3px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
    .hdr-menu:hover{background:#485769}
    .hdr-search{flex:1;max-width:620px}
    .hdr-search input{width:100%;padding:7px 12px;border:none;border-radius:4px;font-size:13px;outline:none;background:#fff}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:#d5dbdb;font-size:13px}
    .badge{background:#ff9900;color:#000;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700}

    /* ── Layout ── */
    .aws-shell{display:flex;min-height:calc(100vh - 50px);margin-top:50px}
    .aws-sidebar{width:258px;background:#fff;border-right:1px solid #eaeded;position:fixed;top:50px;bottom:0;left:0;overflow-y:auto}
    .aws-main{margin-left:258px;padding:20px;min-height:calc(100vh - 50px);width:calc(100% - 258px)}
    .aws-side-search{padding:14px 14px 10px;border-bottom:1px solid #eaeded;background:#fafafa}
    .aws-side-search input{width:100%;padding:8px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;outline:none}
    .aws-side-search input:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .aws-group{padding:10px 0;border-bottom:1px solid #eaeded}
    .aws-group:last-child{border-bottom:none}
    .aws-group-title{padding:4px 14px 8px;font-size:11px;font-weight:700;letter-spacing:.04em;color:#687078;text-transform:uppercase}
    .aws-item{display:flex;align-items:center;gap:8px;padding:9px 14px;color:#16191f;text-decoration:none;font-size:13px;cursor:pointer;border-left:3px solid transparent}
    .aws-item:hover{background:#f2f8fd}
    .aws-item.active{background:#e8f5fb;border-left-color:#0073bb;font-weight:700}
    .aws-item .small{font-size:12px;color:#687078;font-weight:400}

    /* ── Breadcrumb ── */
    .bc{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:13px}
    .bc a{color:#0073bb;cursor:pointer;text-decoration:none}
    .bc a:hover{text-decoration:underline}
    .bc-sep{color:#879596}

    /* ── Panel ── */
    .panel{background:#fff;border:1px solid #eaeded;border-radius:4px;margin-bottom:16px;overflow:hidden}
    .ph{padding:16px 20px;border-bottom:1px solid #eaeded;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .pt{font-size:18px;font-weight:700}
    .ps{font-size:13px;color:#687078;margin-top:3px}

    /* ── Buttons ── */
    .btn{padding:6px 16px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;display:inline-flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap}
    .btn-p{background:#ff9900;border-color:#eb5f07;color:#000}
    .btn-p:hover{background:#e88b00}
    .btn-s{background:#fff;border-color:#879596;color:#16191f}
    .btn-s:hover{background:#f2f3f3}
    .btn-start{background:#ecfdf3;border-color:#1f7a3d;color:#1f7a3d}
    .btn-start:hover{background:#dff7e8}
    .btn-stop{background:#fff4ec;border-color:#c45100;color:#9a3900}
    .btn-stop:hover{background:#ffe8d7}
    .btn-d{background:#d13212;border-color:#b2290f;color:#fff}
    .btn-d:hover{background:#ba2e10}
    .btn-d:disabled,.btn-p:disabled{opacity:.5;cursor:not-allowed}
    .btn-grp{display:flex;gap:8px;flex-wrap:wrap}
    .state-dropdown{position:relative;display:inline-flex;align-items:center}
    .state-btn{min-width:190px;justify-content:space-between}
    .state-btn.running{background:#ecfdf3;border-color:#1f7a3d;color:#1f7a3d}
    .state-btn.running:hover{background:#dff7e8}
    .state-btn.stopped{background:#fff4ec;border-color:#c45100;color:#9a3900}
    .state-btn.stopped:hover{background:#ffe8d7}
    .state-btn.pending,.state-btn.rebooting,.state-btn.terminated{background:#f2f3f3;border-color:#cfd7df;color:#687078}
    .state-btn.pending:hover,.state-btn.rebooting:hover,.state-btn.terminated:hover{background:#eaeded}
    .state-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:60;min-width:260px;background:#fff;border:1px solid #d5dbdb;border-radius:4px;box-shadow:0 10px 26px rgba(0,0,0,.18);overflow:hidden}
    .state-item{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;border:none;border-bottom:1px solid #eaeded;background:#fff;color:#16191f;cursor:pointer;text-align:left}
    .state-item:hover{background:#f2f8fd}
    .state-item:last-child{border-bottom:none}
    .state-item:disabled{cursor:not-allowed;background:#fafafa;color:#879596}
    .state-item-title{font-weight:700;font-size:13px}
    .state-item-sub{font-size:12px;color:#687078;line-height:1.35}
    .btn-lnk{background:none;border:none;color:#0073bb;cursor:pointer;font-size:13px;padding:0;text-decoration:none}
    .btn-lnk:hover{text-decoration:underline}
    .btn-lnk.red{color:#d13212}

    /* ── Toolbar ── */
    .tb{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eaeded;background:#fff;flex-wrap:wrap}
    .tb-r{margin-left:auto}
    .srch{padding:6px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;width:220px;outline:none}
    .srch:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .ec2-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:14px 16px;border-bottom:1px solid #eaeded;background:#fff;flex-wrap:wrap}
    .ec2-topbar-left{display:flex;flex-direction:column;gap:4px}
    .ec2-title{font-size:20px;font-weight:700;line-height:1.2}
    .ec2-subtitle{font-size:13px;color:#687078;line-height:1.4}
    .ec2-toolbar{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #eaeded;background:#fff}
    .ec2-toolbar .btn{padding:6px 12px}
    .ec2-toolbar .btn[disabled]{opacity:.45;cursor:not-allowed}
    .ec2-toolbar-spacer{flex:1}
    .ec2-search{padding:6px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;min-width:280px;max-width:380px;outline:none}
    .ec2-search:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .ec2-count{font-size:12px;color:#687078}
    .ec2-menu{position:relative;display:inline-flex}
    .ec2-menu-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:70;min-width:240px;background:#fff;border:1px solid #d5dbdb;border-radius:4px;box-shadow:0 8px 20px rgba(0,0,0,.18);overflow:hidden}
    .ec2-menu-item{width:100%;padding:10px 12px;border:none;border-bottom:1px solid #eaeded;background:#fff;color:#16191f;text-align:left;cursor:pointer;font-size:13px}
    .ec2-menu-item:hover{background:#f2f8fd}
    .ec2-menu-item:last-child{border-bottom:none}
    .ec2-menu-item:disabled{background:#fafafa;color:#879596;cursor:not-allowed}
    .ec2-menu-item strong{display:block;font-size:13px;font-weight:700}
    .ec2-menu-item span{display:block;font-size:12px;color:#687078;margin-top:2px;line-height:1.35}
    .ec2-menu-item.red strong{color:#d13212}
    .ec2-table-wrap{padding:0 0 16px;overflow-x:auto}
    .ec2-row-selected td{background:#f2f8fd !important}
    .ec2-details{margin-top:16px;background:#fff;border:1px solid #eaeded;border-radius:4px;overflow:hidden}
    .ec2-details-head{padding:14px 16px;border-bottom:1px solid #eaeded;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .ec2-details-title{font-size:16px;font-weight:700}
    .ec2-details-sub{font-size:13px;color:#687078;margin-top:3px}
    .ec2-details-actions{display:flex;gap:8px;flex-wrap:wrap}
    .ec2-details-body{padding:16px}
    .ec2-kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .ec2-kv{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px}
    .ec2-kv dt{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#687078;margin-bottom:4px}
    .ec2-kv dd{font-size:13px;color:#16191f;line-height:1.45;word-break:break-word}
    .ec2-subtabs{padding:0 16px;background:#fff}
    .ec2-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.01em}
    .ec2-chip.running{background:#d5f5e3;color:#1d8102}
    .ec2-chip.stopped{background:#fff4ec;color:#9a3900}
    .ec2-chip.pending{background:#fdebd0;color:#eb5f07}
    .ec2-chip.terminated{background:#eaeded;color:#687078}
    .ec2-mono{font-family:Consolas,"Courier New",monospace;font-size:12px}
    .ec2-docs{padding:18px 20px 20px}
    .ec2-docs-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .ec2-docs-kicker{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:6px;color:#16191f}
    .ec2-docs-lead{font-size:14px;color:#16191f;max-width:980px;line-height:1.5}
    .ec2-docs-crumbs{font-size:12px;color:#687078;margin-top:8px}
    .ec2-docs-section{padding-top:16px;border-top:1px solid #eaeded;margin-top:16px}
    .ec2-docs-section h3{font-size:18px;font-weight:700;color:#16191f;margin-bottom:8px}
    .ec2-docs-note{font-size:13px;color:#687078;line-height:1.5;margin-bottom:10px}
    .ec2-docs-contents{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px 14px;margin-top:16px}
    .ec2-docs-contents h3{font-size:16px;font-weight:700;color:#16191f;margin-bottom:8px}
    .ec2-docs-links{display:flex;flex-wrap:wrap;gap:8px}
    .ec2-docs-link{color:#0073bb;text-decoration:none;font-size:13px}
    .ec2-docs-link:hover{text-decoration:underline}
    .ec2-docs-request{display:flex;flex-direction:column;gap:12px}
    .ec2-docs-block{border:1px solid #eaeded;border-radius:4px;background:#fff;padding:12px}
    .ec2-docs-block-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#16191f}
    .ec2-docs-code{background:#f7f8f8;border:1px solid #eaeded;border-radius:4px;padding:12px 14px;overflow:auto;font-size:12px;line-height:1.5;white-space:pre-wrap;font-family:Consolas,"Courier New",monospace;color:#16191f}
    .ec2-xml{white-space:pre}
    .ec2-xml-line{display:block}
    .ec2-xml-tag{color:#0073bb;font-weight:700}
    .ec2-xml-attr{color:#b25e00}
    .ec2-xml-value{color:#7b2cbf}
    .ec2-docs-param-table{width:100%;border-collapse:collapse;border:1px solid #eaeded}
    .ec2-docs-param-table th,.ec2-docs-param-table td{padding:10px 12px;border-bottom:1px solid #eaeded;vertical-align:top;text-align:left;font-size:13px;line-height:1.45}
    .ec2-docs-param-table th{background:#fafafa;color:#687078;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .ec2-docs-action{border:1px solid #eaeded;border-radius:4px;margin-top:12px;overflow:hidden;background:#fff}
    .ec2-docs-action summary{cursor:pointer;list-style:none;padding:12px 14px;background:#fafafa;font-weight:700;color:#16191f}
    .ec2-docs-action summary::-webkit-details-marker{display:none}
    .ec2-docs-action[open] summary{border-bottom:1px solid #eaeded}
    .ec2-docs-action-body{padding:14px}
    .ec2-doc-toggle,.s3-doc-toggle,.vpc-doc-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:1800;background:linear-gradient(180deg,#28a745 0%,#1d8102 100%);color:#fff;border:1px solid #155a02;border-right:none;border-radius:6px 0 0 6px;padding:12px 0;margin:0;width:30px;min-height:136px;box-shadow:0 6px 16px rgba(29,129,2,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
    .ec2-doc-toggle:hover,.s3-doc-toggle:hover,.vpc-doc-toggle:hover{background:linear-gradient(180deg,#30b04d 0%,#176801 100%);transform:translateY(-50%) translateX(-1px);box-shadow:0 8px 18px rgba(29,129,2,.28)}
    .ec2-doc-toggle-label,.s3-doc-toggle-label,.vpc-doc-toggle-label{display:block;transform:rotate(-90deg);transform-origin:center;white-space:nowrap;letter-spacing:.01em;line-height:1.1;font-size:12px;font-weight:800;padding:2px 0}
    .ec2-doc-drawer,.s3-doc-drawer,.vpc-doc-drawer{position:fixed;right:16px;top:66px;bottom:16px;width:460px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #eaeded;border-radius:8px;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:1900;display:flex;flex-direction:column;overflow:hidden}
    .ec2-doc-drawer-head,.s3-doc-drawer-head,.vpc-doc-drawer-head{padding:14px 16px;border-bottom:1px solid #eaeded;background:#f8fbf5;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .ec2-doc-drawer-title,.s3-doc-drawer-title,.vpc-doc-drawer-title{font-size:18px;font-weight:700;color:#16191f;line-height:1.2}
    .ec2-doc-drawer-sub,.s3-doc-drawer-sub,.vpc-doc-drawer-sub{font-size:12px;color:#687078;margin-top:4px;line-height:1.4}
    .ec2-doc-drawer-close,.s3-doc-drawer-close,.vpc-doc-drawer-close{background:#fff;border:1px solid #a6c98a;color:#1d8102;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
    .ec2-doc-drawer-close:hover,.s3-doc-drawer-close:hover,.vpc-doc-drawer-close:hover{background:#f3faec}
    .ec2-doc-drawer-body,.s3-doc-drawer-body,.vpc-doc-drawer-body{padding:14px 16px 16px;overflow:auto}
    .ec2-doc-select,.s3-doc-select,.vpc-doc-select{width:100%;padding:8px 10px;border:1px solid #879596;border-radius:4px;font-size:13px;background:#fff;outline:none;margin-bottom:12px}
    .ec2-doc-pill-row,.s3-doc-pill-row,.vpc-doc-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
    .ec2-doc-pill,.s3-doc-pill,.vpc-doc-pill{border:1px solid #d5dbdb;background:#fff;border-radius:999px;padding:6px 10px;font-size:12px;color:#16191f;cursor:pointer}
    .ec2-doc-pill.active,.s3-doc-pill.active,.vpc-doc-pill.active{border-color:#1d8102;background:#ecfdf3;color:#1d8102;font-weight:700}
    .ec2-doc-summary,.s3-doc-summary,.vpc-doc-summary{border-left:3px solid #1d8102;background:#f8fbf5;padding:10px 12px;border-radius:4px;font-size:13px;color:#16191f;margin-bottom:12px}
    .s3-switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#16191f;cursor:pointer;user-select:none;white-space:nowrap}
    .s3-switch input{position:absolute;opacity:0;pointer-events:none}
    .s3-switch-ui{width:34px;height:20px;border-radius:999px;background:#d5dbdb;position:relative;transition:background .15s ease;flex:0 0 auto}
    .s3-switch-ui::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .15s ease}
    .s3-switch input:checked + .s3-switch-ui{background:#1d8102}
    .s3-switch input:checked + .s3-switch-ui::after{transform:translateX(14px)}
    .s3-switch-label{font-weight:700;color:#16191f}
    .s3-version-list{display:grid;gap:10px}
    .s3-version-row{display:grid;grid-template-columns:minmax(0,1.5fr) repeat(4,minmax(0,1fr));gap:12px;align-items:center;border:1px solid #eaeded;border-radius:4px;background:#fff;padding:12px 14px;overflow:hidden}
    .s3-version-row.latest{border-color:#1d8102;background:#f8fbf5}
    .s3-version-cell{min-width:0}
    .s3-version-label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#687078;margin-bottom:3px}
    .s3-version-value{font-size:13px;color:#16191f;white-space:nowrap;overflow:hidden;text-overflow:clip}
    .s3-version-id{font-family:Consolas,"Courier New",monospace;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:clip}
    .s3-version-size{text-align:right;font-weight:700}
    .s3-version-empty{padding:14px;border:1px dashed #d5dbdb;border-radius:4px;background:#fafafa;color:#687078;font-size:13px}
    .s3-object-stage{display:block;margin-top:14px}
    .s3-object-list-panel,.s3-object-pane{border:1px solid #eaeded;border-radius:4px;background:#fff;min-width:0;overflow:hidden}
    .s3-object-list-panel{padding:0}
    .s3-object-pane-head{padding:14px 16px;border-bottom:1px solid #eaeded;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#fff}
    .s3-object-pane-title{font-size:16px;font-weight:700;line-height:1.2}
    .s3-object-pane-sub{font-size:12px;color:#687078;margin-top:2px;line-height:1.35}
    .s3-object-pane-body{padding:14px;min-width:0;overflow:auto}
    .s3-object-pane-actions{padding:14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid #eaeded;background:#fafafa}
    .s3-object-empty-detail{padding:24px;border:1px dashed #d5dbdb;border-radius:4px;background:#fafafa;color:#687078;font-size:13px}
    .s3-object-overview{display:grid;grid-template-columns:1fr;gap:16px;align-items:start}
    .s3-object-overview-panel{border:1px solid #eaeded;border-radius:4px;background:#fff;padding:14px;min-width:0;overflow:hidden}
    .s3-object-overview-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
    .s3-object-overview-title{font-size:16px;font-weight:700}
    .s3-object-overview-sub{font-size:12px;color:#687078;margin-top:2px}
    .s3-object-overview-body{min-width:0;overflow-x:auto}
    .s3-object-overview-history{display:grid;gap:10px}
    .s3-object-overview-history .s3-version-row{grid-template-columns:minmax(0,1.4fr) repeat(4,minmax(0,1fr));padding:10px 12px}
    .vpc-shell{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px;margin-top:14px}
    .vpc-list-panel,.vpc-detail-panel{border:1px solid #eaeded;border-radius:4px;background:#fff;min-width:0;overflow:hidden}
    .vpc-list-panel{padding:16px}
    .vpc-vpc-list{display:grid;gap:8px;margin-top:12px}
    .vpc-vpc-card{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px;cursor:pointer;transition:border-color .12s ease,background .12s ease,transform .12s ease}
    .vpc-vpc-card:hover{background:#f8fbfd;border-color:#cfd7df;transform:translateY(-1px)}
    .vpc-vpc-card.active{border-color:#0073bb;background:#f2f8fd}
    .vpc-vpc-card-title{font-size:14px;font-weight:700;line-height:1.3}
    .vpc-vpc-card-sub{font-size:12px;color:#687078;line-height:1.4;margin-top:3px}
    .vpc-vpc-card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:12px;color:#687078}
    .vpc-detail-head{padding:14px 16px;border-bottom:1px solid #eaeded;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .vpc-detail-title{font-size:16px;font-weight:700;line-height:1.2}
    .vpc-detail-sub{font-size:13px;color:#687078;margin-top:3px;line-height:1.4}
    .vpc-detail-body{padding:16px}
    .vpc-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
    .vpc-kpi{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px}
    .vpc-kpi strong{display:block;font-size:22px;line-height:1.1;margin-bottom:4px;color:#16191f}
    .vpc-kpi span{display:block;font-size:12px;color:#687078;line-height:1.35}
    .vpc-panel{border:1px solid #eaeded;border-radius:4px;background:#fff;padding:14px;min-width:0;overflow:hidden}
    .vpc-panel + .vpc-panel{margin-top:12px}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── API layer ──────────────────────────────────────────────────────────── */
async function api(method, path, body, isForm) {
  const opts = { method, cache: 'no-store' };
  if (body && !isForm) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(body); }
  else if (body) opts.body = body;
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({detail: r.statusText})); throw new Error(e.detail || 'Request failed'); }
  return r.json();
}

const S3 = {
  listBuckets:   ()         => api('GET',    '/api/s3/buckets'),
  createBucket:  (n, reg)   => api('POST',   `/api/s3/buckets/${n}?region=${reg}`),
  getBucket:     (n)        => api('GET',    `/api/s3/buckets/${n}`),
  getVersioning: (n)        => api('GET',    `/api/s3/buckets/${n}/versioning`),
  setVersioning: (n, st)    => api('PUT',    `/api/s3/buckets/${n}/versioning`, {status: st}),
  deleteBucket:  (n)        => api('DELETE', `/api/s3/buckets/${n}`),
  listObjects:   (b, pfx)   => api('GET',    `/api/s3/buckets/${b}/objects?prefix=${pfx||''}`),
  listVersions:  (b, pfx)   => api('GET',    `/api/s3/buckets/${b}/versions?prefix=${pfx||''}`),
  uploadObject:  (b, fd)    => api('POST',   `/api/s3/buckets/${b}/objects`, fd, true),
  deleteObject:  (b, k, v='') => api('DELETE', `/api/s3/buckets/${b}/objects/${encodeURIComponent(k)}${v ? `?versionId=${encodeURIComponent(v)}` : ''}`),
  getObjectMeta: (b, k, v='') => api('GET',    `/api/s3/buckets/${b}/objects/${encodeURIComponent(k)}/meta${v ? `?versionId=${encodeURIComponent(v)}` : ''}`),
  listObjectVersions: (b, k) => api('GET',  `/api/s3/buckets/${b}/objects/${encodeURIComponent(k)}/versions`),
  dlUrl:         (b, k, v='') => `/api/s3/buckets/${b}/objects/${encodeURIComponent(k)}/download${v ? `?versionId=${encodeURIComponent(v)}` : ''}`,
};

const Catalog = {
  get: () => api('GET', '/api/catalog'),
};

const Packs = {
  list: () => api('GET', '/api/packs'),
  activate: (id) => api('POST', `/api/packs/${id}/activate`),
};

const License = {
  status: () => api('GET', '/api/license/status'),
  signup: (payload) => api('POST', '/api/license/signup', payload),
  activate: (payload) => api('POST', '/api/license/activate', payload),
};

const IAM = {
  listUsers: () => api('GET', '/api/iam/users'),
  createUser: (payload) => api('POST', '/api/iam/users', payload),
  listRoles: () => api('GET', '/api/iam/roles'),
  createRole: (payload) => api('POST', '/api/iam/roles', payload),
  listPolicies: () => api('GET', '/api/iam/policies'),
  createPolicy: (payload) => api('POST', '/api/iam/policies', payload),
  attachPolicy: (payload) => api('POST', '/api/iam/attach-policy', payload),
};

const EC2 = {
  list: () => api('GET', '/api/ec2/instances'),
  create: (payload) => api('POST', '/api/ec2/instances', payload),
  start: (id) => api('POST', `/api/ec2/instances/${id}/start`),
  stop: (id) => api('POST', `/api/ec2/instances/${id}/stop`),
  reboot: (id) => api('POST', `/api/ec2/instances/${id}/reboot`),
  terminate: (id) => api('POST', `/api/ec2/instances/${id}/terminate`),

const VPC = {

  createSubnet: (payload) => api('POST', '/api/vpc/subnets', payload),
  createSecurityGroup: (payload) => api('POST', '/api/vpc/security-groups', payload),

  createRouteTable: (payload) => api('POST', '/api/vpc/route-tables', payload),

  createInternetGateway: (payload) => api('POST', '/api/vpc/internet-gateways', payload),
  attachInternetGateway: (id, payload) => api('POST', `/api/vpc/internet-gateways/${id}/attach`, payload),
  addRoute: (id, payload) => api('POST', `/api/vpc/route-tables/${id}/routes`, payload),
  associateSubnet: (id, payload) => api('POST', `/api/vpc/route-tables/${id}/associate-subnet`, payload),
  resources: (id) => api('GET', `/api/vpc/vpcs/${id}/resources`),

const RDS = {
  list: () => api('GET', '/api/rds/databases'),
  get: (id) => api('GET', `/api/rds/databases/${id}`),
  create: (payload) => api('POST', '/api/rds/databases', payload),
  modify: (id, payload) => api('PUT', `/api/rds/databases/${id}`, payload),
  delete: (id, payload = {}) => api('DELETE', `/api/rds/databases/${id}?skip_final_snapshot=${payload.skip_final_snapshot !== false}${payload.final_snapshot_identifier ? `&final_snapshot_identifier=${encodeURIComponent(payload.final_snapshot_identifier)}` : ''}`),
  start: (id) => api('POST', `/api/rds/databases/${id}/start`),
  stop: (id) => api('POST', `/api/rds/databases/${id}/stop`),
  reboot: (id) => api('POST', `/api/rds/databases/${id}/reboot`),
  snapshots: () => api('GET', '/api/rds/snapshots'),
  createSnapshot: (id, payload) => api('POST', `/api/rds/databases/${id}/snapshots`, payload),
  restoreSnapshot: (snapshotId, payload) => api('POST', `/api/rds/snapshots/${snapshotId}/restore`, payload),
  subnetGroups: () => api('GET', '/api/rds/subnet-groups'),
  createSubnetGroup: (payload) => api('POST', '/api/rds/subnet-groups', payload),
  parameterGroups: () => api('GET', '/api/rds/parameter-groups'),
  createParameterGroup: (payload) => api('POST', '/api/rds/parameter-groups', payload),
  listTags: (id) => api('GET', `/api/rds/databases/${id}/tags`),
};

const APIGateway = {
  list: () => api('GET', '/api/apigateway/apis'),
  get: (id) => api('GET', `/api/apigateway/apis/${id}`),
  create: (payload) => api('POST', '/api/apigateway/apis', payload),
  remove: (id) => api('DELETE', `/api/apigateway/apis/${id}`),
  listResources: (id) => api('GET', `/api/apigateway/apis/${id}/resources`),
  createResource: (id, payload) => api('POST', `/api/apigateway/apis/${id}/resources`, payload),
  putMethod: (id, payload) => api('POST', `/api/apigateway/apis/${id}/methods`, payload),
  putIntegration: (id, payload) => api('POST', `/api/apigateway/apis/${id}/integrations`, payload),
  createDeployment: (id, payload) => api('POST', `/api/apigateway/apis/${id}/deployments`, payload),
  listDeployments: (id) => api('GET', `/api/apigateway/apis/${id}/deployments`),
  createStage: (id, payload) => api('POST', `/api/apigateway/apis/${id}/stages`, payload),
  listStages: (id) => api('GET', `/api/apigateway/apis/${id}/stages`),
  listLogs: (id) => api('GET', `/api/apigateway/apis/${id}/logs`),
  invokeUrl: (id, stage='') => `/api/apigateway/invoke/${id}${stage ? `/${stage}` : ''}`,
};

const Deployments = {
  listBundles: () => api('GET', '/api/runtime/bundles'),
  create: (payload) => api('POST', '/api/deployments', payload),
};

/* ── Helpers ────────────────────────────────────────────────────────────── */
const fmtDate = (iso) => iso ? new Date(iso).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const relativeTime = (iso) => {
  if (!iso) return '—';
  const delta = Date.now() - new Date(iso).getTime();
  if (!Number.isFinite(delta) || delta < 0) return 'just now';
  const minutes = Math.floor(delta / 60000);
  if (minutes < 1) return 'just now';
  if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
  const days = Math.floor(hours / 24);
  return `${days} day${days === 1 ? '' : 's'} ago`;
};
  const fmtSize = (n) => { if(n<1024) return `${n} B`; if(n<1048576) return `${(n/1024).toFixed(1)} KB`; if(n<1073741824) return `${(n/1048576).toFixed(1)} MB`; return `${(n/1073741824).toFixed(1)} GB`; };
  const fileIcon = (ct='') => { if(ct.startsWith('image/')) return '🖼️'; if(ct.startsWith('video/')) return '🎥'; if(ct.startsWith('audio/')) return '🎵'; if(ct.includes('pdf')) return '📕'; if(ct.includes('zip')||ct.includes('tar')||ct.includes('gzip')) return '🗜️'; if(ct.includes('json')) return '📋'; if(ct.includes('text')) return '📝'; if(ct.includes('csv')) return '📊'; return '📄'; };
  const REGIONS = ['us-east-1','us-east-2','us-west-1','us-west-2','eu-west-1','eu-west-2','eu-central-1','ap-southeast-1','ap-southeast-2','ap-northeast-1','ca-central-1','sa-east-1'];
const AZS = ['us-east-1a','us-east-1b','us-east-1c','us-east-1d','us-east-1e','us-east-1f'];
const rdsConnectionCommand = (db) => {
  if (!db) return '—';
  const host = db.endpoint_address || '127.0.0.1';
  const port = db.endpoint_port || (db.engine === 'postgres' ? 5432 : 3306);
  const user = db.master_username || 'dbadmin';
  if (db.engine === 'postgres') return `psql -h ${host} -p ${port} -U ${user} -d ${db.db_instance_identifier}`;
  if (db.engine === 'mysql' || db.engine === 'mariadb') return `mysql -h ${host} -P ${port} -u ${user} -p`;
  return `${db.engine || 'db'} client -h ${host} -p ${port} -U ${user}`;
};
const maskSecret = (value) => value ? '********' : '—';

/* ── Notification ───────────────────────────────────────────────────────── */
function Notif({msg, type, onClose}) {
  useEffect(() => { const t = setTimeout(onClose, 4500); return () => clearTimeout(t); }, []);
  const cls = {success:'n-ok', error:'n-err', info:'n-inf'}[type] || 'n-inf';
  return <div className={`notif ${cls}`}><span className="n-txt">{msg}</span><button className="n-cls" onClick={onClose}>×</button></div>;
}

/* ── Confirm Delete Modal ───────────────────────────────────────────────── */
function ConfirmDelete({title, lines, onConfirm, onClose, busy}) {
  return (
    <div className="overlay">
      <div className="modal modal-sm">
        <div className="mh"><span className="mt" style={{color:'#d13212'}}>⚠ {title}</span><button className="mx" onClick={onClose}>×</button></div>
        <div className="mb">
          {lines.map((l,i) => <p key={i} style={{fontSize:13,marginBottom:6,lineHeight:1.6}}>{l}</p>)}
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-d" onClick={onConfirm} disabled={busy}>{busy ? '⏳ Deleting…' : 'Delete'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Create Bucket Modal ────────────────────────────────────────────────── */
function CreateBucketModal({onClose, onDone}) {
  const [name, setName] = useState('');
  const [region, setRegion] = useState('us-east-1');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const validate = (v) => {
    if (!v) return 'Bucket name is required';
    if (v.length < 3) return 'Must be at least 3 characters';
    if (v.length > 63) return 'Must be 63 characters or fewer';
    if (!/^[a-z0-9][a-z0-9\-\.]*[a-z0-9]$/.test(v)) return 'Lowercase letters, numbers and hyphens only. Cannot start/end with hyphen.';
    return '';
  };

  const submit = async () => {
    const e = validate(name); if (e) { setErr(e); return; }
    setBusy(true);
    try { await S3.createBucket(name, region); onDone(`Bucket "${name}" created successfully in ${region}`); }
    catch(e) { setErr(e.message); setBusy(false); }
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="mh"><span className="mt">Create bucket</span><button className="mx" onClick={onClose}>×</button></div>
        <div className="mb">
          <div className="ibox"><strong>ℹ Simulator</strong> — State persists locally. Services activate on demand.</div>
          <div className="fg">
            <label className="fl">Bucket name <span style={{color:'#d13212'}}>*</span></label>
            <input className="fi" autoFocus placeholder="my-example-bucket" value={name} onChange={e=>{setName(e.target.value.toLowerCase());setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()} />
            {err && <div className="ferr">{err}</div>}
            <div className="fh">Must be 3–63 characters. Lowercase letters, numbers, hyphens. Globally unique.</div>
          </div>
          <div className="fg">
            <label className="fl">AWS Region</label>
            <select className="fi" value={region} onChange={e=>setRegion(e.target.value)}>
              {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <hr style={{margin:'16px 0',border:'none',borderTop:'1px solid #eaeded'}}/>
          <div className="fg" style={{marginBottom:0}}>
            <label className="fl">Block Public Access settings for this bucket</label>
            <div style={{background:'#fafafa',padding:12,borderRadius:4,border:'1px solid #eaeded'}}>
              {['Block all public access','Block public ACLs','Ignore public ACLs','Block public bucket policies','Restrict public bucket policies'].map(o =>
                <label key={o} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7,fontSize:13,cursor:'pointer'}}>
                  <input type="checkbox" defaultChecked/> {o}
                </label>
              )}
            </div>
            <div className="fh">Recommended: keep all enabled.</div>
          </div>
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy?'⏳ Creating…':'Create bucket'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Upload Modal ───────────────────────────────────────────────────────── */
function UploadModal({bucket, onClose, onDone}) {
  const [files, setFiles] = useState([]);
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dov, setDov] = useState(false);
  const ref = useRef();

  const add = (fl) => setFiles(p => [...p, ...Array.from(fl)]);
  const rm  = (i)  => setFiles(p => p.filter((_,j)=>j!==i));

  const upload = async () => {
    if (!files.length) return;
    setBusy(true); let ok=0, fail=0;
    for (let i=0; i<files.length; i++) {
      setProgress(Math.round(((i)/files.length)*100));
      const fd = new FormData(); fd.append('file', files[i]);
      try { await S3.uploadObject(bucket, fd); ok++; } catch { fail++; }
    }
    setProgress(100);
    onDone(ok, fail);
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>
      <div className="modal">
        <div className="mh"><span className="mt">Upload to <em style={{fontWeight:400}}>{bucket}</em></span><button className="mx" onClick={onClose} disabled={busy}>×</button></div>
        <div className="mb">
          <div className={`upzone ${dov?'dov':''}`}
            onClick={()=>!busy&&ref.current.click()}
            onDrop={e=>{e.preventDefault();setDov(false);add(e.dataTransfer.files);}}
            onDragOver={e=>{e.preventDefault();setDov(true);}}
            onDragLeave={()=>setDov(false)}>
            <div className="upzone-txt"><strong>Drag and drop</strong> files here<br/>or <span style={{color:'#0073bb'}}>click to browse</span></div>
            <input type="file" multiple ref={ref} style={{display:'none'}} onChange={e=>add(e.target.files)}/>
          </div>
          {files.length > 0 &&
            <div className="fi-list">
              <div style={{fontSize:13,fontWeight:700,margin:'10px 0 6px'}}>Files to upload ({files.length}) — {fmtSize(files.reduce((s,f)=>s+f.size,0))} total</div>
              {files.map((f,i) =>
                <div key={i} className="fi-item">
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                  <span className="fi-sz">{fmtSize(f.size)}</span>
                  <button className="fi-rm" onClick={()=>rm(i)} disabled={busy}>×</button>
                </div>
              )}
            </div>
          }
          {busy && <div className="prog-wrap"><div className="prog" style={{width:progress+'%'}}/></div>}
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose} disabled={busy}>Cancel</button>
          <button className="btn btn-p" onClick={upload} disabled={!files.length||busy}>{busy?`Uploading… ${progress}%`:`Upload${files.length?' ('+files.length+')':''}`}</button>
        </div>
      </div>
    </div>
  );
}

function ObjectVersionsView({versions, objKey}) {
  const [sel, setSel] = useState([]);
  const rowKey = (v) => `${v.version_id || 'null'}@@${v.last_modified || ''}`;
  const displayVersionId = (value) => (value ? value : '—');
  const toggle = (k) => setSel(p => p.includes(k) ? p.filter(x => x !== k) : [...p, k]);
  const allChecked = versions.length > 0 && sel.length === versions.length;
  return (
    <div className="s3-object-overview">
      <div className="s3-object-overview-panel" style={{gridColumn:'1 / -1'}}>
        <div className="s3-object-overview-head">
          <div>
            <div className="s3-object-overview-title">Version history</div>
            <div className="s3-object-overview-sub">{versions.length ? `${versions.length} version${versions.length === 1 ? '' : 's'}` : 'No versions found for this object.'}</div>
          </div>
        </div>
        <div className="s3-object-overview-body">
          {versions.length > 0 ? (
            <table className="tbl">
              <thead><tr>
                <th><input type="checkbox" checked={allChecked} onChange={e=>setSel(e.target.checked ? versions.map(rowKey) : [])}/></th>
                <th>Name</th>
                <th>Version ID</th>
                <th>Type</th>
                <th>Last modified</th>
                <th>Size</th>
                <th>Storage class</th>
              </tr></thead>
              <tbody>
                {versions.map(v => {
                  const k = rowKey(v);
                  return (
                    <tr key={k}>
                      <td><input type="checkbox" checked={sel.includes(k)} onChange={()=>toggle(k)}/></td>
                      <td><span className="lnk" title={objKey}>{objKey}</span></td>
                      <td><span className="ec2-mono" title={displayVersionId(v.version_id)}>{displayVersionId(v.version_id)}</span></td>
                      <td style={{color:'#687078'}}>{v.is_delete_marker ? 'Delete marker' : 'Object'}</td>
                      <td>{fmtDate(v.last_modified)}</td>
                      <td>{v.is_delete_marker ? '—' : v.size_human}</td>
                      <td><span className="tag tb2">{v.storage_class || 'STANDARD'}</span></td>

                })}
              </tbody>
            </table>
          ) : (
            <div className="s3-version-empty">This object has no additional visible versions.</div>
          )}
        </div>
      </div>
    </div>
  );
}

function CreateVpcView({onBack, onDone}) {
  const [resourceType, setResourceType] = useState('vpc-only');
  const [name, setName] = useState('my-vpc-01');
  const [cidr, setCidr] = useState('10.0.0.0/24');
  const [ipv4Mode, setIpv4Mode] = useState('manual');
  const [ipv6Mode, setIpv6Mode] = useState('none');
  const [tenancy, setTenancy] = useState('default');
  const [encryption, setEncryption] = useState('none');
  const [tagRows, setTagRows] = useState([]);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    setBusy(true);
    setErr('');
    try {
      const tags = tagRows.map(t => ({key: (t.key || '').trim(), value: (t.value || '').trim()})).filter(t => t.key || t.value);
      const created = await VPC.createVpc({
        name,
        cidr_block: cidr,
        encryption_controls: encryption === 'none' ? 'None' : encryption === 'monitor' ? 'Monitor mode' : 'Enforce mode',
        tenancy,
        ipv6_mode: ipv6Mode,
        tags,
      });
      onDone(created);
    } catch (e) {
      setErr(e.message);
      setBusy(false);
    }
  };

  const resourceOptions = [
    {id:'vpc-only', title:'VPC only', desc:'Create only the VPC resource.'},
    {id:'vpc-more', title:'VPC and more', desc:'Create the VPC plus supporting networking resources.'},
  ];

  const encryptionOptions = [
    {id:'none', title:'None', desc:'No encryption control is applied.'},
    {id:'monitor', title:'Monitor mode', desc:'See encryption status without blocking traffic.'},
    {id:'enforce', title:'Enforce mode', desc:'Require encryption-capable resources.'},
  ];

  const addTag = () => setTagRows(p => [...p, {key:'', value:''}]);
  const updateTag = (idx, field, value) => setTagRows(p => p.map((row, i) => i === idx ? {...row, [field]: value} : row));
  const removeTag = (idx) => setTagRows(p => p.filter((_, i) => i !== idx));

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>VPC</span><span className="bc-sep">›</span><a onClick={onBack}>Your VPCs</a><span className="bc-sep">›</span><span>Create VPC</span>
        </div>
        <div className="vpc-page-title">Create VPC</div>
        <div className="vpc-page-sub">A VPC is an isolated portion of the AWS Cloud populated by AWS objects, such as Amazon EC2 instances.</div>
      </div>
      <div className="vpc-create-wrap">
        <div className="vpc-create-card">
          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">VPC settings</div>
            <div className="vpc-create-subhead">
              <span>Resources to create</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-choice-grid">
              {resourceOptions.map(opt => (
                <label key={opt.id} className={`vpc-choice-card ${resourceType === opt.id ? 'selected' : ''}`}>
                  <input type="radio" name="resourceType" checked={resourceType === opt.id} onChange={() => setResourceType(opt.id)} />
                  <div>
                    <div className="vpc-choice-title">{opt.title}</div>
                    <div className="vpc-choice-desc">{opt.desc}</div>
                  </div>
                </label>
              ))}
            </div>
            <div className="fh">The simulator currently creates the base VPC and default networking resources.</div>
          </div>

          <div className="vpc-create-section">
            <label className="fl">Name tag - optional</label>
            <div className="fh" style={{marginBottom:6}}>Creates a tag with a key of "Name" and a value that you specify.</div>
            <input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="my-vpc-01" />
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>IPv4 CIDR block</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-radio-stack">
              <label className="vpc-radio-line">
                <input type="radio" name="ipv4Mode" checked={ipv4Mode === 'manual'} onChange={() => setIpv4Mode('manual')} />
                <span>IPv4 CIDR manual input</span>
              </label>
              <label className="vpc-radio-line">
                <input type="radio" name="ipv4Mode" checked={ipv4Mode === 'ipam'} onChange={() => setIpv4Mode('ipam')} />
                <span>IPAM-allocated IPv4 CIDR block</span>
              </label>
            </div>
            <div className="vpc-create-field">
              <label className="fl">IPv4 CIDR</label>
              <input className="fi" value={cidr} onChange={e=>setCidr(e.target.value)} placeholder="10.0.0.0/24" />
              <div className="fh">CIDR block size must be between /16 and /28.</div>
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>IPv6 CIDR block</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-radio-stack">
              {[
                ['none','No IPv6 CIDR block'],
                ['ipam','IPAM-allocated IPv6 CIDR block'],

          <div className="vpc-create-section">

            <select className="fi" value={tenancy} onChange={e=>setTenancy(e.target.value)}>
              <option value="default">Default</option>
              <option value="dedicated">Dedicated</option>
            </select>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>VPC encryption control ($)</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-choice-grid vpc-choice-grid-3">
              {encryptionOptions.map(opt => (
                <label key={opt.id} className={`vpc-choice-card ${encryption === opt.id ? 'selected' : ''}`}>
                  <input type="radio" name="encryption" checked={encryption === opt.id} onChange={() => setEncryption(opt.id)} />
                  <div>
                    <div className="vpc-choice-title">{opt.title}</div>
                    <div className="vpc-choice-desc">{opt.desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Tags</div>
            <div className="vpc-create-tag-note">A tag is a label that you assign to an AWS resource. Use tags to search and filter your resources or track your AWS costs.</div>
            <div className="vpc-create-tag-empty">No tags associated with the resource</div>
            {tagRows.map((row, idx) => (
              <div className="vpc-create-tag-row" key={idx}>
                <input className="fi" placeholder="Key" value={row.key} onChange={e => updateTag(idx, 'key', e.target.value)} />
                <input className="fi" placeholder="Value" value={row.value} onChange={e => updateTag(idx, 'value', e.target.value)} />
                <button className="btn btn-s" onClick={() => removeTag(idx)} disabled={busy}>Remove</button>
              </div>
            ))}
            <div className="btn-grp" style={{marginTop:12}}>
              <button className="btn btn-s" onClick={addTag} disabled={busy}>Add tag</button>
            </div>
            <div className="fh" style={{marginTop:8}}>You can add 50 more tags.</div>
          </div>

          {err && <div className="ferr" style={{marginTop:8}}>{err}</div>}

          <div className="vpc-create-footer">
            <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
            <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create VPC'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ObjDetail({bucket, objKey, versionId = '', onClose, onDelete}) {
  const [meta, setMeta] = useState(null);
  const [versions, setVersions] = useState([]);
  const [err, setErr]   = useState('');
  const [view, setView]  = useState('properties');
  const title = versionId && versionId !== 'null' ? `${objKey} (${versionId})` : objKey;

  useEffect(() => {
    S3.getObjectMeta(bucket, objKey, versionId).then(setMeta).catch(e=>setErr(e.message));
    S3.listObjectVersions(bucket, objKey).then(d => setVersions(d.versions || [])).catch(() => setVersions([]));
    setView('properties');
  }, [bucket, objKey, versionId]);

  return (
    <div className="s3-object-pane">
      <div className="s3-object-pane-head">
        <div style={{minWidth:0}}>
          <div className="s3-object-pane-title">{title}</div>
          <div className="s3-object-pane-sub">Object overview for the selected file.</div>
        </div>
        <button className="btn btn-s" onClick={onClose}>Close</button>
      </div>
      <div className="tabs">
        <div className={`tab ${view === 'properties' ? 'active' : ''}`} onClick={() => setView('properties')}>
          Properties
        </div>
        <div className={`tab ${view === 'versions' ? 'active' : ''}`} onClick={() => setView('versions')}>
          Versions
        </div>
      </div>
      <div className="s3-object-pane-body">
        {err ? <p style={{color:'#d13212'}}>{err}</p> : !meta ? <div className="ld">Loading…</div> : (
          view === 'properties'
            ? <ObjectPropertiesView meta={meta}/>
            : <ObjectVersionsView versions={versions} objKey={objKey}/>
        )}
      </div>
      <div className="s3-object-pane-actions">
        <button className="btn btn-d" onClick={()=>onDelete(objKey, versionId)}>Delete</button>
        {meta && !meta.is_delete_marker && <a className="btn btn-p" href={S3.dlUrl(bucket, objKey, meta.version_id)} download={objKey}>Download</a>}
      </div>
    </div>
  );
}

function PacksView({notify}) {
  const [packs, setPacks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try { const d = await Packs.list(); setPacks(d.packs || []); }
    catch(e) { notify(e.message, 'error'); }
    finally { setLoading(false); }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  const activate = async (id) => {
    setBusy(id);
    try { await Packs.activate(id); notify(`Pack "${id}" activated`, 'success'); load(); }
    catch(e) { notify(e.message, 'error'); }
    finally { setBusy(null); }
  };

  return (
    <div className="panel">
      <div className="ph">
        <div>
          <div className="pt">Capability Packs</div>
          <div className="ps">Signed packs are activated on demand and must pass AWS-like API contract checks.</div>
        </div>
        <div className="btn-grp"><button className="btn btn-s" onClick={load}>↻ Refresh</button></div>
      </div>
      {loading ? <div className="ld">⏳ Loading packs…</div> : (
        <table className="tbl">
          <thead><tr><th>Name</th><th>Type</th><th>Version</th><th>Status</th><th>API</th><th></th></tr></thead>
          <tbody>
            {packs.map(p => (
              <tr key={p.id}>
                <td>{p.id}</td>
                <td>{p.type}</td>
                <td>{p.version}</td>
                <td><span className={`tag ${p.active ? 'tg' : 'tgr'}`}>{p.state}</span></td>
                <td>{p.api?.protocol || '—'}</td>
                <td style={{textAlign:'right'}}>
                  {!p.active && <button className="btn btn-p" onClick={()=>activate(p.id)} disabled={busy===p.id}>{busy===p.id?'⏳ Activating…':'Activate'}</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function LicenseView({notify}) {
  const [lic, setLic] = useState(null);
  const [form, setForm] = useState({email:'', user:'guest', tier:'free', device_id:''});
  const [token, setToken] = useState('');
  const [busy, setBusy] = useState(false);

  const load = useCallback(async () => {
    try { setLic(await License.status()); }
    catch(e) { notify(e.message, 'error'); }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  const signup = async () => {
    setBusy(true);
    try {
      const d = await License.signup(form);
      setLic(d.license);
      setToken(d.token);
      notify(`License issued for ${d.license.tier} tier`, 'success');
    } catch(e) {
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  const activate = async () => {
    if (!token) return notify('Paste a token first', 'error');
    setBusy(true);
    try { const d = await License.activate({token}); setLic(d.license); notify('License activated', 'success'); }
    catch(e) { notify(e.message, 'error'); }
    finally { setBusy(false); }

  return (
    <div className="panel">

          {lic ? (
            <table className="ptbl"><tbody>
              {[['User',lic.user],['Email',lic.email],['Tier',lic.tier],['Credits',lic.credits],['Status',lic.status],['Device',lic.device_id||'—']].map(([k,v]) => (

        </div>

          <div className="btn-grp"><button className="btn btn-p" onClick={signup} disabled={busy}>{busy?'⏳ Issuing…':'Generate license'}</button></div>
          <div className="fg" style={{marginTop:16}}><label className="fl">Activation token</label><textarea className="fi" rows="4" value={token} onChange={e=>setToken(e.target.value)} /></div>
          <div className="btn-grp"><button className="btn btn-s" onClick={activate} disabled={busy}>Activate token</button></div>
        </div>
      </div>
    </div>
  );

function LaunchInstanceModal({onClose, onDone, notify, defaults = {}}) {
  const [busy, setBusy] = useState(false);
  const [vpcs, setVpcs] = useState([]);
  const [subnets, setSubnets] = useState([]);
  const [sgs, setSgs] = useState([]);
  const [amis, setAmis] = useState([]);
  const [sampleApps, setSampleApps] = useState([]);
  const [form, setForm] = useState({
    name: 'demo-instance',
    instance_type: 't3.micro',
    ami: '',
    key_pair: '',
    runtime: 'python',
    vpc_id: '',
    subnet_id: '',
    security_group_ids: '',
    az: 'us-east-1a',
    storage_gb: 8,
    command: '',
    user_data: '',
    sample_app_id: '',
    ...defaults,
  });

  useEffect(() => {
    Promise.all([
      api('GET', '/api/vpc/vpcs').catch(() => ({vpcs: []})),
      api('GET', '/api/vpc/subnets').catch(() => ({subnets: []})),
      api('GET', '/api/vpc/security-groups').catch(() => ({security_groups: []})),
      api('GET', '/api/ec2/amis').catch(() => ({amis: []})),
      EC2.sampleApps().catch(() => ({sample_apps: []})),
    ]).then(([v, s, g, a, samples]) => {
      setVpcs(v.vpcs || []);
      setSubnets(s.subnets || []);
      setSgs(g.security_groups || []);
      setAmis(a.amis || []);
      setSampleApps(samples.sample_apps || []);
      const catalogAmis = a.amis || [];
      if (!form.ami && catalogAmis.length) {
        const first = catalogAmis[0];
        setForm(f => ({...f, ami: first.ami, runtime: first.default_runtime || f.runtime}));
      }
      if (!form.vpc_id && (v.vpcs || []).length) setForm(f => ({...f, vpc_id: v.vpcs[0].vpc_id, subnet_id: '', security_group_ids: ''}));
    });
  }, []);

  const currentAmi = amis.find(a => a.ami === form.ami);
  const currentSampleApp = sampleApps.find(app => app.id === form.sample_app_id);
  const amiGroups = useMemo(() => {
    const groups = amis.reduce((acc, ami) => {
      const group = ami.category || 'Other AMIs';
      if (!acc[group]) acc[group] = [];
      acc[group].push(ami);
      return acc;
    }, {});
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
  }, [amis]);

  const submit = async () => {
    setBusy(true);
    try {
      const payload = {
        ...form,
        storage_gb: Number(form.storage_gb) || 8,
        sample_app_id: form.sample_app_id || '',
        security_group_ids: form.security_group_ids ? form.security_group_ids.split(',').map(s => s.trim()).filter(Boolean) : []
      };
      await EC2.create(payload);
      notify('EC2 instance launched', 'success');
      onDone();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  const filteredSubnets = subnets.filter(s => !form.vpc_id || s.vpc_id === form.vpc_id);
  const filteredSgs = sgs.filter(s => !form.vpc_id || s.vpc_id === form.vpc_id);

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>
      <div className="modal" style={{width:760}}>
        <div className="mh">
          <span className="mt">Launch instance</span>
          <button className="mx" onClick={onClose} disabled={busy}>×</button>
        </div>
        <div className="mb">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:14}}>
            <div className="fg">
              <label className="fl">Name and tags</label>
              <input className="fi" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">AMI</label>
              <select className="fi" value={form.ami} onChange={e=>{
                const next = amis.find(a => a.ami === e.target.value);
                setForm(f=>({
                  ...f,
                  ami: e.target.value,
                  runtime: next?.default_runtime || f.runtime,
                }));
              }}>
                <option value="">Select AMI</option>
                {amiGroups.map(([group, groupAmis]) => (
                  <optgroup key={group} label={group}>
                    {groupAmis.map(a => <option key={a.ami} value={a.ami}>{a.name} ({a.ami})</option>)}
                  </optgroup>
                ))}
              </select>
              <div className="fh">{currentAmi?.description || 'Choose the base image for this instance.'}</div>
            </div>
            <div className="fg">
              <label className="fl">Sample app</label>
              <select className="fi" value={form.sample_app_id} onChange={e=>{
                const next = sampleApps.find(app => app.id === e.target.value);
                setForm(f=>({
                  ...f,
                  sample_app_id: e.target.value,
                  command: next ? next.start_command : '',
                }));
              }}>
                <option value="">No sample app</option>
                {sampleApps.map(app => <option key={app.id} value={app.id}>{app.name}</option>)}
              </select>
              <div className="fh">{currentSampleApp?.description || 'Optional starter workload copied into the instance workspace.'}</div>
            </div>
            <div className="fg">
              <label className="fl">Instance type</label>
              <input className="fi" value={form.instance_type} onChange={e=>setForm(f=>({...f,instance_type:e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">Key pair</label>
              <input className="fi" value={form.key_pair} onChange={e=>setForm(f=>({...f,key_pair:e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">Runtime</label>
              <select className="fi" value={form.runtime} onChange={e=>setForm(f=>({...f,runtime:e.target.value}))}>
                {['python','java','dotnet','go','php'].map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">Availability zone</label>
              <select className="fi" value={form.az} onChange={e=>setForm(f=>({...f,az:e.target.value}))}>
                {['us-east-1a','us-east-1b','us-east-1c','us-west-2a','eu-west-1a'].map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">VPC</label>
              <select className="fi" value={form.vpc_id} onChange={e=>setForm(f=>({...f,vpc_id:e.target.value, subnet_id:''}))}>
                <option value="">Select VPC</option>
                {vpcs.map(v => <option key={v.vpc_id} value={v.vpc_id}>{v.name} ({v.cidr_block})</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">Subnet</label>
              <select className="fi" value={form.subnet_id} onChange={e=>setForm(f=>({...f,subnet_id:e.target.value}))}>
                <option value="">Select subnet</option>
                {filteredSubnets.map(s => <option key={s.subnet_id} value={s.subnet_id}>{s.name} ({s.cidr_block})</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">Security groups</label>
              <div style={{border:'1px solid #eaeded',borderRadius:4,padding:10,background:'#fafafa',maxHeight:180,overflow:'auto'}}>
                {filteredSgs.length ? filteredSgs.map(sg => {
                  const checked = form.security_group_ids.split(',').map(s=>s.trim()).filter(Boolean).includes(sg.security_group_id);
                  return (
                    <label key={sg.security_group_id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,fontSize:13,cursor:'pointer'}}>
                      <input
                        type="checkbox"
                        checked={checked}
                        onChange={e=>{
                          const current = form.security_group_ids.split(',').map(s=>s.trim()).filter(Boolean);
                          const next = e.target.checked
                            ? [...new Set([...current, sg.security_group_id])]
                            : current.filter(id => id !== sg.security_group_id);
                          setForm(f=>({...f, security_group_ids: next.join(', ')}));
                        }}
                      />
                      <span>{sg.group_name}</span>
                      <span className="arn">{sg.security_group_id}</span>
                    </label>
                  );
                }) : <div className="fh">Create a security group in the VPC screen first.</div>}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Storage (GiB)</label>
              <input className="fi" type="number" min="8" value={form.storage_gb} onChange={e=>setForm(f=>({...f,storage_gb:e.target.value}))}/>
            </div>
          </div>
          <div className="fg">
            <label className="fl">Advanced details / user data</label>
            <textarea className="fi" rows="4" value={form.user_data} onChange={e=>setForm(f=>({...f,user_data:e.target.value}))} placeholder="#!/bin/bash&#10;echo hello"/>
          </div>
          <div className="fg">
            <label className="fl">Boot command</label>
            <textarea className="fi" rows="3" value={form.command} onChange={e=>setForm(f=>({...f,command:e.target.value}))} placeholder="python -m http.server 8080"/>
            <div className="fh">This command runs inside the chosen runtime after start. Docker is used when available; otherwise the simulator falls back to the local EC2 runtime.</div>
          </div>
          {currentAmi && (
            <div className="ibox">
              <strong>Runtime image</strong> — {currentAmi.runtime_image || currentAmi.container_image || 'python:3.12-slim'} will back Docker-based launches.
            </div>
          )}
          <div className="ibox"><strong>Launch summary</strong> — The backend will create a Docker-backed EC2 instance when Docker is present, otherwise it uses the local simulator runtime and persists state locally.</div>
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose} disabled={busy}>Cancel</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Launching…' : 'Launch instance'}</button>
        </div>
      </div>
    </div>
  );
}

function DeploySampleAppModal({instance, onClose, onDone, notify}) {
  const [apps, setApps] = useState([]);
  const [selected, setSelected] = useState(instance?.sample_app_id || '');
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    EC2.sampleApps()
      .then(d => {
        setApps(d.sample_apps || []);
        if (!selected && (d.sample_apps || []).length) {
          setSelected(d.sample_apps[0].id);
        }
      })
      .catch(e => notify(e.message, 'error'));
  }, []);

  const current = apps.find(app => app.id === selected);

  const deploy = async () => {
    if (!selected) {
      notify('Choose a sample app first.', 'error');
      return;
    }

function EC2ConsoleModal({instance, notify, onClose}) {
  const instanceId = instance?.instance_id || instance?.id || instance?.instanceId || instance?.instanceID || '';
  const [output, setOutput] = useState('');
  const [input, setInput] = useState('');
  const [status, setStatus] = useState('connecting');
  const [busy, setBusy] = useState(false);
  const [history, setHistory] = useState([]);
  const [historyIndex, setHistoryIndex] = useState(-1);
  const endRef = useRef(null);
  const inputRef = useRef(null);
  const wsRef = useRef(null);
  const wsErroredRef = useRef(false);
  const isDockerBacked = instance?.runtime_backend === 'docker';
  const sessionLabel = isDockerBacked ? 'docker exec -it' : 'local runtime shell';
  const sessionTarget = isDockerBacked ? (instance.container_name || instance.container_id || instanceId) : 'simulated EC2 runtime';
  const hostCommand = isDockerBacked ? `docker exec -it ${sessionTarget} /bin/sh` : '';
  const prompt = instance?.console_prompt || (isDockerBacked ? `root@${sessionTarget}:/workspace#` : 'C:\\Users\\Administrator>');
  const emptyTerminal = isDockerBacked
    ? <>docker exec -it {sessionTarget} /bin/sh<br/>Connected to container {sessionTarget} ({instance.runtime_image || 'python:3.12-slim'})</>
    : <>Microsoft Windows [Version 10.0.22631.0]<br/>(c) CloudLearn Simulator. All rights reserved.<br/><br/>{`Attached to ${sessionLabel} ${sessionTarget}`}</>;

  useEffect(() => {
    if (!instanceId) {
      setStatus('error');
      setOutput('Missing EC2 instance id.\n');
      return;
    }
    const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${scheme}://${window.location.host}/ws/ec2/instances/${encodeURIComponent(instanceId)}/console`);
    wsRef.current = ws;
    wsErroredRef.current = false;
    setStatus('connecting');
    ws.onopen = () => setStatus(isDockerBacked ? 'attached' : 'live');
    ws.onmessage = (ev) => {
      const chunk = typeof ev.data === 'string' ? ev.data.replace(/\r\n/g, '\n').replace(/\r/g, '\n') : '';
      if (!chunk) return;
      setOutput(prev => (prev ? prev + chunk : chunk));
    };
    ws.onerror = () => {
      wsErroredRef.current = true;
      setStatus('error');
      setOutput(`Unable to open Command Prompt for ${instanceId}.\n`);
    };
    ws.onclose = () => {
      if (!wsErroredRef.current) setStatus('closed');
    };
    return () => {
      try { ws.close(); } catch (_) {}
    };
  }, [instanceId, instance?.endpoint_url, instance?.runtime_image, isDockerBacked, sessionTarget]);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({behavior:'smooth', block:'end'});
  }, [output]);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  const send = (data) => {
    const ws = wsRef.current;
    if (!instanceId) {
      notify('Missing EC2 instance id for console connection.', 'error');
      return;
    }
    if (!ws || ws.readyState !== 1) {
      notify('Console is not connected.', 'error');
      return;
    }
    setBusy(true);
    const command = data.replace(/\n$/, '');
    try {
      ws.send(command);
    } catch (e) {
      notify(e.message || 'Console session is not connected.', 'error');
    } finally {
      setBusy(false);
    }
  };

  const submit = () => {
    if (busy) return;
    const value = input.trimEnd();
    if (!value) return;
    if (!isDockerBacked) {
      setOutput(prev => {
        const echo = `${prompt} ${value}\n`;
        return prev ? prev + echo : echo;
      });
    }
    setHistory(prev => {
      const next = [...prev, value];
      return next.slice(-100);
    });
    setHistoryIndex(-1);
    send(value + '\n');
    setInput('');
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="mh">
          <span className="mt">Command Prompt</span>
          <button className="mx" onClick={onClose}>×</button>
        </div>
        <div className="mb">
          <div className="ibox">
            <strong>{instance.name}</strong> — {instanceId || instance.instance_id}
            <div className="console-meta">
              <span>State: <strong>{instance.state}</strong></span>
              <span>AMI: <strong>{instance.ami_name || instance.ami}</strong></span>
              <span>Runtime image: <strong>{instance.runtime_image || 'python:3.12-slim'}</strong></span>
              <span>Sample app: <strong>{instance.sample_app_name || 'none'}</strong></span>
              <span>Backend: <strong>{instance.runtime_backend || 'simulated'}</strong></span>
              {instance.endpoint_url && <span>Endpoint: <strong>{instance.endpoint_url}</strong></span>}
              {hostCommand && <span>Host command: <strong className="ec2-mono">{hostCommand}</strong></span>}
            </div>
          </div>
          <div className="terminal-wrap">
            <div className="terminal-top">
              <span className="terminal-title"><span className="terminal-dot" />{sessionLabel}</span>
              <span className="terminal-state">{status}</span>
            </div>
            <div className="terminal-output">
              {output || <span className="dim">{emptyTerminal}</span>}
              <span ref={endRef} />
            </div>
            <div className="terminal-input-row">
              <div className="terminal-input-wrap">
                <span className="shell-prompt">{prompt}</span>
                <input
                  ref={inputRef}
                  className="shell-input"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      submit();
                    } else if (e.key === 'ArrowUp') {
                      e.preventDefault();
                      const nextIndex = history.length ? (historyIndex < 0 ? history.length - 1 : Math.max(0, historyIndex - 1)) : -1;
                      if (nextIndex >= 0) {
                        setHistoryIndex(nextIndex);
                        setInput(history[nextIndex] || '');
                      }
                    } else if (e.key === 'ArrowDown') {
                      e.preventDefault();
                      if (!history.length) return;
                      const nextIndex = historyIndex < 0 ? -1 : historyIndex + 1;
                      if (nextIndex >= history.length) {
                        setHistoryIndex(-1);
                        setInput('');
                      } else {
                        setHistoryIndex(nextIndex);
                        setInput(history[nextIndex] || '');
                      }
                    } else if (e.key === 'Tab') {
                      e.preventDefault();
                      setInput(prev => prev + '  ');
                    }
                  }}
                  placeholder={isDockerBacked ? 'Type a command and press Enter' : 'Local runtime console'}
                  spellCheck="false"
                  autoCapitalize="off"
                  autoComplete="off"
                  autoCorrect="off"
                />
              </div>
            </div>
          </div>
          <div className="terminal-actions">
            <div className="btn-grp">
              <button className="btn btn-s" onClick={() => setOutput('')} disabled={busy}>Cls</button>
              <button className="btn btn-s" onClick={() => send('\u0003')} disabled={busy}>Ctrl-C</button>
            </div>
            <div className="btn-grp">
              <button className="btn btn-s" onClick={() => notify('Console output is streamed from the running EC2 instance console.', 'info')} disabled={busy}>Info</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const renderXmlSnippet = (xml) => {
  const escapeAttr = (value) => String(value).replace(/"/g, '&quot;');
  const highlightTag = (tag) => {
    const match = tag.match(/^<(\/?)([A-Za-z0-9:_-]+)([\s\S]*?)(\/?)>$/);
    if (!match) return <span className="ec2-xml-tag">{tag}</span>;
    const [, closing, name, attrs, selfClosing] = match;
    const tokens = [];
    let lastIndex = 0;
    const attrRe = /([A-Za-z0-9:_-]+)=("([^"]*)"|'([^']*)')/g;
    let attrMatch;
    while ((attrMatch = attrRe.exec(attrs)) !== null) {
      if (attrMatch.index > lastIndex) {
        tokens.push(attrs.slice(lastIndex, attrMatch.index));
      }
      tokens.push(
        <React.Fragment key={`${name}-attr-${attrMatch.index}`}>
          {' '}
          <span className="ec2-xml-attr">{attrMatch[1]}</span>="<span className="ec2-xml-value">{escapeAttr(attrMatch[3] || attrMatch[4] || '')}</span>"
        </React.Fragment>
      );
      lastIndex = attrRe.lastIndex;
    }
    if (lastIndex < attrs.length) {
      tokens.push(attrs.slice(lastIndex));
    }
    return (
      <span className="ec2-xml-tag">
        &lt;{closing}{name}
        {tokens}
        {selfClosing ? '/' : ''}
        &gt;
      </span>
    );
  };

  return (
    <pre className="ec2-docs-code ec2-xml">
      {String(xml).split('\n').map((line, lineIndex) => {
        const parts = line.split(/(<[^>]+>)/g).filter(Boolean);
        return (
          <span key={lineIndex} className="ec2-xml-line">
            {parts.length ? parts.map((part, partIndex) => (
              part.startsWith('<')
                ? <React.Fragment key={partIndex}>{highlightTag(part)}</React.Fragment>
                : <React.Fragment key={partIndex}>{part}</React.Fragment>
            )) : '\u00a0'}
          </span>
        );
      })}
    </pre>
  );
};

function VPCView({notify}) {
  const [data, setData] = useState({vpcs:[], subnets:[], security_groups:[], route_tables:[], internet_gateways:[], instances:[]});
  const [loading, setLoading] = useState(true);
  const [selectedVpcId, setSelectedVpcId] = useState('');
  const [pageTab, setPageTab] = useState('vpcs');
  const [detailTab, setDetailTab] = useState('details');
  const [query, setQuery] = useState('');
  const [updatedAt, setUpdatedAt] = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteVpcTarget, setDeleteVpcTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [showVpcLaunch, setShowVpcLaunch] = useState(false);
  const [vpcResourceForm, setVpcResourceForm] = useState({
    subnet_name: 'public-subnet-a',
    subnet_cidr: '10.0.1.0/24',
    subnet_az: AZS[0],
    sg_name: 'sg-web',
    sg_desc: 'Web access group',
    rt_name: 'rt-public',
    igw_name: 'igw-main',
    assoc_rt_id: '',
    assoc_subnet_id: '',
  });

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [vpcs, subnets, securityGroups, routeTables, internetGateways, instances] = await Promise.all([
        VPC.listVpcs().catch(() => ({vpcs: []})),
        api('GET', '/api/vpc/subnets').catch(() => ({subnets: []})),
        api('GET', '/api/vpc/security-groups').catch(() => ({security_groups: []})),
        api('GET', '/api/vpc/route-tables').catch(() => ({route_tables: []})),
        VPC.listInternetGateways().catch(() => ({internet_gateways: []})),
        EC2.list().catch(() => ({instances: []})),
      ]);
      setData({
        vpcs: vpcs.vpcs || [],
        subnets: subnets.subnets || [],
        security_groups: securityGroups.security_groups || [],
        route_tables: routeTables.route_tables || [],
        internet_gateways: internetGateways.internet_gateways || [],
        instances: instances.instances || [],
      });
      setUpdatedAt(new Date().toISOString());
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (selectedVpcId && !data.vpcs.some(v => v.vpc_id === selectedVpcId)) {
      setSelectedVpcId('');
      setDetailTab('details');
    }
  }, [data.vpcs, selectedVpcId]);

  useEffect(() => {
    if (pageTab !== 'vpcs') setActionsOpen(false);
  }, [pageTab]);

  const filteredVpcs = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return data.vpcs;
    return data.vpcs.filter(vpc => {
      const hay = [
        vpc.name,
        vpc.vpc_id,
        vpc.cidr_block,
        vpc.state,
        (vpc.availability_zones || []).join(' '),
      ].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }, [data.vpcs, query]);

  const selectedVpc = data.vpcs.find(v => v.vpc_id === selectedVpcId) || null;
  const selectedSubnets = data.subnets.filter(s => s.vpc_id === selectedVpcId);
  const selectedRouteTables = data.route_tables.filter(r => r.vpc_id === selectedVpcId);
  const selectedSecurityGroups = data.security_groups.filter(sg => sg.vpc_id === selectedVpcId);
  const selectedIgws = data.internet_gateways.filter(igw => igw.attached_vpc_id === selectedVpcId);
  const selectedInstances = data.instances.filter(inst => inst.vpc_id === selectedVpcId);
  const mainRouteTable = selectedRouteTables.find(r => r.is_main) || selectedRouteTables[0] || null;
  const defaultSecurityGroup = selectedSecurityGroups.find(sg => sg.is_default) || selectedSecurityGroups[0] || null;
  const attachedIgw = selectedIgws[0] || null;
  const totalVpcs = data.vpcs.length;
  const visibleVpcs = filteredVpcs.length;
  const detailTabs = ['details', 'resource map', 'cidrs', 'flow logs', 'tags', 'integrations'];

  const openCreateVpc = () => {
    setActionsOpen(false);
    setShowCreate(true);
  };
  const openVpcLaunch = () => {
    setActionsOpen(false);
    setShowVpcLaunch(true);
  };
  const openDeleteVpc = () => {
    if (!selectedVpc) return;
    setActionsOpen(false);
    setDeleteVpcTarget(selectedVpc);
  };
  const handleCreateDone = (created) => {
    setShowCreate(false);
    notify(`VPC "${created?.name || 'vpc'}" created`, 'success');
    if (created?.vpc_id) {
      setSelectedVpcId(created.vpc_id);
      setDetailTab('details');
      setPageTab('vpcs');
    }
    load();
  };
  const handleSelectVpc = (vpcId) => {
    setActionsOpen(false);
    setSelectedVpcId(vpcId);
    setDetailTab('details');
    setPageTab('vpcs');
  };
  const closeActions = () => setActionsOpen(false);
  const doDeleteVpc = async () => {
    if (!deleteVpcTarget) return;
    setDeleteBusy(true);
    try {
      await VPC.deleteVpc(deleteVpcTarget.vpc_id, true);
      notify(`VPC "${deleteVpcTarget.name}" deleted`, 'success');
      setDeleteVpcTarget(null);
      setSelectedVpcId('');
      setDetailTab('details');
      load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };
  const createSubnet = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createSubnet({
      vpc_id: selectedVpc.vpc_id,
      name: vpcResourceForm.subnet_name,
      cidr_block: vpcResourceForm.subnet_cidr,
      availability_zone: vpcResourceForm.subnet_az,
    });
    notify('Subnet mapped to VPC', 'success');
    load();
  };
  const createSecurityGroup = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createSecurityGroup({
      vpc_id: selectedVpc.vpc_id,
      group_name: vpcResourceForm.sg_name,
      description: vpcResourceForm.sg_desc,
    });
    notify('Security group mapped to VPC', 'success');
    load();
  };
  const createRouteTable = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    await VPC.createRouteTable({
      vpc_id: selectedVpc.vpc_id,
      name: vpcResourceForm.rt_name,
    });
    notify('Route table mapped to VPC', 'success');
    load();
  };
  const createIgw = async () => {
    if (!selectedVpc) return notify('Select a VPC first', 'error');
    const igw = await VPC.createInternetGateway({
      name: vpcResourceForm.igw_name,
    });
    await VPC.attachInternetGateway(igw.internet_gateway_id, {vpc_id: selectedVpc.vpc_id});
    notify('Internet gateway attached to VPC', 'success');
    load();
  };
  const associateSubnet = async () => {
