<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudLearn Simulator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <script crossorigin src="/assets/react.development.js"></script>
  <script crossorigin src="/assets/react-dom.development.js"></script>
  <script src="/assets/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Amazon Ember",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;background:#f2f3f3;color:#16191f}

    /* ── Header ── */
    .hdr{background:#232f3e;color:#fff;display:flex;align-items:center;padding:0 20px;height:50px;position:fixed;top:0;width:100%;z-index:1000;gap:12px}
    .hdr-logo{font-size:20px;font-weight:900;color:#ff9900;letter-spacing:-1px}
    .hdr-logo span{color:#fff;font-weight:400}
    .hdr-svc{color:#fff;font-size:14px;border-left:1px solid #4a5568;padding-left:12px}
    .hdr-menu{background:#37475a;border:1px solid #4a5568;color:#fff;border-radius:3px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
    .hdr-menu:hover{background:#485769}
    .hdr-search{flex:1;max-width:620px}
    .hdr-search input{width:100%;padding:7px 12px;border:none;border-radius:4px;font-size:13px;outline:none;background:#fff}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:#d5dbdb;font-size:13px}
    .badge{background:#ff9900;color:#000;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700}

    /* ── Layout ── */
    .aws-shell{display:flex;min-height:calc(100vh - 50px);margin-top:50px}
    .aws-sidebar{width:258px;background:#fff;border-right:1px solid #eaeded;position:fixed;top:50px;bottom:0;left:0;overflow-y:auto}
    .aws-main{margin-left:258px;padding:20px;min-height:calc(100vh - 50px);width:calc(100% - 258px)}
    .aws-side-search{padding:14px 14px 10px;border-bottom:1px solid #eaeded;background:#fafafa}
    .aws-side-search input{width:100%;padding:8px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;outline:none}
    .aws-side-search input:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .aws-group{padding:10px 0;border-bottom:1px solid #eaeded}
    .aws-group:last-child{border-bottom:none}
    .aws-group-title{padding:4px 14px 8px;font-size:11px;font-weight:700;letter-spacing:.04em;color:#687078;text-transform:uppercase}
    .aws-item{display:flex;align-items:center;gap:8px;padding:9px 14px;color:#16191f;text-decoration:none;font-size:13px;cursor:pointer;border-left:3px solid transparent}
    .aws-item:hover{background:#f2f8fd}
    .aws-item.active{background:#e8f5fb;border-left-color:#0073bb;font-weight:700}
    .aws-item .small{font-size:12px;color:#687078;font-weight:400}
    .aws-item-icon{
      width:18px;
      height:18px;
      flex:0 0 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      line-height:1;
      color:currentColor;
      opacity:.92;
    }
    .aws-item-label{
      min-width:0;
      flex:1;
    }
    .material-symbols-outlined{
      font-family:'Material Symbols Outlined';
      font-weight:normal;
      font-style:normal;
      font-size:20px;
      line-height:1;
      letter-spacing:normal;
      text-transform:none;
      display:inline-block;
      white-space:nowrap;
      word-wrap:normal;
      direction:ltr;
      -webkit-font-smoothing:antialiased;
      font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 20;
    }

    /* ── Breadcrumb ── */
    .bc{display:flex;align-items:center;gap:5px;margin:0 0 10px;font-size:12px;line-height:1.2;color:#687078}
    .bc a{color:#0073bb;cursor:pointer;text-decoration:none}
    .bc a:hover{text-decoration:underline}
    .bc-sep{color:#879596}
    .connected-space-page .bc{
      padding:0 2px;
      margin-bottom:8px;
    }
    .connected-space-page .bc span:last-child{
      color:#16191f;
      font-weight:700;
    }

    /* ── Panel ── */
    .panel{background:#fff;border:1px solid #eaeded;border-radius:4px;margin-bottom:16px;overflow:hidden}
    .ph{padding:16px 20px;border-bottom:1px solid #eaeded;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .pt{font-size:18px;font-weight:700}
    .ps{font-size:13px;color:#687078;margin-top:3px}
    .iam-shell{display:grid;grid-template-columns:220px minmax(0,1fr);gap:16px;align-items:start}
    .iam-nav{border:1px solid #eaeded;border-radius:4px;background:#fff;overflow:hidden;position:sticky;top:66px;align-self:start}
    .iam-nav-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-left:3px solid transparent;cursor:pointer;font-size:13px;color:#16191f}
    .iam-nav-item:hover{background:#f2f8fd}
    .iam-nav-item.active{background:#e8f5fb;border-left-color:#0073bb;font-weight:700}
    .iam-nav-item .small{color:#687078;font-size:12px;font-weight:400}
    .iam-nav-note{padding:10px 14px;border-top:1px solid #eaeded;background:#fafafa;font-size:12px;color:#687078;line-height:1.45}

    /* ── Buttons ── */
    .btn{padding:6px 16px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;display:inline-flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap}
    .btn-p{background:#ff9900;border-color:#eb5f07;color:#000}
    .btn-p:hover{background:#e88b00}
    .btn-aws{background:#232f3e;border-color:#1b2431;color:#fff}
    .btn-aws:hover{background:#1f2937}
    .btn-azure{background:#0078d4;border-color:#005fa3;color:#fff}
    .btn-azure:hover{background:#0065b8}
    .btn-gcp{background:#4285f4;border-color:#3367d6;color:#fff}
    .btn-gcp:hover{background:#3574df}
    .btn-s{background:#fff;border-color:#879596;color:#16191f}
    .btn-s:hover{background:#f2f3f3}
    .btn-start{background:#ecfdf3;border-color:#1f7a3d;color:#1f7a3d}
    .btn-start:hover{background:#dff7e8}
    .btn-stop{background:#fff4ec;border-color:#c45100;color:#9a3900}
    .btn-stop:hover{background:#ffe8d7}
    .btn-d{background:#d13212;border-color:#b2290f;color:#fff}
    .btn-d:hover{background:#ba2e10}
    .btn-d:disabled,.btn-p:disabled{opacity:.5;cursor:not-allowed}
    .btn-grp{display:flex;gap:8px;flex-wrap:wrap}
    .state-dropdown{position:relative;display:inline-flex;align-items:center}
    .state-btn{min-width:190px;justify-content:space-between}
    .state-btn.running{background:#ecfdf3;border-color:#1f7a3d;color:#1f7a3d}
    .state-btn.running:hover{background:#dff7e8}
    .state-btn.stopped{background:#fff4ec;border-color:#c45100;color:#9a3900}
    .state-btn.stopped:hover{background:#ffe8d7}
    .state-btn.pending,.state-btn.rebooting,.state-btn.terminated{background:#f2f3f3;border-color:#cfd7df;color:#687078}
    .state-btn.pending:hover,.state-btn.rebooting:hover,.state-btn.terminated:hover{background:#eaeded}
    .state-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:60;min-width:260px;background:#fff;border:1px solid #d5dbdb;border-radius:4px;box-shadow:0 10px 26px rgba(0,0,0,.18);overflow:hidden}
    .state-item{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;border:none;border-bottom:1px solid #eaeded;background:#fff;color:#16191f;cursor:pointer;text-align:left}
    .state-item:hover{background:#f2f8fd}
    .state-item:last-child{border-bottom:none}
    .state-item:disabled{cursor:not-allowed;background:#fafafa;color:#879596}
    .state-item-title{font-weight:700;font-size:13px}
    .state-item-sub{font-size:12px;color:#687078;line-height:1.35}
    .btn-lnk{background:none;border:none;color:#0073bb;cursor:pointer;font-size:13px;padding:0;text-decoration:none}
    .btn-lnk:hover{text-decoration:underline}
    .btn-lnk.red{color:#d13212}

    /* ── Toolbar ── */
    .tb{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eaeded;background:#fff;flex-wrap:wrap}
    .tb-r{margin-left:auto}
    .srch{padding:6px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;width:220px;outline:none}
    .srch:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .ec2-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:14px 16px;border-bottom:1px solid #eaeded;background:#fff;flex-wrap:wrap}
    .ec2-topbar-left{display:flex;flex-direction:column;gap:4px}
    .ec2-title{font-size:20px;font-weight:700;line-height:1.2}
    .ec2-subtitle{font-size:13px;color:#687078;line-height:1.4}
    .ec2-toolbar{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #eaeded;background:#fff}
    .ec2-toolbar .btn{padding:6px 12px}
    .ec2-toolbar .btn[disabled]{opacity:.45;cursor:not-allowed}
    .ec2-toolbar-spacer{flex:1}
    .ec2-search{padding:6px 10px;border:1px solid #879596;border-radius:3px;font-size:13px;min-width:280px;max-width:380px;outline:none}
    .ec2-search:focus{border-color:#0073bb;box-shadow:0 0 0 2px rgba(0,115,187,.2)}
    .ec2-count{font-size:12px;color:#687078}
    .ec2-menu{position:relative;display:inline-flex}
    .ec2-menu-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:70;min-width:240px;background:#fff;border:1px solid #d5dbdb;border-radius:4px;box-shadow:0 8px 20px rgba(0,0,0,.18);overflow:hidden}
    .ec2-menu-item{width:100%;padding:10px 12px;border:none;border-bottom:1px solid #eaeded;background:#fff;color:#16191f;text-align:left;cursor:pointer;font-size:13px}
    .ec2-menu-item:hover{background:#f2f8fd}
    .ec2-menu-item:last-child{border-bottom:none}
    .ec2-menu-item:disabled{background:#fafafa;color:#879596;cursor:not-allowed}
    .ec2-menu-item strong{display:block;font-size:13px;font-weight:700}
    .ec2-menu-item span{display:block;font-size:12px;color:#687078;margin-top:2px;line-height:1.35}
    .ec2-menu-item.red strong{color:#d13212}
    .ec2-table-wrap{position:relative;min-height:320px;padding:0 0 16px;overflow-x:auto}
    .ec2-row-selected td{background:#f2f8fd !important}
    .ec2-empty-overlay{position:absolute;left:0;right:0;top:58px;bottom:24px;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .ec2-empty-card{width:min(520px,calc(100% - 48px));padding:28px 20px;border:1px dashed #d5dbdb;border-radius:4px;background:#fafafa;text-align:center}
    .ec2-empty-title{font-size:16px;font-weight:700;color:#16191f;margin-bottom:6px}
    .ec2-empty-sub{font-size:13px;color:#687078;line-height:1.45}
    .connected-space-separator{width:calc(100% + 32px);height:1px;background:#eaeded;margin:10px -16px 8px;padding:0;flex:0 0 auto;display:block;box-sizing:border-box}
    .ec2-details{margin-top:16px;background:#fff;border:1px solid #eaeded;border-radius:4px;overflow:hidden}
    .ec2-details-head{padding:14px 16px;border-bottom:1px solid #eaeded;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .ec2-details-title{font-size:16px;font-weight:700}
    .ec2-details-sub{font-size:13px;color:#687078;margin-top:3px}
    .ec2-details-actions{display:flex;gap:8px;flex-wrap:wrap}
    .ec2-details-body{padding:16px}
    .ec2-kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .ec2-kv{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px}
    .ec2-kv dt{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#687078;margin-bottom:4px}
    .ec2-kv dd{font-size:13px;color:#16191f;line-height:1.45;word-break:break-word}
    .ec2-subtabs{padding:0 16px;background:#fff}
    .ec2-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.01em}
    .ec2-chip.running{background:#d5f5e3;color:#1d8102}
    .ec2-chip.stopped{background:#fff4ec;color:#9a3900}
    .ec2-chip.pending{background:#fdebd0;color:#eb5f07}
    .ec2-chip.terminated{background:#eaeded;color:#687078}
    .ec2-chip.paused{background:#e8f5fb;color:#0073bb}
    .ec2-chip.archived{background:#f2f3f3;color:#687078}
    .ec2-mono{font-family:Consolas,"Courier New",monospace;font-size:12px}
    .ec2-docs{padding:18px 20px 20px}
    .ec2-docs-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .ec2-docs-kicker{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:6px;color:#16191f}
    .ec2-docs-lead{font-size:14px;color:#16191f;max-width:980px;line-height:1.5}
    .ec2-docs-crumbs{font-size:12px;color:#687078;margin-top:8px}
    .ec2-docs-section{padding-top:16px;border-top:1px solid #eaeded;margin-top:16px}
    .ec2-docs-section h3{font-size:18px;font-weight:700;color:#16191f;margin-bottom:8px}
    .ec2-docs-note{font-size:13px;color:#687078;line-height:1.5;margin-bottom:10px}
    .ec2-docs-contents{border:1px solid #eaeded;border-radius:4px;background:#fafafa;padding:12px 14px;margin-top:16px}
    .ec2-docs-contents h3{font-size:16px;font-weight:700;color:#16191f;margin-bottom:8px}
    .ec2-docs-links{display:flex;flex-wrap:wrap;gap:8px}
    .ec2-docs-link{color:#0073bb;text-decoration:none;font-size:13px}
    .ec2-docs-link:hover{text-decoration:underline}
    .ec2-docs-request{display:flex;flex-direction:column;gap:12px}
    .ec2-docs-block{border:1px solid #eaeded;border-radius:4px;background:#fff;padding:12px}
    .ec2-docs-block-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#16191f}
    .ec2-docs-code{background:#f7f8f8;border:1px solid #eaeded;border-radius:4px;padding:12px 14px;overflow:auto;font-size:12px;line-height:1.5;white-space:pre-wrap;font-family:Consolas,"Courier New",monospace;color:#16191f}
    .ec2-xml{white-space:pre}
    .ec2-xml-line{display:block}
    .ec2-xml-tag{color:#0073bb;font-weight:700}
    .ec2-xml-attr{color:#b25e00}
    .ec2-xml-value{color:#7b2cbf}
    .ec2-docs-param-table{width:100%;border-collapse:collapse;border:1px solid #eaeded}
    .ec2-docs-param-table th,.ec2-docs-param-table td{padding:10px 12px;border-bottom:1px solid #eaeded;vertical-align:top;text-align:left;font-size:13px;line-height:1.45}
    .ec2-docs-param-table th{background:#fafafa;color:#687078;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .ec2-docs-action{border:1px solid #eaeded;border-radius:4px;margin-top:12px;overflow:hidden;background:#fff}
    .ec2-docs-action summary{cursor:pointer;list-style:none;padding:12px 14px;background:#fafafa;font-weight:700;color:#16191f}
    .ec2-docs-action summary::-webkit-details-marker{display:none}
    .ec2-docs-action[open] summary{border-bottom:1px solid #eaeded}
    .ec2-docs-action-body{padding:14px}
    .ec2-doc-toggle,.s3-doc-toggle,.vpc-doc-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:1800;background:linear-gradient(180deg,#28a745 0%,#1d8102 100%);color:#fff;border:1px solid #155a02;border-right:none;border-radius:6px 0 0 6px;padding:12px 0;margin:0;width:30px;min-height:136px;box-shadow:0 6px 16px rgba(29,129,2,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
    .ec2-doc-toggle:hover,.s3-doc-toggle:hover,.vpc-doc-toggle:hover{background:linear-gradient(180deg,#30b04d 0%,#176801 100%);transform:translateY(-50%) translateX(-1px);box-shadow:0 8px 18px rgba(29,129,2,.28)}
    .ec2-doc-toggle-label,.s3-doc-toggle-label,.vpc-doc-toggle-label{display:block;transform:rotate(-90deg);transform-origin:center;white-space:nowrap;letter-spacing:.01em;line-height:1.1;font-size:12px;font-weight:800;padding:2px 0}
    .ec2-doc-drawer,.s3-doc-drawer,.vpc-doc-drawer{position:fixed;right:16px;top:66px;bottom:16px;width:460px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #eaeded;border-radius:8px;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:1900;display:flex;flex-direction:column;overflow:hidden}
    .ec2-doc-drawer-head,.s3-doc-drawer-head,.vpc-doc-drawer-head{padding:14px 16px;border-bottom:1px solid #eaeded;background:#f8fbf5;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .ec2-doc-drawer-title,.s3-doc-drawer-title,.vpc-doc-drawer-title{font-size:18px;font-weight:700;color:#16191f;line-height:1.2}
    .ec2-doc-drawer-sub,.s3-doc-drawer-sub,.vpc-doc-drawer-sub{font-size:12px;color:#687078;margin-top:4px;line-height:1.4}
    .ec2-doc-drawer-close,.s3-doc-drawer-close,.vpc-doc-drawer-close{background:#fff;border:1px solid #a6c98a;color:#1d8102;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
    .ec2-doc-drawer-close:hover,.s3-doc-drawer-close:hover,.vpc-doc-drawer-close:hover{background:#f3faec}
    .ec2-doc-drawer-body,.s3-doc-drawer-body,.vpc-doc-drawer-body{padding:14px 16px 16px;overflow:auto}
    .ec2-doc-select,.s3-doc-select,.vpc-doc-select{width:100%;padding:8px 10px;border:1px solid #879596;border-radius:4px;font-size:13px;background:#fff;outline:none;margin-bottom:12px}
    .ec2-doc-pill-row,.s3-doc-pill-row,.vpc-doc-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
    .ec2-doc-pill,.s3-doc-pill,.vpc-doc-pill{border:1px solid #d5dbdb;background:#fff;border-radius:999px;padding:6px 10px;font-size:12px;color:#16191f;cursor:pointer}
    .ec2-doc-pill.active,.s3-doc-pill.active,.vpc-doc-pill.active{border-color:#1d8102;background:#ecfdf3;color:#1d8102;font-weight:700}
    .ec2-doc-summary,.s3-doc-summary,.vpc-doc-summary{border-left:3px solid #1d8102;background:#f8fbf5;padding:10px 12px;border-radius:4px;font-size:13px;color:#16191f;margin-bottom:12px}
    .s3-switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#16191f;cursor:pointer;user-select:none;white-space:nowrap}
    .s3-switch input{position:absolute;opacity:0;pointer-events:none}
    .s3-switch-ui{width:34px;height:20px;border-radius:999px;background:#d5dbdb;position:relative;transition:background .15s ease;flex:0 0 auto}
    .s3-switch-ui::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .15s ease}
    .s3-switch input:checked + .s3-switch-ui{background:#1d8102}
    .s3-switch input:checked + .s3-switch-ui::after{transform:translateX(14px)}
    .s3-switch-label{font-weight:700;color:#16191f}
    .s3-version-list{display:grid;gap:10px}
    .s3-version-row{display:grid;grid-template-columns:minmax(0,1.5fr) repeat(4,minmax(0,1fr));gap:12px;align-items:center;border:1px solid #eaeded;border-radius:4px;background:#fff;padding:12px 14px;overflow:hidden}
    .s3-version-row.latest{border-color:#1d8102;background:#f8fbf5}
    .s3-version-cell{min-width:0}
    .s3-version-label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#687078;margin-bottom:3px}
    .s3-version-value{font-size:13px;color:#16191f;white-space:nowrap;overflow:hidden;text-overflow:clip}
    .s3-version-id{font-family:Consolas,"Courier New",monospace;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:clip}
    .s3-version-size{text-align:right;font-weight:700}
    .s3-version-empty{padding:14px;border:1px dashed #d5dbdb;border-radius:4px;background:#fafafa;color:#687078;font-size:13px}
    .s3-object-stage{display:block;margin-top:14px}
    .s3-object-list-panel,.s3-object-pane{border:1px solid #eaeded;border-radius:4px;background:#fff;min-width:0;overflow:hidden}
    .s3-object-list-panel{padding:0}
    .s3-object-pane-head{padding:14px 16px;border-bottom:1px solid #eaeded;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#fff}
    .s3-object-pane-title{font-size:16px;font-weight:700;line-height:1.2}

    /* ── Table ── */

/* ── API layer ──────────────────────────────────────────────────────────── */
async function api(method, path, body, isForm, extraHeaders = {}) {
  const opts = { method, cache: 'no-store' };
  const principal = window.localStorage.getItem('cloudlearn.principal') || 'root';
  opts.headers = {'X-CloudLearn-Principal': principal};
  if (extraHeaders && typeof extraHeaders === 'object') {
    opts.headers = {...opts.headers, ...extraHeaders};
  }
  if (body && !isForm) {
    if (!opts.headers['Content-Type']) opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  else if (body) opts.body = body;
  const activeProvider = String(window.__cloudlearnActiveServiceProvider || 'aws').toLowerCase();
  const gcpServicePrefixes = ['/api/iam', '/api/ec2', '/api/vpc', '/api/rds', '/api/sqs', '/api/dynamodb', '/api/apigateway', '/api/lambda', '/api/s3'];
  let requestPath = path;
  if (activeProvider === 'gcp' && gcpServicePrefixes.some(prefix => path.startsWith(prefix)) && !path.startsWith('/api/gcp/')) {
    requestPath = `/api/gcp${path.slice('/api'.length)}`;
  }
  const r = await fetch(requestPath, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({detail: r.statusText})); throw new Error(e.detail || 'Request failed'); }
  return r.json();
}

const SQS = {
  list: async () => activeServiceProviderKey() === 'gcp' ? (
    async () => {
      const topicResp = await api('GET', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics`);
      const topics = topicResp.topics || [];
      const messagesByTopic = {};
      await Promise.all(topics.map(async (topic) => {
        const leaf = gcpLeafName(topic.name || topic.topicId || '', '');
        if (!leaf) return;
        try {
          const msgResp = await api('GET', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/subscriptions/${encodeURIComponent(leaf)}/messages`);
          messagesByTopic[leaf] = msgResp.receivedMessages || [];
        } catch {
          messagesByTopic[leaf] = [];
        }
      }));
      return gcpNormalizePubSubList(topicResp, gcpProjectScope(), messagesByTopic);
    }
  )() : api('GET', '/api/sqs/queues'),
  get: async (name) => activeServiceProviderKey() === 'gcp' ? (
    async () => {
      const [topicResp, msgResp] = await Promise.all([
        api('GET', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics/${encodeURIComponent(name)}`),
        api('GET', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/subscriptions/${encodeURIComponent(name)}/messages`).catch(() => ({receivedMessages: []})),
      ]);
      return gcpNormalizePubSubTopic(gcpProjectScope(), topicResp, msgResp.receivedMessages || []);
    }
  )() : api('GET', `/api/sqs/queues/${encodeURIComponent(name)}`),
  create: async (payload) => activeServiceProviderKey() === 'gcp'
    ? gcpNormalizePubSubTopic(gcpProjectScope(), await api('POST', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics`, payload), [])
    : api('POST', '/api/sqs/queues', payload),
  update: async (name, payload) => activeServiceProviderKey() === 'gcp'
    ? gcpNormalizePubSubTopic(gcpProjectScope(), await api('PATCH', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics/${encodeURIComponent(name)}`, payload), [])
    : api('PUT', `/api/sqs/queues/${encodeURIComponent(name)}`, payload),
  remove: (name) => activeServiceProviderKey() === 'gcp'
    ? api('DELETE', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics/${encodeURIComponent(name)}`)
    : api('DELETE', `/api/sqs/queues/${encodeURIComponent(name)}`),
  messages: (name) => activeServiceProviderKey() === 'gcp'
    ? api('GET', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/subscriptions/${encodeURIComponent(name)}/messages`)
    : api('GET', `/api/sqs/queues/${encodeURIComponent(name)}/messages`),
  send: (name, payload) => activeServiceProviderKey() === 'gcp'
    ? api('POST', `/v1/projects/${encodeURIComponent(gcpProjectScope())}/topics/${encodeURIComponent(name)}:publish`, {

      }],
    })

const fmtDate = (iso) => iso ? new Date(iso).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const relativeTime = (iso) => {
  if (!iso) return '—';
  const delta = Date.now() - new Date(iso).getTime();
  if (!Number.isFinite(delta) || delta < 0) return 'just now';
  const minutes = Math.floor(delta / 60000);
  if (minutes < 1) return 'just now';
  if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
  const days = Math.floor(hours / 24);
  return `${days} day${days === 1 ? '' : 's'} ago`;
};

function buildProviderStats(spaces, linkedIds = new Set()) {
  const base = {

    other: {spaces: 0, active: 0, linked: 0, memory_mb: 0, disk_mb: 0, runtime_count: 0, ec2_count: 0, lambda_count: 0, rds_count: 0, sqs_count: 0, dynamodb_count: 0},
  };
  (spaces || []).forEach(space => {
    const key = normalizeProvider(space.provider);
    const stats = base[key] || base.other;
    stats.spaces += 1;
    if (String(space.status || 'running').toLowerCase() === 'running') stats.active += 1;
    if (linkedIds.has(space.space_id)) stats.linked += 1;
    stats.memory_mb += Number(space.estimated_memory_mb || space.memory_mb || 0);
    stats.disk_mb += Number(space.estimated_disk_mb || space.disk_mb || 0);
    SPACE_RESOURCE_KEYS.forEach(k => { stats[k] += Number(space[k] || 0); });
  });
  return base;
}

function gcpFirestoreValueToPlain(value) {
  if (value === null || value === undefined) return null;
  if (typeof value !== 'object') return value;
  if ('stringValue' in value) return value.stringValue;
  if ('booleanValue' in value) return !!value.booleanValue;
  if ('integerValue' in value) return Number(value.integerValue);
  if ('doubleValue' in value) return Number(value.doubleValue);
  if ('timestampValue' in value) return value.timestampValue;
  if ('nullValue' in value) return null;
  if ('mapValue' in value) {
    const fields = value.mapValue?.fields || {};
    return Object.fromEntries(Object.entries(fields).map(([k, v]) => [k, gcpFirestoreValueToPlain(v)]));
  }
  if ('arrayValue' in value) {
    const values = value.arrayValue?.values || [];
    return values.map(v => gcpFirestoreValueToPlain(v));
  }
  return value;
}

function gcpNormalizeFirestoreDocument(doc) {
  return {
    key: {id: gcpLeafName(doc.name || '', '')},
    item: Object.fromEntries(Object.entries(doc.fields || {}).map(([k, v]) => [k, gcpFirestoreValueToPlain(v)])),
    created: doc.createTime || '',
  };
}

function gcpNormalizeFirestoreCollections(payload) {
  const documents = payload?.documents || [];
  const groups = new Map();
  documents.forEach(doc => {
    const parts = String(doc.name || '').split('/documents/').pop().split('/');
    const collection = parts[0] || 'documents';
    if (!groups.has(collection)) groups.set(collection, []);
    groups.get(collection).push(gcpNormalizeFirestoreDocument(doc));
  });
  return {
    tables: Array.from(groups.entries()).map(([collection, rows]) => ({
      table_name: collection,
      table_status: 'ACTIVE',
      partition_key_name: 'id',
      sort_key_name: '',
      item_count: rows.length,
      billing_mode: 'PAY_PER_REQUEST',
      table_arn: `projects/${gcpProjectScope()}/databases/(default)/documents/${collection}`,
      created: rows[0]?.created || '',
      last_modified: rows[rows.length - 1]?.created || '',
      item_rows: rows,
      tags: [],
      indexes: [],
      db_subnet_group: {},
      db_parameter_group: {},
    })),
  };
}

function gcpNormalizeFunction(project, location, fn) {
  if (!fn) return null;
  const name = gcpLeafName(fn.name, 'cloud-function');
  const runtime = String(fn.runtime || fn.buildConfig?.runtime || 'python311').replace('python311', 'python3.11').replace('python312', 'python3.12');
  const timeout = Number(fn.serviceConfig?.timeoutSeconds || fn.timeout || 60);
  const memory = parseInt(String(fn.serviceConfig?.availableMemory || fn.memory_size || '256M').replace(/[^\d]/g, ''), 10) || 256;
  const versions = (fn.versions || []).map(v => ({
    version: String(v.version || v.name || '1'),
    state: v.state || 'Active',
    description: v.description || '',
    code_sha256: v.code_sha256 || '',
    created: v.created || v.createTime || '',
    is_latest: !!v.is_latest,
  }));
  const invocations = (fn.invocations || []).map(item => ({
    id: item.executionId || item.id || item.at || '',
    at: item.timestamp || item.at || '',
    invocation_type: item.invocation_type || 'RequestResponse',
    status: item.status || 'success',
    source: item.source || '',
    response_payload: item.payload || item.response_payload || item.result || null,
  }));
  const permissions = Array.isArray(fn.permissions) ? fn.permissions : [];
  const triggers = Array.isArray(fn.triggers) ? fn.triggers : [];
  return {
    function_name: name,
    function_arn: `projects/${project}/locations/${location}/functions/${name}`,
    runtime,
    handler: fn.entryPoint || 'handler',
    state: fn.status === 'ACTIVE' ? 'Active' : (fn.status || 'Active'),
    timeout,
    memory_size: memory,
    description: fn.description || '',
    role: fn.role || '',
    code: fn.code || '',
    created: fn.createTime || '',
    last_modified: fn.updateTime || fn.createTime || '',
    triggers,
    trigger_count: triggers.length,
    versions,
    version_count: versions.length,
    invocations,
    permissions,
    policy_statement_count: permissions.length,
  };
}

  const selectedGateways = gateways.filter(gw => gcpLeafName(gw.apiConfig || '', '') === name || gcpLeafName(gw.name || '', '') === name || gcpLeafName(gw.api || '', '') === name);
  const resourceMap = apiConfigs.map((cfg, idx) => ({
    resource_id: gcpLeafName(cfg.name || cfg.path_part || `res-${idx + 1}`, `res-${idx + 1}`),
    parent_id: cfg.parent_id || '',
    path: `/${cfg.path_part || cfg.resource_path || gcpLeafName(cfg.name || '', `route-${idx + 1}`)}`,
  }));
  const routes = apiConfigs.filter(cfg => cfg.http_method || cfg.integration_type).map(cfg => ({
    resource_id: gcpLeafName(cfg.name || cfg.path_part || 'resource', 'resource'),
    path: `/${cfg.path_part || cfg.resource_path || gcpLeafName(cfg.name || '', 'route')}`,
    http_method: cfg.http_method || 'GET',
    integration_type: cfg.integration_type || 'MOCK',
    integration_uri: cfg.integration_uri || '',
    status_code: cfg.status_code || 200,
  }));
  const stages = selectedGateways.map(gw => ({
    stage_name: gw.stage_name || 'prod',
    deployment_id: gcpLeafName(gw.name || '', 'deployment'),
    invoke_url: `https://${gw.defaultHostname || `${name}-${location}-${project}.cloud.goog`}`,
    created: gw.createTime || '',
  }));
  return {
    rest_api_id: name,
    name: api.displayName || name,
    endpoint_type: 'REGIONAL',
    description: api.displayName || '',
    invoke_url: `https://${name}-${location}-${project}.cloud.goog`,
    root_resource_id: 'root',
    resource_map: [{resource_id: 'root', parent_id: '', path: '/'}, ...resourceMap],
    routes,
    stages,
    deployments: selectedGateways.map(gw => ({
      deployment_id: gcpLeafName(gw.name || '', 'deployment'),
      description: gw.description || '',
      created: gw.createTime || '',
    })),
    logs: [],
    created: api.createTime || '',
    last_modified: api.updateTime || api.createTime || '',
    state: api.state || 'ACTIVE',
  };
}

function gcpNormalizeApigatewayList(payload, project, location) {

function providerApiDocPrefix(provider) {
  const key = normalizeProvider(provider);
  if (key === 'gcp') return 'Google Cloud';
  if (key === 'azure') return 'Microsoft Azure';

}

function providerizeApiDocRequests(docs, provider) {
  if (normalizeProvider(provider) !== 'gcp') return docs;
  return (docs || []).map(doc => ({
    ...doc,
    request: String(doc.request || '')
      .replaceAll('/api/', '/api/gcp/')
      .replace(/(\b(?:GET|POST|PUT|DELETE)) \/sqs\b/g, '$1 /api/gcp/sqs'),
  }));
}

function Notif({msg, type, onClose}) {
  useEffect(() => { const t = setTimeout(onClose, 4500); return () => clearTimeout(t); }, []);
  const cls = {success:'n-ok', error:'n-err', info:'n-inf'}[type] || 'n-inf';
  return <div className={`notif ${cls}`}><span className="n-txt">{msg}</span><button className="n-cls" onClick={onClose}>×</button></div>;
}

class RouteErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = {error: null};
  }
  static getDerivedStateFromError(error) {
    return {error};
  }
  render() {
    if (this.state.error) {
      return (
        <div className="panel" style={{marginTop:16}}>
          <div className="ph">
            <div>
              <div className="pt">Unable to render {this.props.label || 'view'}</div>
              <div className="ps">A client-side error stopped this page from rendering.</div>
            </div>
          </div>
          <div style={{padding:16}}>
            <div className="ibox" style={{background:'#fff7eb',borderColor:'#f5c66a',color:'#7a3b00'}}>
              <strong>Render error</strong> — {String(this.state.error?.message || this.state.error)}
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function CreateBucketModal({onClose, onDone}) {
  const [name, setName] = useState('');
  const [region, setRegion] = useState('us-east-1');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const validate = (v) => {
    if (!v) return 'Bucket name is required';
    if (v.length < 3) return 'Must be at least 3 characters';
    if (v.length > 63) return 'Must be 63 characters or fewer';
    if (!/^[a-z0-9][a-z0-9\-\.]*[a-z0-9]$/.test(v)) return 'Lowercase letters, numbers and hyphens only. Cannot start/end with hyphen.';
    return '';
  };

  const submit = async () => {
    const e = validate(name); if (e) { setErr(e); return; }
    setBusy(true);
    try { await S3.createBucket(name, region); onDone(`Bucket "${name}" created successfully in ${region}`); }
    catch(e) { setErr(e.message); setBusy(false); }
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="mh"><span className="mt">Create bucket</span><button className="mx" onClick={onClose}>×</button></div>
        <div className="mb">
          <div className="ibox"><strong>ℹ Simulator</strong> — State persists locally. Services activate on demand.</div>
          <div className="fg">
            <label className="fl">Bucket name <span style={{color:'#d13212'}}>*</span></label>
            <input className="fi" autoFocus placeholder="my-example-bucket" value={name} onChange={e=>{setName(e.target.value.toLowerCase());setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()} />
            {err && <div className="ferr">{err}</div>}
            <div className="fh">Must be 3–63 characters. Lowercase letters, numbers, hyphens. Globally unique.</div>
          </div>
          <div className="fg">
            <label className="fl">Region</label>
            <select className="fi" value={region} onChange={e=>setRegion(e.target.value)}>
              {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <hr style={{margin:'16px 0',border:'none',borderTop:'1px solid #eaeded'}}/>
          <div className="fg" style={{marginBottom:0}}>
            <label className="fl">Block Public Access settings for this bucket</label>
            <div style={{background:'#fafafa',padding:12,borderRadius:4,border:'1px solid #eaeded'}}>
              {['Block all public access','Block public ACLs','Ignore public ACLs','Block public bucket policies','Restrict public bucket policies'].map(o =>
                <label key={o} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7,fontSize:13,cursor:'pointer'}}>
                  <input type="checkbox" defaultChecked/> {o}
                </label>
              )}
            </div>
            <div className="fh">Recommended: keep all enabled.</div>
          </div>
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy?'⏳ Creating…':'Create bucket'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Upload Modal ───────────────────────────────────────────────────────── */
function UploadModal({bucket, onClose, onDone}) {
  const [files, setFiles] = useState([]);
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dov, setDov] = useState(false);
  const ref = useRef();

  const add = (fl) => setFiles(p => [...p, ...Array.from(fl)]);
  const rm  = (i)  => setFiles(p => p.filter((_,j)=>j!==i));

  const upload = async () => {
    if (!files.length) return;
    setBusy(true); let ok=0, fail=0;
    for (let i=0; i<files.length; i++) {
      setProgress(Math.round(((i)/files.length)*100));
      const fd = new FormData(); fd.append('file', files[i]);
      try { await S3.uploadObject(bucket, fd); ok++; } catch { fail++; }
    }
    setProgress(100);
    onDone(ok, fail);
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&!busy&&onClose()}>
      <div className="modal">
        <div className="mh"><span className="mt">Upload to <em style={{fontWeight:400}}>{bucket}</em></span><button className="mx" onClick={onClose} disabled={busy}>×</button></div>
        <div className="mb">
          <div className={`upzone ${dov?'dov':''}`}
            onClick={()=>!busy&&ref.current.click()}
            onDrop={e=>{e.preventDefault();setDov(false);add(e.dataTransfer.files);}}
            onDragOver={e=>{e.preventDefault();setDov(true);}}
            onDragLeave={()=>setDov(false)}>
            <div className="upzone-txt"><strong>Drag and drop</strong> files here<br/>or <span style={{color:'#0073bb'}}>click to browse</span></div>
            <input type="file" multiple ref={ref} style={{display:'none'}} onChange={e=>add(e.target.files)}/>
          </div>
          {files.length > 0 &&
            <div className="fi-list">
              <div style={{fontSize:13,fontWeight:700,margin:'10px 0 6px'}}>Files to upload ({files.length}) — {fmtSize(files.reduce((s,f)=>s+f.size,0))} total</div>
              {files.map((f,i) =>
                <div key={i} className="fi-item">
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                  <span className="fi-sz">{fmtSize(f.size)}</span>
                  <button className="fi-rm" onClick={()=>rm(i)} disabled={busy}>×</button>
                </div>
              )}
            </div>
          }
          {busy && <div className="prog-wrap"><div className="prog" style={{width:progress+'%'}}/></div>}
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose} disabled={busy}>Cancel</button>
          <button className="btn btn-p" onClick={upload} disabled={!files.length||busy}>{busy?`Uploading… ${progress}%`:`Upload${files.length?' ('+files.length+')':''}`}</button>
        </div>
      </div>
    </div>
  );
}

  const [err, setErr] = useState('');

  const submit = async () => {
    setBusy(true);
    setErr('');
    try {
      const tags = tagRows.map(t => ({key: (t.key || '').trim(), value: (t.value || '').trim()})).filter(t => t.key || t.value);
      const created = await VPC.createVpc({
        name,
        cidr_block: cidr,
        encryption_controls: encryption === 'none' ? 'None' : encryption === 'monitor' ? 'Monitor mode' : 'Enforce mode',
        tenancy,
        ipv6_mode: ipv6Mode,
        tags,
      });
      onDone(created);
    } catch (e) {
      setErr(e.message);
      setBusy(false);
    }
  };

  const resourceOptions = [
    {id:'vpc-only', title:'VPC only', desc:'Create only the VPC resource.'},
    {id:'vpc-more', title:'VPC and more', desc:'Create the VPC plus supporting networking resources.'},
  ];

  const encryptionOptions = [
    {id:'none', title:'None', desc:'No encryption control is applied.'},
    {id:'monitor', title:'Monitor mode', desc:'See encryption status without blocking traffic.'},
    {id:'enforce', title:'Enforce mode', desc:'Require encryption-capable resources.'},
  ];

  const addTag = () => setTagRows(p => [...p, {key:'', value:''}]);
  const updateTag = (idx, field, value) => setTagRows(p => p.map((row, i) => i === idx ? {...row, [field]: value} : row));
  const removeTag = (idx) => setTagRows(p => p.filter((_, i) => i !== idx));

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>{serviceLabel}</span><span className="bc-sep">›</span><a onClick={onBack}>{providerKey === 'gcp' ? 'VPC networks' : 'Your VPCs'}</a><span className="bc-sep">›</span><span>{pageTitle}</span>
        </div>
        <div className="vpc-page-title">{pageTitle}</div>
        <div className="vpc-page-sub">{providerKey === 'gcp' ? 'A VPC network is an isolated global virtual network populated by Google Cloud resources such as Compute Engine instances.' : 'A VPC is an isolated portion of the AWS Cloud populated by AWS objects, such as Amazon EC2 instances.'}</div>
      </div>
      <div className="vpc-create-wrap">
        <div className="vpc-create-card">
          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">VPC settings</div>
            <div className="vpc-create-subhead">
              <span>Resources to create</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-choice-grid">
              {resourceOptions.map(opt => (
                <label key={opt.id} className={`vpc-choice-card ${resourceType === opt.id ? 'selected' : ''}`}>
                  <input type="radio" name="resourceType" checked={resourceType === opt.id} onChange={() => setResourceType(opt.id)} />
                  <div>
                    <div className="vpc-choice-title">{opt.title}</div>
                    <div className="vpc-choice-desc">{opt.desc}</div>
                  </div>
                </label>
              ))}
            </div>
            <div className="fh">The simulator currently creates the base VPC and default networking resources.</div>
          </div>

          <div className="vpc-create-section">
            <label className="fl">Name tag - optional</label>
            <div className="fh" style={{marginBottom:6}}>Creates a tag with a key of "Name" and a value that you specify.</div>
            <input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="my-vpc-01" />
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>IPv4 CIDR block</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-radio-stack">
              <label className="vpc-radio-line">
                <input type="radio" name="ipv4Mode" checked={ipv4Mode === 'manual'} onChange={() => setIpv4Mode('manual')} />
                <span>IPv4 CIDR manual input</span>
              </label>
              <label className="vpc-radio-line">
                <input type="radio" name="ipv4Mode" checked={ipv4Mode === 'ipam'} onChange={() => setIpv4Mode('ipam')} />
                <span>IPAM-allocated IPv4 CIDR block</span>
              </label>
            </div>
            <div className="vpc-create-field">
              <label className="fl">IPv4 CIDR</label>
              <input className="fi" value={cidr} onChange={e=>setCidr(e.target.value)} placeholder="10.0.0.0/24" />
              <div className="fh">CIDR block size must be between /16 and /28.</div>
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>IPv6 CIDR block</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-radio-stack">
              {[
                ['none','No IPv6 CIDR block'],
                ['ipam','IPAM-allocated IPv6 CIDR block'],
                ['amazon','Amazon-provided IPv6 CIDR block'],
                ['owned','IPv6 CIDR owned by me'],
              ].map(([id, label]) => (
                <label key={id} className="vpc-radio-line">
                  <input type="radio" name="ipv6Mode" checked={ipv6Mode === id} onChange={() => setIpv6Mode(id)} />
                  <span>{label}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="vpc-create-section">
            <label className="fl">Tenancy</label>
            <select className="fi" value={tenancy} onChange={e=>setTenancy(e.target.value)}>
              <option value="default">Default</option>
              <option value="dedicated">Dedicated</option>
            </select>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-create-subhead">
              <span>VPC encryption control ($)</span>
              <a href="#" onClick={e => e.preventDefault()} className="vpc-summary-info">Info</a>
            </div>
            <div className="vpc-choice-grid vpc-choice-grid-3">
              {encryptionOptions.map(opt => (
                <label key={opt.id} className={`vpc-choice-card ${encryption === opt.id ? 'selected' : ''}`}>
                  <input type="radio" name="encryption" checked={encryption === opt.id} onChange={() => setEncryption(opt.id)} />
                  <div>
                    <div className="vpc-choice-title">{opt.title}</div>
                    <div className="vpc-choice-desc">{opt.desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Tags</div>
            <div className="vpc-create-tag-note">A tag is a label that you assign to an AWS resource. Use tags to search and filter your resources or track your AWS costs.</div>
            <div className="vpc-create-tag-empty">No tags associated with the resource</div>
            {tagRows.map((row, idx) => (
              <div className="vpc-create-tag-row" key={idx}>
                <input className="fi" placeholder="Key" value={row.key} onChange={e => updateTag(idx, 'key', e.target.value)} />
                <input className="fi" placeholder="Value" value={row.value} onChange={e => updateTag(idx, 'value', e.target.value)} />
                <button className="btn btn-s" onClick={() => removeTag(idx)} disabled={busy}>Remove</button>
              </div>
            ))}
            <div className="btn-grp" style={{marginTop:12}}>
              <button className="btn btn-s" onClick={addTag} disabled={busy}>Add tag</button>
            </div>
            <div className="fh" style={{marginTop:8}}>You can add 50 more tags.</div>
          </div>

          {err && <div className="ferr" style={{marginTop:8}}>{err}</div>}

          <div className="vpc-create-footer">
            <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
            <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create VPC'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Object Detail Pane ─────────────────────────────────────────────────── */
function ObjDetail({bucket, objKey, versionId = '', onClose, onDelete}) {
  const [meta, setMeta] = useState(null);
  const [versions, setVersions] = useState([]);
  const [err, setErr]   = useState('');
  const [view, setView]  = useState('properties');
  const title = versionId && versionId !== 'null' ? `${objKey} (${versionId})` : objKey;

  useEffect(() => {
    S3.getObjectMeta(bucket, objKey, versionId).then(setMeta).catch(e=>setErr(e.message));
    S3.listObjectVersions(bucket, objKey).then(d => setVersions(d.versions || [])).catch(() => setVersions([]));
    setView('properties');
  }, [bucket, objKey, versionId]);

  return (
    <div className="s3-object-pane">
      <div className="s3-object-pane-head">
        <div style={{minWidth:0}}>
          <div className="s3-object-pane-title">{title}</div>
          <div className="s3-object-pane-sub">Object overview for the selected file.</div>
        </div>
        <button className="btn btn-s" onClick={onClose}>Close</button>
      </div>
      <div className="tabs">
        <div className={`tab ${view === 'properties' ? 'active' : ''}`} onClick={() => setView('properties')}>
          Properties
        </div>
        <div className={`tab ${view === 'versions' ? 'active' : ''}`} onClick={() => setView('versions')}>
          Versions
        </div>
      </div>
      <div className="s3-object-pane-body">
        {err ? <p style={{color:'#d13212'}}>{err}</p> : !meta ? <div className="ld">Loading…</div> : (
          view === 'properties'
            ? <ObjectPropertiesView meta={meta}/>
            : <ObjectVersionsView versions={versions} objKey={objKey}/>
        )}
      </div>
      <div className="s3-object-pane-actions">
        <button className="btn btn-d" onClick={()=>onDelete(objKey, versionId)}>Delete</button>
        {meta && !meta.is_delete_marker && <a className="btn btn-p" href={S3.dlUrl(bucket, objKey, meta.version_id)} download={objKey}>Download</a>}
      </div>
    </div>
  );
}

      syntax: 'Action=DescribeTags&Version=2016-11-15',
      summary: 'Describes tags assigned to VPC resources.',
      params: [
        ['Filter.N.Name', 'Filter name such as resource-id, resource-type, key, or value.', 'String'],
        ['Filter.N.Value.N', 'Values for the selected filter.', 'Array'],
        ['MaxResults', 'Maximum number of results to return.', 'Integer'],
      ],
      response: `<DescribeTagsResponse xmlns="http://ec2.amazonaws.com/doc/2016-11-15/">\n  <requestId>...</requestId>\n  <tagSet>\n    <item>\n      <resourceId>vpc-...</resourceId>\n      <resourceType>vpc</resourceType>\n      <key>Name</key>\n      <value>demo</value>\n    </item>\n  </tagSet>\n</DescribeTagsResponse>`,
    },
  ], providerKey);
  }, [providerKey, gcpDocs, isGcp]);
  const [docAction, setDocAction] = useState(docs[0]?.action || '');
  useEffect(() => {
    setDocAction(docs[0]?.action || '');
  }, []);
  const selectedDocAction = docs.find(item => item.action === docAction) || docs[0];

  if (showApiDocs && isGcp) {
    return (
      <GcpDocsShell
        title={`${serviceLabel} API Reference`}
        subtitle="Use local simulator routes for networks, subnetworks, and firewall rules with Google Cloud-style request and response shapes."
        endpoint="http://127.0.0.1:9000/compute/v1/projects/{project}/global/networks"
        docs={docs}
        docAction={docAction}
        onDocAction={setDocAction}
        onClose={() => setShowApiDocs(false)}
      />
    );
  }

  return (
    <>
      {!showApiDocs && (
        <button className="vpc-doc-toggle" onClick={() => setShowApiDocs(true)}>
          <span className="vpc-doc-toggle-label">API Documentation</span>
        </button>
      )}
      {showApiDocs && (
        <GcpDocsShell
          title={`${serviceLabel} API Reference`}
          subtitle={isGcp ? 'Use local simulator routes for networks, subnetworks, and firewall rules with Google Cloud-style request and response shapes.' : `${providerApiDocPrefix(providerKey)} VPC operations use the EC2 Query contract. Use one payload at a time from Postman or curl.`}
          endpoint={isGcp ? 'http://127.0.0.1:9000/compute/v1/projects/{project}/global/networks' : `http://127.0.0.1:9000${apiBase}/vpc/aws`}
          docs={docs}
          docAction={docAction}
          onDocAction={setDocAction}
          onClose={() => setShowApiDocs(false)}
        />
      )}
    </>
  );
}

function SpacesView({notify, providerFilter = '', onConnect, onOpenSpaces, onOpenDashboard, providerCatalog = DEFAULT_PROVIDER_CATALOG}) {
  const [spaces, setSpaces] = useState([]);
  const [activeId, setActiveId] = useState('');
  const [settings, setSettings] = useState({max_spaces: 6, default_provider: 'aws', default_region: 'us-east-1'});
  const [summary, setSummary] = useState({});
  const [estimate, setEstimate] = useState(null);
  const [federationSummary, setFederationSummary] = useState({link_count: 0, linked_spaces: 0, active_linked_spaces: 0, linked_space_ids: [], active_linked_space_ids: [], provider_counts: {}, resource_counts: {}});
  const [loadError, setLoadError] = useState('');
  const [busy, setBusy] = useState('');
  const [loading, setLoading] = useState(true);
  const [showCreateModal, setShowCreateModal] = useState(false);
  const [form, setForm] = useState({
    name: '',
    provider: 'aws',
    region: 'us-east-1',
    max_instances: 10,
    runtime_count: 0,
    ec2_count: 0,
    lambda_count: 0,
    rds_count: 0,
    sqs_count: 0,
    dynamodb_count: 0,
  });
  const seedForm = useCallback((nextSpaces = [], nextSettings = {default_provider: 'aws', default_region: 'us-east-1'}, providerHint = '') => {
    const provider = normalizeProvider(providerHint || nextSettings.default_provider || 'aws');
    const defaultRegionByProvider = {
      aws: 'us-east-1',
      azure: 'eastus',
      gcp: 'us-central1',
      other: nextSettings.default_region || 'us-east-1',
    };
    return {
    name: `lab-${(nextSpaces.length + 1).toString().padStart(2, '0')}`,
    provider,
    region: defaultRegionByProvider[provider] || nextSettings.default_region || 'us-east-1',
    max_instances: 10,
    runtime_count: 0,
    ec2_count: 0,
    lambda_count: 0,
    rds_count: 0,
    sqs_count: 0,
    dynamodb_count: 0,
  };
  }, []);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      setLoadError('');
      const [spaceResp, cloudResp] = await Promise.all([Spaces.list(), CloudSim.current()]);
      const nextSpaces = spaceResp.spaces || [];
      const nextSettings = spaceResp.settings || {max_spaces: 6, default_provider: 'aws', default_region: 'us-east-1'};
      setSpaces(nextSpaces);
      setActiveId(spaceResp.active_space_id || '');
      setSettings(nextSettings);
      setSummary(cloudResp.summary || {});
      setFederationSummary(spaceResp.federation_summary || {link_count: 0, linked_spaces: 0, active_linked_spaces: 0, linked_space_ids: [], active_linked_space_ids: [], provider_counts: {}, resource_counts: {}});
      setForm(f => {
        if (f.name.trim()) return f;
        return {...f, ...seedForm(nextSpaces, nextSettings)};
      });
    } catch (e) {
      setLoadError(e?.message || 'Unable to load simulation spaces');
    } finally {
      setLoading(false);
    }
  }, [seedForm]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const timer = setInterval(load, 4000);
    return () => clearInterval(timer);
  }, [load]);

  useEffect(() => {
    let live = true;
    (async () => {
      try {
        const resp = await Spaces.estimate(form);
        if (live) setEstimate(resp.estimate || resp);
      } catch (e) {
        if (live) setEstimate(null);
      }
    })();
    return () => { live = false; };
  }, [form]);

  const openCreateModal = useCallback(() => {
    const providerHint = filterProvider || normalizeProvider(activeSpace?.provider || settings.default_provider || 'aws');
    setForm(seedForm(spaces, settings, providerHint));
    setShowCreateModal(true);
  }, [seedForm, spaces, settings, filterProvider, activeSpace]);

  const closeCreateModal = useCallback(() => {
    setShowCreateModal(false);
  }, []);

  const createSpace = async () => {
    setBusy('create');
    try {
      const payload = {
        name: form.name,
        provider: form.provider,
        region: form.region,
        max_instances: Number(form.max_instances || 10),
        runtime_count: Number(form.runtime_count || 0),
        ec2_count: Number(form.ec2_count || 0),
        lambda_count: Number(form.lambda_count || 0),
        rds_count: Number(form.rds_count || 0),
        sqs_count: Number(form.sqs_count || 0),
        dynamodb_count: Number(form.dynamodb_count || 0),
      };
      const created = await Spaces.create(payload);
      notify(`Space "${created.space.name}" created`, 'success');
      if (created.space && created.space.space_id) {
        await Spaces.switch(created.space.space_id);
      }
      setShowCreateModal(false);
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setBusy('');
    }
  };

  const switchSpace = async (spaceId) => {
    setBusy(spaceId);
    try {
      await Spaces.switch(spaceId);
      notify('Active space switched', 'success');
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setBusy('');
    }
  };

  const mutateSpace = async (spaceId, action) => {
    setBusy(`${action}:${spaceId}`);
    try {
      if (action === 'pause') await Spaces.pause(spaceId);
      if (action === 'resume') await Spaces.resume(spaceId);
      if (action === 'archive') await Spaces.archive(spaceId);
      if (action === 'delete') {
        if (!window.confirm(`Delete simulation space ${spaceId}?`)) return;
        await Spaces.remove(spaceId);
      }
      notify(`Space ${action}d`, 'success');
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setBusy('');
    }
  };

  const activeSpace = spaces.find(s => s.space_id === activeId) || null;
  const currentEstimate = estimate || {};
  const maxSpaces = settings.max_spaces || 6;
  const linkedIds = new Set(federationSummary.active_linked_space_ids || []);
  const linkedAllIds = new Set(federationSummary.linked_space_ids || []);
  const filterProvider = providerFilter ? normalizeProvider(providerFilter) : '';
  const visibleSpaces = useMemo(() => {
    if (!filterProvider) return spaces;
    return (spaces || []).filter(space => normalizeProvider(space.provider) === filterProvider);
  }, [spaces, filterProvider]);
  const visibleOrAllSpaces = visibleSpaces || spaces;
  const consumedMemory = useMemo(() => visibleOrAllSpaces.reduce((sum, space) => sum + Number(space.estimated_memory_mb || space.memory_mb || 0), 0), [visibleOrAllSpaces]);
  const consumedDisk = useMemo(() => visibleOrAllSpaces.reduce((sum, space) => sum + Number(space.estimated_disk_mb || space.disk_mb || 0), 0), [visibleOrAllSpaces]);
  const consumedRuntimeCount = useMemo(() => visibleOrAllSpaces.reduce((sum, space) => sum + Number(space.runtime_count || 0), 0), [visibleOrAllSpaces]);
  const consumedEc2Count = useMemo(() => visibleOrAllSpaces.reduce((sum, space) => sum + Number(space.ec2_count || 0), 0), [visibleOrAllSpaces]);
  const consumedWorkloads = useMemo(() => visibleOrAllSpaces.reduce((sum, space) => sum + Number(space.lambda_count || 0) + Number(space.rds_count || 0) + Number(space.sqs_count || 0) + Number(space.dynamodb_count || 0), 0), [visibleOrAllSpaces]);
  const providerStats = useMemo(() => {
    const base = {
      aws: {spaces: 0, active: 0, linked: 0, runtime_count: 0, ec2_count: 0, lambda_count: 0, rds_count: 0, sqs_count: 0, dynamodb_count: 0},
      azure: {spaces: 0, active: 0, linked: 0, runtime_count: 0, ec2_count: 0, lambda_count: 0, rds_count: 0, sqs_count: 0, dynamodb_count: 0},
      gcp: {spaces: 0, active: 0, linked: 0, runtime_count: 0, ec2_count: 0, lambda_count: 0, rds_count: 0, sqs_count: 0, dynamodb_count: 0},
      other: {spaces: 0, active: 0, linked: 0, runtime_count: 0, ec2_count: 0, lambda_count: 0, rds_count: 0, sqs_count: 0, dynamodb_count: 0},
    };
    (spaces || []).forEach(space => {
      const key = normalizeProvider(space.provider);
      const stats = base[key] || base.other;
      stats.spaces += 1;
      if (String(space.status || 'running').toLowerCase() === 'running') stats.active += 1;
      if (linkedAllIds.has(space.space_id)) stats.linked += 1;
      SPACE_RESOURCE_KEYS.forEach(k => { stats[k] += Number(space[k] || 0); });
    });
    return base;
  }, [spaces, linkedAllIds, filterProvider]);

  const spaceResourceChips = (space) => (
    <div className="space-grid-badges">
      {providerSpaceFacts(space.provider, providerCatalog).map(item => Number(space[item.key] || 0) > 0 ? (
        <span key={item.key} className="space-provider-chip">{item.label} {Number(space[item.key] || 0)}</span>
      ) : null)}
    </div>
  );
  const themeProviderKey = filterProvider || normalizeProvider(activeSpace?.provider || settings.default_provider || 'aws');
  const themeButtonClass = filterProvider ? `btn-${themeProviderKey}` : 'btn-p';

  useEffect(() => {
    window.__cloudlearnActiveSpaceId = activeSpace?.space_id || activeId || '';
  }, [activeSpace, activeId]);

  return (
    <div className={`panel space-view-theme ${themeProviderKey}`}>
      <div className="ph">
        <div>
          <div className="pt">{filterProvider ? providerLabel(themeProviderKey, providerCatalog) : 'Simulation Spaces'}</div>
          <div className="ps">
            {filterProvider
              ? `${providerResourceNames(filterProvider, providerCatalog).join(' · ')} spaces and native provider workflows.`
              : 'Create isolated local cloud worlds, switch active focus, and track local RAM and disk usage.'}
          </div>
        </div>
        <div className="btn-grp">
          <button className="btn btn-s" onClick={load} disabled={loading || !!busy}>Refresh</button>
          {filterProvider ? <button className="btn btn-s" onClick={() => onOpenSpaces?.('')}>Show all spaces</button> : null}
          <button className={`btn ${themeButtonClass}`} onClick={openCreateModal}>Create space</button>
          <button className="btn btn-s" onClick={async()=>{try{const resp = await CloudSim.reconcile(); notify(resp.message || 'CloudSim reconciled','success'); await load();}catch(e){notify(e.message,'error');}}}>Reconcile CloudSim</button>
        </div>
      </div>

      <div style={{padding:16}}>
        {filterProvider ? (
          <div className={`space-view-hero ${themeProviderKey}`}>
            <div className="space-view-hero-left">
              <ProviderMark provider={filterProvider}/>
              <div className="space-view-hero-copy">
                <div className="space-view-hero-kicker">{providerLabel(themeProviderKey, providerCatalog)}</div>
                <div className="space-view-hero-title">Provider spaces</div>
                <div className="space-view-hero-sub">{providerResourceNames(filterProvider, providerCatalog).join(' · ')}</div>
              </div>
            </div>
            <div className="space-view-hero-right">
              <div className="space-view-hero-stat">
                <strong>{visibleSpaces.length}</strong>
                <span>spaces shown</span>
              </div>
              <div className="space-view-hero-stat">
                <strong>{federationSummary.active_linked_spaces || 0}</strong>
                <span>linked</span>
              </div>
              <div className="space-view-hero-stat">
                <strong>{consumedMemory ? `${consumedMemory} MB` : '—'}</strong>
                <span>consumed memory</span>
              </div>
            </div>
          </div>
        ) : null}

        {filterProvider ? (
          <div className="bc" style={{marginBottom:16}}>
            <a onClick={() => onOpenDashboard?.()}>Overview</a>
            <span className="bc-sep">›</span>
            <a onClick={() => onOpenDashboard?.()}>Cloud Providers</a>
            <span className="bc-sep">›</span>
            <span>{providerLabel(filterProvider, providerCatalog)} spaces</span>
          </div>
        ) : null}

        <div className={`space-section-card stats ${themeProviderKey}`}>
          <div className="space-summary-grid">
            <div className="space-summary-card"><strong>{visibleSpaces.length}</strong><span>{filterProvider ? 'Provider spaces in view' : 'Spaces in view'}</span></div>
            <div className="space-summary-card"><strong>{spaces.length}</strong><span>Total spaces loaded</span></div>
            <div className="space-summary-card"><strong>{spaces.filter(space => String(space.status || 'running').toLowerCase() === 'running').length}</strong><span>Running spaces</span></div>
            <div className="space-summary-card"><strong>{consumedMemory ? `${consumedMemory} MB` : '—'}</strong><span>Consumed memory</span></div>
            <div className="space-summary-card"><strong>{consumedDisk ? `${consumedDisk} MB` : '—'}</strong><span>Consumed disk</span></div>
            <div className="space-summary-card"><strong>{consumedRuntimeCount}</strong><span>Runtime count</span></div>
            <div className="space-summary-card"><strong>{consumedEc2Count}</strong><span>EC2 / VM count</span></div>
            <div className="space-summary-card"><strong>{consumedWorkloads}</strong><span>Workload services</span></div>
            <div className="space-summary-card"><strong>{federationSummary.active_linked_spaces || 0}</strong><span>Active linked spaces</span></div>
            <div className="space-summary-card"><strong>{activeSpace ? activeSpace.name : '—'}</strong><span>Active simulation space</span></div>
            <div className="space-summary-card"><strong>{summary.last_reconcile_at ? relativeTime(summary.last_reconcile_at) : '—'}</strong><span>Last CloudSim reconcile</span></div>

          <div className="ibox" style={{marginTop:16, background:'#fff7eb', borderColor:'#f5c66a', color:'#7a3b00'}}>
            <strong>Simulation Spaces load issue</strong> — {loadError}.

        <div className={`panel space-grid-panel ${themeProviderKey}`}>
          <div className="ph">
            <div>
              <div className="pt">{filterProvider ? `${providerLabel(themeProviderKey, providerCatalog)} spaces` : 'Spaces grid'}</div>
              <div className="ps">
                {filterProvider
                  ? 'Provider-native spaces, lifecycle actions, and space federation.'

              </div>
            </div>
            <div className="btn-grp">
              <button className="btn btn-s" onClick={load} disabled={loading || !!busy}>Refresh</button>
              <button className={`btn ${themeButtonClass}`} onClick={openCreateModal}>Create space</button>
            </div>
          </div>

function PacksView({notify}) {
  const [packs, setPacks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(null);
  const [fragmentCache, setFragmentCache] = useState({});

  const load = useCallback(async () => {
    setLoading(true);
    try { const d = await Packs.list(); setPacks(d.packs || []); }
    catch(e) { notify(e.message, 'error'); }
    finally { setLoading(false); }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    let live = true;
    const visibleFragments = packs.filter(pack => pack.fragment_url);
    if (!visibleFragments.length) return () => { live = false; };
    (async () => {
      const entries = await Promise.all(visibleFragments.map(async pack => {
        try {
          const resp = await fetch(pack.fragment_url, {headers: {'Accept': 'text/html'}});
          if (!resp.ok) return null;
          return [pack.id, await resp.text()];
        } catch (_) {
          return null;
        }
      }));
      if (!live) return;
      const next = {};
      entries.filter(Boolean).forEach(([id, html]) => { next[id] = html; });
      setFragmentCache(next);
      window.__PACK_FRAGMENT_CACHE__ = next;
    })();
    return () => { live = false; };
  }, [packs]);

  const activate = async (id) => {
    setBusy(id);
    try { await Packs.activate(id); notify(`Pack "${id}" activated`, 'success'); load(); }
    catch(e) { notify(e.message, 'error'); }
    finally { setBusy(null); }
  };

  return (
    <div className="panel">
      <div className="ph">
        <div>
          <div className="pt">Capability Packs</div>
          <div className="ps">Signed packs are activated on demand and must pass AWS-like API contract checks.</div>
        </div>
        <div className="btn-grp"><button className="btn btn-s" onClick={load}>↻ Refresh</button></div>
      </div>
      {loading ? <div className="ld">⏳ Loading packs…</div> : (
        <table className="tbl">
          <thead><tr><th>Name</th><th>Type</th><th>Version</th><th>Status</th><th>API</th><th></th></tr></thead>
          <tbody>
            {packs.map(p => (
              <tr key={p.id}>
                <td>{p.id}</td>
                <td>{p.type}</td>
                <td>{p.version}</td>
                <td><span className={`tag ${p.active ? 'tg' : 'tgr'}`}>{p.state}</span></td>
                <td>{p.api?.protocol || '—'}</td>
                <td style={{textAlign:'right'}}>
                  {!p.active && <button className="btn btn-p" onClick={()=>activate(p.id)} disabled={busy===p.id}>{busy===p.id?'⏳ Activating…':'Activate'}</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      <div style={{display:'none'}} aria-hidden="true">
        {Object.keys(fragmentCache).map(id => <div key={id} dangerouslySetInnerHTML={{__html: fragmentCache[id]}} />)}
      </div>
    </div>
  );
}

function LicenseView({notify}) {

    try { setLic(await License.status()); }
    catch(e) { notify(e.message, 'error'); }
  }, [notify]);

  useEffect(() => { load(); }, [load]);

  const signup = async () => {
    setBusy(true);

      const d = await License.signup(form);

      setToken(d.token);
      notify(`License issued for ${d.license.tier} tier`, 'success');

              <div className="fg"><label className="fl">URL</label><input className="fi" placeholder="https://idp.example.com/metadata" value={form.idp_url} onChange={e=>setForm(f=>({...f,idp_url:e.target.value}))}/></div>
            </div>
            <button className="btn btn-p" type="button" onClick={async()=>{setBusy(true);try{await IAM.createIdentityProvider({provider_name:form.idp_name, provider_type:form.idp_type, url:form.idp_url});notify('Identity provider created','success');setForm(f=>({...f,idp_name:'',idp_type:'SAML',idp_url:''}));load();}catch(e){notify(e.message,'error');}finally{setBusy(false);}}} disabled={busy || !form.idp_name.trim()}>Create provider</button>

    return (
      <div className="panel" style={{marginBottom:0}}>
        <div className="ph">
          <div>
            <div className="pt">Password policy</div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12,marginBottom:12}}>

            {[
              ['require_symbols','Require symbols'],
              ['require_numbers','Require numbers'],
              ['require_uppercase','Require uppercase'],
              ['require_lowercase','Require lowercase'],
            ].map(([key, label]) => (
              <label key={key} className="vpc-radio-line" style={{paddingTop:26}}>

          <button className="btn btn-p" type="button" onClick={async()=>{setBusy(true);try{await IAM.updateAccountSettings({password_policy: passwordPolicyForm});notify('Account settings updated','success');load();}catch(e){notify(e.message,'error');}finally{setBusy(false);}}} disabled={busy}>Save account settings</button>

  const renderTable = () => {

    if (section === 'groups') {

    if (section === 'policies') {

            <table className="tbl">

                    <td><button className="btn btn-s" type="button" onClick={async()=>{if(!window.confirm(`Delete policy ${p.policy_name}?`)) return; setBusy(true); try { await IAM.removePolicy(p.policy_id); notify('Policy deleted','success'); load(); } catch (e) { notify(e.message,'error'); } finally { setBusy(false); }}} disabled={busy}>Delete</button></td>

          </div>

    if (section === 'attachments') {
      return (
        <div className="panel" style={{marginBottom:16}}>
          <div className="ph"><div><div className="pt">Policy attachments</div><div className="ps">{filteredAttachments.length} attachments</div></div></div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr><th>Target</th><th>Policy</th><th>Attached at</th><th>Actions</th></tr></thead>
              <tbody>
                {filteredAttachments.map((a, idx) => (
                  <tr key={idx}>
                    <td>{a.target_type}:{a.target_id}</td>
                    <td>{a.policy_id}</td>
                    <td>{fmtDate(a.at)}</td>
                    <td><button className="btn btn-s" type="button" onClick={async()=>{if(!window.confirm(`Remove attachment ${a.target_type}:${a.target_id} -> ${a.policy_id}?`)) return; setBusy(true); try { await IAM.detachPolicy({target_type:a.target_type, target_id:a.target_id, policy_id:a.policy_id}); notify('Policy detached','success'); load(); } catch (e) { notify(e.message,'error'); } finally { setBusy(false); }}} disabled={busy}>Delete</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }
    if (section === 'identity-providers') {
      return (
        <div className="panel" style={{marginBottom:16}}>
          <div className="ph"><div><div className="pt">Identity providers</div><div className="ps">{filteredIdentityProviders.length} providers</div></div></div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr><th>Name</th><th>Type</th><th>URL</th><th>Created</th><th>Actions</th></tr></thead>
              <tbody>
                {filteredIdentityProviders.map(idp => (
                  <tr key={idp.provider_id}>
                    <td>{idp.provider_name}</td>
                    <td>{idp.provider_type}</td>
                    <td>{idp.url || '—'}</td>
                    <td>{fmtDate(idp.created)}</td>
                    <td><button className="btn btn-s" type="button" onClick={async()=>{if(!window.confirm(`Delete identity provider ${idp.provider_name}?`)) return; setBusy(true); try { await IAM.removeIdentityProvider(idp.provider_id); notify('Identity provider deleted','success'); load(); } catch (e) { notify(e.message,'error'); } finally { setBusy(false); }}} disabled={busy}>Delete</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }
    return (
      <div className="panel" style={{marginBottom:16}}>
        <div className="ph"><div><div className="pt">Account settings</div><div className="ps">Password policy defaults</div></div></div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>Setting</th><th>Value</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td>Minimum length</td><td>{accountSettings.password_policy?.minimum_length ?? 8}</td><td>Minimum characters for console passwords.</td></tr>
              <tr><td>Require symbols</td><td>{String(!!accountSettings.password_policy?.require_symbols)}</td><td>Whether symbols are required.</td></tr>
              <tr><td>Require numbers</td><td>{String(!!accountSettings.password_policy?.require_numbers)}</td><td>Whether numbers are required.</td></tr>
              <tr><td>Require uppercase</td><td>{String(!!accountSettings.password_policy?.require_uppercase)}</td><td>Whether uppercase letters are required.</td></tr>
              <tr><td>Require lowercase</td><td>{String(!!accountSettings.password_policy?.require_lowercase)}</td><td>Whether lowercase letters are required.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  return (
    <div className="panel">
      <div className="ph">
        <div>
          <div className="pt">IAM</div>
          <div className="ps">Manage users, groups, roles, policies, and account settings.</div>
        </div>
        <div className="btn-grp" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <input
            className="fi"
            style={{width:240}}
            value={principal}
            onChange={e => {
              const v = e.target.value;
              setPrincipal(v);
              window.localStorage.setItem('cloudlearn.principal', v || 'root');
            }}
            placeholder="root"
          />
          <button className="btn btn-s" type="button" onClick={() => { setPrincipal('root'); window.localStorage.setItem('cloudlearn.principal', 'root'); notify('Principal reset to root','success'); }}>Reset</button>
          <button className="btn btn-s" type="button" onClick={load}>↻ Refresh</button>
        </div>
      </div>
      <div style={{padding:'0 20px 16px', color:'#687078', fontSize:12}}>Requests use principal <span className="ec2-mono">{principal || 'root'}</span>. Set a user or role ARN/name here to test policy enforcement, like the IAM console role switcher.</div>
      <div style={{padding:'0 20px 16px'}}>
        <div className="ec2-kv-grid" style={{gridTemplateColumns:'repeat(6,minmax(0,1fr))'}}>
          <div className="ec2-kv"><dt>Users</dt><dd>{users.length}</dd></div>
          <div className="ec2-kv"><dt>Groups</dt><dd>{groups.length}</dd></div>
          <div className="ec2-kv"><dt>Roles</dt><dd>{roles.length}</dd></div>
          <div className="ec2-kv"><dt>Policies</dt><dd>{policies.length}</dd></div>
          <div className="ec2-kv"><dt>Attachments</dt><dd>{attachments.length}</dd></div>
          <div className="ec2-kv"><dt>Providers</dt><dd>{identityProviders.length}</dd></div>
        </div>
      </div>
      <div style={{padding:'0 20px 20px'}}>
        <div className="iam-shell">
          <aside className="iam-nav">
            {sections.map(item => (
              <div key={item.id} className={`iam-nav-item ${section === item.id ? 'active' : ''}`} onClick={() => setSection(item.id)}>
                <span>{item.label}</span>

            <div className="ec2-toolbar" style={{borderRadius:4,marginBottom:16}}>
