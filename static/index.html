            <div className="ec2-docs-section" id="rds-doc-request-syntax" style={{borderTop:'none',paddingTop:0,marginTop:16}}>
              <h3>Request syntax</h3>
              <div className="ec2-docs-note">{isGcp ? 'Use the Cloud SQL Admin REST API with project-scoped resources and JSON request bodies.' : `Use the ${serviceLabel} Query endpoint with Action and Version. Postman can send query string or x-www-form-urlencoded data.`}</div>
              <div className="ec2-docs-request">
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Endpoint</div>
                  <pre className="ec2-docs-code">{isGcp ? 'http://127.0.0.1:9000/sql/v1beta4/projects/{project}/instances' : `http://127.0.0.1:9000${apiBase}/rds/aws`}</pre>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Sample request</div>
                  <pre className="ec2-docs-code">Action=DescribeDBInstances
Version=2014-10-31</pre>
                </div>
              </div>
            </div>
            <div className="ec2-docs-section" id="rds-doc-query-parameters">
              <h3>Query parameters</h3>
              <table className="ec2-docs-param-table">
                <thead><tr><th>Parameter</th><th>Description</th><th>Type</th></tr></thead>
                <tbody>
                  <tr><td><span className="ec2-mono">Action</span></td><td>The RDS operation to execute.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">Version</span></td><td>The simulator accepts <span className="ec2-mono">2014-10-31</span>.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">DBInstanceIdentifier</span></td><td>Targets a single DB instance for create, modify, delete, start, stop, reboot, or describe.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">DBSubnetGroupName</span></td><td>Selects or creates the DB subnet group used by the instance.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">DBParameterGroupName</span></td><td>Selects the DB parameter group used by the instance.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">DBSnapshotIdentifier</span></td><td>Targets a snapshot for create or restore actions.</td><td>String</td></tr>
                  <tr><td><span className="ec2-mono">ResourceName</span></td><td>ARN or name used for tags.</td><td>String</td></tr>
                </tbody>
              </table>
            </div>
            <div className="ec2-docs-section" id="rds-doc-response-structures">
              <h3>Response structures</h3>
              <div className="ec2-docs-note">Responses use the {serviceLabel} XML namespace and follow the Query API result format.</div>
              {renderXmlSnippet('<DescribeDBInstancesResponse xmlns="http://rds.amazonaws.com/doc/2014-10-31/">\n  <DescribeDBInstancesResult>\n    <DBInstances>\n      <DBInstance>...</DBInstance>\n    </DBInstances>\n  </DescribeDBInstancesResult>\n  <ResponseMetadata><RequestId>...</RequestId></ResponseMetadata>\n</DescribeDBInstancesResponse>')}
            </div>
            <div className="ec2-docs-section" id="rds-doc-examples">
              <h3>Examples</h3>
              <div className="ec2-docs-note">Select one RDS Query action to inspect its request and response payload.</div>
              <select className="rds-doc-select" value={docAction} onChange={e => setDocAction(e.target.value)}>
                {docs.map(item => <option key={item.action} value={item.action}>{item.action}</option>)}
              </select>
              <div className="rds-doc-pill-row">
                {docs.map(item => (
                  <button key={item.action} className={`rds-doc-pill ${selectedDocAction.action === item.action ? 'active' : ''}`} onClick={() => setDocAction(item.action)}>
                    {item.action}
                  </button>
                ))}
              </div>
              <div className="rds-doc-summary">{selectedDocAction.summary}</div>
              <div className="ec2-docs-request">
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Request</div>
                  <pre className="ec2-docs-code">{selectedDocAction.request}</pre>
                  <div className="fh" style={{marginTop:8}}>POST body: <span className="ec2-mono">{selectedDocAction.syntax}</span></div>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Response</div>
                  {renderXmlSnippet(selectedDocAction.response)}
                  <div className="fh" style={{marginTop:8}}>Response root: <span className="ec2-mono">{selectedDocAction.responseRoot}</span></div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      )}
    </>
  );
}

function RDSView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'rds', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Databases' : 'Databases';
  const defaultParameterGroupName = (engine) => `default.${engine === 'mysql' ? 'mysql8.0' : engine === 'mariadb' ? 'mariadb11.4' : 'postgres16'}`;
  const [data, setData] = useState({db_instances: [], db_subnet_groups: [], db_parameter_groups: [], db_snapshots: [], events: [], count: 0});
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('list');
  const [selectedIds, setSelectedIds] = useState([]);
  const [selectedDbId, setSelectedDbId] = useState('');
  const [detailTab, setDetailTab] = useState('connectivity');
  const [search, setSearch] = useState('');
  const [actionsOpen, setActionsOpen] = useState(false);
  const [detailVpcResources, setDetailVpcResources] = useState(null);
  const [createVpcs, setCreateVpcs] = useState([]);
  const [createVpcResources, setCreateVpcResources] = useState(null);
  const [createBusy, setCreateBusy] = useState(false);
  const [createMode, setCreateMode] = useState('easy');
  const [createTags, setCreateTags] = useState([{key: 'Name', value: 'my-rds-01'}]);
  const [showCreatePassword, setShowCreatePassword] = useState(false);
  const [showDetailPassword, setShowDetailPassword] = useState(false);
  const [createForm, setCreateForm] = useState({
    db_instance_identifier: 'my-rds-01',
    db_instance_class: 'db.t3.micro',
    engine: 'postgres',
    engine_version: '16.4',
    master_username: 'dbadmin',
    master_user_password: 'Password123!',
    allocated_storage: 20,
    storage_type: 'gp3',
    vpc_id: '',
    db_subnet_group_name: '',
    db_parameter_group_name: '',
    availability_zone: 'us-east-1a',
    publicly_accessible: false,
    multi_az: false,
    backup_retention_period: 7,
    preferred_maintenance_window: 'sun:03:00-sun:03:30',
    security_group_ids: [],
  });
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [showApiDocs, setShowApiDocs] = useState(false);
  const actionsRef = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await RDS.list();
      setData(d);
      if (!selectedDbId && d.db_instances?.length) {
        setSelectedDbId(d.db_instances[0].db_instance_identifier);
      }
      if (page === 'create' && !createForm.vpc_id) {
        const vpcs = await VPC.listVpcs().catch(() => ({vpcs: []}));
        setCreateVpcs(vpcs.vpcs || []);
        if (vpcs.vpcs?.length) {
          setCreateForm(f => ({...f, vpc_id: vpcs.vpcs[0].vpc_id, db_subnet_group_name: f.db_subnet_group_name || `default-${(vpcs.vpcs[0].vpc_id || '').replace('vpc-','').slice(0,8) || 'default'}`}));
        }
      }
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify, page, selectedDbId, createForm.vpc_id]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (page !== 'create' || !createForm.vpc_id) return;
    VPC.resources(createForm.vpc_id).then(res => {
      setCreateVpcResources(res);
      const defaultSg = (res.security_groups || []).find(sg => sg.is_default) || res.security_groups?.[0] || null;
      setCreateForm(f => ({
        ...f,
        db_subnet_group_name: f.db_subnet_group_name || `default-${(createForm.vpc_id || '').replace('vpc-','').slice(0,8) || 'default'}`,
        security_group_ids: f.security_group_ids.length ? f.security_group_ids : (defaultSg ? [defaultSg.security_group_id] : []),
      }));
    }).catch(() => setCreateVpcResources(null));
  }, [page, createForm.vpc_id]);

  useEffect(() => {
    if (page !== 'detail' || !selectedDb?.vpc_id) {
      setDetailVpcResources(null);
      return;
    }
    VPC.resources(selectedDb.vpc_id).then(setDetailVpcResources).catch(() => setDetailVpcResources(null));
  }, [page, selectedDbId, data.db_instances]);

  useEffect(() => {
    const closeMenu = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', closeMenu);
    return () => document.removeEventListener('pointerdown', closeMenu);
  }, []);

  const selectedDb = data.db_instances.find(db => db.db_instance_identifier === selectedDbId) || null;
  const filteredDbs = data.db_instances.filter(db => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return [db.db_instance_identifier, db.status, db.engine, db.db_instance_class, db.endpoint_url, db.vpc_id, db.db_subnet_group_name, db.db_parameter_group_name].filter(Boolean).some(v => String(v).toLowerCase().includes(q));
  });
  const selectedItems = data.db_instances.filter(db => selectedIds.includes(db.db_instance_identifier));
  const selectedSingle = selectedItems.length === 1 ? selectedItems[0] : null;
  const anyRunning = selectedItems.some(db => db.status === 'available');
  const anyStopped = selectedItems.some(db => db.status === 'stopped');
  const stateChipClass = (status) => ({
    available: 'running',
    stopped: 'stopped',
    creating: 'pending',
    modifying: 'pending',
    'backing-up': 'pending',
    deleting: 'terminated',
    rebooting: 'pending',
  }[status] || 'stopped');

  const openCreate = () => {
    setPage('create');
    setDetailTab('connectivity');
    setActionsOpen(false);
    setShowCreatePassword(false);
  };

  const openDetail = (id) => {
    setSelectedDbId(id);
    setSelectedIds([id]);
    setPage('detail');
    setDetailTab('connectivity');
    setShowDetailPassword(false);
  };

  const backToList = () => {
    setPage('list');
    setActionsOpen(false);
  };

  const toggleSelected = (id) => {
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    setSelectedDbId(id);
  };

  const actOnSelected = async (handler, filter = () => true, emptyMessage = 'Select a database first.') => {
    const targets = selectedItems.filter(filter);
    if (!targets.length) {
      notify(emptyMessage, 'info');
      return;
    }
    setActionsOpen(false);
    try {
      for (const db of targets) {
        await handler(db);
      }
      await load();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const submitCreate = async () => {
    setCreateBusy(true);
    try {
      const identifier = (createForm.db_instance_identifier || '').trim();
      const masterUsername = (createForm.master_username || '').trim();
      const masterPassword = (createForm.master_user_password || '').trim();
      if (!identifier || !masterUsername || !masterPassword) {
        throw new Error('DB instance identifier, master username, and master password are required.');
      }
      const tags = createTags.map(t => ({key: (t.key || '').trim(), value: (t.value || '').trim()})).filter(t => t.key || t.value);
      const created = await RDS.create({
        ...createForm,
        db_instance_identifier: identifier,
        master_username: masterUsername,
        master_user_password: masterPassword,
        tags,
        security_group_ids: createForm.security_group_ids,
      });
      const createdId = created?.db_instance_identifier || identifier;
      if (!createdId) {
        throw new Error('Create database returned an invalid response.');
      }
      notify(`Database "${createdId}" created`, 'success');
      setSelectedDbId(createdId);
      setPage('detail');
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setCreateBusy(false);
    }
  };

  const currentVpc = createVpcs.find(v => v.vpc_id === createForm.vpc_id) || null;
  const detailSecurityGroups = (detailVpcResources?.security_groups || []).filter(sg => selectedDb?.security_group_ids?.includes(sg.security_group_id));

  const renderDetailTab = () => {
    if (!selectedDb) {
      return <div className="rds-detail-empty">Select a database from the grid to view details.</div>;
    }
    const vpc = detailVpcResources?.vpc || null;
    const subnetGroup = selectedDb.db_subnet_group || {};
    const parameterGroup = selectedDb.db_parameter_group || {};
    if (detailTab === 'connectivity') {
      return (
        <>
          <div className="rds-detail-section">
            <div className="rds-detail-section-title">Connectivity & security</div>
            <div className="rds-detail-grid">
              <dl className="ec2-kv"><dt>Endpoint</dt><dd className="ec2-mono">{selectedDb.endpoint_url || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>Port</dt><dd>{selectedDb.endpoint_port || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>VPC</dt><dd className="ec2-mono">{selectedDb.vpc_id || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>DB subnet group</dt><dd>{selectedDb.db_subnet_group_name || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>Publicly accessible</dt><dd>{selectedDb.publicly_accessible ? 'Yes' : 'No'}</dd></dl>
              <dl className="ec2-kv"><dt>Availability Zone</dt><dd>{selectedDb.availability_zone || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>Runtime backend</dt><dd>{selectedDb.runtime_backend || 'simulated'}</dd></dl>
              <dl className="ec2-kv"><dt>LXD image</dt><dd className="ec2-mono">{selectedDb.runtime_image || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>Container</dt><dd className="ec2-mono">{selectedDb.container_name || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>Container status</dt><dd>{selectedDb.container_status || '—'}</dd></dl>
            </div>
          </div>
          <div className="rds-detail-section">
            <div className="rds-detail-section-title">Associated security groups</div>
            {detailSecurityGroups.length ? (
              <table className="vpc-simple-table">
                <thead><tr><th>Group</th><th>Description</th><th>VPC</th></tr></thead>
                <tbody>
                  {detailSecurityGroups.map(sg => (
                    <tr key={sg.security_group_id}>
                      <td>{sg.group_name}</td>
                      <td>{sg.description}</td>
                      <td className="ec2-mono">{sg.vpc_id}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            ) : <div className="rds-detail-empty">No security groups are associated with this DB instance.</div>}
          </div>
          <div className="rds-detail-section">
            <div className="rds-detail-section-title">Connection hints</div>
            <div className="rds-detail-grid">
              <dl className="ec2-kv"><dt>Master username</dt><dd>{selectedDb.master_username || '—'}</dd></dl>
              <dl className="ec2-kv">
                <dt>Master password</dt>
                <dd>
                  <div className="rds-secret-field">
                    <span className={`rds-secret-field-display rds-secret-value ${showDetailPassword ? '' : 'masked'}`}>{showDetailPassword ? (selectedDb.master_user_password || '—') : maskSecret(selectedDb.master_user_password)}</span>
                    <button
                      type="button"
                      className="rds-secret-toggle"
                      onClick={() => setShowDetailPassword(v => !v)}
                      aria-label={showDetailPassword ? 'Hide password' : 'Show password'}
                      title={showDetailPassword ? 'Hide password' : 'Show password'}
                    >
                      {showDetailPassword ? '🙈' : '👁'}
                    </button>
                  </div>
                </dd>
              </dl>
              <dl className="ec2-kv"><dt>Connection string</dt><dd className="ec2-mono">{rdsConnectionCommand(selectedDb)}</dd></dl>
            </div>
            <div className="rds-detail-note">The simulator keeps the connection metadata visible like the managed database console. Use the endpoint, username, and password in client tools.</div>
          </div>
        </>
      );
    }
    if (detailTab === 'configuration') {
      return (
        <>
          <div className="rds-detail-section">
            <div className="rds-detail-section-title">Configuration</div>
            <div className="rds-detail-grid">
              <dl className="ec2-kv"><dt>DB instance identifier</dt><dd>{selectedDb.db_instance_identifier}</dd></dl>
              <dl className="ec2-kv"><dt>Engine</dt><dd>{selectedDb.engine}</dd></dl>
              <dl className="ec2-kv"><dt>Engine version</dt><dd>{selectedDb.engine_version || '—'}</dd></dl>
              <dl className="ec2-kv"><dt>DB instance class</dt><dd>{selectedDb.db_instance_class}</dd></dl>
              <dl className="ec2-kv"><dt>Allocated storage</dt><dd>{selectedDb.allocated_storage} GiB</dd></dl>
              <dl className="ec2-kv"><dt>Storage type</dt><dd>{selectedDb.storage_type}</dd></dl>
              <dl className="ec2-kv"><dt>Parameter group</dt><dd>{selectedDb.db_parameter_group_name || 'default'}</dd></dl>
              <dl className="ec2-kv"><dt>Backup retention</dt><dd>{selectedDb.backup_retention_period} days</dd></dl>
              <dl className="ec2-kv"><dt>Maintenance window</dt><dd>{selectedDb.preferred_maintenance_window}</dd></dl>
            </div>
          </div>
          <div className="rds-detail-section">
            <div className="rds-detail-section-title">Source and access</div>
            <div className="rds-detail-note">Master user: {selectedDb.master_username} · Multi-AZ: {selectedDb.multi_az ? 'Enabled' : 'Disabled'} · Auto minor version upgrade: {selectedDb.auto_minor_version_upgrade ? 'Enabled' : 'Disabled'}</div>
          </div>
        </>
      );
    }
    if (detailTab === 'monitoring') {
      return (
        <div className="rds-detail-section">
          <div className="rds-detail-section-title">Monitoring</div>
          <div className="rds-kpi-grid">
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? '1' : '0'}</strong><span>Connections</span></div>
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? '12%' : '0%'}</strong><span>CPU utilization</span></div>
            <div className="rds-kpi"><strong>{selectedDb.allocated_storage} GiB</strong><span>Allocated storage</span></div>
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? 'Healthy' : 'Stopped'}</strong><span>Status checks</span></div>

      const rows = [...(selectedDb.events || []), ...(data.events || []).filter(ev => ev.detail?.db_instance_identifier === selectedDb.db_instance_identifier)];

              <tr><td>Latest restorable time</td><td>{fmtDate(selectedDb.latest_restorable_time)}</td></tr>
              <tr><td>Pending modified values</td><td>{Object.keys(selectedDb.pending_modified_values || {}).length ? JSON.stringify(selectedDb.pending_modified_values) : 'None'}</td></tr>

        </div>

        <table className="vpc-simple-table">
          <thead><tr><th>Key</th><th>Value</th></tr></thead>

            {tags.map((tag, idx) => (

              </tr>
            ))}
          </tbody>
        </table>
      ) : <div className="rds-detail-empty">No tags are associated with this database.</div>;
    }
    return null;

      {id:'postgres', title:'PostgreSQL', desc:'Popular open-source relational database.'},

              <div className="fg">
                <label className="fl">DB subnet group name</label>
                <input className="fi" value={createForm.db_subnet_group_name} onChange={e => setCreateForm(f => ({...f, db_subnet_group_name: e.target.value}))} />
              </div>
              <div className="fg">
                <label className="fl">Availability zone</label>
                <select className="fi" value={createForm.availability_zone} onChange={e => setCreateForm(f => ({...f, availability_zone: e.target.value}))}>

          {createMode === 'standard' && (

              <div className="rds-create-section">

                    <label className="fl">Backup retention period (days)</label>

          <div className="rds-create-footer">
            <button className="btn btn-s" onClick={backToList} disabled={createBusy}>Cancel</button>
            <button className="btn btn-p" onClick={submitCreate} disabled={createBusy}>{createBusy ? '⏳ Creating…' : 'Create database'}</button>
          </div>
        </div>
      </div>

  if (page === 'create') {
    return (
      <>
        <RDSApiDocsPanel />
        {renderCreateView()}
      </>
    );
  }

  return (
    <>
      <RDSApiDocsPanel />
      <div className="panel">
        <div className="rds-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>{serviceLabel}</span><span className="bc-sep">›</span><span>{pageTitle}</span>
          </div>
          <div className="rds-page-title">{pageTitle}</div>
          <div className="rds-page-sub">{providerKey === 'gcp' ? 'Create and manage Cloud SQL databases, snapshots, and subnet groups with a provider-native console layout.' : 'Create and manage managed database instances, snapshots, and subnet groups with an AWS-like console layout.'}</div>
        </div>

          <div className="rds-toolbar-left">

          </div>
          <div className="rds-toolbar-right">
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
            <button className="btn btn-p" onClick={openCreate}>Create database</button>
            <div className="vpc-actions-wrap" ref={actionsRef}>
              <button className="btn btn-s" onClick={() => setActionsOpen(v => !v)} disabled={!selectedIds.length}>Actions ▾</button>

                <div className="vpc-actions-menu">
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.start(db.db_instance_identifier), db => db.status === 'stopped', 'Select a stopped database first.')}>Start database</button>
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.stop(db.db_instance_identifier), db => db.status === 'available', 'Select an available database first.')}>Stop database</button>
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.reboot(db.db_instance_identifier), db => db.status === 'available', 'Select an available database first.')}>Reboot database</button>
                  <button className="vpc-actions-item" onClick={() => setDeleteTarget(selectedItems.length ? selectedItems : null)} disabled={!selectedIds.length}>Delete selected database</button>
                </div>
              )}
            </div>
          </div>
        </div>
        {loading && !data.db_instances.length ? <div className="ld">Loading databases…</div> : (
          <div className="rds-grid-wrap">
            {filteredDbs.length ? (
              <table className="tbl rds-grid">
                <thead>
                  <tr>
                    <th><input type="checkbox" disabled aria-label="Select all databases" /></th>
                    <th>DB identifier</th>
                    <th>Status</th>
                    <th>Engine</th>
                    <th>Class</th>
                    <th>Endpoint</th>
                    <th>VPC</th>
                    <th>AZ</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredDbs.map(db => (
                    <tr key={db.db_instance_identifier} className={selectedDbId === db.db_instance_identifier ? 'active' : ''} onClick={() => openDetail(db.db_instance_identifier)}>
                      <td>
                        <input
                          type="checkbox"
                          checked={selectedIds.includes(db.db_instance_identifier)}
                          onClick={e => e.stopPropagation()}
                          onChange={() => toggleSelected(db.db_instance_identifier)}
                        />
                      </td>
                      <td title={db.db_instance_identifier}>
                        <span className="rds-grid-name">{db.db_instance_identifier}</span>
                      </td>
                      <td><span className={`tag ${stateChipClass(db.status) === 'running' ? 'tg' : stateChipClass(db.status) === 'stopped' ? 'ty' : 'tgr'}`}>{db.status}</span></td>
                      <td>{db.engine}</td>
                      <td>{db.db_instance_class}</td>
                      <td className="ec2-mono">{db.endpoint_url || '—'}</td>
                      <td className="ec2-mono">{db.vpc_id || '—'}</td>
                      <td>{db.availability_zone || '—'}</td>
                      <td>{fmtDate(db.created)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            ) : (
              <div className="empty">
                <div className="empty-t">{search ? 'No matching databases' : 'No databases yet'}</div>
                <div className="empty-d">{search ? 'Try a different search term.' : 'Create a database to get started.'}</div>
                {!search && <button className="btn btn-p" onClick={openCreate}>Create database</button>}
              </div>
            )}
          </div>
        )}
        <div className="rds-detail-wrap">
          <div className="rds-detail-panel">
            {selectedDb ? (
              <>
                <div className="rds-detail-banner">
                  <div className="rds-detail-name">{selectedDb.db_instance_identifier}</div>
                  <div className="rds-detail-meta">{selectedDb.engine} · {selectedDb.db_instance_class} · {selectedDb.endpoint_url || 'No endpoint yet'}</div>
                </div>
                <div className="tabs">
                  {[
                    ['connectivity', 'Connectivity & security'],
                    ['configuration', 'Configuration'],
                    ['monitoring', 'Monitoring'],
                    ['logs & events', 'Logs & events'],
                    ['maintenance', 'Maintenance'],
                    ['tags', 'Tags'],
                  ].map(([k, label]) => (
                    <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                  ))}
                </div>
                <div className="rds-detail-body">
                  {renderDetailTab()}
                </div>
              </>
            ) : (
              <div className="rds-detail-body">
                <div className="rds-detail-empty">Select a database from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>
      </div>
      {deleteTarget && (
        <ConfirmDelete
          title="Delete database"
          lines={[
            `You are about to delete ${deleteTarget.length} database instance(s).`,
            'The simulator will remove the database metadata. This action cannot be undone.',
          ]}
          onConfirm={async () => {
            try {
              for (const db of deleteTarget) {
                await RDS.delete(db.db_instance_identifier);
              }
              notify('Database deleted', 'success');
              setDeleteTarget(null);
              setSelectedIds([]);
              setSelectedDbId('');
              await load();
            } catch (e) {
              notify(e.message, 'error');
            }
          }}
          onClose={() => setDeleteTarget(null)}
          busy={false}
        />
      )}
    </>
  );
}

const sqsRowsToTags = (rows = []) => rows.reduce((acc, row) => {
  const key = (row.key || '').trim();
  const value = (row.value || '').trim();
  if (key) acc[key] = value;
  return acc;
}, {});

const sqsRedrivePolicyFromForm = (arn, maxReceiveCount) => {
  const target = (arn || '').trim();
  if (!target) return {};
  return {
    deadLetterTargetArn: target,
    maxReceiveCount: Number(maxReceiveCount) || 5,
  };
};

        docAction={docAction}

        onClose={() => setShowApiDocs(false)}
      />
    );
  }

  return (
    <>
      {!showApiDocs && (
        <button className="vpc-doc-toggle" onClick={() => setShowApiDocs(true)}>
          <span className="vpc-doc-toggle-label">API Documentation</span>
        </button>
      )}
      {showApiDocs && (
        <aside className="vpc-doc-drawer" aria-label={`${serviceLabel} API Reference`}>
          <div className="vpc-doc-drawer-head">
            <div style={{minWidth:0,flex:1}}>
              <div className="vpc-doc-drawer-title">{serviceLabel} API Reference</div>
              <div className="vpc-doc-drawer-sub">{isGcp ? 'Pub/Sub uses REST resources for topics and subscriptions. Try one request/response pair at a time from Postman or curl.' : `${serviceLabel} uses the Query API contract. Try one request/response pair at a time from Postman or curl.`}</div>
            </div>
            <button className="vpc-doc-drawer-close" onClick={() => setShowApiDocs(false)}>Close</button>
          </div>
          <div className="vpc-doc-drawer-body">
            <div className="ec2-docs-note" style={{marginBottom:12}}>{isGcp ? 'Select one Pub/Sub request/response pair at a time.' : 'Select one SQS request/response pair at a time.'}</div>
            <div className="ec2-docs-contents" style={{marginTop:0}}>
              <h3>Contents</h3>
              <div className="ec2-docs-links">
                {docs.map(d => (
                  <button key={d.action} className="ec2-docs-link" type="button" onClick={() => setDocAction(d.action)} style={{background:'none',border:'none',padding:0}}>
                    {d.action}
                  </button>
                ))}
              </div>
            </div>
            <div className="ec2-docs-section" style={{borderTop:'none',paddingTop:0,marginTop:16}}>
              <h3>Request and response</h3>
              <div className="ec2-docs-note">{selected.summary}</div>
              <select className="ec2-doc-select" value={docAction} onChange={e => setDocAction(e.target.value)}>
                {docs.map(d => <option key={d.action} value={d.action}>{d.action}</option>)}
              </select>
              <div className="ec2-docs-request">
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Request</div>
                  <pre className="ec2-docs-code">{selected.request}</pre>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Response</div>
                  {selected.response.trim().startsWith('<') ? renderXmlSnippet(selected.response) : <pre className="ec2-docs-code">{selected.response}</pre>}
                </div>
              </div>
            </div>
          </div>
        </aside>
      )}
    </>
  );
}

function CreateSQSView({onBack, onDone, notify}) {
  const [form, setForm] = useState({
    queue_name: 'my-queue',
    queue_type: 'standard',
    visibility_timeout: 30,
    receive_wait_time_seconds: 0,
    message_retention_period: 345600,
    max_message_size: 262144,
    delay_seconds: 0,
    content_based_deduplication: false,
    dead_letter_target_arn: '',
    max_receive_count: '5',
  });
  const [tags, setTags] = useState([{key: '', value: ''}]);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const setQueueType = (queueType) => {
    setForm(prev => {
      const baseName = (prev.queue_name || 'my-queue').replace(/\.fifo$/i, '') || 'my-queue';
      return {
        ...prev,
        queue_type: queueType,
        queue_name: queueType === 'fifo' ? `${baseName}.fifo` : baseName,
        content_based_deduplication: queueType === 'fifo' ? prev.content_based_deduplication : false,
      };
    });
  };

  const submit = async () => {
    const queueName = (form.queue_name || '').trim();
    if (!queueName) {
      setErr('Queue name is required');
      return;
    }
    setBusy(true);
    setErr('');
    try {
      const tagMap = sqsRowsToTags(tags);
      const redrive_policy = sqsRedrivePolicyFromForm(form.dead_letter_target_arn, form.max_receive_count);
      const created = await SQS.create({
        queue_name: queueName,
        fifo_queue: form.queue_type === 'fifo',
        content_based_deduplication: form.queue_type === 'fifo' && !!form.content_based_deduplication,
        visibility_timeout: Number(form.visibility_timeout) || 30,
        receive_wait_time_seconds: Number(form.receive_wait_time_seconds) || 0,
        message_retention_period: Number(form.message_retention_period) || 345600,
        max_message_size: Number(form.max_message_size) || 262144,
        delay_seconds: Number(form.delay_seconds) || 0,
        redrive_policy,
        tags: tagMap,
      });
      onDone(created);
    } catch (e) {
      setErr(e.message);
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>{providerBreadcrumbLabelForView(normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws'), 'sqs', DEFAULT_PROVIDER_CATALOG)}</span><span className="bc-sep">›</span><a onClick={onBack}>{normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws') === 'gcp' ? 'Topics and subscriptions' : 'Queues'}</a><span className="bc-sep">›</span><span>{normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws') === 'gcp' ? 'Create topic' : 'Create queue'}</span>
        </div>
        <div className="vpc-page-title">{normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws') === 'gcp' ? 'Create topic' : 'Create queue'}</div>
        <div className="vpc-page-sub">{normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws') === 'gcp' ? 'Create a Pub/Sub topic, then send and receive messages from the separate details view.' : 'Create an SQS queue with standard or FIFO semantics, then send and receive messages from the separate details view.'}</div>
      </div>
      <div className="vpc-create-wrap">
        <div className="vpc-create-card">
          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Queue settings</div>
            <div className="vpc-kv-grid">
              <div className="fg" style={{gridColumn:'1 / -1'}}>
                <label className="fl">Queue name</label>
                <input className="fi" value={form.queue_name} onChange={e => setForm(prev => ({...prev, queue_name: e.target.value}))} placeholder="my-queue" />
              </div>
            </div>
            <div className="vpc-choice-grid vpc-choice-grid-3" style={{marginTop:12}}>
              <label className={`vpc-choice-card ${form.queue_type === 'standard' ? 'selected' : ''}`}>
                <input type="radio" name="sqsQueueType" checked={form.queue_type === 'standard'} onChange={() => setQueueType('standard')} />
                <div>
                  <div className="vpc-choice-title">Standard</div>
                  <div className="vpc-choice-desc">High-throughput queue with at-least-once delivery semantics.</div>
                </div>
              </label>
              <label className={`vpc-choice-card ${form.queue_type === 'fifo' ? 'selected' : ''}`}>
                <input type="radio" name="sqsQueueType" checked={form.queue_type === 'fifo'} onChange={() => setQueueType('fifo')} />
                <div>
                  <div className="vpc-choice-title">FIFO</div>
                  <div className="vpc-choice-desc">Preserves ordering within message groups and supports deduplication.</div>
                </div>
              </label>
              <label className={`vpc-choice-card ${form.content_based_deduplication ? 'selected' : ''}`}>
                <input type="checkbox" checked={form.content_based_deduplication} disabled={form.queue_type !== 'fifo'} onChange={e => setForm(prev => ({...prev, content_based_deduplication: e.target.checked}))} />
                <div>
                  <div className="vpc-choice-title">Content-based deduplication</div>
                  <div className="vpc-choice-desc">Available on FIFO queues; simulator derives a deduplication key from the message body.</div>
                </div>
              </label>
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Delivery and visibility</div>
            <div className="vpc-kv-grid">
              <div className="fg"><label className="fl">Visibility timeout (seconds)</label><input className="fi" type="number" min="0" value={form.visibility_timeout} onChange={e => setForm(prev => ({...prev, visibility_timeout: Number(e.target.value || 30)}))} /></div>
              <div className="fg"><label className="fl">Receive wait time (seconds)</label><input className="fi" type="number" min="0" value={form.receive_wait_time_seconds} onChange={e => setForm(prev => ({...prev, receive_wait_time_seconds: Number(e.target.value || 0)}))} /></div>
              <div className="fg"><label className="fl">Message retention period (seconds)</label><input className="fi" type="number" min="60" value={form.message_retention_period} onChange={e => setForm(prev => ({...prev, message_retention_period: Number(e.target.value || 345600)}))} /></div>
              <div className="fg"><label className="fl">Maximum message size (bytes)</label><input className="fi" type="number" min="1024" value={form.max_message_size} onChange={e => setForm(prev => ({...prev, max_message_size: Number(e.target.value || 262144)}))} /></div>
              <div className="fg"><label className="fl">Delivery delay (seconds)</label><input className="fi" type="number" min="0" value={form.delay_seconds} onChange={e => setForm(prev => ({...prev, delay_seconds: Number(e.target.value || 0)}))} /></div>
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Dead-letter queue</div>
            <div className="vpc-detail-note">Optional. Route messages here when receive count exceeds the configured threshold.</div>
            <div className="vpc-kv-grid" style={{marginTop:10}}>
              <div className="fg">
                <label className="fl">Dead-letter queue ARN</label>
                <input className="fi" value={form.dead_letter_target_arn} onChange={e => setForm(prev => ({...prev, dead_letter_target_arn: e.target.value}))} placeholder="arn:aws:sqs:us-east-1:123456789012:my-dlq" />
              </div>
              <div className="fg">
                <label className="fl">Max receive count</label>
                <input className="fi" type="number" min="1" value={form.max_receive_count} onChange={e => setForm(prev => ({...prev, max_receive_count: e.target.value}))} />
              </div>
            </div>
          </div>

          <div className="vpc-create-section">
            <div className="vpc-detail-section-title">Tags</div>
            {tags.map((tag, idx) => (
              <div className="vpc-create-tag-row" key={idx}>
                <input className="fi" placeholder="Key" value={tag.key} onChange={e => setTags(rows => rows.map((row, i) => i === idx ? {...row, key: e.target.value} : row))} />
                <input className="fi" placeholder="Value" value={tag.value} onChange={e => setTags(rows => rows.map((row, i) => i === idx ? {...row, value: e.target.value} : row))} />
                <button type="button" className="btn btn-s" onClick={() => setTags(rows => rows.filter((_, i) => i !== idx))}>Remove</button>
              </div>
            ))}
            <div className="btn-grp" style={{marginTop:12}}>
              <button type="button" className="btn btn-s" onClick={() => setTags(rows => [...rows, {key:'', value:''}])}>Add tag</button>
            </div>
          </div>

          {err && <div className="ferr" style={{marginTop:12}}>{err}</div>}
          <div className="vpc-create-footer">
            <button type="button" className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
            <button type="button" className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create queue'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SQSView({notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 'sqs', DEFAULT_PROVIDER_CATALOG);
  const [queues, setQueues] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('list');
  const [selectedQueueName, setSelectedQueueName] = useState('');
  const [selectedQueue, setSelectedQueue] = useState(null);
  const [detailTab, setDetailTab] = useState('overview');
  const [search, setSearch] = useState('');
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [showApiDocs, setShowApiDocs] = useState(false);
  const [sendBody, setSendBody] = useState('Hello from SQS');
  const [sendGroupId, setSendGroupId] = useState('group-1');
  const [sendDedupId, setSendDedupId] = useState('');
  const [receiveForm, setReceiveForm] = useState({
    max_number_of_messages: 10,
    wait_time_seconds: 0,
    visibility_timeout: 30,
  });
  const [receiveResult, setReceiveResult] = useState(null);
  const [attrDraft, setAttrDraft] = useState({
    visibility_timeout: 30,
    receive_wait_time_seconds: 0,
    message_retention_period: 345600,
    max_message_size: 262144,
    delay_seconds: 0,
    content_based_deduplication: false,
    dead_letter_target_arn: '',
    max_receive_count: '5',
  });
  const [tagRows, setTagRows] = useState([{key: '', value: ''}]);
  const actionsRef = useRef(null);

  const loadList = useCallback(async () => {
    setLoading(true);
    try {
      const d = await SQS.list();
      const list = d.queues || [];
      setQueues(list);
      setSelectedQueueName(current => current && list.some(queue => queue.queue_name === current) ? current : (list[0]?.queue_name || ''));
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  const loadDetail = useCallback(async (queueName) => {
    if (!queueName) {
      setSelectedQueue(null);
      return;
    }
    try {
      const d = await SQS.get(queueName);
      setSelectedQueue(d);
    } catch (e) {
      notify(e.message, 'error');
    }
  }, [notify]);

  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => {
    if (page === 'create') return;
    if (!selectedQueueName) return;
    if (selectedQueue && selectedQueue.queue_name === selectedQueueName) return;
    loadDetail(selectedQueueName);
  }, [selectedQueueName, selectedQueue, page, loadDetail]);
  useEffect(() => {
    if (!selectedQueue) return;
    setReceiveResult(null);
    setSendGroupId(selectedQueue.fifo_queue ? 'group-1' : '');
    setSendDedupId('');
    setAttrDraft({
      visibility_timeout: Number(selectedQueue.visibility_timeout || selectedQueue.attributes?.VisibilityTimeout || 30),
      receive_wait_time_seconds: Number(selectedQueue.receive_wait_time_seconds || selectedQueue.attributes?.ReceiveMessageWaitTimeSeconds || 0),
      message_retention_period: Number(selectedQueue.message_retention_period || selectedQueue.attributes?.MessageRetentionPeriod || 345600),
      max_message_size: Number(selectedQueue.max_message_size || selectedQueue.attributes?.MaximumMessageSize || 262144),
      delay_seconds: Number(selectedQueue.delay_seconds || selectedQueue.attributes?.DelaySeconds || 0),
      content_based_deduplication: !!selectedQueue.content_based_deduplication,
      dead_letter_target_arn: selectedQueue.redrive_policy?.deadLetterTargetArn || '',
      max_receive_count: selectedQueue.redrive_policy?.maxReceiveCount || '5',
    });
    const rows = Object.entries(selectedQueue.tags || {}).map(([key, value]) => ({key, value}));
    setTagRows(rows.length ? rows : [{key: '', value: ''}]);
  }, [selectedQueue]);
  useEffect(() => {
    if (!actionsOpen) return;
    const onPointerDown = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', onPointerDown);
    return () => document.removeEventListener('pointerdown', onPointerDown);
  }, [actionsOpen]);

  const filteredQueues = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return queues;
    return queues.filter(queue => [queue.queue_name, queue.queue_url, queue.queue_arn, queue.queue_type, queue.state].join(' ').toLowerCase().includes(q));
  }, [queues, search]);

  const selectedAttrs = selectedQueue ? selectedQueue.attributes || {} : {};
  const queueCount = queues.length;
  const visibleCount = filteredQueues.length;

  const handleCreateDone = async (created) => {
    setPage('list');
    notify(`Queue "${created?.queue_name || 'queue'}" created`, 'success');
    if (created?.queue_name) {
      setSelectedQueueName(created.queue_name);
      setSelectedQueue(created);
    }
    setDetailTab('overview');
    await loadList();
  };

  const handleSelect = (queueName) => {
    setActionsOpen(false);
    setSelectedQueueName(queueName);
    setDetailTab('overview');
  };

  const openCreate = () => {
    setActionsOpen(false);
    setShowApiDocs(false);
    setDeleteTarget(null);
    setSelectedQueueName('');
    setSelectedQueue(null);
    setDetailTab('overview');
    setReceiveResult(null);
    setPage('create');
  };

  const backToList = () => {
    setPage('list');
    setActionsOpen(false);
  };

  const deleteQueue = async () => {
    if (!deleteTarget) return;
    setDeleteBusy(true);
    try {
      await SQS.remove(deleteTarget.queue_name);
      notify(`Queue "${deleteTarget.queue_name}" deleted`, 'success');
      setDeleteTarget(null);
      setSelectedQueueName('');
      setSelectedQueue(null);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };

  const saveAttributes = async () => {
    if (!selectedQueue) return;
    try {
      await SQS.update(selectedQueue.queue_name, {
        visibility_timeout: Number(attrDraft.visibility_timeout) || 30,
        receive_wait_time_seconds: Number(attrDraft.receive_wait_time_seconds) || 0,
        message_retention_period: Number(attrDraft.message_retention_period) || 345600,
        max_message_size: Number(attrDraft.max_message_size) || 262144,
        delay_seconds: Number(attrDraft.delay_seconds) || 0,
        content_based_deduplication: !!attrDraft.content_based_deduplication,
        redrive_policy: sqsRedrivePolicyFromForm(attrDraft.dead_letter_target_arn, attrDraft.max_receive_count),
      });
      notify('Queue attributes updated', 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const saveTags = async () => {
    if (!selectedQueue) return;
    try {
      await SQS.update(selectedQueue.queue_name, {tags: sqsRowsToTags(tagRows)});
      notify('Queue tags updated', 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const sendMessage = async () => {
    if (!selectedQueue) return notify('Select a queue first', 'error');
    const body = sendBody.trim();
    if (!body) return notify('Message body is required', 'error');
    if (selectedQueue.fifo_queue && !sendGroupId.trim()) return notify('Message group ID is required for FIFO queues', 'error');
    try {
      await SQS.send(selectedQueue.queue_name, {
        message_body: body,
        message_group_id: selectedQueue.fifo_queue ? sendGroupId.trim() : '',
        message_deduplication_id: selectedQueue.fifo_queue ? sendDedupId.trim() : '',
      });
      notify('Message sent', 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const receiveMessages = async () => {
    if (!selectedQueue) return notify('Select a queue first', 'error');
    try {
      const d = await SQS.receive(selectedQueue.queue_name, {
        max_number_of_messages: Number(receiveForm.max_number_of_messages) || 1,
        wait_time_seconds: Number(receiveForm.wait_time_seconds) || 0,
        visibility_timeout: Number(receiveForm.visibility_timeout) || 30,
      });
      setReceiveResult(d);
      notify(`Received ${d.count || 0} message(s)`, 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const deleteMessage = async (message) => {
    if (!selectedQueue || !message.receipt_handle) return;
    try {
      await SQS.deleteMessage(selectedQueue.queue_name, message.receipt_handle);
      notify('Message deleted', 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const changeVisibility = async (message) => {
    if (!selectedQueue || !message.receipt_handle) return;
    try {
      await SQS.changeVisibility(selectedQueue.queue_name, message.receipt_handle, {
        visibility_timeout: Number(receiveForm.visibility_timeout) || 30,
      });
      notify('Message visibility updated', 'success');
      await loadDetail(selectedQueue.queue_name);
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const purgeQueue = async () => {
    if (!selectedQueue) return;
    try {
      await SQS.purge(selectedQueue.queue_name);
      notify('Queue purged', 'success');
      await loadDetail(selectedQueue.queue_name);
      await loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const openDelete = () => {
    if (!selectedQueue) return notify('Select a queue first', 'info');
    setDeleteTarget(selectedQueue);
    setActionsOpen(false);
  };

  const renderOverview = () => {
    if (!selectedQueue) {
      return <div className="vpc-detail-empty">Select a queue from the grid to view details.</div>;
    }
    const redrive = selectedQueue.redrive_policy || {};
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-kpi-grid">
            <div className="vpc-kpi"><strong>{selectedQueue.visible_message_count ?? 0}</strong><span>Visible messages</span></div>
            <div className="vpc-kpi"><strong>{selectedQueue.in_flight_count ?? 0}</strong><span>In flight</span></div>
            <div className="vpc-kpi"><strong>{selectedQueue.message_count ?? 0}</strong><span>Total messages</span></div>
            <div className="vpc-kpi"><strong>{Object.keys(selectedQueue.tags || {}).length}</strong><span>Tags</span></div>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Queue details</div>
          <div className="rds-detail-grid">
            <dl className="ec2-kv"><dt>Queue name</dt><dd>{selectedQueue.queue_name}</dd></dl>
            <dl className="ec2-kv"><dt>Queue type</dt><dd>{selectedQueue.fifo_queue ? 'FIFO' : 'Standard'}</dd></dl>
            <dl className="ec2-kv"><dt>Queue URL</dt><dd className="ec2-mono">{selectedQueue.queue_url}</dd></dl>
            <dl className="ec2-kv"><dt>Queue ARN</dt><dd className="ec2-mono">{selectedQueue.queue_arn}</dd></dl>
            <dl className="ec2-kv"><dt>Visibility timeout</dt><dd>{selectedAttrs.VisibilityTimeout || selectedQueue.visibility_timeout || 30} seconds</dd></dl>
            <dl className="ec2-kv"><dt>Receive wait time</dt><dd>{selectedAttrs.ReceiveMessageWaitTimeSeconds || selectedQueue.receive_wait_time_seconds || 0} seconds</dd></dl>
            <dl className="ec2-kv"><dt>Message retention</dt><dd>{selectedAttrs.MessageRetentionPeriod || selectedQueue.message_retention_period || 345600} seconds</dd></dl>
            <dl className="ec2-kv"><dt>Delay seconds</dt><dd>{selectedAttrs.DelaySeconds || selectedQueue.delay_seconds || 0}</dd></dl>
            <dl className="ec2-kv"><dt>Content-based dedup</dt><dd>{selectedQueue.fifo_queue ? (selectedQueue.content_based_deduplication ? 'Enabled' : 'Disabled') : 'Not applicable'}</dd></dl>
            <dl className="ec2-kv"><dt>Dead-letter queue</dt><dd className="ec2-mono">{redrive.deadLetterTargetArn || '—'}</dd></dl>
            <dl className="ec2-kv"><dt>Max receive count</dt><dd>{redrive.maxReceiveCount || '—'}</dd></dl>
            <dl className="ec2-kv"><dt>Created</dt><dd>{fmtDate(selectedQueue.created)}</dd></dl>
            <dl className="ec2-kv"><dt>Last modified</dt><dd>{fmtDate(selectedQueue.last_modified)}</dd></dl>
          </div>
        </div>
      </>
    );
  };

  const renderMessages = () => {
    if (!selectedQueue) return <div className="vpc-detail-empty">Select a queue from the grid to view messages.</div>;
    const messages = selectedQueue.messages || [];
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Send message</div>
          <div className="vpc-detail-note">The simulator stores messages in the queue and applies visibility timeout, FIFO ordering, and dead-letter routing rules.</div>
          <div className="vpc-kv-grid" style={{marginTop:10}}>
            <div className="fg" style={{gridColumn:'1 / -1'}}>

  const renderTags = () => {

            <button className="btn btn-s" onClick={() => setTagRows(rows => [...rows, {key:'', value:''}])}>Add tag</button>
            <button className="btn btn-p" onClick={saveTags}>Save tags</button>
          </div>
        </div>
      </>

  if (page === 'create') {
    return (
      <>

    <>

        <div className="vpc-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>{serviceLabel}</span><span className="bc-sep">›</span><span>{providerKey === 'gcp' ? 'Topics and subscriptions' : 'Queues'}</span>

          <div className="vpc-page-title">{providerKey === 'gcp' ? 'Pub/Sub' : 'Queues'}</div>
          <div className="vpc-page-sub">{providerKey === 'gcp' ? 'Create, inspect, and manage Pub/Sub topics and subscriptions using a provider-native list and separate detail view.' : 'Create, inspect, and manage standard and FIFO queues using an AWS-style list and separate detail view.'}</div>
        </div>

        <div className="vpc-vpcs-toolbar">
          <div className="vpc-vpcs-toolbar-left">
            <input

              placeholder="Find queues by attribute or tag"

            <div className="vpc-summary">
            <div className="vpc-summary-count">{providerKey === 'gcp' ? 'Your Pub/Sub resources' : 'Your queues'} ({visibleCount}/{queueCount})</div>
              <a className="vpc-summary-info" href="#" onClick={e => e.preventDefault()}>Info</a>
              <div className="vpc-summary-updated">Last updated {relativeTime(selectedQueue?.last_modified || queues[0]?.last_modified || new Date().toISOString())}</div>
            </div>
          </div>
          <div className="vpc-vpcs-toolbar-right">
              <button type="button" className="btn btn-s" onClick={() => { setActionsOpen(false); loadList(); }}>↻</button>
              <div className="vpc-actions-wrap" ref={actionsRef}>
              <button type="button" className="btn btn-s" onClick={(e) => { e.stopPropagation(); setActionsOpen(v => !v); }}>Actions ▾</button>
              {actionsOpen && (
                <div className="vpc-actions-menu">
                  <button type="button" className="vpc-actions-item" onClick={() => { setActionsOpen(false); loadList(); }}>Refresh</button>
                  <button type="button" className="vpc-actions-item" onClick={openCreate}>{providerKey === 'gcp' ? 'Create topic' : 'Create queue'}</button>
                  <button type="button" className="vpc-actions-item" onClick={openDelete} disabled={!selectedQueue}>{providerKey === 'gcp' ? 'Delete selected topic' : 'Delete selected queue'}</button>
                </div>
              )}
            </div>
            <button type="button" className="btn btn-p" onClick={openCreate}>{providerKey === 'gcp' ? 'Create topic' : 'Create queue'}</button>
          </div>
        </div>

        <div className="sqs-grid-wrap">
          {loading && !queues.length ? (
            <div className="ld">Loading queues…</div>
          ) : filteredQueues.length ? (
            <table className="tbl vpc-grid sqs-grid">
              <colgroup>
                <col style={{width:'4%'}} />
                <col style={{width:'13%'}} />
                <col style={{width:'35%'}} />
                <col style={{width:'10%'}} />
                <col style={{width:'7%'}} />
                <col style={{width:'7%'}} />
                <col style={{width:'24%'}} />
              </colgroup>
              <thead>
                <tr>
                  <th style={{width:'4%'}}><input type="checkbox" disabled aria-label="Select all queues" /></th>
                  <th style={{width:'13%'}}>Name</th>
                  <th style={{width:'35%'}}>{providerKey === 'gcp' ? 'Resource URL' : 'Queue URL'}</th>
                  <th style={{width:'10%'}}>Type</th>
                  <th style={{width:'7%'}}>Visible</th>
                  <th style={{width:'7%'}}>In flight</th>
                  <th style={{width:'24%'}}>Created</th>
                </tr>
              </thead>
              <tbody>
                {filteredQueues.map(queue => (
                  <tr key={queue.queue_name} className={selectedQueueName === queue.queue_name ? 'active' : ''} onClick={() => handleSelect(queue.queue_name)}>
                    <td style={{width:'4%'}}><input type="checkbox" checked={selectedQueueName === queue.queue_name} onChange={() => handleSelect(queue.queue_name)} /></td>
                    <td title={queue.queue_name} style={{width:'13%'}}><span className="vpc-grid-name">{queue.queue_name}</span></td>
                    <td title={queue.queue_url} style={{width:'35%'}}><span className="ec2-mono">{queue.queue_url}</span></td>
                    <td style={{width:'10%'}}><span className={`tag ${queue.queue_type === 'fifo' ? 'tgr' : 'tg'}`}>{queue.queue_type === 'fifo' ? 'FIFO' : 'Standard'}</span></td>
                    <td style={{width:'7%'}}>{queue.visible_message_count ?? 0}</td>
                    <td style={{width:'7%'}}>{queue.in_flight_count ?? 0}</td>
                    <td style={{width:'24%'}}>{fmtDate(queue.created)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            <div className="empty">
              <div className="empty-t">{search ? 'No matching queues' : (providerKey === 'gcp' ? 'No topics yet' : 'No queues yet')}</div>
              <div className="empty-d">{search ? 'Try a different search term.' : (providerKey === 'gcp' ? 'Create a topic to get started.' : 'Create a queue to get started.')}</div>
            </div>
          )}
        </div>

        <div className="vpc-detail-wrap">
          <div className="vpc-detail-panel">
            {selectedQueue ? (
              <>
                <div className="vpc-detail-banner">
                  <div className="vpc-detail-name">{selectedQueue.queue_name}</div>
                  <div className="vpc-detail-meta">{selectedQueue.queue_arn} · {selectedQueue.queue_type === 'fifo' ? 'FIFO' : 'Standard'} · {selectedQueue.queue_url}</div>
                </div>
                <div className="vpc-detail-tabs">
                  <div className="tabs ec2-subtabs">
                    {[
                      ['overview', 'Overview'],
                      ['messages', 'Messages'],
                      ['attributes', 'Attributes'],
                      ['tags', 'Tags'],
                    ].map(([key, label]) => (
                      <div key={key} className={`tab ${detailTab === key ? 'active' : ''}`} onClick={() => setDetailTab(key)}>{label}</div>
                    ))}
                  </div>
                </div>
                <div className="vpc-detail-body">
                  {detailTab === 'overview' ? renderOverview()
                    : detailTab === 'messages' ? renderMessages()
                    : detailTab === 'attributes' ? renderAttributes()
                    : renderTags()}
                </div>
              </>
            ) : (
              <div className="vpc-detail-body">
                <div className="vpc-detail-empty">Select a queue from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>

        {deleteTarget && (
          <ConfirmDelete
            title="Delete queue"
            lines={[
              `You are about to delete queue "${deleteTarget.queue_name}".`,
              'The simulator will remove the queue and all messages in it.',
            ]}
            onConfirm={deleteQueue}
            onClose={() => setDeleteTarget(null)}
            busy={deleteBusy}
          />
        )}
      </div>
    </>
  );
}
