              <input className="fi" type="number" min="1" value={configDraft.timeout} onChange={e => setConfigDraft(f => ({...f, timeout: e.target.value}))} />
            </div>
            <div className="fg">
              <label className="fl">Memory size (MB)</label>
              <input className="fi" type="number" min="128" step="64" value={configDraft.memory_size} onChange={e => setConfigDraft(f => ({...f, memory_size: e.target.value}))} />
            </div>
            <div className="fg" style={{gridColumn:'1 / -1'}}>
              <label className="fl">Description</label>
              <input className="fi" value={configDraft.description} onChange={e => setConfigDraft(f => ({...f, description: e.target.value}))} />
            </div>
          </div>
          <div className="btn-grp" style={{marginTop:10}}>
            <button className="btn btn-p" onClick={saveConfig}>Save configuration</button>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Resource policy</div>
          <div className="vpc-detail-note">S3 event notifications can invoke this function only when a matching permission statement exists.</div>
          <div className="vpc-kv-grid" style={{marginBottom:12}}>
            <div className="fg">
              <label className="fl">Statement ID</label>
              <input className="fi" value={permissionDraft.statement_id} onChange={e => setPermissionDraft(f => ({...f, statement_id: e.target.value}))} placeholder="AllowS3Invoke" />
            </div>
            <div className="fg">
              <label className="fl">Action</label>
              <input className="fi ec2-mono" value={permissionDraft.action} onChange={e => setPermissionDraft(f => ({...f, action: e.target.value}))} placeholder="lambda:InvokeFunction" />
            </div>
            <div className="fg">
              <label className="fl">Principal</label>
              <input className="fi" value={permissionDraft.principal} onChange={e => setPermissionDraft(f => ({...f, principal: e.target.value}))} placeholder="s3.amazonaws.com" />
            </div>
            <div className="fg">
              <label className="fl">Source ARN</label>
              <input className="fi ec2-mono" value={permissionDraft.source_arn} onChange={e => setPermissionDraft(f => ({...f, source_arn: e.target.value}))} placeholder="arn:aws:s3:::my-bucket" />
            </div>
            <div className="fg" style={{gridColumn:'1 / -1'}}>
              <label className="fl">Source account</label>
              <input className="fi ec2-mono" value={permissionDraft.source_account} onChange={e => setPermissionDraft(f => ({...f, source_account: e.target.value}))} placeholder="123456789012" />
            </div>
          </div>
          <div className="btn-grp" style={{marginBottom:14}}>
            <button className="btn btn-p" onClick={addPermission}>Add permission</button>
          </div>
          {selectedPermissions.length ? (
            <table className="vpc-simple-table">
              <thead><tr><th>Statement ID</th><th>Principal</th><th>Action</th><th>Source ARN</th><th>Source Account</th><th></th></tr></thead>
              <tbody>
                {selectedPermissions.map(permission => (
                  <tr key={permission.statement_id}>
                    <td className="ec2-mono">{permission.statement_id}</td>
                    <td>{permission.principal || '—'}</td>
                    <td className="ec2-mono">{permission.action || 'lambda:InvokeFunction'}</td>
                    <td className="ec2-mono">{permission.source_arn || '—'}</td>
                    <td className="ec2-mono">{permission.source_account || '—'}</td>
                    <td style={{textAlign:'right'}}>
                      <button className="btn-lnk red" type="button" onClick={() => removePermission(permission.statement_id)}>Remove</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="vpc-empty-table">No invoke permissions are configured yet.</div>}
        </div>
      </>
    );
  };

  const renderTriggers = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to see triggers.</div>;
    return (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Triggers</div>
        <div className="vpc-detail-note">S3 bucket notifications that target this function appear here. Add a matching resource policy before expecting delivery.</div>
        {selectedTriggers.length ? (
          <table className="vpc-simple-table">
            <thead><tr><th>Source</th><th>Bucket</th><th>Events</th><th>Filters</th><th>Target</th></tr></thead>
            <tbody>
              {selectedTriggers.map((trigger, idx) => (
                <tr key={`${trigger.bucket}-${idx}`}>
                  <td>{trigger.source}</td>
                  <td>{trigger.bucket}</td>
                  <td>{(trigger.event_types || []).join(', ') || '—'}</td>
                  <td className="ec2-mono">{[trigger.prefix ? `prefix=${trigger.prefix}` : '', trigger.suffix ? `suffix=${trigger.suffix}` : ''].filter(Boolean).join(' · ') || '—'}</td>
                  <td className="ec2-mono">{trigger.destination || '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : <div className="vpc-empty-table">No S3 notifications currently target this function.</div>}
      </div>
    );
  };

  const renderVersions = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to view versions.</div>;
    return (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Versions</div>
        <div className="vpc-detail-note">Publish the current $LATEST code into a numbered version.</div>
        <div className="vpc-kv-grid" style={{marginBottom:12}}>
          <div className="fg" style={{gridColumn:'1 / -1'}}>
            <label className="fl">Version description</label>
            <input className="fi" value={publishDescription} onChange={e => setPublishDescription(e.target.value)} placeholder="Release note" />
          </div>
        </div>
        <div className="btn-grp" style={{marginBottom:14}}>
          <button className="btn btn-p" onClick={publishVersion}>Publish version</button>
        </div>
        {selectedVersions.length ? (
          <table className="vpc-simple-table">
            <thead><tr><th>Version</th><th>Description</th><th>State</th><th>Code SHA256</th><th>Created</th></tr></thead>
            <tbody>
              {selectedVersions.map(version => (
                <tr key={`${version.version}-${version.created}`}>
                  <td className="ec2-mono">{version.version}</td>
                  <td>{version.description || '—'}</td>
                  <td><span className={`tag ${version.is_latest ? 'tg' : 'tb2'}`}>{version.state || 'Active'}</span></td>
                  <td className="ec2-mono">{version.code_sha256 || '—'}</td>
                  <td>{fmtDate(version.created)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : <div className="vpc-empty-table">No versions have been published yet.</div>}
      </div>
    );
  };

  const renderInvocations = () => {
    if (!selectedFunction) return <div className="vpc-detail-empty">Select a function from the grid to test invocations.</div>;
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Test invocation</div>
          <div className="vpc-kv-grid">
            <div className="fg">
              <label className="fl">Invocation type</label>
              <select className="fi" value={invokeType} onChange={e => setInvokeType(e.target.value)}>
                <option value="RequestResponse">RequestResponse</option>
                <option value="Event">Event</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:'1 / -1'}}>
              <label className="fl">Event payload</label>
              <textarea className="fi ec2-mono" style={{minHeight:180,fontFamily:'Consolas, "Courier New", monospace'}} value={testPayload} onChange={e => setTestPayload(e.target.value)} />
            </div>
          </div>
          <div className="btn-grp" style={{marginTop:10}}>
            <button className="btn btn-p" onClick={runInvoke} disabled={invokeBusy}>{invokeBusy ? 'Invoking…' : 'Invoke function'}</button>
          </div>
          {invokeResult && (
            <div style={{marginTop:14}}>
              <div className="vpc-detail-section-title" style={{marginBottom:8}}>Last response</div>
              <pre className="ec2-docs-code">{JSON.stringify(invokeResult, null, 2)}</pre>
            </div>
          )}
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Invocations</div>
          {selectedInvocations.length ? (
            <table className="vpc-simple-table">
              <thead><tr><th>Time</th><th>Type</th><th>Status</th><th>Source</th><th>Result</th></tr></thead>
              <tbody>
                {selectedInvocations.map(item => (
                  <tr key={item.id}>
                    <td>{fmtDate(item.at)}</td>
                    <td>{item.invocation_type}</td>
                    <td><span className={`tag ${item.status === 'success' ? 'tg' : item.status === 'accepted' ? 'ty' : 'tgr'}`}>{item.status}</span></td>
                    <td>{item.source || '—'}</td>
                    <td className="ec2-mono">{item.response_payload ? JSON.stringify(item.response_payload) : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="vpc-empty-table">No invocations yet.</div>}
        </div>
      </>
    );
  };

  if (showCreate) {
    return (
      <>
        <LambdaApiDocsPanel />
        <CreateLambdaView onBack={() => setShowCreate(false)} onDone={handleCreateDone} notify={notify} />
      </>
    );
  }

  return (
    <>
      <LambdaApiDocsPanel />
      <div className="panel">
        <div className="vpc-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>{serviceLabel}</span><span className="bc-sep">›</span><span>{pageTitle}</span>
          </div>
          <div className="vpc-page-title">{pageTitle}</div>
          <div className="vpc-page-sub">{providerKey === 'gcp' ? 'Create, manage, invoke, and version Cloud Functions with a provider-native control plane.' : 'Create, manage, invoke, and version Lambda functions with a lightweight AWS-style control plane.'}</div>
        </div>
        <div className="vpc-vpcs-toolbar">
          <div className="vpc-vpcs-toolbar-left">
            <input className="fi vpc-search" value={query} onChange={e => setQuery(e.target.value)} placeholder="Find functions by name, runtime, handler, or description" />
            <div className="vpc-summary">
              <div className="vpc-summary-count">Your functions ({visibleCount}/{totalCount})</div>
              <a className="vpc-summary-info" href="#" onClick={e => e.preventDefault()}>Info</a>
              <div className="vpc-summary-updated">Last updated {relativeTime(selectedFunction?.created || functions[0]?.created || '')}</div>
            </div>
          </div>
          <div className="vpc-vpcs-toolbar-right">
            <button className="btn btn-s" onClick={() => { setActionsOpen(false); loadList(); }}>↻</button>
            <div className="vpc-actions-wrap" ref={actionsRef}>
              <button className="btn btn-s" onClick={(e) => { e.stopPropagation(); setActionsOpen(v => !v); }}>Actions ▾</button>
              {actionsOpen && (
                <div className="vpc-actions-menu">
                  <button className="vpc-actions-item" onClick={() => { setActionsOpen(false); loadList(); }}>Refresh</button>
                  <button className="vpc-actions-item" onClick={() => { setActionsOpen(false); openCreate(); }}>Create function</button>
                  <button className="vpc-actions-item" onClick={() => { if (selectedFunction) { setActionsOpen(false); setDeleteTarget(selectedFunction); } }} disabled={!selectedFunction}>Delete selected function</button>
                </div>
              )}
            </div>
            <button className="btn btn-p" onClick={openCreate}>Create function</button>
          </div>
        </div>

        <div className="vpc-grid-wrap">
          {loading && !functions.length ? (
            <div className="ld">Loading functions…</div>
          ) : filteredFunctions.length ? (
            <table className="tbl vpc-grid lambda-grid">
              <thead>
                <tr>
                  <th><input type="checkbox" disabled aria-label="Select all functions" /></th>
                  <th>Name</th>
                  <th>Runtime</th>
                  <th>Handler</th>
                  <th>Status</th>
                  <th>Versions</th>
                  <th>Triggers</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>
                {filteredFunctions.map(fn => (
                  <tr key={fn.function_name} className={selectedFunctionName === fn.function_name ? 'active' : ''} onClick={() => handleSelect(fn.function_name)}>
                    <td><input type="checkbox" checked={selectedFunctionName === fn.function_name} onChange={() => handleSelect(fn.function_name)} /></td>
                    <td title={fn.function_name}><span className="vpc-grid-name">{fn.function_name}</span></td>
                    <td>{fn.runtime}</td>
                    <td className="ec2-mono">{fn.handler}</td>
                    <td><span className={`tag ${fn.state === 'Active' ? 'tg' : 'tgr'}`}>{fn.state || 'Active'}</span></td>
                    <td>{fn.version_count || 0}</td>
                    <td>{fn.trigger_count || 0}</td>
                    <td>{fmtDate(fn.created)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            <div className="empty">
              <div className="empty-t">{query ? 'No matching functions' : 'No functions yet'}</div>
              <div className="empty-d">{query ? 'Try a different search term.' : 'Create a Lambda function to get started.'}</div>
            </div>
          )}
        </div>

        <div className="vpc-detail-wrap">
          <div className="vpc-detail-panel">
            {selectedFunction ? (
              <>
                <div className="vpc-detail-banner">
                  <div className="vpc-detail-name">{selectedFunction.function_name}</div>
                  <div className="vpc-detail-meta">{selectedFunction.function_arn} · {selectedFunction.runtime} · {selectedFunction.handler}</div>
                </div>
                <div className="vpc-detail-tabs">
                  <div className="tabs ec2-subtabs">
                    {[
                      ['overview', 'Overview'],
                      ['code', 'Code'],
                      ['configuration', 'Configuration'],
                      ['triggers', 'Triggers'],
                      ['versions', 'Versions'],
                      ['invocations', 'Invocations'],
                    ].map(([k, label]) => (
                      <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                    ))}
                  </div>
                </div>
                <div className="vpc-detail-body">
                  {detailTab === 'overview' ? renderOverview()
                    : detailTab === 'code' ? renderCode()
                    : detailTab === 'configuration' ? renderConfiguration()
                    : detailTab === 'triggers' ? renderTriggers()
                    : detailTab === 'versions' ? renderVersions()
                    : renderInvocations()}
                </div>
              </>
            ) : (
              <div className="vpc-detail-body">
                <div className="vpc-detail-empty">Select a function from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>

        {deleteTarget && (
          <ConfirmDelete
            title="Delete function"
            lines={[
              `You are about to delete function "${deleteTarget.function_name}".`,
              'The simulator will remove the function, code, versions, and invocation history.',
            ]}
            onConfirm={doDelete}
            onClose={() => setDeleteTarget(null)}
            busy={deleteBusy}
          />
        )}
      </div>
    </>
  );
}

/* ── Buckets View ───────────────────────────────────────────────────────── */
function BucketsView({onEnter, notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 's3-buckets', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Cloud Storage buckets' : 'General purpose buckets';
  const [list, setList]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCr, setShowCr]   = useState(false);
  const [delT, setDelT]       = useState(null);
  const [delBusy, setDelBusy] = useState(false);
  const [sel, setSel]         = useState([]);
  const [q, setQ]             = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try { const d = await S3.listBuckets(); setList(d.buckets||[]); }
    catch(e) { notify(e.message,'error'); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const doDelete = async () => {
    setDelBusy(true);
    try { await S3.deleteBucket(delT); notify(`Bucket "${delT}" deleted`,'success'); setDelT(null); setSel([]); load(); }
    catch(e) { notify(e.message,'error'); }
    finally { setDelBusy(false); }
  };

  const toggle = (n) => setSel(p => p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  const filtered = list.filter(b=>b.name.toLowerCase().includes(q.toLowerCase()));

  return (
    <>
      <S3ApiDocsPanel mode="buckets" />
      <div className="panel">
        <div className="ph">
          <div>
            <div className="pt">{pageTitle} <span style={{fontWeight:400,fontSize:14,color:'#687078'}}>({list.length})</span></div>
            <div className="ps">{providerKey === 'gcp' ? 'Store objects in Cloud Storage buckets organized by region.' : 'Store objects in buckets, organized by AWS Region.'}</div>
          </div>
          <div className="btn-grp">
            {sel.length===1 && <button className="btn btn-d" onClick={()=>setDelT(sel[0])}>Delete</button>}
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
            <button className="btn btn-p" onClick={()=>setShowCr(true)}>Create bucket</button>
          </div>
        </div>

        <div className="tb">
          <input className="srch" placeholder="Find buckets by name" value={q} onChange={e=>setQ(e.target.value)}/>
          <span className="tb-r" style={{fontSize:13,color:'#687078'}}>{filtered.length} bucket{filtered.length!==1?'s':''}</span>
        </div>

        {loading ? <div className="ld">Loading buckets…</div>
        : filtered.length===0 ?
          <div className="empty">
            <div className="empty-t">{list.length===0?'No buckets yet':q?`No results for "${q}"`:''}</div>
            <div className="empty-d">{list.length===0?'Create your first bucket to start storing data':''}</div>
            {list.length===0 && <button className="btn btn-p" onClick={()=>setShowCr(true)}>Create bucket</button>}
          </div>
        :
          <table className="tbl">
            <thead><tr>
              <th><input type="checkbox" checked={sel.length===filtered.length&&filtered.length>0} onChange={e=>setSel(e.target.checked?filtered.map(b=>b.name):[])}/></th>
              <th>Name</th><th>{providerKey === 'gcp' ? 'Region' : 'AWS Region'}</th><th>Type</th><th>Access</th><th>Creation date</th>
            </tr></thead>
            <tbody>
              {filtered.map(b => (
                <tr key={b.name}>
                  <td><input type="checkbox" checked={sel.includes(b.name)} onChange={()=>toggle(b.name)}/></td>
                  <td><span className="lnk" onClick={()=>onEnter(b)}>{b.name}</span></td>
                  <td>{b.region}</td>
                  <td>General purpose</td>
                  <td><span className="tag tg">{b.access}</span></td>
                  <td>{fmtDate(b.created)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        }
      </div>

      {showCr && <CreateBucketModal onClose={()=>setShowCr(false)} onDone={msg=>{notify(msg,'success');setShowCr(false);load();}}/>}
      {delT && <ConfirmDelete title="Delete bucket" lines={[`You are about to delete bucket "${delT}".`,'The bucket must be empty. This action cannot be undone.']} onConfirm={doDelete} onClose={()=>setDelT(null)} busy={delBusy}/>}
    </>
  );
}

/* ── Objects View ───────────────────────────────────────────────────────── */
function ObjectsView({bucket, onBack, notify}) {
  const providerKey = normalizeProvider(window.__cloudlearnActiveServiceProvider || 'aws');
  const serviceLabel = providerBreadcrumbLabelForView(providerKey, 's3-buckets', DEFAULT_PROVIDER_CATALOG);
  const pageTitle = providerKey === 'gcp' ? 'Cloud Storage objects' : 'Objects';
  const [objs, setObjs]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [showUp, setShowUp]   = useState(false);
  const [delT, setDelT]       = useState(null);
  const [delBusy, setDelBusy] = useState(false);
  const [sel, setSel]         = useState([]);
  const [selectedObject, setSelectedObject] = useState(null);
  const [q, setQ]             = useState('');
  const [tab, setTab]         = useState('objects');
  const [versioningMode, setVersioningMode] = useState(bucket.versioning || 'Disabled');
  const [showVersions, setShowVersions] = useState(false);
  const [notificationState, setNotificationState] = useState({eventBridgeEnabled:false, topicConfigurations:[], queueConfigurations:[], cloudFunctionConfigurations:[], deliveries:[], updatedAt:''});
  const [notificationDraft, setNotificationDraft] = useState({event_bridge_enabled:false, rules:[{id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}]});
  const [notificationBusy, setNotificationBusy] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = showVersions
        ? await S3.listVersions(bucket.name, q)
        : await S3.listObjects(bucket.name, q);
      setObjs((showVersions ? d.versions : d.objects) || []);
      setSel([]);
    }
    catch(e) { notify(e.message,'error'); }
    finally { setLoading(false); }
  }, [bucket.name, showVersions, q]);

  useEffect(() => { load(); }, [load]);

  const doDelete = async () => {
    setDelBusy(true);
    try {
      for (const obj of delT) await S3.deleteObject(bucket.name, obj.key, showVersions ? (obj.version_id || '') : '');
      notify(`${delT.length} object(s) deleted`,'success');
      setDelT(null); setSel([]); load();
    } catch(e) { notify(e.message,'error'); }
    finally { setDelBusy(false); }
  };

  const toggle = (k) => setSel(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const filtered = objs.filter(o=>o.key.toLowerCase().includes(q.toLowerCase()));
  const totalSz  = objs.reduce((s,o)=>s+(o.size||0),0);
  useEffect(() => {
    setVersioningMode(bucket.versioning || 'Disabled');
  }, [bucket.name, bucket.versioning]);
  useEffect(() => {
    setSel([]);
  }, [showVersions]);
  useEffect(() => {
    if (versioningMode === 'Disabled') setShowVersions(false);
  }, [versioningMode]);
  useEffect(() => {
    let alive = true;
    S3.getNotifications(bucket.name)
      .then(d => {
        if (!alive) return;
        setNotificationState(d || {eventBridgeEnabled:false, topicConfigurations:[], queueConfigurations:[], cloudFunctionConfigurations:[], deliveries:[], updatedAt:''});
        const rules = [];
        for (const rule of d.topicConfigurations || []) rules.push({id: rule.id || '', destination_type: 'TopicConfiguration', destination: rule.topic || '', events_text: (rule.events || []).join(', ') || 's3:ObjectCreated:*', prefix: rule.prefix || '', suffix: rule.suffix || ''});
        for (const rule of d.queueConfigurations || []) rules.push({id: rule.id || '', destination_type: 'QueueConfiguration', destination: rule.queue || '', events_text: (rule.events || []).join(', ') || 's3:ObjectCreated:*', prefix: rule.prefix || '', suffix: rule.suffix || ''});
        for (const rule of d.cloudFunctionConfigurations || []) rules.push({id: rule.id || '', destination_type: 'CloudFunctionConfiguration', destination: rule.cloudFunction || '', events_text: (rule.events || []).join(', ') || 's3:ObjectCreated:*', prefix: rule.prefix || '', suffix: rule.suffix || ''});
        setNotificationDraft({
          event_bridge_enabled: !!d.eventBridgeEnabled,
          rules: rules.length ? rules : [{id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}],
        });
      })
      .catch(() => {
        if (!alive) return;
        setNotificationState({eventBridgeEnabled:false, topicConfigurations:[], queueConfigurations:[], cloudFunctionConfigurations:[], deliveries:[], updatedAt:''});
        setNotificationDraft({event_bridge_enabled:false, rules:[{id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}]});
      });
    return () => { alive = false; };
  }, [bucket.name]);
  const saveVersioning = async () => {
    try {
      const d = await S3.setVersioning(bucket.name, versioningMode);
      setVersioningMode(d.versioning || versioningMode);
      notify(`Bucket versioning set to ${d.versioning || versioningMode}`,'success');
      load();
    } catch (e) {
      notify(e.message, 'error');
    }
  };
  const updateNotificationRule = (idx, key, value) => {
    setNotificationDraft(prev => ({
      ...prev,
      rules: prev.rules.map((rule, i) => i === idx ? {...rule, [key]: value} : rule),
    }));
  };
  const addNotificationRule = () => {
    setNotificationDraft(prev => ({
      ...prev,
      rules: [...prev.rules, {id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}],
    }));
  };
  const removeNotificationRule = (idx) => {
    setNotificationDraft(prev => {
      const next = prev.rules.filter((_, i) => i !== idx);
      return {...prev, rules: next.length ? next : [{id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}]};
    });
  };
  const saveNotifications = async () => {
    setNotificationBusy(true);
    try {
      const payload = {
        event_bridge_enabled: !!notificationDraft.event_bridge_enabled,
        rules: (notificationDraft.rules || []).map(rule => ({
          id: (rule.id || '').trim(),
          destination_type: rule.destination_type || 'TopicConfiguration',
          destination: (rule.destination || '').trim(),
          events: (rule.events_text || '').split(',').map(s => s.trim()).filter(Boolean),
          prefix: (rule.prefix || '').trim(),
          suffix: (rule.suffix || '').trim(),
        })).filter(rule => rule.destination || rule.events.length || rule.prefix || rule.suffix),
      };
      await S3.setNotifications(bucket.name, payload);
      const fresh = await S3.getNotifications(bucket.name);
      setNotificationState(fresh);
      notify(`Bucket notifications updated`, 'success');
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setNotificationBusy(false);
    }
  };
  const clearNotifications = async () => {
    setNotificationBusy(true);
    try {
      await S3.clearNotifications(bucket.name);
      const fresh = await S3.getNotifications(bucket.name);
      setNotificationState(fresh);
      setNotificationDraft({event_bridge_enabled:false, rules:[{id:'', destination_type:'TopicConfiguration', destination:'', events_text:'s3:ObjectCreated:*', prefix:'', suffix:''}]});
      notify('Bucket notifications cleared', 'success');
      await load();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setNotificationBusy(false);
    }
  };
  const showVersionSwitch = versioningMode !== 'Disabled';
  const rowKey = (o) => showVersions ? `${o.key}@@${o.version_id || 'null'}` : o.key;
  const parsedSelected = useMemo(() => {
    return sel.map(id => {
      if (!showVersions) return objs.find(o => o.key === id) || null;
      const [key, version_id = 'null'] = id.split('@@');
      return objs.find(o => o.key === key && String(o.version_id || 'null') === version_id) || null;
    }).filter(Boolean);
  }, [objs, sel, showVersions]);

  return (
    <>
      <S3ApiDocsPanel mode="objects" bucketName={bucket.name} />
      {/* Breadcrumb */}
      <div className="bc">
        <span>{serviceLabel}</span><span className="bc-sep">›</span>
        <a onClick={onBack}>{providerKey === 'gcp' ? 'Cloud Storage buckets' : 'General purpose buckets'}</a><span className="bc-sep">›</span>
        <span>{bucket.name}</span>
      </div>

      <div className="panel">
        <div className="ph">
          <div>
            <div className="pt">{bucket.name}</div>
            <div className="ps">Region: <strong>{bucket.region}</strong> &nbsp;|&nbsp; Type: <strong>{providerKey === 'gcp' ? 'Cloud Storage bucket' : 'General purpose'}</strong></div>
          </div>
          <div className="btn-grp">
            <button className="btn btn-s" onClick={onBack}>← Back</button>
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
          </div>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {['objects','properties','permissions','metrics'].map(t => (
            <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </div>
          ))}
        </div>

        {tab==='objects' ? <>
          {/* Stats bar */}
          <div className="sbar">
            <span>Objects: <strong>{objs.length}</strong></span>
            <span>Total size: <strong>{fmtSize(totalSz)}</strong></span>
            <span>Region: <strong>{bucket.region}</strong></span>
            <span>Versioning: <strong>{versioningMode}</strong></span>
          </div>

          {/* Toolbar */}
          <div className="tb" style={{flexWrap:'wrap',gap:8}}>
          <button className="btn btn-p" onClick={()=>setShowUp(true)}>Upload</button>
          <button className="btn btn-s" onClick={()=>notify('Folder creation is simulated — use prefixes in object keys','info')}>Create folder</button>
          {sel.length>0 && <>
            {sel.length===1 && parsedSelected[0] && (
              <a className="btn btn-s" href={S3.dlUrl(bucket.name, parsedSelected[0].key, showVersions ? (parsedSelected[0].version_id || '') : '')} download={parsedSelected[0].key}>Download</a>
            )}
            <button className="btn btn-d" onClick={()=>setDelT(parsedSelected)}>Delete ({sel.length})</button>
          </>}
          {showVersionSwitch && (
            <label className="s3-switch" style={{marginLeft:8}}>
              <input type="checkbox" checked={showVersions} onChange={e=>setShowVersions(e.target.checked)} />
              <span className="s3-switch-ui" aria-hidden="true" />
              <span className="s3-switch-label">Show versions</span>
            </label>
          )}
          <div className="tb-r"><input className="srch" placeholder="Find objects by name" value={q} onChange={e=>setQ(e.target.value)}/></div>
          </div>

          <div className="s3-object-stage">
            {!selectedObject ? <div className="s3-object-list-panel">
              {loading ? <div className="ld">Loading objects…</div>
              : filtered.length===0 ?
                <div className="empty">
                  <div className="empty-t">{objs.length===0?'Bucket is empty':q?`No results for "${q}"`:''}</div>
                  <div className="empty-d">{objs.length===0?'Upload files to start storing objects in this bucket':''}</div>
                  {objs.length===0 && <button className="btn btn-p" onClick={()=>setShowUp(true)}>Upload</button>}
                </div>
              :
                <table className="tbl">
                  <thead><tr>
                    <th><input type="checkbox" checked={sel.length===filtered.length&&filtered.length>0} onChange={e=>setSel(e.target.checked?filtered.map(o=>rowKey(o)):[])}/></th>
                    <th>Name</th>
                    {showVersions && <th>Version ID</th>}
                    <th>Type</th><th>Last modified</th><th>Size</th><th>Storage class</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(o => (
                      <tr key={rowKey(o)}>
                        <td><input type="checkbox" checked={sel.includes(rowKey(o))} onChange={()=>toggle(rowKey(o))}/></td>
                        <td><span className="lnk" onClick={()=>setSelectedObject({key:o.key, versionId:showVersions ? (o.version_id || '') : ''})}>{o.key}</span></td>
                        {showVersions && <td><span className="ec2-mono">{o.version_id ? o.version_id : '—'}</span></td>}
                        <td style={{color:'#687078'}}>{showVersions ? (o.is_delete_marker ? 'Delete marker' : 'Object') : o.content_type}</td>
                        <td>{fmtDate(o.last_modified)}</td>
                        <td>{o.is_delete_marker ? '—' : o.size_human}</td>
                        <td><span className="tag tb2">{o.storage_class}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              }
            </div> : (
              <ObjDetail
                bucket={bucket.name}
                objKey={selectedObject.key}
                versionId={selectedObject.versionId}
                onClose={()=>setSelectedObject(null)}
                onDelete={(k,v)=>{ setSelectedObject(null); setDelT([{key:k, version_id:v || ''}]); }}
              />
            )}
          </div>
        </>
        : tab==='properties' ?
          <div style={{padding:24}}>
            <div className="ibox" style={{marginBottom:16}}>
              <strong>Versioning</strong> keeps multiple versions of objects when enabled.
            </div>
            <div className="fg" style={{maxWidth:420}}>
              <label className="fl">Bucket versioning</label>
              <select className="fi" value={versioningMode} onChange={e=>setVersioningMode(e.target.value)}>
                {['Disabled','Enabled','Suspended'].map(status => <option key={status} value={status}>{status}</option>)}
              </select>
              <div className="fh">Enabled preserves every write as a version. Suspended keeps prior versions but stops creating new unique version IDs.</div>
            </div>
            <div className="btn-grp" style={{margin:'12px 0 18px'}}>
              <button className="btn btn-p" onClick={saveVersioning}>Save changes</button>
            </div>
            <div className="vpc-detail-section" style={{marginBottom:16}}>
              <div className="vpc-detail-section-title">Event notifications</div>
              <div className="vpc-detail-note">Configure bucket events for SNS, SQS, Lambda, or EventBridge. The simulator records deliveries and emits a test event when you save the notification config.</div>
              <label className="s3-switch" style={{marginTop:12}}>
                <input type="checkbox" checked={notificationDraft.event_bridge_enabled} onChange={e=>setNotificationDraft(prev => ({...prev, event_bridge_enabled: e.target.checked}))} />
                <span className="s3-switch-ui" aria-hidden="true" />
                <span className="s3-switch-label">Enable EventBridge</span>
              </label>
              <div style={{marginTop:14, display:'grid', gap:12}}>
                {notificationDraft.rules.map((rule, idx) => (
                  <div key={idx} className="vpc-panel" style={{background:'#fafafa'}}>
                    <div className="vpc-detail-section-title" style={{marginBottom:8}}>Rule {idx + 1}</div>
                    <div className="vpc-kv-grid">
                      <div className="fg">
                        <label className="fl">Destination type</label>
                        <select className="fi" value={rule.destination_type} onChange={e=>updateNotificationRule(idx, 'destination_type', e.target.value)}>
                          <option value="TopicConfiguration">SNS topic</option>
                          <option value="QueueConfiguration">SQS queue</option>
                          <option value="CloudFunctionConfiguration">Lambda function</option>
                        </select>
                      </div>
                      <div className="fg">
                        <label className="fl">Destination ARN / target</label>
                        <input className="fi" value={rule.destination} onChange={e=>updateNotificationRule(idx, 'destination', e.target.value)} placeholder="arn:aws:sns:us-east-1:123456789012:my-topic" />
                      </div>
                      <div className="fg">
                        <label className="fl">Event types</label>
                        <input className="fi" value={rule.events_text} onChange={e=>updateNotificationRule(idx, 'events_text', e.target.value)} placeholder="s3:ObjectCreated:*" />
                        <div className="fh">Comma-separated. Examples: <span className="ec2-mono">s3:ObjectCreated:*</span>, <span className="ec2-mono">s3:ObjectRemoved:*</span>, <span className="ec2-mono">s3:TestEvent</span></div>
                      </div>
                      <div className="fg">
                        <label className="fl">Prefix filter</label>
                        <input className="fi" value={rule.prefix} onChange={e=>updateNotificationRule(idx, 'prefix', e.target.value)} placeholder="images/" />
                      </div>
                      <div className="fg">
                        <label className="fl">Suffix filter</label>
                        <input className="fi" value={rule.suffix} onChange={e=>updateNotificationRule(idx, 'suffix', e.target.value)} placeholder=".jpg" />
                      </div>
                      <div className="fg">
                        <label className="fl">Rule ID</label>
                        <input className="fi" value={rule.id} onChange={e=>updateNotificationRule(idx, 'id', e.target.value)} placeholder="image-topic" />
                      </div>
                    </div>
                    <div className="btn-grp" style={{marginTop:10}}>
                      <button className="btn btn-s" onClick={()=>removeNotificationRule(idx)} disabled={notificationBusy}>Remove rule</button>
                    </div>
                  </div>
                ))}
              </div>
              <div className="btn-grp" style={{marginTop:12}}>
                <button className="btn btn-s" onClick={addNotificationRule} disabled={notificationBusy}>Add rule</button>
                <button className="btn btn-p" onClick={saveNotifications} disabled={notificationBusy}>{notificationBusy ? 'Saving…' : 'Save notifications'}</button>
                <button className="btn btn-d" onClick={clearNotifications} disabled={notificationBusy}>Clear notifications</button>
              </div>
              <div className="fh" style={{marginTop:8}}>
                Current config: {notificationState.eventBridgeEnabled ? 'EventBridge enabled' : 'EventBridge disabled'} · {notificationState.deliveries?.length || 0} delivery record(s)
              </div>
              {notificationState.deliveries && notificationState.deliveries.length > 0 && (
                <div style={{marginTop:16}}>
                  <div className="vpc-detail-section-title" style={{marginBottom:8}}>Recent deliveries</div>
                  <table className="vpc-simple-table">
                    <thead><tr><th>Time</th><th>Event</th><th>Destination</th><th>Key</th><th>Status</th></tr></thead>
                    <tbody>
                      {notificationState.deliveries.slice().reverse().slice(0, 10).map(delivery => (
                        <tr key={delivery.id}>
                          <td>{fmtDate(delivery.at)}</td>
                          <td className="ec2-mono">{delivery.event_name}</td>
                          <td>{delivery.destination_type} · <span className="ec2-mono">{delivery.destination || '—'}</span></td>
                          <td className="ec2-mono">{delivery.key || '—'}</td>
                          <td><span className="tag tg">{delivery.status}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
            <table className="ptbl"><tbody>
              {[['Bucket name',bucket.name],['Region',bucket.region],['ARN',bucket.arn],
                ['Creation date',fmtDate(bucket.created)],['Versioning',versioningMode],
                ['Default encryption','SSE-S3 (AES-256)'],['Static website hosting','Disabled'],
                ['Transfer acceleration','Disabled'],['Requester pays','Disabled']
              ].map(([k,v]) => (
                <tr key={k}><td>{k}</td><td>{k==='ARN'?<span className="arn">{v}</span>:v}</td></tr>
              ))}
            </tbody></table>
          </div>
        : tab==='permissions' ?
          <div style={{padding:24}}>
            <div className="ibox"><strong>Block Public Access</strong> — All public access is blocked for this bucket.</div>
            <p style={{fontSize:13,color:'#687078',lineHeight:1.7}}>
              {providerKey === 'gcp'
                ? 'In the real Google Cloud console, this tab lets you manage bucket access, IAM bindings, CORS rules, and public access settings.'
                : 'In the real AWS console, this tab lets you manage bucket policies, ACLs, CORS rules and public access settings.'}
              {' '}
              {providerKey === 'gcp'
                ? 'This simulator maps to the Cloud Storage console — security controls are enforced at the API layer.'
                : 'This simulator maps to the S3 console — security controls are enforced at the API layer.'}
            </p>
          </div>
        :
          <div style={{padding:24}}>
            <div className="ibox"><strong>CloudWatch Metrics</strong> — Storage and request metrics would appear here in real AWS.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginTop:12}}>
              {[['Total objects',objs.length],['Total size',fmtSize(totalSz)],['Requests today',Math.floor(Math.random()*500+100)],['Data transferred',fmtSize(totalSz*2)]].map(([label,val]) => (
                <div key={label} style={{background:'#fafafa',border:'1px solid #eaeded',borderRadius:4,padding:16,textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:700,margin:'6px 0'}}>{val}</div>
                  <div style={{fontSize:13,color:'#687078'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        }
      </div>

      {showUp && <UploadModal bucket={bucket.name} onClose={()=>setShowUp(false)} onDone={(ok,fail)=>{setShowUp(false);if(ok)notify(`${ok} file(s) uploaded successfully`,'success');if(fail)notify(`${fail} file(s) failed`,'error');load();}}/>}
      {delT && <ConfirmDelete title={`Delete ${delT.length} object(s)`} lines={[`You are about to permanently delete:`,...delT.map(o=>`• ${o.key}${showVersions ? ` (${o.version_id ? o.version_id : '—'})` : ''}`),'This action cannot be undone.']} onConfirm={doDelete} onClose={()=>setDelT(null)} busy={delBusy}/>}
    </>
  );
}

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const productMode = window.location.pathname.startsWith('/product') || window.location.pathname.startsWith('/cloudlearn');
  const [view, setView]   = useState('dashboard');
  const [bucket, setBucket] = useState(null);
  const [notif, setNotif]   = useState(null);
  const [query, setQuery]   = useState('');
  const [servicePaneOpen, setServicePaneOpen] = useState(false);
  const [spacesProviderFilter, setSpacesProviderFilter] = useState('');
  const [servicePaneProvider, setServicePaneProvider] = useState('aws');
  const [connectedSpace, setConnectedSpace] = useState({spaceId: '', spaceName: '', provider: ''});
  const [connectedServiceView, setConnectedServiceView] = useState('ec2');
  const [providerCatalog, setProviderCatalog] = useState(DEFAULT_PROVIDER_CATALOG);
  window.__cloudlearnActiveServiceProvider = normalizeProvider(servicePaneProvider || spacesProviderFilter || 'aws');
  const debugState = {
    view,
    activeShellView: connectedSpace?.spaceId ? connectedServiceView : view,
    connectedSpaceRoute: !!connectedSpace?.spaceId,
    connectedSpaceId: connectedSpace?.spaceId || '',
    connectedSpaceName: connectedSpace?.spaceName || '',
    connectedSpaceProvider: connectedSpace?.provider || '',
    connectedServiceView,
    servicePaneOpen,
    servicePaneProvider,
    spacesProviderFilter,
    query,
  };

  const notify = useCallback((msg, type='info') => setNotif({msg, type, id: Date.now()}), []);

  const enterBucket = (b) => { setBucket(b); setView('s3-objects'); };
  const goBack      = ()  => { setBucket(null); setView('s3-buckets'); };
  const open = (target, opts = {}) => {
    const resolved = target === 's3' ? 's3-buckets' : target;
    setBucket(null);
    setView(resolved);
    if (resolved === 'dashboard') {
      setSpacesProviderFilter('');
      setServicePaneProvider('aws');
      setServicePaneOpen(false);
      setConnectedSpace({spaceId: '', spaceName: '', provider: ''});
      setConnectedServiceView('ec2');
    }
    if (resolved === 'spaces') {
      setSpacesProviderFilter(opts.provider ? normalizeProvider(opts.provider) : '');
      if (opts.provider) {
        setServicePaneProvider(normalizeProvider(opts.provider));
      }
      if (!opts.showServices) {
        setServicePaneOpen(false);
      }
    }
    if (opts.showServices === true) {
      setServicePaneOpen(true);
      if (opts.provider) {
        setServicePaneProvider(normalizeProvider(opts.provider));
      }
    }
    const nextProvider = normalizeProvider(opts.provider || spacesProviderFilter || servicePaneProvider || 'aws');
    window.__cloudlearnActiveServiceProvider = nextProvider;
  };
  useEffect(() => {
    let live = true;
    (async () => {
      try {
        const resp = await fetch('/api/providers');
        if (!resp.ok) return;
        const data = await resp.json();
        if (live && data?.providers) {
          const next = {...DEFAULT_PROVIDER_CATALOG};
          Object.entries(data.providers || {}).forEach(([key, value]) => {
            next[normalizeProvider(key)] = value;
          });
          setProviderCatalog(next);
        }
      } catch (_) {
        if (live) setProviderCatalog(DEFAULT_PROVIDER_CATALOG);
      }
    })();
    return () => { live = false; };
  }, []);
  useEffect(() => {
    window.__cloudlearnActiveServiceProvider = normalizeProvider(servicePaneProvider || spacesProviderFilter || 'aws');
  }, [servicePaneProvider, spacesProviderFilter]);
  useEffect(() => {
    window.__cloudlearnDebugState = debugState;
    if (window.location.search.includes('debug=1')) {
      console.debug('[cloudlearn-debug]', debugState);
    }
  }, [view, connectedSpace?.spaceId, connectedSpace?.spaceName, connectedSpace?.provider, connectedServiceView, servicePaneOpen, servicePaneProvider, spacesProviderFilter, query]);
  useEffect(() => {
    if (view === 'space-ec2' && connectedSpace?.spaceId) {
      setServicePaneOpen(true);
    }
  }, [view, connectedSpace?.spaceId]);
  useEffect(() => {
    if (connectedSpace?.spaceId) {
      setConnectedServiceView('ec2');
    }
  }, [connectedSpace?.spaceId]);
  const activeShellView = connectedSpace?.spaceId && view === 'space-ec2' ? connectedServiceView : view;
  const titleMap = {
    dashboard: 'CloudLearn Console',
    spaces: 'Simulation Spaces',
    iam: 'IAM',
    ec2: 'Amazon EC2',
    dynamodb: 'Amazon DynamoDB',
    sqs: 'Amazon SQS',
    vpc: 'Amazon VPC',
    rds: 'Amazon RDS',
    lambda: 'AWS Lambda',
    apigateway: 'Amazon API Gateway',
    's3-buckets': 'Amazon S3',
    's3-objects': 'Amazon S3',
  };
  const sidebarProviderKey = normalizeProvider(servicePaneProvider || spacesProviderFilter || 'aws');
  const providerServiceViews = new Set(['iam', 'ec2', 'dynamodb', 'sqs', 'rds', 'lambda', 'apigateway', 'vpc', 's3-buckets', 's3-objects']);
  const serviceBreadcrumbProvider = normalizeProvider(servicePaneProvider || spacesProviderFilter || 'aws');
  const serviceBreadcrumbLabel = providerBreadcrumbLabelForView(serviceBreadcrumbProvider, activeShellView, providerCatalog);
  const headerTitle = providerServiceViews.has(activeShellView)
    ? providerBreadcrumbLabelForView(serviceBreadcrumbProvider, activeShellView, providerCatalog)
    : titleMap[activeShellView] || 'Simulator';
  const serviceThemeClass = providerServiceViews.has(activeShellView) ? `${serviceBreadcrumbProvider}-service-shell` : '';
  const shellThemeClass = providerServiceViews.has(activeShellView) ? `${serviceBreadcrumbProvider}-shell` : '';
  const effectiveServicePaneOpen = servicePaneOpen || providerServiceViews.has(activeShellView) || (view === 'space-ec2' && !!connectedSpace.spaceId);
  const connectedSpaceRoute = !!connectedSpace.spaceId && view === 'space-ec2';
  const sideGroups = [
    {title: providerNavTitle(sidebarProviderKey, providerCatalog), items: providerNavItems(sidebarProviderKey, providerCatalog)},
  ];
  const serviceSearch = providerServiceViews.has(view) ? '' : query;
  const matches = (label) => label.toLowerCase().includes(serviceSearch.toLowerCase());
  const filteredGroups = sideGroups
    .map(group => ({
      ...group,
      items: group.items.filter(([label]) => matches(label))
    }))
    .filter(group => group.items.length);

  return (
    <>
      {productMode ? (
        <>
          <header className="hdr">
            <div className="hdr-logo">cloud-learn<span>☁</span></div>
            <div className="hdr-svc"><strong>CloudLearn Product Center</strong></div>
            <div className="hdr-right">
              <span className="badge">ADMIN</span>
              <span>local</span>
            </div>
          </header>
          <main className="aws-main" style={{marginLeft:0,width:'100%'}}>
            <ProductView notify={notify}/>
          </main>
        </>
      ) : (
        <>
          {!connectedSpaceRoute && (
            <header className={`hdr ${shellThemeClass}`.trim()}>
              <div className="hdr-logo">cloud-learn<span>☁</span></div>
              <div className="hdr-svc"><strong>{headerTitle}</strong></div>
              <div className="hdr-search">
                <input
                  value={query}
                  onChange={e=>setQuery(e.target.value)}
                  placeholder="Search services"
                />
              </div>
              <div className="hdr-right">
                <span className="badge">SIMULATOR</span>
                <span>us-east-1</span>
                <span style={{background:'#37475a',padding:'3px 10px',borderRadius:3,fontSize:12}}>root</span>
              </div>
            </header>
          )}

          {connectedSpaceRoute ? (
            <>
              <div className={`aws-shell connected-space-route ${shellThemeClass}`.trim()} style={connectedSpaceRoute ? {marginTop:0,minHeight:'100vh'} : undefined}>
              <aside className="aws-sidebar">
                <div className="aws-side-search">
                  <input
                    value={query}
                    onChange={e=>setQuery(e.target.value)}
                    placeholder="Search services"
                  />
                </div>
                {(() => {
                  const sidebarProvider = normalizeProvider(servicePaneProvider || spacesProviderFilter || connectedSpace.provider || 'aws');
                  return filteredGroups.map(group => (
                    <div className="aws-group" key={group.title}>
                      <div className="aws-group-title">{group.title}</div>
                      {group.items.map(([label, target]) => {
                        const icon = providerNavIconDescriptor(sidebarProvider, target, providerCatalog);
                        const activeTarget = connectedServiceView === target || (connectedServiceView === 's3-objects' && target === 's3-buckets');
                        return (
                          <div
                            key={label}
                            className={`aws-item ${activeTarget ? 'active' : ''}`}
                            onClick={() => {
                              setConnectedServiceView(target);
                              setServicePaneProvider(normalizeProvider(connectedSpace.provider || servicePaneProvider || spacesProviderFilter || 'aws'));
                              window.__cloudlearnActiveServiceProvider = normalizeProvider(connectedSpace.provider || servicePaneProvider || spacesProviderFilter || 'aws');
                            }}
                          >
                            {icon.kind === 'fa'
                              ? <i className={`aws-item-icon ${icon.className}`} aria-hidden="true" />
                              : <span className="aws-item-icon material-symbols-outlined" aria-hidden="true">{icon.text}</span>}
                            <span className="aws-item-label">{label}</span>
                            <span className="small">›</span>
                          </div>
                        );
                      })}
                    </div>
                  ));
                })()}
              </aside>

              <main className={`aws-main ${serviceThemeClass}`.trim()}>
                <div className={`connected-space-page ${serviceThemeClass}`.trim()}>
                  <div className="panel" style={{margin:'16px 0 16px'}}>
                    <div className="ec2-topbar" style={{borderBottom:'1px solid #eaeded',flexDirection:'column',alignItems:'stretch'}}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,minWidth:0}}>
                        <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:0}}>
                          <div className="ec2-details-title">{connectedSpace.spaceName || connectedSpace.spaceId || 'Connected space'}</div>
                          <div className="ec2-details-sub">
                            {connectedSpace.provider || serviceBreadcrumbProvider} · {connectedSpace.spaceId || '—'}
                          </div>
                        </div>
                        <div className="ec2-details-actions">
                          <span className={`ec2-chip ${connectedServiceView === 'ec2' ? 'running' : 'stopped'}`}>
                            {connectedServiceView === 'ec2' ? 'EC2' : connectedServiceView}
                          </span>
                        </div>
                      </div>
                      <div className="connected-space-separator" aria-hidden="true" />
                      <ProviderBreadcrumb provider={connectedSpace.provider || serviceBreadcrumbProvider} providerCatalog={providerCatalog} onOpenSpaces={(provider='') => {
                          setConnectedSpace({spaceId: '', spaceName: '', provider: ''});
                          setConnectedServiceView('ec2');
                          open('spaces', {provider});
                        }} onOpenDashboard={() => {
                          setConnectedSpace({spaceId: '', spaceName: '', provider: ''});
                          setConnectedServiceView('ec2');
                          open('dashboard');
                        }} leafLabel={serviceBreadcrumbLabel}/>
                    </div>
                  </div>
                  {connectedServiceView === 'ec2' ? (
                    <RouteErrorBoundary label="EC2 / Compute Engine">
                      <EC2View key={`space-ec2:${connectedSpace.spaceId || 'global'}:${connectedSpace.provider || spacesProviderFilter || servicePaneProvider || 'aws'}`} notify={notify} providerCatalog={providerCatalog} providerContext={connectedSpace.provider || spacesProviderFilter || servicePaneProvider} connectedSpace={connectedSpace} onOpenSpaces={(provider='') => {
                        setConnectedSpace({spaceId: '', spaceName: '', provider: ''});
                        setConnectedServiceView('ec2');
                        open('spaces', {provider});
                      }} onOpenDashboard={() => {
                        setConnectedSpace({spaceId: '', spaceName: '', provider: ''});
                        setConnectedServiceView('ec2');
                        open('dashboard');
                      }}/>
                    </RouteErrorBoundary>
                  ) : connectedServiceView === 'dynamodb' ? (
                    <DynamoDBView key={`space-ec2-ddb:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'sqs' ? (
                    <SQSView key={`space-ec2-sqs:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'rds' ? (
                    <RDSView key={`space-ec2-rds:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'lambda' ? (
                    <LambdaView key={`space-ec2-lambda:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'apigateway' ? (
                    <APIGatewayView key={`space-ec2-apigw:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'vpc' ? (
                    <VPCView key={`space-ec2-vpc:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 'iam' ? (
                    <IAMView key={`space-ec2-iam:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} notify={notify}/>
                  ) : connectedServiceView === 's3-buckets' ? (
                    <BucketsView key={`space-ec2-s3:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} onEnter={enterBucket} notify={notify}/>
                  ) : (
                    <ObjectsView key={`space-ec2-s3obj:${connectedSpace.spaceId || 'global'}:${connectedServiceView}`} bucket={bucket} onBack={goBack} notify={notify}/>
                  )}
                </div>
              </main>
              </div>
            </>
          ) : (
          <div className={`aws-shell ${shellThemeClass}`.trim()}>
            {effectiveServicePaneOpen ? (
              <aside className="aws-sidebar">
                <div className="aws-side-search">
                  <input
                    value={query}
                    onChange={e=>setQuery(e.target.value)}
                    placeholder="Search services"
                  />
                </div>
                {(() => {
                  const sidebarProvider = normalizeProvider(servicePaneProvider || spacesProviderFilter || 'aws');
                  return filteredGroups.map(group => (
                    <div className="aws-group" key={group.title}>
                      <div className="aws-group-title">{group.title}</div>
                      {group.items.map(([label, target]) => {
                        const icon = providerNavIconDescriptor(sidebarProvider, target, providerCatalog);
                        return (
                          <div
                            key={label}
                            className={`aws-item ${(view===target || (view==='s3-objects' && target==='s3-buckets')) ? 'active' : ''}`}
                            onClick={()=>open(target, {showServices: true})}
                          >
                            {icon.kind === 'fa'
                              ? <i className={`aws-item-icon ${icon.className}`} aria-hidden="true" />
                              : <span className="aws-item-icon material-symbols-outlined" aria-hidden="true">{icon.text}</span>}
                            <span className="aws-item-label">{label}</span>
                            <span className="small">›</span>
                          </div>
                        );
                      })}
                    </div>
                  ));
                })()}
              </aside>
            ) : null}

            <main className={`aws-main ${serviceThemeClass}`.trim()} style={effectiveServicePaneOpen ? undefined : {marginLeft:0,width:'100%'}}>
              {providerServiceViews.has(view) ? (
                <div style={{padding:'16px 16px 0'}}>
                  <ProviderBreadcrumb provider={serviceBreadcrumbProvider} providerCatalog={providerCatalog} onOpenSpaces={(provider='') => open('spaces', {provider})} onOpenDashboard={() => open('dashboard')} leafLabel={serviceBreadcrumbLabel}/>
                </div>
              ) : null}
              {view==='dashboard'
                ? <DashboardView providerCatalog={providerCatalog} onOpenSpaces={(provider='') => open('spaces', {provider})} notify={notify}/>
              : view==='spaces'
                ? <RouteErrorBoundary label="Simulation Spaces">
                    <SpacesView providerCatalog={providerCatalog} notify={notify} providerFilter={spacesProviderFilter} onConnect={(provider, spaceId, spaceName) => {
                      const resolvedProvider = normalizeProvider(provider || spacesProviderFilter || servicePaneProvider || 'aws');
                      window.__cloudlearnActiveSpaceId = spaceId || window.__cloudlearnActiveSpaceId || '';
                      window.__cloudlearnActiveServiceProvider = resolvedProvider;
                      setQuery('');
                      setConnectedSpace({spaceId: spaceId || '', spaceName: spaceName || '', provider: resolvedProvider});
                      setConnectedServiceView('ec2');
                      setServicePaneProvider(resolvedProvider);
                      setServicePaneOpen(true);
                      setView('space-ec2');
                      setTimeout(() => { void Spaces.switch(spaceId).catch(() => {}); }, 0);
                    }} onOpenSpaces={(provider='') => open('spaces', {provider})} onOpenDashboard={() => open('dashboard')}/>
                  </RouteErrorBoundary>
              : view==='iam'
              ? <IAMView notify={notify}/>
              : view==='ec2'
                ? <RouteErrorBoundary label="EC2 / Compute Engine">
                    <EC2View key={`${connectedSpace.spaceId || 'global'}:${connectedSpace.provider || spacesProviderFilter || servicePaneProvider || 'aws'}`} notify={notify} providerCatalog={providerCatalog} providerContext={connectedSpace.provider || spacesProviderFilter || servicePaneProvider} connectedSpace={connectedSpace} onOpenSpaces={(provider='') => open('spaces', {provider})} onOpenDashboard={() => open('dashboard')}/>
                  </RouteErrorBoundary>
              : view==='dynamodb'
                ? <DynamoDBView key={`ddb:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='sqs'
                ? <SQSView key={`sqs:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='rds'
                ? <RDSView key={`rds:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='lambda'
                ? <LambdaView key={`lambda:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='apigateway'
                ? <APIGatewayView key={`apigw:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='vpc'
                ? <VPCView key={`vpc:${connectedSpace.spaceId || 'global'}:${view}`} notify={notify}/>
              : view==='s3-buckets'
                ? <BucketsView key={`s3:${connectedSpace.spaceId || 'global'}:${view}`} onEnter={enterBucket} notify={notify}/>
                : <ObjectsView key={`s3obj:${connectedSpace.spaceId || 'global'}:${view}`} bucket={bucket} onBack={goBack} notify={notify}/>
              }
            </main>
          </div>
          )}
        </>
      )}

      {/* Notification toast */}
      {notif && <Notif key={notif.id} msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <RouteErrorBoundary label="CloudLearn">
    <App/>
  </RouteErrorBoundary>
);
</script>
</body>
</html>
