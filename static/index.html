                </tr>

      <div className="vpc-detail-wrap">
        <div className="vpc-detail-panel">
          {selectedVpc ? (

              <div className="vpc-detail-banner">
                <div className="vpc-detail-name">{selectedVpc.name}</div>
                <div className="vpc-detail-meta">{selectedVpc.vpc_id} · {selectedVpc.cidr_block}</div>
              </div>
              <div className="vpc-detail-tabs">
                <div className="tabs ec2-subtabs">
                  {detailTabs.map(t => (
                    <div key={t} className={`tab ${detailTab === t ? 'active' : ''}`} onClick={() => setDetailTab(t)}>

            notify('EC2 instance launched into VPC', 'success');
            load();
          }}

  );

  const renderEncryptionControls = () => (
    <div className="vpc-detail-wrap" style={{paddingTop:16}}>
      <div className="vpc-detail-panel">
        <div className="vpc-detail-banner">
          <div className="vpc-detail-name">VPC encryption controls</div>
          <div className="vpc-detail-meta">No VPC encryption controls are configured yet.</div>
        </div>
        <div className="vpc-detail-body">
          <div className="vpc-detail-empty">AWS surfaces VPC encryption controls here. The simulator keeps this as a lightweight placeholder for now.</div>
        </div>
      </div>
    </div>
  );

  return (
    <>
      <VPCApiDocsPanel />
      <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>Amazon VPC</span><span className="bc-sep">›</span><span>Your VPCs</span>
        </div>
        <div className="vpc-page-title">Your VPCs</div>
        <div className="vpc-page-sub">View and manage your virtual private clouds, their subnets, route tables, security groups, and connected services.</div>
      </div>
      <div className="vpc-page-tabs">
        <div className="tabs">
          <div className={`tab ${pageTab === 'vpcs' ? 'active' : ''}`} onClick={() => setPageTab('vpcs')}>VPCs</div>

            'Any attached EC2 instances in this simulator will be terminated as part of the delete.'

          onConfirm={doDeleteVpc}
          onClose={() => setDeleteVpcTarget(null)}
          busy={deleteBusy}
        />
      )}
      </div>
    </>
  );
}

    db_parameter_group_name: '',
    availability_zone: 'us-east-1a',

    security_group_ids: [],
  });
  const [deleteTarget, setDeleteTarget] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await RDS.list();
      setData(d);
      if (!selectedDbId && d.db_instances?.length) {
        setSelectedDbId(d.db_instances[0].db_instance_identifier);
      }
      if (page === 'create' && !createForm.vpc_id) {
        const vpcs = await VPC.listVpcs().catch(() => ({vpcs: []}));
        setCreateVpcs(vpcs.vpcs || []);
        if (vpcs.vpcs?.length) {
          setCreateForm(f => ({...f, vpc_id: vpcs.vpcs[0].vpc_id, db_subnet_group_name: f.db_subnet_group_name || `default-${(vpcs.vpcs[0].vpc_id || '').replace('vpc-','').slice(0,8) || 'default'}`}));
        }
      }
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify, page, selectedDbId, createForm.vpc_id]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (page !== 'create' || !createForm.vpc_id) return;
    VPC.resources(createForm.vpc_id).then(res => {
      setCreateVpcResources(res);
      const defaultSg = (res.security_groups || []).find(sg => sg.is_default) || res.security_groups?.[0] || null;
      setCreateForm(f => ({
        ...f,
        db_subnet_group_name: f.db_subnet_group_name || `default-${(createForm.vpc_id || '').replace('vpc-','').slice(0,8) || 'default'}`,
        security_group_ids: f.security_group_ids.length ? f.security_group_ids : (defaultSg ? [defaultSg.security_group_id] : []),
      }));
    }).catch(() => setCreateVpcResources(null));
  }, [page, createForm.vpc_id]);

  useEffect(() => {
    if (page !== 'detail' || !selectedDb?.vpc_id) {
      setDetailVpcResources(null);
      return;
    }
    VPC.resources(selectedDb.vpc_id).then(setDetailVpcResources).catch(() => setDetailVpcResources(null));
  }, [page, selectedDbId, data.db_instances]);

  useEffect(() => {
    const closeMenu = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {

    return () => document.removeEventListener('pointerdown', closeMenu);

  const selectedDb = data.db_instances.find(db => db.db_instance_identifier === selectedDbId) || null;

    if (!q) return true;
    return [db.db_instance_identifier, db.status, db.engine, db.db_instance_class, db.endpoint_url, db.vpc_id, db.db_subnet_group_name, db.db_parameter_group_name].filter(Boolean).some(v => String(v).toLowerCase().includes(q));
  });

    setActionsOpen(false);

            <div className="rds-detail-note">Master user: {selectedDb.master_username} · Multi-AZ: {selectedDb.multi_az ? 'Enabled' : 'Disabled'} · Auto minor version upgrade: {selectedDb.auto_minor_version_upgrade ? 'Enabled' : 'Disabled'}</div>
          </div>
        </>
      );
    }
    if (detailTab === 'monitoring') {
      return (
        <div className="rds-detail-section">
          <div className="rds-detail-section-title">Monitoring</div>
          <div className="rds-kpi-grid">
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? '1' : '0'}</strong><span>Connections</span></div>
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? '12%' : '0%'}</strong><span>CPU utilization</span></div>
            <div className="rds-kpi"><strong>{selectedDb.allocated_storage} GiB</strong><span>Allocated storage</span></div>
            <div className="rds-kpi"><strong>{selectedDb.status === 'available' ? 'Healthy' : 'Stopped'}</strong><span>Status checks</span></div>
          </div>
        </div>
      );
    }
    if (detailTab === 'logs & events') {
      const rows = [...(selectedDb.events || []), ...(data.events || []).filter(ev => ev.detail?.db_instance_identifier === selectedDb.db_instance_identifier)];
      return rows.length ? (
        <table className="vpc-simple-table">
          <thead><tr><th>Action</th><th>Detail</th><th>Time</th></tr></thead>
          <tbody>
            {rows.map((ev, idx) => (
              <tr key={`${ev.action}-${idx}`}>
                <td>{ev.action}</td>
                <td className="ec2-mono">{JSON.stringify(ev.detail || {})}</td>
                <td>{fmtDate(ev.timestamp || ev.created || selectedDb.created)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      ) : <div className="rds-detail-empty">No logs or events are available yet.</div>;
    }
    if (detailTab === 'maintenance') {
      return (
        <div className="rds-detail-section">
          <div className="rds-detail-section-title">Maintenance</div>
          <table className="vpc-simple-table">
            <tbody>
              <tr><td>Preferred maintenance window</td><td>{selectedDb.preferred_maintenance_window}</td></tr>
              <tr><td>Latest restorable time</td><td>{fmtDate(selectedDb.latest_restorable_time)}</td></tr>
              <tr><td>Pending modified values</td><td>{Object.keys(selectedDb.pending_modified_values || {}).length ? JSON.stringify(selectedDb.pending_modified_values) : 'None'}</td></tr>
              <tr><td>Multi-AZ</td><td>{selectedDb.multi_az ? 'Enabled' : 'Disabled'}</td></tr>
            </tbody>
          </table>
        </div>
      );
    }
    if (detailTab === 'tags') {
      const tags = selectedDb.tags || [];
      return tags.length ? (
        <table className="vpc-simple-table">
          <thead><tr><th>Key</th><th>Value</th></tr></thead>
          <tbody>
            {tags.map((tag, idx) => (
              <tr key={`${tag.key || idx}`}>
                <td>{tag.key}</td>
                <td>{tag.value}</td>
              </tr>
            ))}
          </tbody>
        </table>
      ) : <div className="rds-detail-empty">No tags are associated with this database.</div>;

    return null;
  };

  const renderCreateView = () => {
    const engineChoices = [
      {id:'postgres', title:'PostgreSQL', desc:'Popular open-source relational database.'},
      {id:'mysql', title:'MySQL', desc:'Widely used open-source relational database.'},
      {id:'mariadb', title:'MariaDB', desc:'MySQL-compatible relational database.'},

      <div className="rds-create-wrap">
        <div className="rds-create-card">
          <div className="vpc-page-head" style={{padding:'0 0 10px'}}>
            <div className="bc" style={{marginBottom:8}}>
              <span>Amazon RDS</span><span className="bc-sep">›</span><a onClick={backToList}>Databases</a><span className="bc-sep">›</span><span>Create database</span>
            </div>
            <div className="rds-page-title" style={{fontSize:28}}>Create database</div>
            <div className="rds-page-sub">Create a managed database instance with AWS-like defaults and VPC-backed placement.</div>
          </div>
          <div className="tabs" style={{padding:'0 0 0',marginBottom:14}}>

          <div className="rds-create-section">
            <div className="rds-create-subhead"><span>Engine</span><a href="#" onClick={e => e.preventDefault()} className="rds-summary-info">Info</a></div>

                <label key={opt.id} className={`rds-choice-card ${createForm.engine === opt.id ? 'selected' : ''}`}>

                  <div>
                    <div className="rds-choice-title">{opt.title}</div>
                    <div className="rds-choice-desc">{opt.desc}</div>

                </label>

          <div className="rds-create-section">
            <label className="fl">DB instance identifier</label>
            <input className="fi" value={createForm.db_instance_identifier} onChange={e => setCreateForm(f => ({...f, db_instance_identifier: e.target.value}))} />

          <div className="rds-create-section">
            <div className="rds-detail-section-title">Credentials and compute</div>

                <label className="fl">Master username</label>
                <input className="fi" value={createForm.master_username} onChange={e => setCreateForm(f => ({...f, master_username: e.target.value}))} />
              </div>
              <div className="fg">
                <label className="fl">Master password</label>
                <div className="rds-secret-field">
                  <input

                    value={createForm.master_user_password}

                  />
                  <button
                    type="button"
                    className="rds-secret-toggle"
                    onClick={() => setShowCreatePassword(v => !v)}

                    title={showCreatePassword ? 'Hide password' : 'Show password'}
                  >
                    {showCreatePassword ? '🙈' : '👁'}
                  </button>
                </div>
              </div>
              <div className="fg">
                <label className="fl">DB instance class</label>
                <select className="fi" value={createForm.db_instance_class} onChange={e => setCreateForm(f => ({...f, db_instance_class: e.target.value}))}>
                  <option value="db.t3.micro">db.t3.micro</option>
                  <option value="db.t3.small">db.t3.small</option>
                  <option value="db.t4g.micro">db.t4g.micro</option>
                </select>
              </div>
              <div className="fg">
                <label className="fl">Allocated storage (GiB)</label>
                <input className="fi" type="number" min="20" value={createForm.allocated_storage} onChange={e => setCreateForm(f => ({...f, allocated_storage: Number(e.target.value || 20)}))} />
              </div>
            </div>
          </div>

          <div className="rds-create-section">
            <div className="rds-detail-section-title">Connectivity</div>
            <div className="rds-detail-grid">
              <div className="fg">
                <label className="fl">VPC</label>
                <select className="fi" value={createForm.vpc_id} onChange={e => setCreateForm(f => ({...f, vpc_id: e.target.value, db_subnet_group_name: `default-${(e.target.value || '').replace('vpc-','').slice(0,8) || 'default'}`}))}>
                  <option value="">Select VPC</option>
                  {createVpcs.map(vpc => <option key={vpc.vpc_id} value={vpc.vpc_id}>{vpc.name} ({vpc.cidr_block})</option>)}
                </select>
                <div className="fh">A DB subnet group will be created automatically if needed.</div>
              </div>
              <div className="fg">
                <label className="fl">DB subnet group name</label>
                <input className="fi" value={createForm.db_subnet_group_name} onChange={e => setCreateForm(f => ({...f, db_subnet_group_name: e.target.value}))} />
              </div>
              <div className="fg">
                <label className="fl">Availability zone</label>
                <select className="fi" value={createForm.availability_zone} onChange={e => setCreateForm(f => ({...f, availability_zone: e.target.value}))}>
                  {AZS.map(az => <option key={az} value={az}>{az}</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="fl">DB parameter group</label>
                <input className="fi" value={createForm.db_parameter_group_name} onChange={e => setCreateForm(f => ({...f, db_parameter_group_name: e.target.value}))} placeholder={defaultParameterGroupName(createForm.engine)} />
              </div>
            </div>
            <div className="rds-choice-grid" style={{marginTop:10}}>
              <label className={`rds-choice-card ${!createForm.publicly_accessible ? 'selected' : ''}`}>
                <input type="radio" name="publicAccess" checked={!createForm.publicly_accessible} onChange={() => setCreateForm(f => ({...f, publicly_accessible: false}))} />
                <div>
                  <div className="rds-choice-title">Not publicly accessible</div>
                  <div className="rds-choice-desc">Recommended default for private VPC-only access.</div>
                </div>
              </label>
              <label className={`rds-choice-card ${createForm.publicly_accessible ? 'selected' : ''}`}>
                <input type="radio" name="publicAccess" checked={createForm.publicly_accessible} onChange={() => setCreateForm(f => ({...f, publicly_accessible: true}))} />
                <div>
                  <div className="rds-choice-title">Publicly accessible</div>
                  <div className="rds-choice-desc">Expose the endpoint to public network paths in the simulator.</div>
                </div>
              </label>
            </div>
          </div>

          {createMode === 'standard' && (
            <>
              <div className="rds-create-section">
                <div className="rds-detail-section-title">Engine settings</div>
                <div className="rds-detail-grid">
                  <div className="fg">
                    <label className="fl">Engine version</label>
                    <input className="fi" value={createForm.engine_version} onChange={e => setCreateForm(f => ({...f, engine_version: e.target.value}))} />
                  </div>
                  <div className="fg">
                    <label className="fl">Backup retention period (days)</label>
                    <input className="fi" type="number" min="1" max="35" value={createForm.backup_retention_period} onChange={e => setCreateForm(f => ({...f, backup_retention_period: Number(e.target.value || 7)}))} />
                  </div>
                  <div className="fg">
                    <label className="fl">Preferred maintenance window</label>
                    <input className="fi" value={createForm.preferred_maintenance_window} onChange={e => setCreateForm(f => ({...f, preferred_maintenance_window: e.target.value}))} />
                  </div>
                </div>
                <div className="rds-choice-grid" style={{marginTop:10}}>
                  <label className={`rds-choice-card ${createForm.multi_az ? 'selected' : ''}`}>
                    <input type="checkbox" checked={createForm.multi_az} onChange={e => setCreateForm(f => ({...f, multi_az: e.target.checked}))} />
                    <div>
                      <div className="rds-choice-title">Multi-AZ deployment</div>
                      <div className="rds-choice-desc">Simulate a standby database in another Availability Zone.</div>
                    </div>
                  </label>
                  <label className={`rds-choice-card ${createForm.storage_type === 'gp3' ? 'selected' : ''}`}>
                    <input type="checkbox" checked={createForm.storage_type === 'gp3'} onChange={e => setCreateForm(f => ({...f, storage_type: e.target.checked ? 'gp3' : 'gp2'}))} />
                    <div>
                      <div className="rds-choice-title">General Purpose storage</div>
                      <div className="rds-choice-desc">Use gp3 for the default AWS-like storage profile.</div>
                    </div>
                  </label>
                </div>
              </div>
              <div className="rds-create-section">
                <div className="rds-detail-section-title">Tags</div>
                <div className="rds-detail-note">Use tags to label and filter database resources.</div>
                {createTags.map((tag, idx) => (
                  <div className="vpc-create-tag-row" key={idx}>
                    <input className="fi" placeholder="Key" value={tag.key} onChange={e => setCreateTags(rows => rows.map((row, i) => i === idx ? {...row, key: e.target.value} : row))} />
                    <input className="fi" placeholder="Value" value={tag.value} onChange={e => setCreateTags(rows => rows.map((row, i) => i === idx ? {...row, value: e.target.value} : row))} />
                    <button className="btn btn-s" onClick={() => setCreateTags(rows => rows.filter((_, i) => i !== idx))}>Remove</button>
                  </div>
                ))}
                <div className="btn-grp" style={{marginTop:12}}>
                  <button className="btn btn-s" onClick={() => setCreateTags(rows => [...rows, {key:'', value:''}])}>Add tag</button>
                </div>
              </div>
            </>
          )}

          <div className="rds-create-footer">
            <button className="btn btn-s" onClick={backToList} disabled={createBusy}>Cancel</button>
            <button className="btn btn-p" onClick={submitCreate} disabled={createBusy}>{createBusy ? '⏳ Creating…' : 'Create database'}</button>
          </div>
        </div>
      </div>
    );
  };

  if (page === 'create') {
    return (
      <>
        <RDSApiDocsPanel />
        {renderCreateView()}
      </>
    );
  }

  return (
    <>
      <RDSApiDocsPanel />
      <div className="panel">
        <div className="rds-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>Amazon RDS</span><span className="bc-sep">›</span><span>Databases</span>
          </div>
          <div className="rds-page-title">Databases</div>
          <div className="rds-page-sub">Create and manage managed database instances, snapshots, and subnet groups with an AWS-like console layout.</div>
        </div>
        <div className="rds-toolbar">
          <div className="rds-toolbar-left">
            <input className="fi rds-search" value={search} onChange={e => setSearch(e.target.value)} placeholder="Find databases by identifier, engine, or endpoint" />
            <div className="rds-summary">
              <div className="rds-summary-count">Databases ({filteredDbs.length}/{data.db_instances.length})</div>
              <a className="rds-summary-info" href="#" onClick={e => e.preventDefault()}>Info</a>
              <div className="rds-summary-updated">Last updated {relativeTime(data.db_instances[0]?.updated || data.db_instances[0]?.created)}</div>
            </div>
          </div>
          <div className="rds-toolbar-right">
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
            <button className="btn btn-p" onClick={openCreate}>Create database</button>
            <div className="vpc-actions-wrap" ref={actionsRef}>
              <button className="btn btn-s" onClick={() => setActionsOpen(v => !v)} disabled={!selectedIds.length}>Actions ▾</button>
              {actionsOpen && (
                <div className="vpc-actions-menu">
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.start(db.db_instance_identifier), db => db.status === 'stopped', 'Select a stopped database first.')}>Start database</button>
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.stop(db.db_instance_identifier), db => db.status === 'available', 'Select an available database first.')}>Stop database</button>
                  <button className="vpc-actions-item" onClick={() => actOnSelected(db => RDS.reboot(db.db_instance_identifier), db => db.status === 'available', 'Select an available database first.')}>Reboot database</button>
                  <button className="vpc-actions-item" onClick={() => setDeleteTarget(selectedItems.length ? selectedItems : null)} disabled={!selectedIds.length}>Delete selected database</button>
                </div>
              )}
            </div>
          </div>
        </div>
        {loading && !data.db_instances.length ? <div className="ld">Loading databases…</div> : (
          <div className="rds-grid-wrap">
            {filteredDbs.length ? (
              <table className="tbl rds-grid">
                <thead>
                  <tr>
                    <th><input type="checkbox" disabled aria-label="Select all databases" /></th>
                    <th>DB identifier</th>
                    <th>Status</th>
                    <th>Engine</th>
                    <th>Class</th>
                    <th>Endpoint</th>
                    <th>VPC</th>
                    <th>AZ</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredDbs.map(db => (
                    <tr key={db.db_instance_identifier} className={selectedDbId === db.db_instance_identifier ? 'active' : ''} onClick={() => openDetail(db.db_instance_identifier)}>
                      <td>
                        <input
                          type="checkbox"
                          checked={selectedIds.includes(db.db_instance_identifier)}
                          onClick={e => e.stopPropagation()}
                          onChange={() => toggleSelected(db.db_instance_identifier)}
                        />
                      </td>
                      <td title={db.db_instance_identifier}>
                        <span className="rds-grid-name">{db.db_instance_identifier}</span>
                      </td>
                      <td><span className={`tag ${stateChipClass(db.status) === 'running' ? 'tg' : stateChipClass(db.status) === 'stopped' ? 'ty' : 'tgr'}`}>{db.status}</span></td>
                      <td>{db.engine}</td>
                      <td>{db.db_instance_class}</td>
                      <td className="ec2-mono">{db.endpoint_url || '—'}</td>
                      <td className="ec2-mono">{db.vpc_id || '—'}</td>
                      <td>{db.availability_zone || '—'}</td>
                      <td>{fmtDate(db.created)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            ) : (
              <div className="empty">
                <div className="empty-t">{search ? 'No matching databases' : 'No databases yet'}</div>
                <div className="empty-d">{search ? 'Try a different search term.' : 'Create a database to get started.'}</div>
                {!search && <button className="btn btn-p" onClick={openCreate}>Create database</button>}
              </div>
            )}
          </div>
        )}
        <div className="rds-detail-wrap">
          <div className="rds-detail-panel">
            {selectedDb ? (
              <>
                <div className="rds-detail-banner">
                  <div className="rds-detail-name">{selectedDb.db_instance_identifier}</div>
                  <div className="rds-detail-meta">{selectedDb.engine} · {selectedDb.db_instance_class} · {selectedDb.endpoint_url || 'No endpoint yet'}</div>
                </div>
                <div className="tabs">
                  {[
                    ['connectivity', 'Connectivity & security'],
                    ['configuration', 'Configuration'],
                    ['monitoring', 'Monitoring'],
                    ['logs & events', 'Logs & events'],
                    ['maintenance', 'Maintenance'],
                    ['tags', 'Tags'],
                  ].map(([k, label]) => (
                    <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                  ))}
                </div>
                <div className="rds-detail-body">
                  {renderDetailTab()}
                </div>
              </>
            ) : (
              <div className="rds-detail-body">
                <div className="rds-detail-empty">Select a database from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>
      </div>
      {deleteTarget && (
        <ConfirmDelete
          title="Delete database"
          lines={[
            `You are about to delete ${deleteTarget.length} database instance(s).`,
            'The simulator will remove the database metadata. This action cannot be undone.',
          ]}
          onConfirm={async () => {
            try {
              for (const db of deleteTarget) {
                await RDS.delete(db.db_instance_identifier);
              }
              notify('Database deleted', 'success');
              setDeleteTarget(null);
              setSelectedIds([]);
              setSelectedDbId('');
              await load();
            } catch (e) {
              notify(e.message, 'error');
            }
          }}
          onClose={() => setDeleteTarget(null)}
          busy={false}
        />
      )}
    </>
  );
}

function APIGatewayApiDocsPanel() {
  const [showApiDocs, setShowApiDocs] = useState(false);
  const [docAction, setDocAction] = useState('CreateRestApi');
  const docs = useMemo(() => ([
    {
      action: 'CreateRestApi',
      request: `POST /api/apigateway/apis
{
  "name": "orders-api",
  "description": "Orders API",
  "endpoint_type": "REGIONAL"
}`,
      response: `{
  "rest_api_id": "api-abc123",
  "name": "orders-api",
  "endpoint_type": "REGIONAL",
  "invoke_url": "/api/apigateway/invoke/api-abc123"
}`,
      summary: 'Creates a managed API Gateway API inside the simulator control plane.',
    },
    {
      action: 'CreateResource',
      request: `POST /api/apigateway/apis/{api_id}/resources
{
  "parent_id": "res-root",
  "path_part": "hello"
}`,
      response: `{
  "resource": {
    "resource_id": "res-001",
    "path": "/hello"
  }
}`,
      summary: 'Creates a resource path that belongs to the selected API.',
    },
    {
      action: 'PutMethod',
      request: `POST /api/apigateway/apis/{api_id}/methods
{
  "resource_id": "res-001",
  "http_method": "GET",
  "authorization_type": "NONE"
}`,
      response: `{
  "method": {
    "resource_id": "res-001",
    "http_method": "GET"
  }
}`,
      summary: 'Attaches an HTTP method to a resource.',
    },
    {
      action: 'PutIntegration',
      request: `POST /api/apigateway/apis/{api_id}/integrations
{
  "resource_id": "res-001",
  "http_method": "GET",
  "type": "MOCK",
  "status_code": 200,
  "response_body": "{\\"message\\":\\"hello\\"}"
}`,
      response: `{
  "integration": {
    "type": "MOCK",
    "status_code": 200
  }
}`,
      summary: 'Connects a method to a mock or HTTP backend.',
    },
    {
      action: 'CreateDeployment',
      request: `POST /api/apigateway/apis/{api_id}/deployments
{
  "stage_name": "prod",
  "description": "Initial deployment"
}`,
      response: `{
  "deployment": {
    "deployment_id": "dep-abc123"
  }
}`,
      summary: 'Captures the current routes and makes them available at a stage.',
    },
    {
      action: 'Invoke',
      request: `GET /api/apigateway/invoke/{api_id}/prod/hello`,
      response: `{
  "message": "Hello from API Gateway"
}`,
      summary: 'Invokes the deployed API through the simulator invoke URL.',
    },
  ]), []);
  const selected = docs.find(d => d.action === docAction) || docs[0];

  return (
    <>
      {!showApiDocs && (
        <button className="vpc-doc-toggle" onClick={() => setShowApiDocs(true)}>
          <span className="vpc-doc-toggle-label">API Documentation</span>
        </button>
      )}
      {showApiDocs && (
        <aside className="vpc-doc-drawer" aria-label="Amazon API Gateway API Reference">
          <div className="vpc-doc-drawer-head">
            <div style={{minWidth:0,flex:1}}>
              <div className="vpc-doc-drawer-title">Amazon API Gateway API Reference</div>
              <div className="vpc-doc-drawer-sub">Design APIs, resources, methods, integrations, deployments, and stages from the same control plane used by the simulator.</div>
            </div>
            <button className="vpc-doc-drawer-close" onClick={() => setShowApiDocs(false)}>Close</button>
          </div>
          <div className="vpc-doc-drawer-body">
            <div className="ec2-docs-note" style={{marginBottom:12}}>Select one API Gateway request/response pair at a time.</div>
            <div className="ec2-docs-contents" style={{marginTop:0}}>
              <h3>Contents</h3>
              <div className="ec2-docs-links">
                {docs.map(d => (
                  <button key={d.action} className="ec2-docs-link" type="button" onClick={() => setDocAction(d.action)} style={{background:'none',border:'none',padding:0}}>
                    {d.action}
                  </button>
                ))}
              </div>
            </div>
            <div className="ec2-docs-section" style={{borderTop:'none',paddingTop:0,marginTop:16}}>
              <h3>Request and response</h3>
              <div className="ec2-docs-note">{selected.summary}</div>
              <select className="ec2-doc-select" value={docAction} onChange={e => setDocAction(e.target.value)}>
                {docs.map(d => <option key={d.action} value={d.action}>{d.action}</option>)}
              </select>
              <div className="ec2-docs-request">
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Request</div>
                  <pre className="ec2-docs-code">{selected.request}</pre>
                </div>
                <div className="ec2-docs-block">
                  <div className="ec2-docs-block-title">Response</div>
                  <pre className="ec2-docs-code">{selected.response}</pre>
                </div>
              </div>
            </div>
          </div>
        </aside>
      )}
    </>
  );
}

function CreateAPIGatewayView({onBack, onDone, notify}) {
  const [name, setName] = useState('orders-api');
  const [description, setDescription] = useState('Orders API');
  const [endpointType, setEndpointType] = useState('REGIONAL');
  const [seedSample, setSeedSample] = useState(true);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    if (!name.trim()) {
      setErr('API name is required');
      return;
    }
    setBusy(true);
    setErr('');
    try {
      const created = await APIGateway.create({
        name: name.trim(),
        description: description.trim(),
        endpoint_type: endpointType,
      });
      let api = created;
      if (seedSample && created?.rest_api_id) {
        const rootId = created.root_resource_id;
        const resource = await APIGateway.createResource(created.rest_api_id, {parent_id: rootId, path_part: 'hello'});
        const resourceId = resource.resource.resource_id;
        await APIGateway.putMethod(created.rest_api_id, {
          resource_id: resourceId,
          http_method: 'GET',
          authorization_type: 'NONE',
          api_key_required: false,
        });
        await APIGateway.putIntegration(created.rest_api_id, {
          resource_id: resourceId,
          http_method: 'GET',
          type: 'MOCK',
          response_body: JSON.stringify({message: 'Hello from API Gateway'}, null, 2),
          status_code: 200,
          content_type: 'application/json',
        });
        await APIGateway.createDeployment(created.rest_api_id, {stage_name: 'prod', description: 'Initial deployment'});
        api = await APIGateway.get(created.rest_api_id);
      }
      onDone(api || created);
    } catch (e) {
      setErr(e.message);
      notify(e.message, 'error');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="panel">
      <div className="vpc-page-head">
        <div className="bc" style={{marginBottom:8}}>
          <span>API Gateway</span><span className="bc-sep">›</span><a onClick={onBack}>APIs</a><span className="bc-sep">›</span><span>Create API</span>
        </div>
        <div className="vpc-page-title">Create API</div>
        <div className="vpc-page-sub">Create a lightweight REST API, then add resources, methods, integrations, and stages from the separate details view.</div>
      </div>
      <div className="vpc-detail-body">
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">API settings</div>
          <div className="vpc-kv-grid">
            <div className="fg">
              <label className="fl">API name</label>
              <input className="fi" value={name} onChange={e => setName(e.target.value)} />
            </div>
            <div className="fg">
              <label className="fl">Endpoint type</label>
              <select className="fi" value={endpointType} onChange={e => setEndpointType(e.target.value)}>
                <option value="REGIONAL">Regional</option>
                <option value="EDGE" disabled>Edge-optimized</option>
                <option value="PRIVATE" disabled>Private</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:'1 / -1'}}>
              <label className="fl">Description</label>
              <input className="fi" value={description} onChange={e => setDescription(e.target.value)} />
            </div>
          </div>
        </div>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">Getting started</div>
          <label className="s3-switch">
            <input type="checkbox" checked={seedSample} onChange={e => setSeedSample(e.target.checked)} />
            <span className="s3-switch-ui"></span>
            <span className="s3-switch-label">Seed a sample MOCK /hello route and deploy to prod</span>
          </label>
          <div className="vpc-detail-note" style={{marginTop:10}}>This makes the API immediately testable after creation.</div>
        </div>
        {err && <div className="ferr">{err}</div>}
        <div className="btn-grp">
          <button className="btn btn-s" onClick={onBack} disabled={busy}>Cancel</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy ? '⏳ Creating…' : 'Create API'}</button>
        </div>
      </div>
    </div>
  );
}

function APIGatewayView({notify}) {
  const [apis, setApis] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedApiId, setSelectedApiId] = useState('');
  const [selectedApi, setSelectedApi] = useState(null);
  const [query, setQuery] = useState('');
  const [detailTab, setDetailTab] = useState('overview');
  const [showCreate, setShowCreate] = useState(false);
  const [actionsOpen, setActionsOpen] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);
  const [selectedResourceId, setSelectedResourceId] = useState('');
  const [routeForm, setRouteForm] = useState({
    parent_id: '',
    path_part: 'hello',
    http_method: 'GET',
    authorization_type: 'NONE',
    integration_type: 'MOCK',
    uri: '',
    response_body: JSON.stringify({message: 'Hello from API Gateway'}, null, 2),
    status_code: 200,
    content_type: 'application/json',
  });
  const [stageForm, setStageForm] = useState({
    stage_name: 'prod',
    description: 'Production',
  });
  const actionsRef = useRef(null);

  const loadList = useCallback(async () => {
    setLoading(true);
    try {
      const d = await APIGateway.list();
      setApis(d.apis || []);
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [notify]);

  const loadDetail = useCallback(async (apiId) => {
    if (!apiId) {
      setSelectedApi(null);
      return;
    }
    try {
      const d = await APIGateway.get(apiId);
      setSelectedApi(d);
    } catch (e) {
      notify(e.message, 'error');
    }
  }, [notify]);

  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => { loadDetail(selectedApiId); }, [selectedApiId, loadDetail]);
  useEffect(() => {
    if (!selectedApi) return;
    if (!selectedResourceId) {
      setSelectedResourceId(selectedApi.root_resource_id || '');
    }
    if (!routeForm.parent_id) {
      setRouteForm(f => ({...f, parent_id: selectedApi.root_resource_id || ''}));
    }
    if (selectedApi && !selectedApi.resource_map?.some(r => r.resource_id === selectedResourceId)) {
      setSelectedResourceId(selectedApi.root_resource_id || '');
      setRouteForm(f => ({...f, parent_id: selectedApi.root_resource_id || ''}));
    }
  }, [selectedApi, selectedResourceId, routeForm.parent_id]);
  useEffect(() => {
    if (!actionsOpen) return;
    const onPointerDown = (event) => {
      if (actionsRef.current && !actionsRef.current.contains(event.target)) {
        setActionsOpen(false);
      }
    };
    document.addEventListener('pointerdown', onPointerDown);
    return () => document.removeEventListener('pointerdown', onPointerDown);
  }, [actionsOpen]);

  const filteredApis = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return apis;
    return apis.filter(api => [api.name, api.rest_api_id, api.description, api.endpoint_type].join(' ').toLowerCase().includes(q));
  }, [apis, query]);

  const openCreate = () => {
    setShowCreate(true);
    setActionsOpen(false);
  };

  const handleCreateDone = (created) => {
    setShowCreate(false);
    notify(`API "${created?.name || 'api'}" created`, 'success');
    if (created?.rest_api_id) {
      setSelectedApiId(created.rest_api_id);
      setDetailTab('overview');
      loadList();
    }
  };

  const handleSelectApi = (apiId) => {
    setActionsOpen(false);
    setSelectedApiId(apiId);
    setSelectedResourceId('');
    setDetailTab('overview');
    setRouteForm(f => ({...f, parent_id: ''}));
  };

  const closeActions = () => setActionsOpen(false);

  const doDelete = async () => {
    if (!deleteTarget) return;
    setDeleteBusy(true);
    try {
      await APIGateway.remove(deleteTarget.rest_api_id);
      notify(`API "${deleteTarget.name}" deleted`, 'success');
      setDeleteTarget(null);
      setSelectedApiId('');
      setSelectedApi(null);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    } finally {
      setDeleteBusy(false);
    }
  };

  const createRoute = async () => {
    try {
      if (!selectedApi) return notify('Select an API first', 'error');
      if (!routeForm.path_part.trim()) return notify('Path part is required', 'error');
      const parentId = routeForm.parent_id || selectedApi.root_resource_id;
      const resource = await APIGateway.createResource(selectedApi.rest_api_id, {parent_id: parentId, path_part: routeForm.path_part.trim()});
      const resourceId = resource.resource.resource_id;
      const httpMethod = routeForm.http_method.toUpperCase();
      await APIGateway.putMethod(selectedApi.rest_api_id, {
        resource_id: resourceId,
        http_method: httpMethod,
        authorization_type: routeForm.authorization_type,
        api_key_required: false,
      });
      await APIGateway.putIntegration(selectedApi.rest_api_id, {
        resource_id: resourceId,
        http_method: httpMethod,
        type: routeForm.integration_type,
        uri: routeForm.uri,
        integration_http_method: routeForm.integration_http_method || httpMethod,
        response_body: routeForm.response_body,
        status_code: Number(routeForm.status_code) || 200,
        content_type: routeForm.content_type || 'application/json',
      });
      notify('Route created', 'success');
      await loadDetail(selectedApi.rest_api_id);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const deployStage = async () => {
    try {
      if (!selectedApi) return notify('Select an API first', 'error');
      if (!stageForm.stage_name.trim()) return notify('Stage name is required', 'error');
      await APIGateway.createDeployment(selectedApi.rest_api_id, {
        stage_name: stageForm.stage_name.trim(),
        description: stageForm.description.trim(),
      });
      notify(`Stage "${stageForm.stage_name}" deployed`, 'success');
      await loadDetail(selectedApi.rest_api_id);
      loadList();
    } catch (e) {
      notify(e.message, 'error');
    }
  };

  const routeRows = selectedApi?.routes || [];
  const resourceRows = selectedApi?.resource_map || [];
  const stageRows = selectedApi?.stages || [];
  const deploymentRows = selectedApi?.deployments || [];
  const logRows = selectedApi?.logs || [];
  const selectedResource = resourceRows.find(r => r.resource_id === selectedResourceId) || resourceRows[0] || null;
  const selectedResourceRoutes = routeRows.filter(r => r.resource_id === (selectedResource?.resource_id || selectedApi?.root_resource_id));
  const totalApis = apis.length;
  const visibleApis = filteredApis.length;

  const renderOverview = () => {
    if (!selectedApi) return <div className="vpc-detail-empty">Select an API from the grid to view details.</div>;
    const activeStage = stageRows[0] || null;
    const invokeUrl = activeStage ? APIGateway.invokeUrl(selectedApi.rest_api_id, activeStage.stage_name) : APIGateway.invokeUrl(selectedApi.rest_api_id);
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-kpi-grid">
            <div className="vpc-kpi"><strong>{resourceRows.length}</strong><span>Resources</span></div>
            <div className="vpc-kpi"><strong>{routeRows.length}</strong><span>Routes</span></div>
            <div className="vpc-kpi"><strong>{stageRows.length}</strong><span>Stages</span></div>

        <div className="vpc-detail-section">

  const renderResources = () => {

        <div className="vpc-detail-section">

            <div className="fg" style={{gridColumn:'1 / -1'}}>

          </tbody>

    ) : <div className="vpc-detail-empty">Create a route to see integrations here.</div>;
  };

  const renderLogs = () => {
    if (!selectedApi) return <div className="vpc-detail-empty">Select an API from the grid to view logs.</div>;
    return logRows.length ? (
      <div className="vpc-detail-section">
        <div className="vpc-detail-section-title">Invoke logs</div>
        <table className="vpc-simple-table">

            ))}
          </tbody>
        </table>

    ) : <div className="vpc-detail-empty">No invoke logs yet. Call an invoke URL after deployment.</div>;
  };

  const renderSettings = () => {
    if (!selectedApi) return <div className="vpc-detail-empty">Select an API from the grid to view settings.</div>;
    return (
      <>
        <div className="vpc-detail-section">
          <div className="vpc-detail-section-title">API settings</div>
          <table className="vpc-simple-table">
            <thead><tr><th>Field</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>API ID</td><td className="ec2-mono">{selectedApi.rest_api_id}</td></tr>
              <tr><td>Endpoint type</td><td>{selectedApi.endpoint_type}</td></tr>
              <tr><td>Created</td><td>{fmtDate(selectedApi.created)}</td></tr>
              <tr><td>Invoke URL</td><td className="ec2-mono">{APIGateway.invokeUrl(selectedApi.rest_api_id, stageRows[0]?.stage_name || '')}</td></tr>

              <thead><tr><th>Key</th><th>Value</th></tr></thead>
              <tbody>
                {selectedApi.tags.map((tag, idx) => (
                  <tr key={`${tag.key || idx}`}>
                    <td>{tag.key}</td>
                    <td>{tag.value}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="vpc-empty-table">No tags are set on this API.</div>}
        </div>
      </>
    );
  };

  if (showCreate) {
    return (
      <>
        <APIGatewayApiDocsPanel />
        <CreateAPIGatewayView onBack={() => setShowCreate(false)} onDone={handleCreateDone} notify={notify} />
      </>
    );
  }

  return (
    <>
      <APIGatewayApiDocsPanel />
      <div className="panel">
        <div className="vpc-page-head">
          <div className="bc" style={{marginBottom:8}}>
            <span>API Gateway</span><span className="bc-sep">›</span><span>APIs</span>
          </div>
          <div className="vpc-page-title">APIs</div>
          <div className="vpc-page-sub">Create, manage, and deploy API Gateway resources with a lightweight AWS-like control plane.</div>
        </div>
        <div className="vpc-vpcs-toolbar">
          <div className="vpc-vpcs-toolbar-left">
            <input className="fi vpc-search" value={query} onChange={e => setQuery(e.target.value)} placeholder="Find APIs by name, id, or description" />
            <div className="vpc-summary">
              <div className="vpc-summary-count">Your APIs ({visibleApis}/{totalApis})</div>
              <a className="vpc-summary-info" href="#" onClick={e => e.preventDefault()}>Info</a>
              <div className="vpc-summary-updated">Last updated {relativeTime(selectedApi?.created || apis[0]?.created || '')}</div>
            </div>
          </div>
          <div className="vpc-vpcs-toolbar-right">
            <button className="btn btn-s" onClick={() => { closeActions(); loadList(); }}>↻</button>
            <div className="vpc-actions-wrap" ref={actionsRef}>
              <button className="btn btn-s" onClick={(e) => { e.stopPropagation(); setActionsOpen(v => !v); }}>Actions ▾</button>
              {actionsOpen && (
                <div className="vpc-actions-menu">
                  <button className="vpc-actions-item" onClick={() => { closeActions(); loadList(); }}>Refresh</button>
                  <button className="vpc-actions-item" onClick={() => { closeActions(); openCreate(); }}>Create API</button>
                  <button className="vpc-actions-item" onClick={() => { if (selectedApi) { closeActions(); setDeleteTarget(selectedApi); } }} disabled={!selectedApi}>Delete selected API</button>
                </div>
              )}
            </div>
            <button className="btn btn-p" onClick={openCreate}>Create API</button>
          </div>
        </div>

        <div className="vpc-grid-wrap">
          {loading && !apis.length ? (
            <div className="ld">Loading APIs…</div>
          ) : filteredApis.length ? (
            <table className="tbl vpc-grid">
              <thead>
                <tr>
                  <th><input type="checkbox" disabled aria-label="Select all APIs" /></th>
                  <th>Name</th>
                  <th>API ID</th>
                  <th>Endpoint</th>
                  <th>Resources</th>
                  <th>Stages</th>
                  <th>Invoke URL</th>
                </tr>
              </thead>
              <tbody>
                {filteredApis.map(api => (
                  <tr key={api.rest_api_id} className={selectedApiId === api.rest_api_id ? 'active' : ''} onClick={() => handleSelectApi(api.rest_api_id)}>
                    <td><input type="checkbox" checked={selectedApiId === api.rest_api_id} onChange={() => handleSelectApi(api.rest_api_id)} /></td>
                    <td title={api.name}><span className="vpc-grid-name">{api.name}</span></td>
                    <td><span className="ec2-mono">{api.rest_api_id}</span></td>
                    <td>{api.endpoint_type}</td>
                    <td>{api.resource_count}</td>
                    <td>{api.stage_count}</td>
                    <td><span className="ec2-mono" title={api.invoke_url}>{api.invoke_url}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            <div className="empty">
              <div className="empty-t">{query ? 'No matching APIs' : 'No APIs yet'}</div>
              <div className="empty-d">{query ? 'Try a different search term.' : 'Create an API to get started.'}</div>
            </div>
          )}
        </div>

        <div className="vpc-detail-wrap">
          <div className="vpc-detail-panel">
            {selectedApi ? (
              <>
                <div className="vpc-detail-banner">
                  <div className="vpc-detail-name">{selectedApi.name}</div>
                  <div className="vpc-detail-meta">{selectedApi.rest_api_id} · {selectedApi.endpoint_type} · {selectedApi.invoke_url}</div>
                </div>
                <div className="vpc-detail-tabs">
                  <div className="tabs ec2-subtabs">
                    {[
                      ['overview', 'Overview'],
                      ['resources', 'Resources'],
                      ['stages', 'Stages'],
                      ['integrations', 'Integrations'],
                      ['logs', 'Logs'],
                      ['settings', 'Settings'],
                    ].map(([k, label]) => (
                      <div key={k} className={`tab ${detailTab === k ? 'active' : ''}`} onClick={() => setDetailTab(k)}>{label}</div>
                    ))}
                  </div>
                </div>
                <div className="vpc-detail-body">
                  {detailTab === 'overview' ? renderOverview()
                    : detailTab === 'resources' ? renderResources()
                    : detailTab === 'stages' ? renderStages()
                    : detailTab === 'integrations' ? renderIntegrations()
                    : detailTab === 'logs' ? renderLogs()
                    : renderSettings()}
                </div>
              </>
            ) : (
              <div className="vpc-detail-body">
                <div className="vpc-detail-empty">Select an API from the grid to show the separate details view.</div>
              </div>
            )}
          </div>
        </div>

        {deleteTarget && (
          <ConfirmDelete
            title="Delete API"
            lines={[
              `You are about to delete API "${deleteTarget.name}".`,
              'The simulator will remove the API, routes, stages, and deployments.',
            ]}
            onConfirm={doDelete}
            onClose={() => setDeleteTarget(null)}
            busy={deleteBusy}
          />
        )}
      </div>
    </>
  );
}

/* ── Buckets View ───────────────────────────────────────────────────────── */
function BucketsView({onEnter, notify}) {
  const [list, setList]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCr, setShowCr]   = useState(false);
  const [delT, setDelT]       = useState(null);
  const [delBusy, setDelBusy] = useState(false);
  const [sel, setSel]         = useState([]);
  const [q, setQ]             = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try { const d = await S3.listBuckets(); setList(d.buckets||[]); }
    catch(e) { notify(e.message,'error'); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const doDelete = async () => {
    setDelBusy(true);
    try { await S3.deleteBucket(delT); notify(`Bucket "${delT}" deleted`,'success'); setDelT(null); setSel([]); load(); }
    catch(e) { notify(e.message,'error'); }
    finally { setDelBusy(false); }
  };

  const toggle = (n) => setSel(p => p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  const filtered = list.filter(b=>b.name.toLowerCase().includes(q.toLowerCase()));

  return (
    <>
      <S3ApiDocsPanel mode="buckets" />
      <div className="panel">
        <div className="ph">
          <div>
            <div className="pt">General purpose buckets <span style={{fontWeight:400,fontSize:14,color:'#687078'}}>({list.length})</span></div>
            <div className="ps">Store objects in buckets, organized by AWS Region.</div>
          </div>
          <div className="btn-grp">
            {sel.length===1 && <button className="btn btn-d" onClick={()=>setDelT(sel[0])}>Delete</button>}
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
            <button className="btn btn-p" onClick={()=>setShowCr(true)}>Create bucket</button>
          </div>
        </div>

        <div className="tb">
          <input className="srch" placeholder="Find buckets by name" value={q} onChange={e=>setQ(e.target.value)}/>
          <span className="tb-r" style={{fontSize:13,color:'#687078'}}>{filtered.length} bucket{filtered.length!==1?'s':''}</span>
        </div>

        {loading ? <div className="ld">Loading buckets…</div>
        : filtered.length===0 ?
          <div className="empty">
            <div className="empty-t">{list.length===0?'No buckets yet':q?`No results for "${q}"`:''}</div>
            <div className="empty-d">{list.length===0?'Create your first bucket to start storing data':''}</div>
            {list.length===0 && <button className="btn btn-p" onClick={()=>setShowCr(true)}>Create bucket</button>}
          </div>
        :
          <table className="tbl">
            <thead><tr>
              <th><input type="checkbox" checked={sel.length===filtered.length&&filtered.length>0} onChange={e=>setSel(e.target.checked?filtered.map(b=>b.name):[])}/></th>
              <th>Name</th><th>AWS Region</th><th>Type</th><th>Access</th><th>Creation date</th>
            </tr></thead>
            <tbody>
              {filtered.map(b => (
                <tr key={b.name}>
                  <td><input type="checkbox" checked={sel.includes(b.name)} onChange={()=>toggle(b.name)}/></td>
                  <td><span className="lnk" onClick={()=>onEnter(b)}>{b.name}</span></td>
                  <td>{b.region}</td>
                  <td>General purpose</td>
                  <td><span className="tag tg">{b.access}</span></td>
                  <td>{fmtDate(b.created)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        }
      </div>

      {showCr && <CreateBucketModal onClose={()=>setShowCr(false)} onDone={msg=>{notify(msg,'success');setShowCr(false);load();}}/>}
      {delT && <ConfirmDelete title="Delete bucket" lines={[`You are about to delete bucket "${delT}".`,'The bucket must be empty. This action cannot be undone.']} onConfirm={doDelete} onClose={()=>setDelT(null)} busy={delBusy}/>}
    </>
  );
}

/* ── Objects View ───────────────────────────────────────────────────────── */
function ObjectsView({bucket, onBack, notify}) {
  const [objs, setObjs]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [showUp, setShowUp]   = useState(false);
  const [delT, setDelT]       = useState(null);
  const [delBusy, setDelBusy] = useState(false);
  const [sel, setSel]         = useState([]);
  const [selectedObject, setSelectedObject] = useState(null);
  const [q, setQ]             = useState('');
  const [tab, setTab]         = useState('objects');
  const [versioningMode, setVersioningMode] = useState(bucket.versioning || 'Disabled');
  const [showVersions, setShowVersions] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = showVersions
        ? await S3.listVersions(bucket.name, q)
        : await S3.listObjects(bucket.name, q);
      setObjs((showVersions ? d.versions : d.objects) || []);
      setSel([]);
    }
    catch(e) { notify(e.message,'error'); }
    finally { setLoading(false); }
  }, [bucket.name, showVersions, q]);

  useEffect(() => { load(); }, [load]);

  const doDelete = async () => {
    setDelBusy(true);
    try {
      for (const obj of delT) await S3.deleteObject(bucket.name, obj.key, showVersions ? (obj.version_id || '') : '');
      notify(`${delT.length} object(s) deleted`,'success');
      setDelT(null); setSel([]); load();
    } catch(e) { notify(e.message,'error'); }
    finally { setDelBusy(false); }
  };

  const toggle = (k) => setSel(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const filtered = objs.filter(o=>o.key.toLowerCase().includes(q.toLowerCase()));
  const totalSz  = objs.reduce((s,o)=>s+(o.size||0),0);
  useEffect(() => {
    setVersioningMode(bucket.versioning || 'Disabled');
  }, [bucket.name, bucket.versioning]);
  useEffect(() => {
    setSel([]);
  }, [showVersions]);
  useEffect(() => {
    if (versioningMode === 'Disabled') setShowVersions(false);
  }, [versioningMode]);
  const saveVersioning = async () => {
    try {
      const d = await S3.setVersioning(bucket.name, versioningMode);
      setVersioningMode(d.versioning || versioningMode);
      notify(`Bucket versioning set to ${d.versioning || versioningMode}`,'success');
      load();
    } catch (e) {
      notify(e.message, 'error');
    }
  };
  const showVersionSwitch = versioningMode !== 'Disabled';
  const rowKey = (o) => showVersions ? `${o.key}@@${o.version_id || 'null'}` : o.key;
  const parsedSelected = useMemo(() => {
    return sel.map(id => {
      if (!showVersions) return objs.find(o => o.key === id) || null;
      const [key, version_id = 'null'] = id.split('@@');
      return objs.find(o => o.key === key && String(o.version_id || 'null') === version_id) || null;
    }).filter(Boolean);
  }, [objs, sel, showVersions]);

  return (
    <>
      <S3ApiDocsPanel mode="objects" bucketName={bucket.name} />
      {/* Breadcrumb */}
      <div className="bc">
        <span>Amazon S3</span><span className="bc-sep">›</span>
        <a onClick={onBack}>General purpose buckets</a><span className="bc-sep">›</span>
        <span>{bucket.name}</span>
      </div>

      <div className="panel">
        <div className="ph">
          <div>
            <div className="pt">{bucket.name}</div>
            <div className="ps">Region: <strong>{bucket.region}</strong> &nbsp;|&nbsp; Type: <strong>General purpose</strong></div>
          </div>
          <div className="btn-grp">
            <button className="btn btn-s" onClick={onBack}>← Back</button>
            <button className="btn btn-s" onClick={load}>↻ Refresh</button>
          </div>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {['objects','properties','permissions','metrics'].map(t => (
            <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </div>
          ))}
        </div>

        {tab==='objects' ? <>
          {/* Stats bar */}
          <div className="sbar">
            <span>Objects: <strong>{objs.length}</strong></span>
            <span>Total size: <strong>{fmtSize(totalSz)}</strong></span>
            <span>Region: <strong>{bucket.region}</strong></span>
            <span>Versioning: <strong>{versioningMode}</strong></span>
          </div>

          {/* Toolbar */}
          <div className="tb" style={{flexWrap:'wrap',gap:8}}>
          <button className="btn btn-p" onClick={()=>setShowUp(true)}>Upload</button>
          <button className="btn btn-s" onClick={()=>notify('Folder creation is simulated — use prefixes in object keys','info')}>Create folder</button>
          {sel.length>0 && <>
            {sel.length===1 && parsedSelected[0] && (
              <a className="btn btn-s" href={S3.dlUrl(bucket.name, parsedSelected[0].key, showVersions ? (parsedSelected[0].version_id || '') : '')} download={parsedSelected[0].key}>Download</a>
            )}
            <button className="btn btn-d" onClick={()=>setDelT(parsedSelected)}>Delete ({sel.length})</button>
          </>}
          {showVersionSwitch && (
            <label className="s3-switch" style={{marginLeft:8}}>
              <input type="checkbox" checked={showVersions} onChange={e=>setShowVersions(e.target.checked)} />
              <span className="s3-switch-ui" aria-hidden="true" />
              <span className="s3-switch-label">Show versions</span>
            </label>
          )}
          <div className="tb-r"><input className="srch" placeholder="Find objects by name" value={q} onChange={e=>setQ(e.target.value)}/></div>
          </div>

          <div className="s3-object-stage">
            {!selectedObject ? <div className="s3-object-list-panel">
              {loading ? <div className="ld">Loading objects…</div>
              : filtered.length===0 ?
                <div className="empty">
                  <div className="empty-t">{objs.length===0?'Bucket is empty':q?`No results for "${q}"`:''}</div>
                  <div className="empty-d">{objs.length===0?'Upload files to start storing objects in this bucket':''}</div>
                  {objs.length===0 && <button className="btn btn-p" onClick={()=>setShowUp(true)}>Upload</button>}
                </div>
              :
                <table className="tbl">
                  <thead><tr>
                    <th><input type="checkbox" checked={sel.length===filtered.length&&filtered.length>0} onChange={e=>setSel(e.target.checked?filtered.map(o=>rowKey(o)):[])}/></th>
                    <th>Name</th>
                    {showVersions && <th>Version ID</th>}
                    <th>Type</th><th>Last modified</th><th>Size</th><th>Storage class</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(o => (
                      <tr key={rowKey(o)}>
                        <td><input type="checkbox" checked={sel.includes(rowKey(o))} onChange={()=>toggle(rowKey(o))}/></td>
                        <td><span className="lnk" onClick={()=>setSelectedObject({key:o.key, versionId:showVersions ? (o.version_id || '') : ''})}>{o.key}</span></td>
                        {showVersions && <td><span className="ec2-mono">{o.version_id ? o.version_id : '—'}</span></td>}
                        <td style={{color:'#687078'}}>{showVersions ? (o.is_delete_marker ? 'Delete marker' : 'Object') : o.content_type}</td>
                        <td>{fmtDate(o.last_modified)}</td>
                        <td>{o.is_delete_marker ? '—' : o.size_human}</td>
                        <td><span className="tag tb2">{o.storage_class}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              }
            </div> : (
              <ObjDetail
                bucket={bucket.name}
                objKey={selectedObject.key}
                versionId={selectedObject.versionId}
                onClose={()=>setSelectedObject(null)}
                onDelete={(k,v)=>{ setSelectedObject(null); setDelT([{key:k, version_id:v || ''}]); }}
              />
            )}
          </div>
        </>
        : tab==='properties' ?
          <div style={{padding:24}}>
            <div className="ibox" style={{marginBottom:16}}>
              <strong>Versioning</strong> keeps multiple versions of objects when enabled.
            </div>
            <div className="fg" style={{maxWidth:420}}>
              <label className="fl">Bucket versioning</label>
              <select className="fi" value={versioningMode} onChange={e=>setVersioningMode(e.target.value)}>
                {['Disabled','Enabled','Suspended'].map(status => <option key={status} value={status}>{status}</option>)}
              </select>
              <div className="fh">Enabled preserves every write as a version. Suspended keeps prior versions but stops creating new unique version IDs.</div>
            </div>
            <div className="btn-grp" style={{margin:'12px 0 18px'}}>
              <button className="btn btn-p" onClick={saveVersioning}>Save changes</button>
            </div>
            <table className="ptbl"><tbody>
              {[['Bucket name',bucket.name],['AWS Region',bucket.region],['ARN',bucket.arn],
                ['Creation date',fmtDate(bucket.created)],['Versioning',versioningMode],
                ['Default encryption','SSE-S3 (AES-256)'],['Static website hosting','Disabled'],
                ['Transfer acceleration','Disabled'],['Requester pays','Disabled']
              ].map(([k,v]) => (
                <tr key={k}><td>{k}</td><td>{k==='ARN'?<span className="arn">{v}</span>:v}</td></tr>
              ))}
            </tbody></table>
          </div>
        : tab==='permissions' ?
          <div style={{padding:24}}>
            <div className="ibox"><strong>Block Public Access</strong> — All public access is blocked for this bucket.</div>
            <p style={{fontSize:13,color:'#687078',lineHeight:1.7}}>
              In the real AWS console, this tab lets you manage bucket policies, ACLs, CORS rules and public access settings.
              This simulator maps to the S3 console — security controls are enforced at the API layer.
            </p>
          </div>
        :
          <div style={{padding:24}}>
            <div className="ibox"><strong>CloudWatch Metrics</strong> — Storage and request metrics would appear here in real AWS.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginTop:12}}>
              {[['Total objects',objs.length],['Total size',fmtSize(totalSz)],['Requests today',Math.floor(Math.random()*500+100)],['Data transferred',fmtSize(totalSz*2)]].map(([label,val]) => (
                <div key={label} style={{background:'#fafafa',border:'1px solid #eaeded',borderRadius:4,padding:16,textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:700,margin:'6px 0'}}>{val}</div>
                  <div style={{fontSize:13,color:'#687078'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        }
      </div>

      {showUp && <UploadModal bucket={bucket.name} onClose={()=>setShowUp(false)} onDone={(ok,fail)=>{setShowUp(false);if(ok)notify(`${ok} file(s) uploaded successfully`,'success');if(fail)notify(`${fail} file(s) failed`,'error');load();}}/>}
      {delT && <ConfirmDelete title={`Delete ${delT.length} object(s)`} lines={[`You are about to permanently delete:`,...delT.map(o=>`• ${o.key}${showVersions ? ` (${o.version_id ? o.version_id : '—'})` : ''}`),'This action cannot be undone.']} onConfirm={doDelete} onClose={()=>setDelT(null)} busy={delBusy}/>}
    </>
  );
}

/* ── App ────────────────────────────────────────────────────────────────── */

    const resolved = target === 's3' ? 's3-buckets' : target;
    setBucket(null);
    setView(resolved);

    dashboard: 'AWS Management Console',
    iam: 'IAM',
    ec2: 'Amazon EC2',
    vpc: 'Amazon VPC',
    rds: 'Amazon RDS',
    apigateway: 'Amazon API Gateway',
    's3-buckets': 'Amazon S3',
    's3-objects': 'Amazon S3',

    ['Overview', 'dashboard'],
    ['EC2', 'ec2'],
    ['RDS', 'rds'],
    ['VPC', 'vpc'],
    ['API Gateway', 'apigateway'],
    ['S3', 's3-buckets'],

  const sideGroups = [
    {title: 'AWS services', items: navItems},

  const matches = (label) => label.toLowerCase().includes(query.toLowerCase());
  const filteredGroups = sideGroups
    .map(group => ({
      ...group,
      items: group.items.filter(([label]) => matches(label))

    .filter(group => group.items.length);

  return (
    <>
      {productMode ? (
        <>
          <header className="hdr">
            <div className="hdr-logo">aws<span>☁</span></div>
            <div className="hdr-svc"><strong>CloudLearn Product Center</strong></div>
            <div className="hdr-right">
              <span className="badge">ADMIN</span>
              <span>local</span>
            </div>
          </header>
          <main className="aws-main" style={{marginLeft:0,width:'100%'}}>
            <ProductView notify={notify}/>
          </main>
        </>
      ) : (
        <>
          {/* Top header */}
          <header className="hdr">
            <div className="hdr-logo">aws<span>☁</span></div>
            <button className="hdr-menu" onClick={()=>open('dashboard')}>Services</button>
            <div className="hdr-svc"><strong>{titleMap[view] || 'Simulator'}</strong></div>
            <div className="hdr-search">
              <input
                value={query}
                onChange={e=>setQuery(e.target.value)}
                placeholder="Search services"
              />
            </div>
            <div className="hdr-right">
              <span className="badge">SIMULATOR</span>
              <span>us-east-1</span>
              <span style={{background:'#37475a',padding:'3px 10px',borderRadius:3,fontSize:12}}>root</span>
            </div>
          </header>

          <div className="aws-shell">
            <aside className="aws-sidebar">
              <div className="aws-side-search">
                <input
                  value={query}
                  onChange={e=>setQuery(e.target.value)}
                  placeholder="Search services"
                />
              </div>
              {filteredGroups.map(group => (
                <div className="aws-group" key={group.title}>
                  <div className="aws-group-title">{group.title}</div>
                  {group.items.map(([label, target]) => (
                    <div
                      key={label}
                      className={`aws-item ${(view===target || (view==='s3-objects' && target==='s3-buckets')) ? 'active' : ''}`}
                      onClick={()=>open(target)}

                      <span>{label}</span>
                      <span className="small">›</span>

                  ))}
                </div>
              ))}
            </aside>

            <main className="aws-main">
              {view==='dashboard'
                ? <DashboardView onOpen={open} notify={notify}/>
              : view==='iam'
                ? <IAMView notify={notify}/>
              : view==='ec2'
                ? <EC2View notify={notify}/>
              : view==='rds'
                ? <RDSView notify={notify}/>
              : view==='apigateway'
                ? <APIGatewayView notify={notify}/>
              : view==='vpc'
                ? <VPCView notify={notify}/>
              : view==='s3-buckets'
                ? <BucketsView onEnter={enterBucket} notify={notify}/>
                : <ObjectsView bucket={bucket} onBack={goBack} notify={notify}/>
              }
            </main>
          </div>
        </>
      )}

      {/* Notification toast */}
      {notif && <Notif key={notif.id} msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
